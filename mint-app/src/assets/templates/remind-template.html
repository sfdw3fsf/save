<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="cache-control" content="no-cache" />
  <meta http-equiv="pragma" content="no-cache" />
  <meta http-equiv="expires" content="-1" />
  <meta http-equiv="content-type" content="text/html; charset=UTF-8" />
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&amp;display=swap" rel="stylesheet" />
  <title>Mint App</title>
</head>
<body style="font-family: 'Noto Sans KR', sans-serif; background-color: white">
<table id="mint-email" width="100%" cellpadding="0" cellspacing="0" border="0">

    <td align="center">
      <table width="640" cellpadding="0" cellspacing="0" border="0">

                    <tr>
                      <td>
                        <img

                      </td>
                    </tr>
                    </tbody>
                  </table>
                </td>
              </tr>
              </tbody>
            </table>
          </td>
        </tr>
        <tr>

            <table

                    cellpadding=""
                    cellspacing="24"
                    border="0"
                    style="
                        padding: 8px 0px;
                        font-size: 16px;
                        line-height: 24px;
                        font-weight: 400;
                        color: #64748b;
                        text-align: left;
                      ">
              <tr>
                <td>
                  <span style="font-size: 20px; line-height: 30px; font-weight: 700; color: #34987b">Dr. Wiz</span>

              </tr>
              <tr>
                <td>

                                  <td>날짜</td>

                                </tbody>
                              </table>

                            <td align="right">
                              <table style="width: 100%" cellpadding="0" cellspacing="0" border="0">
                                <tbody>
                                <tr>
                                  <td align="right">
                                    <span style="font-weight: 700" th:text="${data.date}"></span>
                                  </td>
                                </tr>
                                </tbody>
                              </table>
                            </td>
                          </tr>
                          </tbody>
                        </table>
                      </td>
                    </tr>
                    </tbody>
                  </table>
                </td>
              </tr>
              <tr>
                <td>
                  <table width="100%" cellpadding="0" cellspacing="0" border="0">

                    <tr>
                      <td>
                        <table width="100%" cellpadding="0" cellspacing="0" border="0">
                          <tbody>
                          <tr>
                            <td width="40%" align="left">
                              <table cellpadding="0" cellspacing="0" border="0">
                                <tbody>
                                <tr>
                                  <td>시간</td>
                                </tr>
                                </tbody>
                              </table>

                              <table style="width: 100%" cellpadding="0" cellspacing="0" border="0">
                                <tbody>
                                <tr>
                                  <td align="right">
                                    <span style="font-weight: 700" th:text="${data.time}"></span>
                                  </td>
                                </tr>
                                </tbody>
                              </table>
                            </td>
                          </tr>
                          </tbody>
                        </table>
                      </td>
                    </tr>
                    </tbody>
                  </table>
                </td>
              </tr>
              <tr>
                <td>

                    <tr>
                      <td>

                          <tbody>
                          <tr>
                            <td width="40%" align="left">
                              <table cellpadding="0" cellspacing="0" border="0">
                                <tbody>
                                <tr>
                                  <td>장소</td>
                                </tr>
                                </tbody>
                              </table>
                            </td>
                            <td align="right">
                              <table style="width: 100%" cellpadding="0" cellspacing="0" border="0">
                                <tbody>
                                <tr>
                                  <td align="right">
                                    <span style="font-weight: 700" th:text="${data.url}"></span>
                                  </td>
                                </tr>
                                </tbody>
                              </table>
                            </td>
                          </tr>
                          </tbody>
                        </table>
                      </td>
                    </tr>
                    </tbody>
                  </table>
                </td>
              </tr>
              <tr>
                <td>
                  <table width="100%" cellpadding="0" cellspacing="0" border="0">
                    <tbody>
                    <tr>
                      <td>
                        <table width="100%" cellpadding="0" cellspacing="0" border="0">
                          <tbody>
                          <tr>
                            <td width="40%" align="left">
                              <table cellpadding="0" cellspacing="0" border="0">
                                <tbody>
                                <tr>
                                  <td>참석자</td>
                                </tr>
                                </tbody>
                              </table>
                            </td>
                            <td align="right">
                              <table style="width: 100%" cellpadding="0" cellspacing="0" border="0">
                                <tbody>
                                <tr>
                                  <td align="right">
                                                  <span
                                                          style="font-weight: 700"
                                                          th:text="|${data.expertName} - ${data.memberName}|">
                                                  </span>
                                  </td>
                                </tr>
                                </tbody>
                              </table>
                            </td>
                          </tr>
                          </tbody>
                        </table>
                      </td>
                    </tr>
                    </tbody>
                  </table>
                </td>
              </tr>
              <tr>
                <td>
                  미팅 전에 준비하실 내용이 있는지 확인 부탁드립니다. 만약 일정 변경이 필요하면 가능한 빠르게 연락 주시길
                  바랍니다. <br />
                  <br />
                  감사합니다. <br />
                  <br />
                  Dr. Wiz 팀 드림
                </td>
              </tr>
            </table>
          </td>
        </tr>
        <tr>

                    <tr>

                        <table cellpadding="0" cellspacing="0" border="0">
                          <tbody>
                          <tr>
                            <td>
                              <img
                                      width="40"
                                      height="auto"
                                      src="https://mint-asset.s3.ap-northeast-2.amazonaws.com/public/d9e18c6c-e738-4ec1-ab93-349ea21991b1"
                                      alt="logo" />
                            </td>
                          </tr>
                          </tbody>
                        </table>
                      </td>
                      <td align="right">
                        <table cellpadding="0" cellspacing="0" border="0">
                          <tbody>
                          <tr>
                            <td>
                              <a href="#" target="_blank">
                                <img
                                        width="20"
                                        height="20"
                                        src="https://mint-asset.s3.ap-northeast-2.amazonaws.com/public/970e8f5d-f6d5-43ed-a549-68f85da8b6a3"
                                        alt="LinkedIn" />
                              </a>
                            </td>
                            <td style="padding-left: 16px">
                              <a href="#" target="_blank">
                                <img
                                        width="20"
                                        height="20"
                                        src="https://mint-asset.s3.ap-northeast-2.amazonaws.com/public/b8e87461-b14f-4541-b57d-0b005912a8de"
                                        alt="Facebook" />
                              </a>
                            </td>
                          </tr>
                          </tbody>
                        </table>
                      </td>
                    </tr>
                    </tbody>
                  </table>
                </td>
              </tr>
              <tr>
                <td>
                  <table
                          width="100%"
                          cellpadding="0"
                          cellspacing="0"
                          border="0"
                          style="font-size: 12px; line-height: 18px; font-weight: 400; color: #64748b">
                    <tbody>
                    <tr>
                      <td style="padding-bottom: 8px">고객센터</td>
                    </tr>
                    <tr>
                      <td style="padding-bottom: 8px">이메일: general@mintmd.bio</td>
                    </tr>
                    <tr>
                      <td>Copyright @ Dr. Wiz. All Rights Reserved</td>
                    </tr>
                    </tbody>
                  </table>
                </td>
              </tr>
              </tbody>
            </table>

      </table>
    </td>

</table>

</html>
