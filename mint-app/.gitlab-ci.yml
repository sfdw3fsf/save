stages:
  - deploy

deploy:
  stage: deploy
  image: alpine:3.11
  before_script:
    - apk update && apk add openssh-client bash
    - mkdir -p ~/.ssh
    - eval $(ssh-agent -s)
    - echo "$DROPLET_PRIVATE_KEY" | tr -d '\r' | ssh-add - > /dev/null
    - touch ~/.ssh/config
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
    - ssh-keyscan -H $DROPLET_PUBLIC_IP >> ~/.ssh/known_hosts
  script:
    - echo "Deploying started..."
    - ssh $DROPLET_USER@$DROPLET_PUBLIC_IP "cd /root/mint-app && git pull && source ~/.nvm/nvm.sh && /root/.nvm/versions/node/v20.17.0/bin/yarn install && /root/.nvm/versions/node/v20.17.0/bin/yarn build:production && docker compose up --build -d"
    - echo "Finished deploying the app."
    - ssh $DROPLET_USER@$DROPLET_PUBLIC_IP "nohup docker system prune -f > /dev/null 2>&1 &"
  only:
    - develop
  tags:
    - mint-system
