        c3p0:
        max_size: 15
        min_size: 6
        timeout: 60000
        max_statements_per_connection: 10
        idle_test_period: 3000
        acquire_increment: 3
        validate: false
        numHelperThreads: 15
        jdbc:
          time_zone: UTC
  jackson:
