eureka: #<1>
  instance:
    appname: ${HOSTNAME:BSS-SUCO-Service}
    lease-renewal-interval-in-seconds: ${lease_renewal:5}
    lease-expiration-duration-in-seconds: ${lease_expiration:15}
    health-check-url-path: /actuator/health
    metadata-map:
      startup: ${random.int}
    ip-address: ${CLIENT_IP_ADDRESS:local.idg.vnpt.vn}
    prefer-ip-address: ${PREFER_IP_ADDRESS:true}
    hostname: ${HOSTNAME:BSS-SUCO-Service}
  client:
    initial-instance-info-replication-interval-seconds: 5
    registry-fetch-interval-seconds: 5
    registryFetchIntervalSeconds: 5
    serviceUrl:
      defaultZone: ${EUREKA_SERVICE_URL:http://local.idg.vnpt.vn:8761}/eureka
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    healthcheck:
      enabled: true

logging:
  mode: ${fluentd_mode:fluentd}
  #mode: local
  fluentd:
    tag: ${fluentd_tag:VNPTIT.ERP.ONE_APP_DEBT_TEST}
    host: ${fluentd_host:10.159.28.112}
    port: ${fluentd_post:24224}

object-storage:
  enabled: ${obj_storage_enabled:true}
  url: ${obj_storage_url:https://minio.vnptit3.vn}
  access-key: ${obj_storage_access_key:minioit3}
  secret-key: ${obj_storage_secret_key:minioit3it3IT3IT3IT3}
  bucket: ${obj_storage_bucket:onebss-develop}
  region: ${obj_storage_region:us-east-1}
  folder: ${obj_storage_folder:SUCO}
  presigned-url-expiry-seconds: ${presigned_url_expiry_seconds:86400}

management:
  endpoints:
    web:
      exposure:
        include: "*" #<2>
  endpoint:
    health:
      show-details: ALWAYS
---
oauth2:
  oauth:
    clientId: ${AUTH_CLIENTID:clientapp}
    secret: ${AUTH_SECRET:password}
    publicKeyEndpointUri: ${AUTH_URL:https://explorer.idg.vnpt.vn/auth-service/oauth/token_key}
    url-permit-all: ${URL_PERMIT_ALL:/instances**,/actuator/**,/v2/api-docs}
    url-permit-all-by-ip-range: ${URL_PERMIT_ALL_BY_IP_RANGE:/instances**,/actuator/**}
    ip-range-permit-all: ${IP_RANGE_PERMIT_ALL:127.0.0.1,192.168.1.0/24,0:0:0:0:0:0:0:1}

ribbon:
  eureka:
    enabled: true

---
logging:
  level:
    com.zaxxer.hikari: debug
