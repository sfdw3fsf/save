            application/json:
              schema:
                $ref: '#/components/schemas/DeviceWirelessAdvV2ListResponse'
  /device/v2/GW040H/setWirelessAdvance:
    post:
      tags:
      - GW040H
      description: API cập nhật thông tin wlan advance cho GW040H
