          type: string
      requestBody:
        description: Chuỗi JSON định danh file backup cần backup
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FileBackup'
        required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
      x-codegen-request-body-name: body
  /device/getByOptical:
    get:
      tags:
      - device
      description: Lấy thông tin chi tiết thiết bị
      operationId: searchDevice
      parameters:
      - name: optical
        in: query
        description: Mã Optical Serial number của thiết bị
        required: true
        schema:
          type: string
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceParamResponse'
  /device/getUptime:
    get:
      tags:
      - device
      description: Lấy thông tin uptime thiết bị
      operationId: getUptime
      parameters:
      - name: optical
        in: query
        description: Mã Optical Serial number của thiết bị
        required: true
        schema:
          type: string
      responses:
        200:
          description: Thời gian uptime tính theo giây
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
  /batch/action:
    post:
      tags:
      - batch
      description: reboot/reset/xóa file backup thiết bị hàng loạt
      operationId: batch_action
      requestBody:
        description: Chuỗi JSON định danh file backup cần backup
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchInput'
        required: true
      responses:
        200:
          description: url trỏ tới api check kết quả thực hiện
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
      x-codegen-request-body-name: body
  /batch/result:
    get:
      tags:
      - batch
      description: Kết quả log batch (reboot, reset, …)
      operationId: batch_result
      parameters:
      - name: batchID
        in: query
        description: Batch session ID của lệnh cần tra cứu log
        required: true
        schema:
          type: integer
      responses:
        200:
          description: Kết quả trả về là một Json object dạng List, mỗi object là
            log cho từng thiết bị
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchLogListResponse'
  /backup/delAll:
    get:
      tags:
      - backup
      description: Xóa toàn bộ file backup của một thiết bị
      operationId: backup_delAll
      parameters:
      - name: optical
        in: query
        description: Mã Optical Serial number của thiết bị
        required: true
        schema:
          type: string
      responses:
        200:
          description: Kết quả trả về là một Json object dạng List, mỗi object là
            log cho từng thiết bị
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
  /device/delete:
    get:
      tags:
      - device
      description: Xóa thiết bị
      operationId: delete
      parameters:
      - name: optical
        in: query
        description: Mã Optical Serial number của thiết bị
        required: true
        schema:
          type: string
      responses:
        200:
          description: Kết quả trả về là một Json object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
  /device/getListWlan:
    get:
      tags:
      - device
      description: Lấy thông tin wifi
      operationId: device_getListWlan
      parameters:
      - name: optical
        in: query
        description: Mã Optical Serial number của thiết bị
        required: true
        schema:
          type: string
      responses:
        200:
          description: Kết quả trả về là một Json List object các Wlan của thiết bị
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceWlanListResponse'
  /device/onOffWifi:
    post:
      tags:
      - device
      description: Cấu hình on/off wifi
      operationId: device_onOffWifi
      parameters:
      - name: optical
        in: query
        description: Mã Optical Serial number của thiết bị
        required: true
        schema:
          type: string
      requestBody:
        description: List các object wifi cần bật/tắt
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/DeviceWlan'
        required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
      x-codegen-request-body-name: wifis
  /device/updateWifi:
    post:
      tags:
      - device
      description: Cấu hình thông tin wifi (wlan)
      operationId: device_updateWifi
      parameters:
      - name: optical
        in: query
        description: Mã Optical Serial number của thiết bị
        required: true
        schema:
          type: string
      requestBody:
        description: List các object wifi cần bật/tắt
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/DeviceWlan'
        required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
      x-codegen-request-body-name: wifis
  /backup/searchTemplate:
    get:
      tags:
      - backup
      description: Tìm kiếm template ZeroTouch
      operationId: backup_searchTemplate
      parameters:
      - name: templateName
        in: query
        description: Lọc kết quả template theo template Name
        schema:
          type: string
      - name: modelName
        in: query
        description: Lọc kết quả template theo model name dòng thiết bị
        schema:
          type: string
      - name: templateCode
        in: query
        description: Lọc kết quả template theo template Code
        schema:
          type: string
      responses:
        200:
          description: Kết quả trả về thành công là chuỗi json chứa list các template
            ZeroTouch tìm kiếm thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateZerotouchListResponse'
  /backup/getTemplateImport:
    get:
      tags:
      - backup
      description: Lấy file import cấu hình ZeroTouch
      operationId: backup_getTemplateImport
      parameters:
      - name: templateCode
        in: query
        description: Template Code cần để lấy import file
        schema:
          type: string
      responses:
        200:
          description: Kết quả trả về thành công file excel (.xls) để người dùng cấu
            hình dịch vụ cho thiết bị.
          content:
            application/json:
              schema:
                type: string
                format: binary
  /backup/templateUpload:
    post:
      tags:
      - backup
      description: Import cấu hình ZeroTouch cho nhiều thiết bị
      operationId: backup_templateUpload
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                fileExcel:
                  type: string
                  description: File excel chứa cấu hình zerotouch của nhiều thiết bị
                  format: binary
      responses:
        200:
          description: Kết quả trả về thành công là file excel (.xls) có thêm cột result chứa url file zerotouch (là file backup) vừa được tạo trên hệ thống
          content:
            application/xls:
              schema:
                type: string
                format: binary
                description: File excel chứa cấu hình zerotouch của nhiều thiết bị
  /backup/getTemplate:
    get:
      tags:
      - backup
      description: Lấy chuỗi cấu hình cho từng template
      operationId: backup_getTemplate
      parameters:
      - name: templateCode
        in: query
        description: Template code sử dụng
        schema:
          type: string
      responses:
        200:
          description: Kết quả trả về là object Json chứa các tham số cần để cấu hình cho template, chú ý tham số serial dùng để lưu trường Serial của thiết bị
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateInfResponse'
  /backup/importZerotouch:
    post:
      tags:
      - backup
      description: Cấu hình zero touch cho 1 thiết bị
      operationId: backup_importZerotouch
      parameters:
      - name: templateCode
        in: query
        description: Template code sử dụng
        required: true
        schema:
          type: string
      requestBody:
        description: Thông tin cấu hình zero touch
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateInf'
        required: true
      responses:
        200:
          description: Kết quả trả về thành công là url file backup đã tạo cho thiết bị
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
      x-codegen-request-body-name: objectConfig
  /device/getAccWebGui:
    get:
