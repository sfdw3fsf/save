tags: []
paths:
  /device/reboot:
    get:
      tags:
      - device
      description: Khởi động lại thiết bị
      operationId: reboot
      parameters:
      - name: optical
        in: query
        description: Mã Optical Serial number của thiết bị
        required: true
        schema:
          type: string
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
  /backup/getListBackup:
    get:
      tags:
      - backup
      description: Lấy danh sách file backup của thiết bị
      operationId: getListBackup
      parameters:
      - name: optical
        in: query
        description: Mã Optical Serial number của thiết bị
        required: true
        schema:
          type: string
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileBackupListResponse'
  /backup/delxml:
    post:
      tags:
      - backup
      description: Xóa file backup cấu hình
      operationId: delxml
      parameters:
      - name: optical
        in: query
        description: Mã Optical Serial number của thiết bị
        required: true
        schema:
          type: string
      requestBody:
        description: Chuỗi JSON định danh các object file backup muốn xóa
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/FileBackup'
        required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
      x-codegen-request-body-name: body
  /backup/backup:
    get:
      tags:
      - backup
      description: Backup cấu hình thiết bị
      operationId: backup
      parameters:
      - name: optical
        in: query
        description: Mã Optical Serial number của thiết bị
        required: true
        schema:
          type: string
      - name: backupName
        in: query
        description: Tên file backup
        required: true
        schema:
          type: string
      responses:
        200:
          description: Đường dẫn file đã được backup
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
  /backup/restore:
    post:
      tags:
