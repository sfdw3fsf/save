        description: url hoặc ip của host cần kiểm tra kết nối
        required: true
        schema:
          type: string
      - name: downloadurl
        in: query
        description: url test download file
        required: true
        schema:
          type: string
      - name: uploadurl
        in: query
        description: url upload file test (kích thước 10Mb)
        required: true
        schema:
          type: string
      responses:
        200:
          description: Kết quả trả về là object Json chứa kết quả ping
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticResponse'
