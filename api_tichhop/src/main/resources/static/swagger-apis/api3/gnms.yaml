        schema:
          type: string
      responses:
        200:
          description: Kết quả trả về là object Json chứa thông tin account đăng nhập
            thiết bị
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccWebGuiListResponse'
  /device/configWebGuiPass:
    get:
      tags:
      - device
      description: Lấy cấu hình account đăng nhập thiết bị
      operationId: device_configWebGuiPass
      parameters:
      - name: optical
        in: query
        description: Mã Optical Serial number của thiết bị
        required: true
        schema:
          type: string
      - name: username
        in: query
        description: Username login
        required: true
        schema:
          type: string
      - name: password
        in: query
        description: Password mới
        required: true
        schema:
          type: string
      responses:
        200:
          description: Kết quả trả về là object Json chứa message thông báo kết quả
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
  /device/getListWan:
    get:
      tags:
      - device
      description: Lấy thông tin các WAN của thiết bị
      operationId: device_getListWan
      parameters:
      - name: optical
        in: query
        description: Mã Optical Serial number của thiết bị
        required: true
        schema:
          type: string
      responses:
        200:
          description: Kết quả trả về là object Json chứa danh sách các WAN của thiết
            bị
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceWanListResponse'
  /device/getWirelessAdvance:
    get:
      tags:
      - device
      description: Lấy thông tin cấu hình advance của wifi (channel, công suất phát,
        …)
      operationId: device_getWirelessAdvance
      parameters:
      - name: optical
        in: query
        description: Mã Optical Serial number của thiết bị
        required: true
        schema:
          type: string
      responses:
        200:
          description: Kết quả trả về là object Json chứa thông tin cấu hình wif
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceWirelessAdvResponse'
  /device/setWirelessAdvance:
    post:
      tags:
      - device
      description: Cấu hình thông tin wifi advance
      operationId: device_setWirelessAdvance
      parameters:
      - name: optical
        in: query
        description: Mã Optical Serial number của thiết bị
        required: true
        schema:
          type: string
      requestBody:
        description: Object cấu hình wifi advance
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceWirelessAdv'
        required: true
      responses:
        200:
          description: Kết quả trả về thành công là chuỗi json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BaseResponse'
      x-codegen-request-body-name: newConfig
  /backup/getJsonReportWifi:
    get:
      tags:
      - backup
      description: Lấy Report Wifi
      operationId: backup_getJsonReportWifi
      parameters:
      - name: areaId
        in: query
        description: Area Id. Nếu rỗng kết quả trả về sẽ là tất cả Area có trên hệ
          thống
        required: true
        schema:
          type: number
      - name: listSerialNumber
        in: query
        description: Danh sách serial number cách nhau bởi dấu phẩy “,”. Nếu rỗng
          kết quả trả về sẽ là tất cả Searial Number có trên hệ thống
        required: true
        schema:
          type: string
      - name: Start
        in: query
        description: Vị trí bản ghi đầu tiên muốn lấy. Đối với lần lấy đầu tiên start
          = 0. Với lần lấy tiếp theo check trường start trong kết quả response. Nếu
          start = -1 có nghĩa là người dùng đã lấy được tất cả các bản ghi cần lấy
          => Hoàn thành. Với start khác -1, lấy giá trị start trong response của request
          trước để làm input của request tiếp theo. Đối với lần lấy thứ n. Kết quả
          trả về của start sẽ là vị trí đầu tiên của lần lấy thứ n+1.
        required: true
        schema:
          type: number
      - name: Limit
        in: query
        description: Số lượng bản ghi muốn lấy (mặc định là 1000, giá trị cho phép
          là 0 – 2000).
        required: true
        schema:
          type: number
      - name: startDate
        in: query
        description: Thời gian bắt đầu của báo cáo.
        required: true
        schema:
          type: string
      - name: endDate
        in: query
        description: Thời gian kết thúc. Nếu để rỗng, hệ thống sẽ lấy mặc định là
          thời gian hiện tại.
        schema:
          type: string
      responses:
        200:
          description: Kết quả trả về là object Json chứa danh sách thiết bị trong
            báo cáo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListReportWifiResponse'
  /device/ping:
    get:
      tags:
