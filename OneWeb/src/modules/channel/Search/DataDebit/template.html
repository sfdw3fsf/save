<div class="main-wrapper">
    <breadcrumb :header="header" title_in="Tra cứu thông tin nợ thuê bao các nhà mạng" />
    <div class="list-actions-top">
        <ul class="list">
            <li @click="tracuu">
                <a>
                    <span class="icon one-search"></span> Tìm kiếm
                </a>
            </li>
            <li v-if="enableButton == true">
                <a @click="nhapmoi">
                    <span class="icon one-save"></span> Cập nhật
                </a>
            </li>
            <li v-if="dataSource_2_filter.length > 0">
                <a @click="xoa">
                    <span class="icon one-trash"></span> Xóa
                </a>
            </li>
        </ul>
    </div>
    <div class="page-content">
        <div class="row">
            <div class="col-sm-12 col-md-12">
                <div class="box-form">
                    <div class="row">
                        <div class="col-sm-12 col-md-6">
                            <div class="info-row">
                                <div class="key w100">Số giấy tờ</div>
                                <div class="value">
                                    <input ref="txtSGT" type="text" @keyup.enter="tracuu" class="form-control" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-12 col-md-6">
                <div class="box-form">
                    <div class="legend-title">Danh sách thông tin nợ cước</div>
                    <DataGrid
                        ref="dataSource_1"
                        @rowSelected="rowSelected_1"
                        :dataSource="dataSource_1"
                        :columns="columns_grid_1"
                    />
                </div>
            </div>
            <div class="col-sm-12 col-md-6">
                <div class="box-form">
                    <div class="legend-title">Danh sách hồ sơ</div>
                    <DataGrid
                        @rowSelected="rowSelected_2"
                        :dataSource="dataSource_2_filter"
                        :columns="columns_grid_2"
                    />
                </div>
            </div>
        </div>
    </div>
    <popupForm ref="popupForm" @submit="tracuu()" :selected="selected" />
</div>
