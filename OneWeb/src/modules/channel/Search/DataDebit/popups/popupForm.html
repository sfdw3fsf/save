<ejs-dialog :enableResize='true' :resizeHandles='resizeHandles' :allowDragging="draggable"
    @close="closePopup()"
    :header="'Cập nhật thông tin hồ sơ'" showCloseIcon="true" :target="'.main-wrapper'"
    header-class="popup-header" :visible="false" ref="popupForm" :position="{ X: 'center', Y: 'top' }"
    width="80%" id="popupForm">
    <div class="popup-content">
        <div class="list-actions-top">
            <ul class="list">
                <li>
                    <a @click="submitForm()">
                        <span class="icon one-file-plus"></span> Ghi lại
                    </a>
                </li>
            </ul>
        </div>
        <div class="popup-body">
            <div class="box-form">
                <div class="legend-title">
                    Thông tin hồ sơ
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="info-row">
                            <div class="key">Nhà mạng</div>
                            <div class="value">
                                <div class="select-custom" ref="ds_kenhban">
                                    <Select2Ext disable ref="comboNhamang"  />
                                </div>  
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="info-row">
                            <div class="key">Ngày thanh toán (<span class="red">*</span>)</div>
                            <div class="value">
                                <div class="select-custom" ref="ds_kenhban">
                                    <VueDateExt ref="ngaytt" type="date" format="DD/MM/YYYY" />
                                </div>  
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="info-row">
                            <div class="key">File đính kèm (<span class="red">*</span>)</div>
                            <div class="value">
                                <input type="file" class="form-control" ref="file_upload" />
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="info-row">
                            <div class="key">Ngày cập nhật</div>
                            <div class="value">
                                <div class="select-custom" ref="ds_kenhban">
                                    <VueDateExt ref="ngaycn" disable type="date" format="DD/MM/YYYY" />
                                </div>  
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</ejs-dialog>
