<div>
    <ejs-dialog
    :enableResize='true'
    :allowDragging='true'
    :visible='false'
    ref="popupMaTB"
    :animationSettings='animationSettings'
    width='90%'
    :target='target'
    :open="dialogOpen"
    :isModal="true">
        <div class="modal-content popup-box">
            <div class="popup-header">
                <div class="title"><span class="icon one-notepad"></span>Tra cứu danh bạ thuê bao</div>
                <div class="close -ap icon-close" style="cursor: pointer" @click="closeModal"></div>
            </div>
            <ActionTop :actions="actions" @onActionClick="onActionClick"/>
            <div class="popup-body">
                <div class="col-sm-12 col-12">
                    <div class="box-form">
                        <div class="legend-title">Thông tin tra cứu</div>
                        <div class="row">
                            <div class="col-sm-6 col-12">
                                <div class="info-row">
                                    <div class="key">{{txtTraCuuTheo.text}}</div>
                                    <div class="value" style="display: flex; align-items: center;">
                                        <select2 style="width: 50%; margin: 0 5px 0 0;" v-model="txtTraCuuTheo.value_v1" :options="txtTraCuuTheo.list"></select2>
                                        <input style="width: 50%;" type="text" class="form-control" v-model="txtTraCuuTheo.value_v2" />
                                    </div>

                                </div>
                            </div>
                            <div class="col-sm-3 col-12">
                                <div class="info-row">
                                    <div class="key"><ejs-checkbox label="Dịch vụ" v-model="ckbDichVu.value_v1" :checked="ckbDichVu.value_v1"></ejs-checkbox></div>
                                    <div class="value">
                                        <select2 v-model="ckbDichVu.value_v2" :options="ckbDichVu.list" :disabled="ckbDichVu.disabled"></select2>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-3 col-12">
                                <div class="info-row">
                                    <div class="key"><ejs-checkbox label="Đơn vị" v-model="ckbDonVi.value_v1" :checked="ckbDonVi.value_v1"></ejs-checkbox></div>
                                    <div class="value">
                                        <select2 v-model="ckbDonVi.value_v2" :options="ckbDonVi.list" :disabled="ckbDonVi.disabled" > </select2>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-sm-6 col-12">
                                <div class="info-row">
                                    <div class="key"><ejs-checkbox label="Tra theo" v-model="ckbTraCuuTheo_v1.value_v1" :checked="ckbTraCuuTheo_v1.value_v1"></ejs-checkbox></div>
                                    <div class="value" style="display: flex; align-items: center;">
                                        <select2 style="width: 50%; margin: 0 5px 0 0;" v-model="ckbTraCuuTheo_v1.value_v2" :options="ckbTraCuuTheo_v1.list" :disabled="ckbTraCuuTheo_v1.disabled"></select2>
                                        <input style="width: 50%;" type="text" class="form-control" v-model="ckbTraCuuTheo_v1.value_v3" :disabled="ckbTraCuuTheo_v1.disabled">
                                    </div>

                                </div>
                            </div>
                            <div class="col-sm-6 col-12">
                                <div class="info-row">
                                    <div class="key">{{txtMaKH.text}}</div>
                                    <div class="value">
                                        <input type="text" class="form-control" v-model="txtMaKH.value">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-sm-6 col-12">
                                <div class="info-row">
                                    <div class="key"><ejs-checkbox label="Tra theo" v-model="ckbTraCuuTheo_v2.value_v1" :checked="ckbTraCuuTheo_v2.value_v1"></ejs-checkbox></div>
                                    <div class="value" style="display: flex; align-items: center;">
                                        <select2 style="width: 50%; margin: 0 5px 0 0;" v-model="ckbTraCuuTheo_v2.value_v2" :options="ckbTraCuuTheo_v2.list" :disabled="ckbTraCuuTheo_v2.disabled"></select2>
                                        <input style="width: 50%;" type="text" class="form-control" v-model="ckbTraCuuTheo_v2.value_v3" :disabled="ckbTraCuuTheo_v2.disabled">
                                    </div>

                                </div>
                            </div>
                            <div class="col-sm-3 col-12">
                                <div class="info-row">
                                    <div class="key">{{txtSoMay.text}}</div>
                                    <div class="value">
                                        <input type="text" class="form-control" v-model="txtSoMay.value" ref="txtSoMay"/>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-3 col-12">
                                <div class="info-row">
                                    <div class="key">{{txtSoAo.text}}</div>
                                    <div class="value">
                                        <input type="text" class="form-control" v-model="txtSoAo.value"/>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="legend-title">Lọc theo</div>
                        <div class="row">
                            <div class="col-sm-6 col-12">
                                <div class="info-row">
                                    <div class="key"><ejs-checkbox label="Dịch vụ" v-model="ckbLocTheoDV.value_v1" :checked="ckbLocTheoDV.value_v1"></ejs-checkbox></div>
                                    <div class="value">
                                        <select2 v-model="ckbLocTheoDV.value_v2" :options="ckbLocTheoDV.list" :disabled="ckbLocTheoDV.disabled"></select2>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-6 col-12">
                                <div class="info-row">
                                    <div class="key"><ejs-checkbox label="Loại hình" v-model="ckbLocTheoLH.value_v1" :checked="ckbLocTheoLH.value_v1"></ejs-checkbox></div>
                                    <div class="value">
                                        <select2 v-model="ckbLocTheoLH.value_v2" :options="ckbLocTheoLH.list" :disabled="ckbLocTheoLH.disabled"></select2>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="box-form">
                        <div class="legend-title">Danh sách thuê bao</div>
                        <div class="row">
                            <div class="col-sm-12 col-12">
                                <DataGrid :columns="DsThueBao.columns" :dataSource="DsThueBao.data"
                                :showColumnCheckbox="false" :enable-paging-server="false" panelDataHeight="200" :allowPaging="true" :showFilter="true" ref="reflistDsThueBao"
                                :enabledSelectFirstRow="false" @selectedItemsChanged="select_selectedItemsChangedDsThueBao"></DataGrid>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </ejs-dialog>
</div>
