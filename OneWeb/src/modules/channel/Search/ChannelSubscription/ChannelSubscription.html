<div class="main-wrapper">
    <breadcrumb :header="header" />
    <ActionTop :actions="actions" @onActionClick="onActionClick" />
    <div class="page-content">
        <div class="row">
            <div class="col-sm-12 col-12">
                <div class="box-form">
                    <div class="legend-title">Thông tin tra cứu</div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key"><ejs-checkbox label="Dịch vụ" v-model="cboDichVu.check"
                                        :checked="cboDichVu.check"></ejs-checkbox></div>
                                <div class="value">
                                    <select2 :disabled="cboDichVu.disabled" v-model="cboDichVu.value"
                                        :options="cboDichVu.list" ref="cboDichVu"></select2>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key"><ejs-checkbox label="Loại hình" v-model="cboLoaiHinh.check"
                                        :checked="cboLoaiHinh.check"></ejs-checkbox></div>
                                <div class="value">
                                    <select2 :disabled="cboLoaiHinh.disabled" v-model="cboLoaiHinh.value"
                                        :options="cboLoaiHinh.list" ref="cboLoaiHinh"></select2>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <!-- <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key">{{cboLoaiKenh.text}}</div>
                                <div class="value">
                                    <select2 v-model="cboLoaiKenh.value" :options="cboLoaiKenh.list"></select2>
                                </div>
                            </div>
                        </div> -->
                        <div class="col-sm-12 col-12">
                            <div class="info-row">
                                <div class="key">{{txtMaTB.text}}</div>
                                <div class="value">
                                    <div class="input-more-button">
                                        <button class="btn" @click="openModalMaTB">
                                            <span class="-ap icon-more_horiz"></span>
                                        </button>
                                        <input class="form-control" v-model="txtMaTB.value" v-on:keyup.enter="TimKiem"/>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key">{{txtMaKH.text}}</div>
                                <div class="value">
                                    <input class="form-control" v-model="txtMaKH.value" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key">{{txtTenKH.text}}</div>
                                <div class="value">
                                    <input class="form-control" v-model="txtTenKH.value" />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key">{{txtMaKenh.text}}</div>
                                <div class="value">
                                    <input class="form-control" v-model="txtMaKenh.value" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key">{{txtMaHD.text}}</div>
                                <div class="value">
                                    <input class="form-control" v-model="txtMaHD.value" />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div style="margin-top: 5px;">

                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key"></div>
                                <div class="value"
                                    style="display: flex !important; align-items: center; justify-content: space-around;">
                                    <div class="item" style="margin-right: 10px !important;"
                                        v-for="rdo in rdoInfoChannel.options" :value="rdo.value">
                                        <div class="check-action">
                                            <input type="radio" class="check" :name="rdo.name" :value="rdo.value"
                                                v-model="rdoInfoChannel.value">
                                            <span class="name" style="font-weight: 400;">{{rdo.label}}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key">{{cboTinh.text}} <span style="color: red;">(*)</span></div>
                                <div class="value">
                                    <select2 v-model="cboTinh.value" :options="cboTinh.list" ref="cboTinh"></select2>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="box-form">
                    <div class="legend-title">Danh sách thuê bao</div>
                    <div class="row">
                        <div class="col-sm-12 col-12">
                            <DataGrid :columns="DsThueBao.columns" :dataSource="DsThueBao.data"
                                :showColumnCheckbox="false" :enable-paging-server="false" panelDataHeight="200"
                                :allowPaging="true" :showFilter="true" ref="reflistDsThueBao"
                                :enabledSelectFirstRow="false"
                                @selectedItemsChanged="select_selectedItemsChangedDsThueBao"
                                @rowDoubleClicked = "ThongSoKT_DoubleClick"></DataGrid>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <MaTB ref="modalMaTB" @appect="loadMaTB"></MaTB>
    <TraCuuThongSoKTModal ref="traCuuThongSoKTModal" :dichvuvt_id="parseInt(formData.dichvuvt_id)" :kieu="1"
        :thuebao_id="parseInt(formData.thuebao_id)" :ma_tb="formData.ma_tb" :phanvung_id="formData.phanvung_id"></TraCuuThongSoKTModal>
</div>
