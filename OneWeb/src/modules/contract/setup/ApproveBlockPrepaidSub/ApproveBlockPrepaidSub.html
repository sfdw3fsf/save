<div id="PayLaterNoTempFee">
  <div class="breadcrumb-top">
    <div class="main-title">PHÊ DUYỆT YÊU CẦU KHÓA CƯỠNG BỨC TB TRẢ TRƯỚC</div>
    <ul class="breadcrumb">
      <li class="breadcrumb-item">
        <a href="#"><span class="nc-icon-outline ui-1_home-simple"></span> Trang chủ </a>
      </li>
      <li class="breadcrumb-item"><a href="#">Phê duyệt yêu cầu khóa cưỡng bức TB trả trước</a></li>
    </ul>
  </div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <a href="#" @click.prevent="layTT_Click" :class="{ disabled: false }"> <span
            class="icon one-file-attach"></span>Lấy TT</a>
      </li>
      <li>
        <a href="#" @click.prevent="ghilai_Click_1" :class="{ disabled: isDisabled }"> <span
            class="icon one-save"></span>Ghi lại</a>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <div class="row">
      <div class="col-sm-6 col-12">
        <div class="box-form">
          <div class="legend-title">Thông tin tra cứu</div>
          <div class="row">
            <div class="col-sm-12 col-12">
              <div class="info-row">
                <div class="key w100">ĐK lọc phiếu</div>
                <div class="value">
                  <select2 :options="dklocphieu.list" v-model="thongtintracuu.dk_locphieu">
                    <option disabled value="0">Select one</option>
                  </select2>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-12 col-12">
              <div class="row">
                <div class="col-sm-6 col-12">
                  <div class="info-row">
                    <div class="key w100">Từ ngày YC</div>
                    <div class="value">
                      <div class="input-icon-right">
                        <KDatePicker format="DD/MM/YYYY" v-model="thongtintracuu.tungay" :disabled="false" />
                      </div>
                    </div>
                  </div>
                </div>
                <div class="col-sm-6 col-12">
                  <div class="info-row">
                    <div class="key w100">Đến ngày YC</div>
                    <div class="value">
                      <div class="input-icon-right">
                        <KDatePicker format="DD/MM/YYYY" v-model="thongtintracuu.denngay" :disabled="false" />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div style="height: 20px;"></div>
        </div>
      </div>
      <div class="col-sm-6 col-12">
        <div class="row">
          <div class="box-form">
            <div class="legend-title">Cập nhật kết quả phê duyệt</div>
            <div class="row">
              <div class="col-sm-12 col-12">
                <div class="info-row">
                  <div class="key w100">KQ phê duyệt</div>
                  <div class="value">
                    <select2 :options="kqduyet.list" v-model="capnhat_kq.kq_duyet">
                      <option disabled value="0">Select one</option>
                    </select2>
                  </div>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-sm-12 col-12">
                <div class="info-row">
                  <div class="key w100">Ghi chú</div>
                    <div class="value">
                      <textarea class="form-control" v-model="capnhat_kq.ghichu" rows="2" placeholder="Nhập thông tin ghi chú"></textarea>
                    </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="box-form">
      <div class="legend-title" style="color: rgb(0, 0, 0);">{{ gridTitle }}</div>
      <div class="row">
        <div class="clearfix"></div>
        <div>
          <DataGrid :columns="[
              {fieldName: 'group', headerText: '', isGroupedColumn: true },
              {fieldName: 'ma_tb', headerText: 'Mã TB', allowfiltering: true},
              {fieldName: 'ten_tb', headerText: 'Tên TB', allowfiltering: true},
              {fieldName: 'ketqua_ob', headerText: 'KQ phiếu CSKH', allowfiltering: true},
              {fieldName: 'ngaygiao', headerText: 'Ngày gửi phiếu', allowfiltering: true},
              {fieldName: 'ghichu_yc', headerText: 'Ghi chú phiếu YC', allowfiltering: true},
              {fieldName: 'nv_taophieu', headerText: 'NV tạo phiếu', allowfiltering: true,allowSorting: true},
              {fieldName: 'ngay_td', headerText: 'Ngày tạm dừng', allowfiltering: true},
              {fieldName: 'ghichu_duyet', headerText: 'Ghi chú duyệt', allowfiltering: true},
              {fieldName: 'ngay_duyet', headerText: 'Ngày duyệt', allowfiltering: true},
              {fieldName: 'chitiet', headerText:'Trạng thái dùng DV', allowFiltering: true, allowSorting: false, width: 160, template: viewInvTemplate,cssClass: 'text-center'},
              {fieldName: 'loaihinh_tb', headerText: 'Loại TB', allowfiltering: true},
              {fieldName: 'trangthai_tb', headerText: 'Trạng thái TB', allowfiltering: true},
              {fieldName: 'diachi_ld', headerText: 'Địa chỉ LĐ', allowfiltering: true},
              {fieldName: 'ten_tt', headerText: 'Tên TT', allowfiltering: true},
              {fieldName: 'ma_tt', headerText: 'Mã TT', allowfiltering: true},
              {fieldName: 'diachi_tt', headerText: 'Địa chỉ TT', allowfiltering: true},
          ]" 
          v-bind:dataSource="gridDSphieuyeucau"
          :enable-paging-server="false" :allowPaging="true" :showFilter="true" @selectedRowChanged="onSelectedRow"  :showColumnCheckbox="checkbox_chuaduyet" @selectedItemsChanged="selectedItemsChanged"
          @checkBoxChange="checkBoxChange" :enabledSelectFirstRow="false" :allowGrouping="true"></DataGrid>
        </div>
      </div>
    </div>
  </div>
  <b-modal id="popupComponents" size="huge" :title="popupComponentHeader" :hide-header="popupComponentHeader?false:true"
    hide-footer modal-class="modal-custom" body-class="modal-body p-0">
    <component :is="popupComponent" ref="generalPopup" :dulieu="popupComponentData" v-bind="popupComponentAttr"
      isPopup="true" v-on="popupComponentEvts" @form-close="popupClosed"></component>
  </b-modal>
  <footer class="footer">
    VNPT-IT &copy; 2021
  </footer>
</div>
