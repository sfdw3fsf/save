<div>
    <ejs-dialog
    :allowDragging='true'
    :enableResize='true'
    :visible='false'
    :animationSettings='animationSettings'
    :position="{X:'center', Y:'top'}"
    ref="popupTraCuuCSHT"
    width='90%'
    height="1000"
    :isModal="false"
    :target='target'
    :open="dialogOpen"
    >
        <div class="modal-content popup-box">
            <div class="popup-header">
                <div class="title" style="font-weight: bold"><span class="icon one-building"></span>Tra cứu cơ sở hạ tầng</div>
                <div class="close -ap icon-close" style="cursor: pointer" @click="closeModal"></div>
            </div>
            <ActionTop :actions="actions" @onActionClick="onActionClick"/>
            <div class="popup-body">
                <div class="col-sm-12 col-12">
                    <div class="box-form">
                        <div class="legend-title">Thông tin tra cứu</div>
                        <div class="row">
                            <div class="col-sm-12 col-12">
                                <div class="info-row">
                                    <div class="key">Tỉnh/TP <span style="color: red;">(*)</span></div>
                                    <div class="value">
                                        <Select2 v-model="cboTinh.value" :options="cboTinh.list"></Select2>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-sm-12 col-12">
                                <div class="info-row">
                                    <div class="key">Mã CSHT <span style="color: red;">(*)</span></div>
                                    <div class="value">
                                        <input ref="txtMaCSHT" v-model="txtMaCSHT.value" type="text" class="form-control">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="box-form">
                        <div class="legend-title">Danh sách thông tin trạm cơ sở hạ tầng</div>
                        <div class="row">
                            <DataGrid :columns="dsCSHT.columns" :dataSource="dsCSHT.data"
                            :showColumnCheckbox="false" :enable-paging-server="false" panelDataHeight="200" :allowPaging="true" :showFilter="true" ref="reflistDsSoMay"
                            :enabledSelectFirstRow="false" :allowTextWrap="false" @selectedItemsChanged="select_selectedItemsChangedDsCSHT"></DataGrid>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </ejs-dialog>
</div>
