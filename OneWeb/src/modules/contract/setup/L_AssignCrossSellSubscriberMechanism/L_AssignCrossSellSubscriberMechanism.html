<div>
  <div class="breadcrumb-top">
    <div class="main-title">Gán cơ chế bán chéo cho thuê bao</div>
    <ul class="breadcrumb">
      <li class="breadcrumb-item"><a href="#"><span class="nc-icon-outline ui-1_home-simple"></span> Trang chủ
        </a></li>
      <li class="breadcrumb-item"><a href="#">Bán chéo</a></li>
      <li class="breadcrumb-item active">Gán cơ chế bán chéo cho thuê bao</li>
    </ul>
  </div>

  <div class="list-actions-top">
    <ul class="list">
      <li>
        <a href="#" @click.prevent="onClickClearAll">
          <span class="icon one-reload1"></span>Nhập lại
        </a>
      </li>
      <li>
        <a
            href="#"
            @click.prevent="saveData_Click"
            :class="{ disabled: isSaveButtonDisabled }"
            :aria-disabled="isSaveButtonDisabled"
          >
          <span class="icon nc-icon-glyph ui-1_check-circle-08" style="font-size: 1.5em;"></span>Gán
        </a>
      </li>
      <li>
        <a
            href="#"
            @click.prevent="huyData_Click"
            :class="{ disabled: isHuyButtonDisabled }"
            :aria-disabled="isHuyButtonDisabled"
          >
          <span class="icon nc-icon-glyph ui-1_circle-remove"></span>Bỏ gán
        </a>
      </li>
    </ul>
  </div>

  <div :class="isPopup ? 'modal-content' : 'page-content'">
    <div class="box-form">
      <div class="legend-title">Danh sách thuê bao</div>
      <div class="col-sm-3 col-12">
        <div class="info-row">
          <div class="key w90">Hợp đồng</div>
          <div class="value">
            <div class="input-more-button">
              <button class="btn" @click="showPopupSearchContract">
                <span class="-ap icon-more_horiz"></span>
              </button>
              <SearchContractModal ref="popupSearchContract" @accept="acceptSearchContract" />
              <div class="input-icon-right">
              <input type="text" ref="txtMaGD" v-model="formThongTinPhieuYeuCau.maGiaoDich" @keyup.enter="onClickSearch"
                class="form-control highlight fw6 ">
                <span class="icon nc-icon-outline ui-1_zoom" @click="onClickSearch"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
      <DataGrid ref="gridDanhSachTB" v-bind:columns="dsThueBao.headers" v-bind:dataSource="gridDanhSachTB"
        :showColumnCheckbox="true" :enable-paging-server="false" :allowPaging="true" :showFilter="true"
        :row-index="dsThueBao.selectedIndex" @selectedRowChanged="gridDsThueBao_SelectedRowChanged" @checkBoxChange="checkBoxChange" :enabledSelectFirstRow="false"></DataGrid>
    </div>

    <div class="box-form">
      <div class="legend-title">Thông tin phân chia doanh thu</div>
      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w120">Số công văn (*)</div>
            <div class="value">
              <div class="input-more-button">
                <button class="btn" @click="btnThemThanhVien_Click">
                  <span class="-ap icon-more_horiz"></span>
                </button>
                <input type="text" v-model="socongvan" @keyup.enter="onClickSearch_1" class="form-control highlight fw6" />
              </div>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key">Mã cơ chế</div>
            <div class="value">
              <input type="text" v-model="ma_coche" @keyup.enter="onClickSearch_1" class="form-control highlight fw6" />
            </div>
          </div>
        </div>
      </div>
      <k-table-custom :dataSources="gridDanhSachPCDT" :columns="columns2" :allowFilter="true" :allowCheckBox="true"
        @onRowCheckChange="onRowCheckChange" @dataCheckeds="onDataCheckeds_1" :rowSelectedIndex="1" />
    </div>
    <div class="box-form">
      <div class="legend-title" style="color: rgb(5, 166, 253);">
        <div class="pull-left" >Bảng gán cơ chế bán chéo cho thuê bao</div>
        <div class="pull-right">
          <a href="#" class="link" @click.prevent="exportExcel" > <span class="icon one-download" style="font-size: 1.5em;" ></span>
            Xuất file </a>
        </div>
        <div class="clearfix"></div>
      </div>
      <DataGrid ref="gridDanhSachTB_gan" v-bind:columns="dsThueBao_gan.headers" v-bind:dataSource="gridDanhSachTB_gan"
        :showColumnCheckbox="true" :enable-paging-server="false" :allowPaging="true" :showFilter="true"
        :row-index="dsThueBao_gan.selectedIndex" @selectedRowChanged="gridDsThueBao_gan_SelectedRowChanged" @checkBoxChange="checkBoxChange_1" :enabledSelectFirstRow="false"></DataGrid>
    </div>
  </div>
  <b-modal id="popupComponents" size="xl" :title="popupComponentHeader" :hide-header="popupComponentHeader?false:true"
  hide-footer body-class="modal-body p-0">
  <component :is="popupComponent" ref="generalPopup" :dulieu="popupComponentData" v-bind="popupComponentAttr"
    isPopup="true" v-on:form-close="handleFormClose"></component>
  <!--v-dynamic-events="popupComponentEvents"-->
</b-modal>
</div>
