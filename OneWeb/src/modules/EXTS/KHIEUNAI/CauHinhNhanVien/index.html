<div>
  <div :class="{ 'modal-content popup-box': type == 'modal' }">
    
    <div class="list-actions-top">
      <ul class="list">
        <li v-for="(item, index) in menus" :class="{ disable: !item.enabled, 'btn-action': item.enabled }">
          <a @click.prevent="onMenuClicked(item)"><span :class="`${item.icon} icon`"></span>{{ item.name }}</a>
        </li>
      </ul>
    </div>
    <div class="page-content">
      <div class="row">
        <div class="col-sm-4 col-12">
          <div class="box-form" style="height: 1460px; overflow: scroll;">
            <div class="legend-title">Danh sách đơn vị</div>
            <div class="tree-plus">
              <span class="search-input e-input-group e-control-wrapper">
                <input :disabled="!txtTreeDonViSearch.enabled" class="e-filtertext e-input highlight"
                  placeholder="Nhập tên đơn vị cần tìm kiếm" v-model="txtTreeDonViSearch.value"
                  @keypress.enter="onTxtTreeDonViSearchEntered" />
                <span class="e-clear-icon e-clear-icon-hide" aria-label="close" role="button"></span>
              </span>
              <ejs-treeview ref="treeDonVi" @nodeSelected="onTreeDonviNodeSelected" :selectedNodes="treeDonVi.selected" 
                :fields="{ dataSource: treeDonVi.list, id: 'donvi_id', text: 'ten_dv', child: 'children' }"></ejs-treeview>
            </div>
          </div>
        </div>
        <div class="col-sm-8">
          <div class="row">

            <div class="box-move-select-table">
              <div class="box-col box-form">
                <div class="legend-title">Nhân viên đã gán</div>
                <DataGrid panelDataHeight="240" v-bind:columns="gridNhanVienDaGan.header"
                  v-bind:dataSource="gridNhanVienDaGan.list" :enable-paging-server="false" :allowPaging="true"
                  :showFilter="true" :showColumnCheckbox="true" ref="gridNhanVienDaGan" />
              </div>
              <div class="actions">
                <button class="btn" @click="nhanVienMTL">
                  <span class="-ap icon-chevron-thin-right"></span>
                </button>
                <button class="btn" @click="nhanVienMTR">
                  <span class="-ap icon-chevron-thin-left"></span>
                </button>
              </div>
              <div class="box-col box-form">
                <div class="legend-title">Nhân viên chưa gán</div>
                <div calss="row">
                  <div class="info-row">
                    <div class="key w100">
                      Loại nhân viên
                    </div>
                    <div class="value">
                      <div class="select-custom">
                        <select name="" id="" class="form-control" v-model="cboLoaiNV.value">
                          <option v-for="item in cboLoaiNV.list" :value="item.LOAINV_ID">
                            {{item.TEN}}</option>
                        </select>
                      </div>
                    </div>
                  </div>
                  <DataGrid3 panelDataHeight="232" v-bind:columns="gridNhanVienChuaGan.header"
                  v-bind:dataSource="gridNhanVienChuaGan.list" :enable-paging-server="false" :allowPaging="true"
                  :showFilter="true" :showColumnCheckbox="true" ref="gridNhanVienChuaGan" />
                </div>
                
              </div>
            </div>


            <div class="box-move-select-table">
              <div class="box-col box-form">
                <div class="legend-title">Danh sách loại hình đã gán</div>
                <DataGrid panelDataHeight="190" v-bind:columns="gridLoaiHinhDaGan.header"
                  v-bind:dataSource="gridLoaiHinhDaGan.list" :enable-paging-server="false" :allowPaging="true"
                  :showFilter="true" :showColumnCheckbox="true" ref="gridLoaiHinhDaGan" />
              </div>
              <div class="actions">
                <button class="btn" @click="loaiTBMTL">
                  <span class="-ap icon-chevron-thin-right"></span>
                </button>
                <button class="btn" @click="loaiTBMTR">
                  <span class="-ap icon-chevron-thin-left"></span>
                </button>
              </div>
              <div class="box-col box-form">
                <div class="legend-title">Danh sách loại hình chưa gán</div>
                <div clas="row">
                  <div class="info-row">
                    <div class="key w100">
                      dịch vụ
                    </div>
                    <div class="value">
                      <div class="select-custom">
                        <select name="" id="" class="form-control" v-model="cboDichvuVT.value">
                          <option v-for="item in cboDichvuVT.list" :value="item.DICHVUVT_ID">
                            {{item.TEN_DVVT}}</option>
                        </select>
                      </div>
                    </div>
                  </div>
                  <DataGrid3 panelDataHeight="190" v-bind:columns="gridLoaiHinhChuaGan.header"
                    v-bind:dataSource="gridLoaiHinhChuaGan.list" :enable-paging-server="false" :allowPaging="true"
                    :showFilter="true" :showColumnCheckbox="true" ref="gridLoaiHinhChuaGan" />
                </div>
              </div>
            </div>


            <div class="box-move-select-table">
              <div class="box-col box-form">
                <div class="legend-title">Danh sách chủ đề đã gán</div>
                <DataGrid panelDataHeight="232" v-bind:columns="gridChuDeDaGan.header"
                  v-bind:dataSource="gridChuDeDaGan.list" 
                  :enable-paging-server="false" 
                  :allowPaging="true"
                  :showFilter="true" 
                  :showColumnCheckbox="true" ref="gridChuDeDaGan" />
              </div>
              <div class="actions">
                <button class="btn" @click="chuDeMTL">
                  <span class="-ap icon-chevron-thin-right"></span>
                </button>
                <button class="btn" @click="chuDeMTR">
                  <span class="-ap icon-chevron-thin-left"></span>
                </button>
              </div>
              <div class="box-col box-form">
                <div class="legend-title">Danh sách chủ đề chưa gán</div>
                <div clas="'row">
                  <div class="info-row">
                    <div class="key w100">
                      Nhóm chủ đề
                    </div>
                    <div class="value">
                      <div class="select-custom">
                        <select name="" id="" class="form-control" v-model="cboNhomChuDe.value">
                          <option v-for="item in cboNhomChuDe.list" :value="item.NHOM_ID">
                            {{item.TEN_NHOM}}</option>
                        </select>
                      </div>
                    </div>
                  </div>
                <DataGrid3 panelDataHeight="232" v-bind:columns="gridChuDeChuaGan.header"
                  v-bind:dataSource="gridChuDeChuaGan.list" 
                  :enable-paging-server="false" 
                  :allowPaging="true"
                  :showFilter="true" 
                  :showColumnCheckbox="true" ref="gridChuDeChuaGan" />
                </div>
                </div>
            </div>



          </div>
        </div>
      </div>
      <div class="box-form">
        <div class="legend-title">Danh sách đơn vị nhận xử lý phiếu khiếu nại tự động</div>
        <DataGrid v-bind:columns="gridColumn.header" v-bind:dataSource="gridColumn.list"
          :enable-paging-server="false" :allowPaging="true" :showFilter="true" ref="gridColumn"
          @selectedRowChanged="gridColumnOnSelectedRowChanged" />
      </div>
    </div>
  </div>
</div>
