<tr :class="!isShowForm ? 'e-emptyrow' : 'e-row'" @keyup.enter="newRow_Enter">
  <td class="e-rowcell">
    <ejs-numerictextbox v-model="data.STT" locale='vi-VN' format="n0" decimals="0" :min="0" cssClass="text-right"
      :enabled="false" :showSpinButton="false"></ejs-numerictextbox>
  <td class="e-rowcell">
    <ejs-numerictextbox v-model="data.MA_TT" locale='vi-VN' format="n0" decimals="0" :min="0" cssClass="text-right"
      :enabled="false" :showSpinButton="false"></ejs-numerictextbox>
  </td>
  <td class="e-rowcell">
    <ejs-numerictextbox v-model="data.MA_TB" locale='vi-VN' format="n0" decimals="0" :min="0" cssClass="text-right"
      :enabled="false" :showSpinButton="false"></ejs-numerictextbox>
  </td>
  <td class="e-rowcell">
    <ejs-numerictextbox v-model="data.SO_HD" locale='vi-VN' format="n0" decimals="0" :min="0" cssClass="text-right"
      :enabled="false" :showSpinButton="false"></ejs-numerictextbox>
  </td>
  <td class="e-rowcell">
    <ejs-dropdownlist :allowFiltering="true" :dataSource="dsThangGC" :fields="{ text: 'THANG_GCHT', value: 'THANG_GC' }"
      v-model="data.THANG_GC" locale='vi-VN' @change="updateData"></ejs-dropdownlist>
  </td>
  <td class="e-rowcell">
    <ejs-dropdownlist :allowFiltering="true" :dataSource="dsKyApDung" :fields="{ text: 'THANG_APHT', value: 'KY_GC' }"
      v-model="data.KY_GC" locale='vi-VN' @change="updateData"></ejs-dropdownlist>
  </td>
  <td class="e-rowcell">
    <ejs-numerictextbox v-model="data.TIEN_GC" locale='vi-VN' format="n0" decimals="0" :min="0" cssClass="text-right"
      :enabled="false" :showSpinButton="false"></ejs-numerictextbox>
  </td>
  <td class="e-rowcell">
    <ejs-numerictextbox v-model="data.TIEN" locale='vi-VN' format="n0" decimals="0" :min="0" cssClass="text-right"
      :enabled="false" :showSpinButton="false"></ejs-numerictextbox>
  </td>
  <td class="e-rowcell">
    <ejs-numerictextbox v-model="data.THUE" locale='vi-VN' format="n0" decimals="0" :min="0" cssClass="text-right"
      :enabled="false" :showSpinButton="false"></ejs-numerictextbox>
  </td>
  <td class="e-rowcell">
    <ejs-numerictextbox v-model="data.VAT" locale='vi-VN' format="n0" decimals="0" :min="0" cssClass="text-right"
      :enabled="false" :showSpinButton="false"></ejs-numerictextbox>
  </td>
  <td class="e-rowcell">
    <ejs-numerictextbox v-model="data.MA_DOANHTHU" locale='vi-VN' format="n0" decimals="0" :min="0" cssClass="text-right"
      :enabled="false" :showSpinButton="false"></ejs-numerictextbox>
  </td>
  <td class="e-rowcell">
    <ejs-numerictextbox v-model="data.TEN_CHITIEU" locale='vi-VN' format="n0" decimals="0" :min="0" cssClass="text-right"
      :enabled="false" :showSpinButton="false"></ejs-numerictextbox>
  </td>
