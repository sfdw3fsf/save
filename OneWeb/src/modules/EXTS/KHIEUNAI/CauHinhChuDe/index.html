<div>
    <div class="list-actions-top">
        <ul class="list">
            <li>
                <a href="javascript:void(0)" ref="tsbtnNhapMoi" :class="{'disable-btn' : !btnNhapMoiEnable}"
                    @click="btnNhapMoiClick">
                    <span class="icon  one-file-plus"></span> Nhập mới
                </a>
            </li>
            <li>
                <a href="javascript:void(0)" ref="tsbtnGhiLai" :class="{'disable-btn' : !btnGhiLaiEnable}"
                    @click="btnGhiLaiClick">
                    <span class="icon  one-save"></span> Ghi lại
                </a>
            </li>
            <li>
                <a href="javascript:void(0)" ref="tsbtnXoa" :class="{'disable-btn' : !btnXoaEnable}"
                    @click="btnXoaClick">
                    <span class="icon  one-trash"></span> Xóa
                </a>
            </li>
            <li>
                <a href="javascript:void(0)" ref="tsbtnHuyBo" :class="{'disable-btn' : !btnHuyEnable}"
                    @click="btnHuyClick">
                    <span class="icon  nc-icon-glyph ui-1_circle-remove"></span> Huỷ
                </a>
            </li>
        </ul>
    </div>
    <div class="page-content">
        <div class="box-form">

            <div class="row">
                <div class="box-form">
                    <div class="legend-title">
                        Thông tin chủ đề khiếu nại
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">
                                    Loại phiếu
                                </div>
                                <div class="value">
                                    <div class="select-custom">
                                        <select name="" id="" class="form-control" v-model="currentItem.LOAI_ID"
                                            @change="onChangeLoai($event)" :disabled="btnNhapMoiEnable">
                                            <option v-for="item in DS_LOAI_KN" :value="item.LOAI_ID">
                                                {{item.TEN_LOAI}}</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="row">
                                <div class="col-sm-6 col-12">
                                    <div class="info-row">
                                        <div class="key w100">
                                            Giảm trừ cước
                                        </div>
                                        <div class="value padt7">
                                            <div class="check-action">
                                                <input type="checkbox" class="check" v-model="currentItem.GIAM_CUOC">
                                                <span class="name"></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-sm-6 col-12">
                                    <div class="info-row">
                                        <div class="key w100">
                                            Tình trạng
                                        </div>
                                        <div class="value">
                                            <div class="select-custom">
                                                <select name="" id="" class="form-control"
                                                    v-model="currentItem.TRANG_THAI">
                                                    <option value="1">Hoạt động bình thường</option>
                                                    <option value="0">Vô hiệu hóa</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">
                                    Nhóm chủ đề
                                </div>
                                <div class="value">
                                    <div class="select-custom">
                                        <select name="" id="" class="form-control" v-model="currentItem.ID_NHOM"
                                            :disabled="btnNhapMoiEnable">
                                            <option v-for="item in DS_NHOM_CHUDE" :value="item.NHOM_ID">
                                                {{item.TEN_NHOM}}</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="row">
                                <div class="col-sm-6 col-12">
                                    <div class="info-row">
                                        <div class="key w100">
                                            Đối tượng lỗi
                                        </div>
                                        <div class="value">
                                            <div class="select-custom">
                                                <select name="" id="" class="form-control"
                                                    v-model="currentItem.DOITUONG_LOI_ID">
                                                    <option v-for="item in DS_DOITUONG_LOI" :value="item.ID">
                                                        {{item.NOIDUNG}}</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-sm-6 col-12">
                                    <div class="info-row">
                                        <div class="key w100">
                                            Trách nhiệm
                                        </div>
                                        <div class="value">
                                            <div class="select-custom">
                                                <select name="" id="" class="form-control"
                                                    v-model="currentItem.TRACHNHIEM_ID"
                                                    :disabled="currentItem.DOITUONG_LOI_ID==2">
                                                    <option v-for="item in DS_TRACHNHIEM" :value="item.ID">
                                                        {{item.NOIDUNG}}</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">
                                    Chủ đề cấp 1
                                </div>
                                <div class="value">
                                    <div class="select-custom">
                                        <select name="" id="" class="form-control" v-model="currentItem.ID_CAP1"
                                            :disabled="btnNhapMoiEnable">
                                            <option v-for="item in DS_CHUDE_CAP1" :value="item.CHUDE_CAP1_ID">
                                                {{item.CHUDE_CAP1}}</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="row">
                                <div class="col-sm-6 col-12">
                                    <div class="info-row">
                                        <div class="key w100">
                                            Mã doanh thu
                                        </div>
                                        <div class="value">
                                            <div class="select-custom">
                                                <select name="" id="" class="form-control"
                                                    v-model="currentItem.MA_DOANTHU_ID">
                                                    <option value="1">Ma 1</option>
                                                    <option value="2">Ma 2</option>
                                                    <option value="3">Ma 3</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-sm-6 col-12">
                                    <div class="info-row">
                                        <div class="key w100">
                                            Tên chỉ tiêu
                                        </div>
                                        <div class="value">
                                            <div class="select-custom">
                                                <select name="" id="" class="form-control red"
                                                    v-model="currentItem.CHITIEU_ID">
                                                    <option value="1">chỉ tiêu 1</option>
                                                    <option value="2">chỉ tiêu 2</option>
                                                    <option value="3">chỉ tiêu 3</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">
                                    Chủ đề cấp 2
                                </div>
                                <div class="value">
                                    <div>
                                        <input type="text" class="form-control" v-model.trim="currentItem.CHUDE_CAP2"
                                            :disabled="btnNhapMoiEnable">
                                    </div>
                                </div>
                                <!-- <div class="value">
                                <div class="select-custom">
                                    <select name="" id="" class="form-control" v-model="currentItem.ID_CAP2" >
                                        <option v-for="item in DS_CHUDE_CAP2" :value="item.CHUDE_CAP2_ID">
                                            {{item.CHUDE_CAP2}}</option>
                                    </select>
                                </div>
                            </div> -->
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="row">
                                <div class="col-sm-6 col-12">
                                    <div class="info-row">
                                        <div class="key w100">
                                            Ngày tạo
                                        </div>
                                        <div class="value">
                                            <ejs-datetimepicker v-model="currentItem.NGAY_TAO" format="dd/MM/yyyy HH:mm"
                                                :disabled="true">
                                            </ejs-datetimepicker>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-sm-6 col-12">
                                    <div class="info-row">
                                        <div class="key w100">
                                            Người tạo
                                        </div>
                                        <div class="value">
                                            <input type="text" class="form-control" v-model="currentItem.NGUOI_CN"
                                                disabled>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="row">
                                <div class="col-sm-6 col-12">
                                    <div class="info-row">
                                        <div class="key w100">
                                            Dịch vụ
                                        </div>
                                        <div class="value">
                                            <div class="select-custom">
                                                <select name="" id="" class="form-control"
                                                    v-model="currentItem.DICHVUVT_ID">
                                                    <option v-for="item in DS_DICHVU_VT" :value="item.DICHVUVT_ID">
                                                        {{item.TEN_DVVT}}</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-sm-6 col-12">
                                    <div class="info-row">
                                        <div class="key w100">
                                            Loại hình
                                        </div>
                                        <div class="value">
                                            <ejs-multiselect :dataSource='DS_LOAIHINH_TB' :fields='configLoaiTB.fields'
                                                v-model="currentItem.dsLoaiTBDaChon" :enabled="true" :mode="configLoaiTB.mode"
                                                :showSelectAll="configLoaiTB.showSelectAll"
                                                :showDropDownIcon="configLoaiTB.showDropDownIcon"
                                                :filterBarPlaceholder="configLoaiTB.filterBarPlaceholder"
                                                id="refLoaiTB123"></ejs-multiselect>

                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">
                                    Ghi chú
                                </div>
                                <div class="value">
                                    <input type="text" class="form-control" v-model="currentItem.GHI_CHU">
                                </div>
                            </div>
                        </div>



                    </div>
                </div>
                <div class="box-form">
                    <div class="legend-title">
                        Danh sách nguyên nhân lỗi và phương án giảm trừ
                    </div>
                    <div>
                        <DataGrid2 ref="grid" v-bind:columns="[
                        {fieldName: 'CHUDEKN_ID', width : 150 , headerText: 'ID chủ đề', allowFiltering: true},
                        {fieldName: 'CHUDE_CAP2', width : 150 , headerText: 'Chủ đề cấp 2', allowFiltering: true},
                        {fieldName: 'CHUDE_CAP1', width : 150 , headerText: 'Chủ đề cấp 1', allowFiltering: true},                
                        {fieldName: 'TEN_NHOM', width : 150 , headerText: 'Nhóm chủ đề', allowFiltering: true},
                        {fieldName: 'TEN_LOAI', width : 150 , headerText: 'Loại khiếu nại', allowFiltering: true},                
                        {fieldName: 'GIAM_CUOC_TEXT', width : 150 , headerText: 'Giảm trừ cước', allowFiltering: true},
                        {fieldName: 'DICHVU_VT', width : 150 , headerText: 'Dịch vụ', allowFiltering: true},
                        {fieldName: 'LOAIHINH_TB', width : 150 , headerText: 'Loại hình', allowFiltering: true},
                        {fieldName: 'NGAY_TAO', width : 150 , headerText: 'Ngày tạo', allowFiltering: true},
                        {fieldName: 'NGUOI_CN', width : 150 , headerText: 'Ngưòi tạo', allowFiltering: true},
                        {fieldName: 'TRANG_THAI_TEXT', width : 150 , headerText: 'Tình trạng', allowFiltering: true},                        
                    ]" v-bind:dataSource="DS_CAUHINH" 
                    :showFilter="true" 
                    :allowPaging=true 
                    :enable-paging-server="true"
                    :enabledSelectFirstRow="true"                     
                    @selectedRowChanged="grid_rowSelected">
                        </DataGrid2>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <ThemChuDe1 :parent="this" modalID="ModalThemChuDe1" ref="ModalThemChuDe1" :loai="currentItem.LOAI_ID" :nhom="currentItem.ID_NHOM" />
</div>
