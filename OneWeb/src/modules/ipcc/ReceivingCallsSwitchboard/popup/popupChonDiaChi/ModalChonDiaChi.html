<b-modal
    :id="modalId"
    size="lg"
    :data="data"
    :isStrictMode="isStrictMode"
    no-close-on-backdrop
    hide-footer
    hide-header
    hide-header-close
    @shown="focusMyElement"
    @hidden="onModalHidden"
    body-class="modal-body p-0">
    <div class="modal-content popup-box">
        <div class="popup-header">
            <div class="title">
                <span class="icon one-notepad"></span> Chọn Tỉnh
            </div>
            <div
                class="close -ap icon-close"
                data-dismiss="modal"
                @click="$bvModal.hide(modalId)">
            </div>
        </div>

        <div class="popup-body">
            <div class="box-form">
                <div class="row">
                    <div class="col-sm-6 col-12">
                        <div class="info-row">
                            <div class="key w100">Tỉnh/TP</div>
                            <div class="value">
                              <SelectExt v-model="diachi.tmp_tinh"
                                         :dataSource="dsTinh"
                                         :allowFiltering="true"
                                         dataTextField="text"
                                         dataValueField="id"/>
                            </div>
                        </div>

                    </div>

                </div>
            </div>
        <div class="group-buttons -bottom center">

            <button class="btn btn-second nocorner" style="width: 120px;" @click="chapnhan()">
                <span class="icon nc-icon-glyph ui-1_check-circle-08"></span> Chấp nhận
            </button>
            <button class="btn btn-second nocorner" style="width: 120px;" @click="$bvModal.hide(modalId)">
                <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Thoát
            </button>
        </div>
    </div>
</div>
</b-modal>
