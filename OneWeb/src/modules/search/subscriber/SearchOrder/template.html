<div class="main-wrapper">
    <div>
        <breadcrumb />
        <div class="list-actions-top">
            <ul class="list">
                <li @click.prevent="LOAD_ORDERS">
                    <a>
                        <span class="icon one-search"></span> Tìm kiếm
                    </a>
                </li>
                <li @click.prevent="excelExport">
                    <a>
                        <span class="icon one-excel"></span> Xuất Excel
                    </a>
                </li>
            </ul>
        </div>
    </div>
    <div class="page-content">
        <section role="region" aria-label="Thông tin tra cứu">
            <div class="box-form">
                <div class="legend-title">Thông tin tra cứu</div>
                <div class="row">
                    <div class="col-xl-3 col-md-6 col-sm-12">
                        <div class="info-row">
                            <div class="key nowrap w120">Nguồn đơn</div>
                            <div class="value">
                                    <MultiSelect 
                                    :options="cbbNguonDon.options" v-model="cbbNguonDon.value" />
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 col-sm-12">
                        <div class="info-row">
                            <div class="key nowrap w120">Loại KH</div>
                            <div class="value">
                                <select2 :options="cbbLoaiKH.options" v-model="cbbLoaiKH.value" />
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 col-sm-12">
                        <div class="info-row">
                            <div class="key nowrap w120">
                                <div class="check-action">
                                    <input type="checkbox" v-model="cbbDonVi.enabled" class="check">
                                    <span class="name">Đơn vị</span>
                                </div>
                            </div>
                            <div class="value">
                                    <!-- <treeselect :disabled="!cbbDonVi.enabled" :options="cbbDonVicomputed"
                                        v-model="cbbDonVi.value" /> -->
                                    <MultiSelect :disabled="!cbbDonVi.enabled" :options="cbbDonVicomputed"
                                        v-model="cbbDonVi.value" />
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 col-sm-12">
                        <div class="info-row">
                            <div class="key nowrap w120">
                                <div class="check-action">
                                    <input type="checkbox" v-model="cbbLoaiNV.enabled" class="check">
                                    <span class="name">Loại nhân viên</span>
                                </div>
                            </div>
                            <div class="value">
                                <select2 :options="cbbLoaiNV.options" :disabled="!cbbLoaiNV.enabled"
                                    v-model="cbbLoaiNV.value" />
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-xl-3 col-md-6 col-sm-12">
                        <div class="info-row">
                            <div class="key nowrap w120">Dịch vụ</div>
                            <div class="value">
                                <select2 :options="cbbDichVuVT.options" v-model="cbbDichVuVT.value" />
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 col-sm-12">
                        <div class="info-row">
                            <div class="key nowrap w120">Loại hình</div>
                            <div class="value">
                                <select2 :options="cbbLoaiHinh.options" v-model="cbbLoaiHinh.value"
                                    :disabled="cbbLoaiHinh.disable" />
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 col-sm-12">
                        <div class="info-row">
                            <div class="key nowrap w120">
                                <div class="check-action">
                                    <input type="checkbox" :disabled="cbbNhanVien.disableChk"
                                        v-model="cbbNhanVien.enabled" class="check">
                                    <span class="name">Nhân viên</span>
                                </div>
                            </div>
                            <div class="value">
                                    <MultiSelect :options="cbbNhanVien.options" :multiple="true" :disabled="!cbbNhanVien.enabled"
                                    v-model="cbbNhanVien.value" />
                            </div>
                        </div>

                    </div>
                    <div class="col-xl-3 col-md-6 col-sm-12">
                        <div class="info-row">
                            <div class="key nowrap w120">
                                <div class="check-action">
                                    <input type="checkbox" v-model="txtMaKenhBan.enabled" class="check">
                                    <span class="name">Mã kênh bán</span>
                                </div>
                            </div>
                            <div class="value">
                                <input type="text" v-model="txtMaKenhBan.value" :disabled="!txtMaKenhBan.enabled"
                                    class="form-control" />
                            </div>
                        </div>

                    </div>
                </div>
                <div class="row">
                    <div class="col-xl-3 col-md-6 col-sm-12">
                        <div class="info-row">
                            <div class="key nowrap w120">
                                <div class="check-action">
                                    <input type="checkbox" v-model="dtpTuNgay.enabled" class="check">
                                    <span class="name">Từ ngày</span>
                                </div>
                            </div>
                            <div class="value">
                                <ejs-datepicker :enabled="dtpTuNgay.enabled" :format="dateFormat"
                                    v-model="dtpTuNgay.value" />
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 col-sm-12">
                        <div class="info-row">
                            <div class="key nowrap w120">
                                <div class="check-action">
                                    <input type="checkbox" v-model="dtpDenNgay.enabled" class="check">
                                    <span class="name">Đến ngày</span>
                                </div>
                            </div>
                            <div class="value">
                                <ejs-datepicker :enabled="dtpDenNgay.enabled" :format="dateFormat"
                                    v-model="dtpDenNgay.value" />
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 col-sm-12">
                        <div class="info-row">
                            <div class="key nowrap w120">
                                <div class="check-action">
                                    <input type="checkbox" v-model="txtDienThoaiKenh.enabled" class="check">
                                    <span class="name">Điện thoại kênh</span>
                                </div>
                            </div>
                            <div class="value">
                                <input type="text" :disabled="!txtDienThoaiKenh.enabled" class="form-control"
                                    v-model="txtDienThoaiKenh.value" />
                            </div>
                        </div>

                    </div>
                    <div class="col-xl-3 col-md-6 col-sm-12">
                        <!-- <div class="info-row">
                            <div class="key nowrap w120">
                                <div class="check-action">
                                    <input type="checkbox" v-model="txtMaDonHang.enabled" class="check">
                                    <span class="name">Mã đơn hàng</span>
                                </div>
                            </div>
                            <div class="value">
                                <input v-model="txtMaDonHang.value" :disabled="!txtMaDonHang.enabled" type="text"
                                    class="form-control">
                            </div>
                        </div> -->
                        <div class="info-row">
                            <div class="key nowrap w120">
                                <div class="check-action">
                                    <input type="checkbox" v-model="cbbTTSim.enabled" class="check">
                                    <span class="name">Trạng thái sim</span>
                                </div>
                            </div>
                            <div class="value">
                                <select2 :disabled="!cbbTTSim.enabled" :options="cbbTTSim.options"
                                    v-model="cbbTTSim.value" />
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-xl-3 col-md-6 col-sm-12">
                        <div class="info-row">
                            <div class="key nowrap w120">
                                Mã đơn hàng
                            </div>
                            <div class="value">
                                <input type="text" v-model="txtMaDonHang.value" class="form-control" />
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 col-sm-12"></div>
                    <div class="col-xl-3 col-md-6 col-sm-12">
                        <div class="info-row">
                            <div class="key nowrap w120">
                                <div class="check-action">
                                    <input type="checkbox" v-model="cbbTrangThai.enabled" class="check">
                                    <span class="name">Trạng thái đơn</span>
                                </div>
                            </div>
                            <div class="value">
                                <select2 :disabled="!cbbTrangThai.enabled" :options="cbbTrangThai.options"
                                    v-model="cbbTrangThai.value" />
                            </div>
                        </div>
                    </div>
                    <div class="col-xl-3 col-md-6 col-sm-12">
                        
                    </div>
                </div>
            </div>
        </section>
        <section role="region" aria-label="Danh sách đơn hàng">
            <div class="box-form">
                <div class="legend-title">Danh sách đơn hàng</div>
                <div class="list-filter">
                    <div v-for="status in cbbTrangThai.options"  @click="filterbyTTD(status.id)" v-if="status.number" :key="status.value" class="list-filter__item">
                        <StatusButton :active="ttd_filter == status.id"  :status="status.text" :number="status.number" />
                    </div>
                    <div v-if="listSapQuaHan.length > 0" @click="toggleFilter_Sapquahan" class="list-filter__item">
                        <StatusButton :active="filter_sapquahan"  :status="`Sắp quá hạn`" :number="listSapQuaHan.length" />
                    </div>
                    <div v-if="listDaQuaHan.length > 0" @click="toggleFilter_Daquahan" class="list-filter__item">
                        <StatusButton :active="filter_daquahan"  :status="`Đã quá hạn`" :number="listDaQuaHan.length" />
                    </div>
                </div>
                <div class="list-filter">
                    <div v-for="status in cbbTTSim.options" @click="filterbyTTS(status.id)"  v-if="status.number" :key="status.value" class="list-filter__item">
                        <StatusButton :active="tts_filter == status.id"  :status="status.text" :number="status.number" :color="status.color" />
                    </div>
                </div>
                <DataGrid class="table-result table-gachle" panelDataHeight="220px" :allowPaging="true"
                    :columns="tbDSDonHang.columns" ref="tbDSDonHang" :showFilter="true" @rowDataBound="tbDSDonHang_rowDataBound"
                    @rowSelected="tbDSDonHang_rowSelected" :enablePagingServer="false" :dataSource="filter_sapquahan?listSapQuaHan:filter_daquahan?listDaQuaHan:tbDSDonHang_computedData"
                    :enabledSelectFirstRow="false"
                    />
            </div>
        </section>
        <section role="region" aria-label="Chi tiết phân giao">
            <div class="box-form">
                <div class="legend-title">Chi tiết phân giao</div>
                <DataGrid panelDataHeight="220px" :allowPaging="true" :columns="tbChiTietPhanGiao.columns"
                    :dataSource="tbChiTietPhanGiao.data" />
            </div>
        </section>
    </div>
    <ThongTinDonHang ref="ThongTinDonHangModal" :dhData="currentDH" />
</div>
