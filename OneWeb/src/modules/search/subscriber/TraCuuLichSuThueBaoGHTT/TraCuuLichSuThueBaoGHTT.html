<div class="main-wrapper">
    <breadcrumb :header="header" />
    <div class="list-actions-top">
        <ul class="list">
            <li>
                <a href="javascript:void(0)" @click.prevent="onMaTBKeyPress">
                    <span class="icon one-file-search"></span> Tra cứu
                </a>
            </li>
        </ul>
    </div>
    <div class="page-content">
        <div class="row">
            <div class="col-sm-6 col-12">
                <div class="legend-title">Thông tin thuê bao</div>

                <div class="box-form">
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w90">Số máy/Acc</div>
                                <div class="value">
                                    <div class="input-more-button">
                                        <button class="btn" @click="showPopupSearchAccount()">
                                            <span class="-ap icon-more_horiz"></span>
                                        </button>
                                        <SearchAccountModal ref="popupSearchAccount"
                                            @form-close="searchAccountModalClose" />
                                        <input type="text" v-model="txtma_tb.value" class="form-control highlight fw"
                                            @keyup.enter="onMaTBKeyPress">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w95">Mã TT</div>
                                <div class="value">
                                    <input type="text" class="form-control highlight" v-model="txtma_thanhtoan.value">
                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w95">Tên KH</div>
                                <div class="value">
                                    <input type="text" class="form-control highlight" v-model="ten_KH"
                                        @keyup.enter="handleSearch">
                                </div>
                            </div>
                        </div>

                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w95">Số LH</div>
                                <div class="value">
                                    <input type="text" class="form-control highlight" v-model="txtso_lh.value">
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Trạng thái</div>
                                <!-- <SelectExt v-model="trangthaitb_id" :options="ds_trangthai"
                                    @change="onChangeTT($event)" /> -->
                                <input type="text" class="form-control highlight" v-model="txtTrangThai.value">
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w95">Khu vực</div>
                                <div class="value">
                                    <input type="text" class="form-control highlight" v-model="txtkhuvuc.value">
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w95">Gói cước </div>
                                <div class="value">
                                    <input type="text" class="form-control highlight" v-model="txtso_lh.value">
                                </div>
                            </div>
                        </div>
                        <!-- </div> -->
                        <!-- <div class="row"> -->
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Loại hình</div>
                                <SelectExt v-model="LoaitTB_id" :options="ds_loaihinhtb"
                                    @change="onChangeLoaiHinhTB($event)" />
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Dịch vụ</div>
                                <SelectExt v-model="DichVu_ID" :options="ds_dichvu" @change="onChangeDVVT($event)" />
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Đối tượng</div>
                                <SelectExt v-model="doituong_id" :options="ds_doituong" @change="onChangeDT($event)" />
                            </div>
                        </div>
                    </div>
                    <!-- <div class="info-row">
                        <div class="key w100">Tên thuê bao</div>
                        <input type="text" class="form-control" v-bind:value="dataSelected.ten_tb"
                            @change="e=>dataSelected.ten_tb = e.target.value">
                    </div> -->

                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Trạng thái</div>
                                <SelectExt v-model="trangthaitb_id" :options="ds_trangthai"
                                    @change="onChangeTT($event)" /> 
                                <input type="text" class="form-control highlight" v-model="txtTrangThai.value">
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w95">Khu vực</div>
                                <div class="value">
                                    <input type="text" class="form-control highlight" v-model="txtkhuvuc.value">
                                </div>
                            </div>
                        </div>
                    </div> -->
                    <div class="info-row">
                        <div class="key w95">Địa chỉ lắp đặt</div>
                        <div class="value">
                            <div class="input-more-button">
                                <button class="btn" @click="openMapTB(DiaChiKH, 'DiaChiKH')">
                                    <span class="one-map-location f20"></span>
                                </button>
                                <input type="text" class="form-control  text fw6" v-model="DiaChiKH" ref="DiaChiKH"
                                    readonly />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-sm-6 col-12">
                <div class="legend-title">Đặt cọc / Khuyến mại</div>
                <div class="box-form">
                    <DataGrid ref="gridDC_KM" panelDataHeight="100px" v-bind:columns="gridDC_KM.header"
                        v-bind:dataSource="gridDC_KM.listDC_KM" :enabledSelectFirstRow="true" :showFilter="true"
                        :enablePagingServer="false" :showColumnCheckbox="false" :allowPaging="true"
                        :focused-row-enabled="true" :column-auto-width="true" />
                </div>
            </div>
        </div>
        <div>

            <div class="legend-title">Danh sách kết quả phiếu OB GHTT</div>
            <div class="box-form">
                <DataGrid ref="gridOB_GHTT" panelDataHeight="100px" v-bind:columns="gridOB_GHTT.header"
                    v-bind:dataSource="gridOB_GHTT.listOB_GHTT" :enabledSelectFirstRow="true" :showFilter="true"
                    :enablePagingServer="false" :showColumnCheckbox="false" :allowPaging="true"
                    :focused-row-enabled="true" :column-auto-width="true" />
            </div>

        </div>

        <!-- <div>

            <div class="legend-title">Chi tiết OB GHTT</div>
            <div class="box-form">
                <DataGrid ref="gridOB_GHTT" panelDataHeight="100px" v-bind:columns="gridOB_GHTT.header"
                    v-bind:dataSource="gridOB_GHTT.listOB_GHTT" :enabledSelectFirstRow="true" :showFilter="true"
                    :enablePagingServer="false" :showColumnCheckbox="false" :allowPaging="true"
                    :focused-row-enabled="true" :column-auto-width="true" />

        <div>
            <div class="legend-title">Danh sách phiếu YC</div>
            <div class="box-form">
                <DataGrid ref="gridPhieu_YC" panelDataHeight="100px" v-bind:columns="gridPhieu_YC.header"
                    v-bind:dataSource="gridPhieu_YC.listPhieu_YC" :enabledSelectFirstRow="true" :showFilter="true"
                    :enablePagingServer="false" :showColumnCheckbox="false" :allowPaging="true"
                    :focused-row-enabled="true" :column-auto-width="true" />
            </div>

        </div>
        <div>
            <div class="legend-title">Chi tiết phiếu YC</div>
            <div class="box-form">
                <DataGrid ref="gridChiTiet_PYC" panelDataHeight="100px" v-bind:columns="gridChiTiet_PYC.header"
                    v-bind:dataSource="gridPhieu_YC.listChiTiet_PYC" :enabledSelectFirstRow="true" :showFilter="true"
                    :enablePagingServer="false" :showColumnCheckbox="false" :allowPaging="true"
                    :focused-row-enabled="true" :column-auto-width="true" />
            </div>
        </div>
    </div>
</div>
