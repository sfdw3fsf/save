<div>
    <vue-bread-crumb :header="header" />
    <vue-nav>
        <div class="list-actions-top">
            <ul class="list">
                <li>
                    <a href="javascript: void(0)" @click="btnTimkiemClick" title="Tìm kiếm">
                        <span class="icon one-search"></span>Tìm kiếm
                    </a>
                </li>
            </ul>
        </div>
    </vue-nav>
    <div class="page-content">

        <div class="tab-content">
            <div class="box-form">
                    <div class="legend-title">Thông tin tìm kiếm</div>
                    <div class="row">
                        <div class="col-sm-4 col-12">
                            <div class="info-row">
                                <div class="key w110">Mã TT/GD</div>
                                <div class="value">
                                    <input type="text" class="form-control  font-weight-bold text"
                                        v-model="items.ma_kh" ref="ma_kh" v-on:keyup.enter="txtMaKH_KeyPress">
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-4 col-12">
                            <div class="info-row">
                                <div class="key w90">Số máy/Acc</div>
                                <div class="value">
                                    <div class="input-more-button">
                                        <button @click="showPopupSearchAccount" class="btn">
                                            <span class="-ap icon-more_horiz"></span>
                                        </button>
                                        <SearchAccountModal ref="searchAccountModal" @form-close="acceptSearchAccount" />
                                        <input type="text" class="form-control highlight" v-model="items.ma_tb" ref="MaTB"
                                            v-on:keyup.enter="txtMaKH_KeyPress" />
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-4 col-12">
                            <div class="info-row">
                                <div class="key w110">Số điện thoại</div>
                                <div class="value">
                                    <input type="text" class="form-control" v-model="items.so_dt"
                                        ref="so_dt">
                                </div>
                            </div>
                        </div>
                    </div>
            </div>
        </div>
        <div class="box-form">
            <div class="legend-title">
                <div class="pull-left">
                    Danh sách tin nhắn
                </div>
                <div class="clearfix"></div>
            </div>
        </div>

        <div class="table-content">
            <DataGrid v-bind:columns="[
                        {fieldName: 'phoneNumber', headerText: 'Số điện thoại', allowFiltering: true, allowSorting: false, width: 60},
                        {fieldName: 'contentSms', headerText: 'Nội dung', allowFiltering: true, allowSorting: false, width: 250},
                        {fieldName: 'smsDate', headerText: 'Ngày gửi', allowFiltering: true, allowSorting: false, width: 80},
                        {fieldName: 'customerId', headerText: 'Mã thanh toán/giao dịch', allowFiltering: true, allowSorting: false, width: 90},
                        {fieldName: 'subscriberCode', headerText: 'Mã thuê bao', allowFiltering: true, allowSorting: false, width: 90},
                        {fieldName: 'serviceName', headerText: 'Dịch vụ', allowFiltering: true, allowSorting: false, width: 90},
                        {fieldName: 'shortenLink', headerText: 'Link QrCode', allowFiltering: true, allowSorting: false, width: 120, template: colLinkQR(this)},
                        ]" v-bind:dataSource="DsSMSs" :showFilter="true" :allowPaging="true"
                ref="DsKhachhangGrid" :enablePagingServer="false" :allowExcelExport="true">
            </DataGrid>
        </div>
    </div>
</div>
</div>
