<div>
    <vue-bread-crumb :header="header" />
    <vue-nav>
        <div class="list-actions-top">
            <ul class="list">
                <li>
                    <a href="javascript: void(0)" @click="btnTimkiemClick" title="Tìm kiếm">
                        <span class="icon one-search"></span>Tìm kiếm
                    </a>
                </li>
                <li>
                    <a href="javascript: void(0)" @click="ChitietChanDungKH" title="Chi tiết chân dung KH" >
                        <span class="icon one-save"></span>Chi tiết chân dung KH
                    </a>
                </li>

            </ul>
        </div>
    </vue-nav>
    <div class="page-content">

        <div class="tab-content">
            <div class="grid-stack-box box-form">
                <div class="box-col" id="boxLeft" style="width: calc(50% - 8px);">
                    <div class="legend-title">Thông tin tìm kiếm</div>
                    <div class="row">
                        <div class="col-sm-12 col-12">
                            <div class="info-row">
                                <div class="key w110">Mã KH</div>
                                <div class="value">
                                    <input type="text" class="form-control  font-weight-bold text"
                                        v-model="items.ma_kh" ref="ma_kh" v-on:keyup.enter="txtMaKH_KeyPress">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w110">Mã số thuế</div>
                                <div class="value">
                                    <input type="text" class="form-control  font-weight-bold text"
                                        v-model="items.mst" ref="mst" v-on:keyup.enter="txtMaKH_KeyPress">
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w110">Phân loại</div>
                                <div class="value">
                                    <div class="select-custom">
                                        <SelectExt id="cbb_Phanloai" v-model="items.phanloai"
                                            :settings="{dropdownParent: $refs['dataPhanLoai']}"
                                            :dataSource="dataPhanLoais" dataTextField="ten_phanloai"
                                            dataValueField="phanloai" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-12 col-12">
                            <div class="info-row">
                                <div class="key w110">DB tiềm năng</div>
                                <div class="value">
                                    <div class="select-custom">
                                        <SelectExt id="cbb_DBTiemnang" v-model="items.tiemnang"
                                            :settings="{dropdownParent: $refs['dataDuBaoTiemNang']}"
                                            :dataSource="dataDuBaoTiemNangs" dataTextField="ten_tiemnang"
                                            dataValueField="tiemnang" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="gutter gutter-horizontal" style="width: 16px;"></div>
                <div class="box-col" id="boxRight" style="width: calc(50% - 8px);">
                    <div class="legend-title"><span></span><br></div>
                    <div class="row">
                        <div class="col-sm-12 col-12">
                            <div class="info-row">
                                <div class="key w110">Tên KH</div>
                                <div class="value">
                                    <input type="text" class="form-control" v-model="items.ten_kh"
                                        ref="ten_kenh">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w110">Phân hạng</div>
                                <div class="value">
                                    <div class="select-custom">
                                        <SelectExt id="cbb_Phanhang" v-model="items.phanhang"
                                            :settings="{dropdownParent: $refs['dataPhanHang']}"
                                            :dataSource="dataPhanHangs" dataTextField="ten_phanhang"
                                            dataValueField="phanhang" />
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w110">Phân khúc</div>
                                <div class="value">
                                    <div class="select-custom">
                                        <SelectExt id="cbb_Phankhuc" v-model="items.phankhuc"
                                            :settings="{dropdownParent: $refs['dataPhanKhuc']}"
                                            :dataSource="dataPhanKhucs" dataTextField="ten_phankhuc"
                                            dataValueField="phankhuc" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-12 col-12">
                            <div class="info-row">
                                <div class="key w110">DB rủi ro</div>
                                <div class="value">
                                    <div class="select-custom">
                                        <SelectExt id="cbb_DBRuiro" v-model="items.ruiro"
                                            :settings="{dropdownParent: $refs['dataDuBaoRuiRo']}"
                                            :dataSource="dataDuBaoRuiRos" dataTextField="ten_ruiro"
                                            dataValueField="ruiro" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="box-form">
            <div class="legend-title">
                <div class="pull-left">
                    Danh sách khách hàng
                </div>
                <div class="pull-right" style="width:7%">
                    <div class="col-sm-12 col-12">
                        <div class="info-row">
                            <div class="key w100">Export</div>
                            <div class="value">
                                <div class="col-sm-1 col-12">
                                    <button class="btn btn-sm btn-primary" @click="btnExportExcel_Click">
                                        <span class="-ap icon-upload"></span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="clearfix"></div>
            </div>
        </div>

        <div class="table-content">
            <DataGrid v-bind:columns="[
                        {fieldName: 'customerId', headerText: 'Mã khách hàng', allowFiltering: true, allowSorting: false, width: 90},
                        {fieldName: 'customerName', headerText: 'Tên khách hàng', allowFiltering: true, allowSorting: false, width: 90},
                        {fieldName: 'addressInfo', headerText: 'Địa chỉ', allowFiltering: true, allowSorting: false, width: 150},
                        {fieldName: 'taxId', headerText: 'Mã số thuế', allowFiltering: true, allowSorting: false, width: 90},
                        {fieldName: 'phoneNumber', headerText: 'Điện thoại', allowFiltering: true, allowSorting: false, width: 90},
                        {fieldName: 'career', headerText: 'Ngành nghề', allowFiltering: true, allowSorting: false, width: 90},
                        ]" v-bind:dataSource="DsKhachhangs" :showFilter="true" :allowPaging="true"
                ref="DsKhachhangGrid" :enablePagingServer="false" :allowExcelExport="true" @rowSelected="DsKhachhangSelected">
            </DataGrid>
        </div>
    </div>
</div>
</div>
