<div class="main-wrapper">
  <div>
    <breadcrumb />
    <div class="list-actions-top">
      <ul class="list">
        <li><a>
            <span class="icon one-search"></span>Lấy DS
          </a></li>
        <li>
          <a>
            <Icon icon="material-symbols:download" width="24" height="24" /> Export
          </a>
        </li>
        <li>
          <a>
            <Icon icon="gridicons:create" width="24" height="24" /> Tạo kế hoạch
          </a>
        </li>
      </ul>
    </div>
  </div>
  <div class="page-content">
    <div class="row">
      <div class="col-sm-6 col-12">
        <div class="box-form detail-box">
          <div class="legend-title">Thông tin nhiệm vụ giao</div>
          <div class="row" style="padding-top: 10px;">
            <div class="col-6">
              <div class="info-row">
                <div class="key">Mã nhiệm vụ <span class="red">(*)</span></div>
                <div class="value">
                  <input type="text" :disabled="!txtMaNV.enabled" v-model="txtMaNV.value" class="form-control" />
                </div>
              </div>
            </div>
            <div class="col-6">
              <div class="info-row">
                <div class="key">Loại nhiệm vụ <span class="red">(*)</span></div>
                <div class="value">
                  <select2 :disabled="!cbbLoaiNV.enabled" :options="cbbLoaiNV.options" v-model="cbbLoaiNV.value" />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-6">
              <div class="info-row">
                <div class="key">Ngày giao <span class="red">(*)</span></div>
                <div class="value">
                  <ejs-datepicker :disabled="!dateNgayGiao.enabled" v-model="dateNgayGiao.value" :format="DateFormat" />
                </div>
              </div>
            </div>
            <div class="col-6">
              <div class="info-row">
                <div class="key">Hạn thực hiện</div>
                <div class="value">
                  <input type="text" class="form-control" :disabled="!txtHanThucHien.enabled"
                    v-model="txtHanThucHien.value">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-12">
        <div class="box-form detail-box">
          <div class="legend-title">Nội dung giao nhiệm vụ</div>
          <div class="row" style="padding-top: 10px;">
            <div class="col-6">
              <div class="info-row">
                <div class="key">Dịch vụ</div>
                <div class="value">
                  <select2 :disabled="!cbbDichVu.enabled" :options="cbbDichVu.options" v-model="cbbDichVu.value" />
                </div>
              </div>
            </div>
            <div class="col-6">
              <div class="info-row">
                <div class="key">Loại hình</div>
                <div class="value">
                  <select2 :disabled="!cbbLoaiHinh.enabled" :options="cbbLoaiHinh.options"
                    v-model="cbbLoaiHinh.value" />
                </div>
              </div>
            </div>
          </div>
          <div class="info-row">
            <div class="key">ND tiếp cận <span class="red">(*)</span></div>
            <div class="value" style="padding: 0px 3px 0px 9px;">
              <textarea class="form-control" rows="5" :disabled="!txtNDTiepCan.enabled"
                v-model="txtNDTiepCan.value"></textarea>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="nav tab-over tabs">
      <a href="#tab1" data-toggle="tab" class=" minw0 active">Khách hàng chưa có kế hoạch</a>
      <a href="#tab2" data-toggle="tab" class="minw0">Khách hàng đã có kế hoạch</a>
    </div>
    <div class="tab-content">
      <div class="tab-pane active fullh" id="tab1">
        <DataGrid 
        :columns="tbKHChuaCoKH.columns"
        :dataSource="tbKHChuaCoKH.data" :showFilter="true" :enabledSelectFirstRow="false"
          panelDataHeight="150px" dataKeyField="" :selectionSettings="{ checkboxMode: 'ResetOnRowClick' }"
          :allowPaging="true" @rowSelected="" :enablePagingServer="false" :showColumnCheckbox="true" />
      </div>
      <div class="tab-pane fullh" id="tab2">
        <DataGrid 
        :columns="tbKHCoKH.columns"
        :dataSource="tbKHCoKH.data" :showFilter="true" :enabledSelectFirstRow="false"
          panelDataHeight="150px" dataKeyField="" :selectionSettings="{ checkboxMode: 'ResetOnRowClick' }"
          :allowPaging="true" @rowSelected="" :enablePagingServer="false" :showColumnCheckbox="true" />
      </div>
    </div>
    <div class="box-form">
      <div class="legend-title">Danh sách nhiệm vụ tiếp cận khách hàng</div>
      <DataGrid 
        :columns="tbNhiemVu.columns"
        :dataSource="tbNhiemVu.data" :showFilter="true" :enabledSelectFirstRow="false"
          panelDataHeight="150px" dataKeyField="" :selectionSettings="{ checkboxMode: 'ResetOnRowClick' }"
          :allowPaging="true" @rowSelected="" :enablePagingServer="false" :showColumnCheckbox="true" />
    </div>
  </div>
</div>
