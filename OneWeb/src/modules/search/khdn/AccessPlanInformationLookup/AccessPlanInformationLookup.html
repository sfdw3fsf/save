<div class="main-wrapper"> 
    <breadcrumb :header="header" />
    <ActionTop :actions="actions" @onActionClick="onActionClick"/>
    <div class="page-content">
        <div class="row">
            <div class="col-sm-12 col-12">
                <div class="box-form">
                    <div class="legend-title">Thông tin tra cứu</div>
                    <div class="row">
                        <div class="col-sm-3 col-12">
                            <div class="info-row">
                                <div class="key">{{cboLoaiNV.text}}</div>
                                <div class="value">
                                    <select2 v-model="cboLoaiNV.value"></select2>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-3 col-12">
                            <div class="info-row">
                                <div class="key">{{txtTenCT.text}}</div>
                                <div class="value">
                                    <input class="form-control" v-model="txtTenCT.value"/>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-3 col-12">
                            <div class="info-row">
                                <div class="key">{{dpTuNgay.text}}</div>
                                <div class="value">
                                    <ejs-datepicker :showClearButton="true"
                                    v-model="dpTuNgay.value"
                                    :format="'dd/MM/yyyy'">
                                    </ejs-datepicker>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-3 col-12">
                            <div class="info-row">
                                <div class="key">{{dpDenNgay.text}}</div>
                                <div class="value">
                                    <ejs-datepicker :showClearButton="true"
                                    v-model="dpDenNgay.value"
                                    :format="'dd/MM/yyyy'">
                                    </ejs-datepicker>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="box-form">
                    <div class="legend-title">Lịch tiếp cận khách hàng</div>
                    <div class="row">
                        <div class="col-sm-12 col-12">
                            <DataGrid :columns="DataLichTCKH.columns" :dataSource="DataLichTCKH.data"
                            :enable-paging-server="false" panelDataHeight="300" :allowPaging="true" :showFilter="true" ref="refDataLichTCKH"
                            :showColumnCheckbox="true" :allowExcelExport="true" :enabledSelectFirstRow="false"
                            @selectedItemsChanged="select_selectedItemsChangedDataLichTCKH"></DataGrid>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
