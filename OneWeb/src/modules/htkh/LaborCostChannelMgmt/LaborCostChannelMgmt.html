<div>
    <vue-bread-crumb :header="header" />
    <vue-nav>
        <div class="list-actions-top">
            <ul class="list">
                <li>
                    <a @click="tsbtnGhiLai_Click" >
                        <span class="icon one-save"></span>Ghi lại
                    </a>
                </li>
                <li>
                    <a href="javascript:;" @click="taiFileMau">
                        <span class="icon one-excel"></span> Tải file excel mẫu
                    </a>
                </li>
                <li>
                    <a href="javascript: void(0)" @click="ChuyenduyetClick" title="Giao phiếu" :class="{'disabled': !tsbtnChuyenDuyet.Enabled}" >
                        <span class="icon one-file-arrow-right1"></span>Chuyển duyệt
                    </a>
                </li>

            </ul>
        </div>
    </vue-nav>
    <div class="page-content">

        <div class="box-form">
            <div class="row">
              <div class="info-row">
                <div class="key w80">Đường dẫn</div>
                <div class="input-more-button">
                  <label for="upload" class="btn">
                    <span class="-ap icon-more_horiz"></span>
                    <input ref="fileInput" type="file" id="upload" style="display: none" @change="onChangeFile"
                      accept=".xls, .xlsx" @click="$refs.fileInput.value=null" />
                  </label>
                  <input @click="duongDan_click" v-model="duongDan" type="text" class="form-control" style="background-color: #FFF;" readonly="true" />
                </div>
              </div>
            </div>
          </div>
        <div class="box-form">
            <div class="legend-title">
                <div class="pull-left">
                    Danh sách thuê bao cần điều chỉnh phân giao
                </div>
                <div class="clearfix"></div>
            </div>
            <div class="nav tabs tab-over">
                <a href="#tab1" data-toggle="tab">Hợp lệ</a>
                <a href="#tab2" data-toggle="tab" class="active" >Không hợp lệ</a>
            </div> 
            <div class="tab-content">
                <div id="tab1" class="tab-pane active">
                    <div class="pull-right" style="width:7%">
                        <div class="col-sm-12 col-12">
                            <div class="info-row">
                                <div class="key w100">Export</div>
                                <div class="value">
                                    <div class="col-sm-1 col-12">
                                        <button class="btn btn-sm btn-primary" @click="btnExportExcelHople_Click">
                                            <span class="-ap icon-upload"></span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="grid-stack-box box-form">
                        <div class="table-content">
                            <DataGrid v-bind:columns="columns_ds_dulieuhople" v-bind:dataSource="dt_hople" :showFilter="true" :allowPaging="true"
                                ref="DsthuebaoGrid1" :enablePagingServer="false" :allowExcelExport="true" @rowSelected="DsThuebaoSelected">
                            </DataGrid>
                        </div>
                    </div>
                    
                </div>
                <div id="tab2" class="tab-pane">
                    <div class="pull-right" style="width:7%">
                        <div class="col-sm-12 col-12">
                            <div class="info-row">
                                <div class="key w100">Export</div>
                                <div class="value">
                                    <div class="col-sm-1 col-12">
                                        <button class="btn btn-sm btn-primary" @click="btnExportExcelKhonghople_Click">
                                            <span class="-ap icon-upload"></span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div> 
                    <div class="grid-stack-box box-form">
                        <div class="table-content">
                            <DataGrid v-bind:columns="columns_ds_dulieukhonghople" v-bind:dataSource="dt_khonghople" :showFilter="true" :allowPaging="true"
                                ref="DsThuebaoGrid2" :enablePagingServer="false" :allowExcelExport="true" @rowSelected="DsThuebaoSelected">
                            </DataGrid>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
