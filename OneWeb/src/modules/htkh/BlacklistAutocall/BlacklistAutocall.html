<div class="main-wrapper">
    <breadcrumb :header="header" />
    <ActionTop :actions="actions" @onActionClick="onActionClick"/>
    <div class="page-content">
        <div class="row">
            <div class="col-sm-12 col-12">
                <div class="box-form">
                    <div class="row">
                        <div class="row">
                            <div class="col-sm-12 col-12">
                                <div style="margin-bottom: 10px; display: flex; align-items: center;">
                                    <span class="icon one-alert" style="color: orange;font-size: 20px; margin-right: 10px;"></span>
                                    <span style="font-weight: 500;">File excel gồm các trường: MA, LOAI, SUDUNG (LOAI: 1-mã khách hàng/2-mã thanh toán/3-mã thuê bao; SUDUNG: 1 - sử dụng/0- không còn sử dụng)</span>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-sm-12 col-12">
                                <div class="info-row">
                                    <div class="key">Đường dẫn</div>
                                    <div class="value" style="display: flex;">
                                        <div class="input-more-button">
                                            <button class="btn" @click="uploadFile">
                                                <span class="-ap icon-more_horiz"></span>
                                                <input ref="fileInput" type="file" id="upload" style="display:none" @change="importExcel"
                                                accept=".xls, .xlsx" @click="$refs.fileInput.value=null" />
                                            </button>
                                        </div>
                                        <input disabled class="form-control" v-model="tenFile"/>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key">Blacklist theo:</div>
                                <div class="value">
                                    <select2 v-model="cboLoai.value" :options="cboLoai.list"></select2>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key">Sử dụng:</div>
                                <div class="value">
                                    <select2 v-model="cboSuDung.value" :options="cboSuDung.list"></select2>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key">Nhập mã:</div>
                                <div class="value">
                                    <input ref="refNhapMa" v-model="txtNhapMa.value" type="text" class="form-control">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- <div class="legend-title">Thêm thuê bao</div> -->
                <div class="box-form">
                    <div class="legend-title">Danh sách thuê bao</div>
                    <div class="row">
                        <div class="col-sm-12 col-12">
                            <DataGrid :columns="DsSauKhiImport.columns" :dataSource="DsSauKhiImport.data"
                            :showColumnCheckbox="false" :enable-paging-server="false" panelDataHeight="200" :allowPaging="true" :showFilter="true" ref="reflistDsSauKhiImport"
                            :enabledSelectFirstRow="false" @selectedItemsChanged="select_selectedItemsChangedDsSauKhiImport"></DataGrid>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <InfoImportVue ref="refInfoImportVue"></InfoImportVue>
    
</div>
