<div class="main-wrapper">
  <div>
    <breadcrumb :header="header" />
    <div class="list-actions-top">
      <ul class="list">
        <li @click="btnLayThongTin_Click" v-if="autoCall != 1">
          <a>
            <span class="icon one-reload1"></span> Lấy TT
          </a>
        </li>
        <li>
        <li @click="btnCapNhat_click"><a>
            <span class="icon one-save"></span> Cập nhật
          </a></li>
        <li @click="OutBoundCall_Click" v-show="autoCall != 1" class="disabled">
          <a>
            <Icon icon="fluent:call-outbound-20-filled" width="24" height="24" /> Outbound Call
          </a>
        </li>
        <li v-if="autoCall != 1" class="disabled">
          <a>
            <Icon icon="material-symbols:download" width="24" height="24" /> Export DS KH
          </a>
        </li>
        <li @click="viewReportDetail_Click" v-show="autoCall != 1" class="disabled"> 
          <a>
            <Icon icon="icon-park-outline:file-search" width="24" height="24" /> Xem chi tiết thống kê
          </a>
        </li>
      </ul>
    </div>
  </div>
  <div class="page-content">
    <div class="nav tab-over tabs" >
      <a href="#tab1" data-toggle="tab" style="min-width: 200px !important;" class=" minw0 active">OB GHTT (F2)</a>
      <a href="#tab2" data-toggle="tab" style="min-width: 200px !important;" class="minw0 disabled" >Tra cứu (F3)</a>
      <a href="#tab3" data-toggle="tab" style="min-width: 200px !important;" class="minw0 disabled">Thống kê (F4)</a>
    </div>
    <div class="tab-content">
      <div class="tab-pane active fullh" id="tab1">


        <ThongTinKhachHangAutoCall ref="refThongTinKhachHangAutoCallComponent" v-if="autoCall == 1"  :list_thuebao_selected="list_thuebao_selected"/>
        
        <NhanCongOB ref="refThongTinTraCuuOBComponent"  v-if="autoCall != 1" @onRowSelected="handleOnRowThongTinTraCuuSelected" @tap-nhan-cong-change="hanldeTapNhanCongChange" :thuebao_id="selected_item.thuebao_id" :list_thuebao_selected="list_thuebao_selected"/>
        
        <!--  Thông tin đặt cọc/ trả trước auto call-->
        <ThongTinDatCocTraTruoc  v-show="autoCall == 1" :khachhang_id="Number(khachhang_id)" :thang_kt="Number(thang_kt_cpt)" :ma_kh="ma_kh" :ma_tb="ma_tb" @on-select-row="handleThongTinDatCocSelected"/>
        
        <!-- Thong tin Tra Cuu Nhan Cong OB -->
        <ThongTinTBKhachHang v-show="autoCall != 1" :khachhang_id="Number(khachhang_id)"  @on-select-row="handleThongTinDatCocSelected" :tracuuOB="tracuuOB" :list_thuebao_selected="list_thuebao_selected"/>

        <!-- Thông tin kết quả OB -->
        <ThongTinChiTietOB  ref="refThongTinChiTietOBlComponent" :khachhang_id="Number(khachhang_id)" :ma_kh="ma_kh" :ten_kh="ten_kh" :phanvung_id="Number(phanvung_id)"/>
      </div>
      <div class="tab-pane  fullh" id="tab2">
       
      </div>
      <div class="tab-pane  fullh" id="tab3">
        <ThongKeOB />
      </div>
    </div>
  </div>
</div>
