<div class="main-wrapper">
    <breadcrumb :header="header" />
    <div class="list-actions-top">
        <ul class="list">
            <li>
                <a href="javascript: void(0)" @click="tsbtnNhapMoi_Click" title="Nhập mới">
                    <span class="icon one-file-plus"></span>Nhập mới
                </a>
            </li>
            <li>
                <a href="javascript: void(0)" @click="tsbtnTimkiem_Click" title="Hiển thị danh sách">
                    <span class="icon one-file-attach"></span>Tìm kiếm
                </a>
            </li>
            <li>
                <a href="javascript: void(0)" @click="tsbtnChitiet_Click" title="Giao phiếu" >
                    <span class="icon one-file-edit"></span>Chi tiết
                </a>
            </li>
        </ul>
    </div>
    <div class="page-content">
        <div class="box-form">
            <div class="legend-title">
                <div class="pull-left">
                    <span v-b-toggle.collapse-tthc class="icon fa fa-angle-up"></span>
                    <span v-b-toggle.collapse-tthc class="icon fa fa-angle-down"></span> Thông tin tra cứu
                </div>
                <div class="clearfix"></div>
            </div>
            <b-collapse visible id="collapse-tthc">
                <div class="row">
                    <div class="col-sm-12 col-12">
                        <div class="row">
                            <div class="col-sm-3 col-12">
                                <div class="info-row">
                                    <div class="key w100">Mã phiếu</div>
                                    <div class="value">
                                            <input type="text" class="form-control" v-model="txtMaphieu">
                                            <span class="name"></span>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-3 col-12">
                                <div class="info-row">
                                    <div class="key w100">Mã khách hàng</div>
                                    <div class="value">
                                            <input type="text" class="form-control" v-model="txtMaKH">
                                            <span class="name"></span>
                                    </div>
                                </div>
                            </div>
                            <div class="col-sm-3 col-12">
                                <div class="info-row">
                                    <div class="key w110">Ngày giao phiếu</div>
                                    <div>
                                        <div class="input-icon-right">
                                            <k-date-picker format="DD/MM/YYYY" type="datetime" v-model="Ngaygiaophieu"
                                             />
                                        </div>
                                    </div>
                                </div>
                            </div>  
                            <div class="col-sm-3 col-12">
                                <div class="info-row">
                                    <div class="key w100">ĐV phối hợp</div>
                                    <div class="value">
                                        <div class="select-custom">
                                           <treeselect placeholder="Chọn đơn vị" ref="cbb_DonviPhoihop" name="cbb_DonviPhoihop" id="cbb_DonviPhoihop" v-model="donvi_phoihop_id" :options="dsDonviPhoihop" @select="onChangeDonviPhoihop($event)" >
                                            </treeselect>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </b-collapse>
        </div>

        <div class="box-form">
            <div class="nav tabs tab-over">
                <a href="#tab1" @click="changetab_ChoXL" data-toggle="tab" class="active">Phiếu chờ xử lý</a>
                <a href="#tab2" @click="changetab_DaHT" data-toggle="tab">Phiếu đã hoàn thành</a>
            </div>
            <div class="tab-content">
                <div id="tab1" class="tab-pane active">
                    <DataGrid v-bind:columns="headerChoxuly"
                        v-bind:dataSource="DsphieuChoxuly"
                        :showFilter="true"
                        :allowPaging="true"
                        ref="phieuchoXLGrid"
                        :enablePagingServer="false"
                        :allowExcelExport="true"
                        @rowSelected="onPhieuChoXLSelected"
                    >
                    </DataGrid>
                </div>
                <div id="tab2" class="tab-pane">
                    <DataGrid v-bind:columns="headerDaHT"
                    v-bind:dataSource="DsphieuDahoanthanh"
                    :showFilter="true"
                    :allowPaging="true"
                    ref="phieuDaHTGrid"
                    :enablePagingServer="false"
                    :allowExcelExport="true"
                    @rowSelected="onPhieuDaHTSelected"
                >
                </DataGrid>
                </div>
            </div>

        </div>
    </div>
</div>
