<ejs-dialog 
    :enableResize="true"
    :resizeHandles="['All']"
    :allowDragging="true"
    :header="'Phân đơn hàng'" showCloseIcon="true" :target="'.main-wrapper'"
    header-class="popup-header" :visible="false" ref="popupPhanDonHang" :position="{ X: 'center', Y: 'top' }"
    width="60%" id="popupPhanDonHang">
    <div class="popup-content">
        <div class="list-actions-top">
            <ul class="list">
                <li>
                    <a ref="tsbtnGhiLai" @click="tsbtnGhiLai_Click()">
                        <span class="icon one-save"></span> Ghi lại
                    </a>
                </li>
            </ul>
        </div>
        <div class="popup-body">
            <div class="box-form">
                <div class="info-row">
                    <div class="key w220">Đơn vị</div>
                    <div class="value">
                        <treeselect placeholder="Chọn đơn vị" :disable-branch-nodes="true" ref="cboDonvi" name="cboDonvi" id="cboDonvi" v-model="donvi_id" :multiple="false" :options="treeDonvi" >
                        </treeselect>
                    </div>
                </div>
                <div class="info-row">
                    <div class="key w220">Nhân viên XLĐH</div>
                    <div class="value">
                        <Select2Ext @change="getDonHang()" ref="cboNhanvien" />
                    </div>
                </div>
            </div>
            <div class="box-form">
                <div class="legend-title">Danh sách đơn hàng đã phân giao</div>
                <div class="table-content manual-fill">
                    <DataGrid :columns="headers" :dataSource="dataSources" :showColumnCheckbox="false"
                      :enable-paging-server="false" :allowPaging="true" :showFilter="true" />
                  </div>
            </div>
        </div>
    </div>
</ejs-dialog>
