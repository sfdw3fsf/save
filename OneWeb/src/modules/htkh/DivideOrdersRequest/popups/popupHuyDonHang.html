<ejs-dialog 
    :enableResize="true"
    :resizeHandles="['All']"
    :allowDragging="true"
    :header="'Cập nhập lý do huỷ đơn'" showCloseIcon="true" :target="'.main-wrapper'"
    header-class="popup-header" :visible="false" ref="popupHuyDonHang" :position="{ X: 'center', Y: 'top' }"
    width="60%" id="popupHuyDonHang">
    <div class="popup-content">
        <div class="list-actions-top">
            <ul class="list">
                <li>
                    <a ref="tsbtnGhiLai" @click="tsbtnGhiLai_Click()">
                        <span class="icon one-save"></span> Ghi lại
                    </a>
                </li>
            </ul>
        </div>
        <div class="popup-body">
            <div class="box-form">
                <div class="info-row">
                    <div class="key" style="width: 200px;">Lý do huỷ đơn hàng (*)</div>
                    <div class="value">
                        <input name="ghichu" ref="txtGhiChu" class="form-control" />
                    </div>
                </div>
            </div>
        </div>
    </div>
</ejs-dialog>
