<div class="main-wrapper">
  <breadcrumb :header="header" />
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <a href="#" @click.prevent="tim_kiem" id='btnTimKiem'>
          Xuất DL
        </a>
      </li>
    </ul>
  </div>

  <div class="page-content">
    <div class="row">
      <div class="col-sm-3">
        <div class="box-form">
          <div class="legend-title">Chọn đơn vị</div>
          <div class="tree-plus donvi" style="overflow: auto; min-height: 350px">
            <treeselect v-model="donviVaule"
                        :multiple="true"
                        :options="listItemDonViGoc"
                        v-on:select="onChangeTreeSelect"
                        noResultsText="Không có dữ liệu"
                        placeholder="Vui lòng chọn đơn vị"
                        :normalizer="removeNoChildren"
                        :defaultExpandLevel="2"
                        :always-open="true"
                        :clearable="true"
                        :limit="3"
                        :show-count="false"
                        noChildrenText="''"
                        noOptionsText=''
                        value-consists-of="ALL" />
          </div>
        </div>
      </div>

      <div class="col-sm-6">
        <div class="box-form">
          <div class="legend-title">Tìm kiếm theo điều kiện</div>

          <div class="row">
            <div class="col-sm-12 col-md-12">
              <div class="info-row">
                <div class="key w120">Tên bảng kê</div>
                <div class="value">
                  <div class="select-custom">
                    <ejs-dropdownlist
                      :allowFiltering="true"
                      v-model="bangke.value"
                      placeholder="Chọn"
                      :dataSource="bangke.list"
                      :fields="{value:'banke_id', text: 'ten_bk'}"
                      :change="onChangeTrangThai"
                    />
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-sm-12 col-md-12 col-lg-6">
              <div class="info-row">
                <div class="key w120">Ngày ra HĐ</div>
                <div class="value">
                  <ejs-datepicker v-model="dtpStartDate" :value="dtpStartDate" :max="today"
                                  :format="'dd/MM/y'"></ejs-datepicker>
                </div>
              </div>
            </div>

            <div class="col-sm-12 col-md-12 col-lg-6">
              <div class="info-row">
                <div class="key w80">Tháng năm</div>
                <div class="value">
                  <ejs-datepicker v-model="dtpEndDateSearch" :value="dtpEndDateSearch" :max="today"
                                  :format="'MM/y'"></ejs-datepicker>
                </div>
              </div>
            </div>
          </div>

          <div class='row'>
            <div class="col-sm-12 col-md-12 col-lg-6">
              <div class="info-row">
                <div class="key w120 nowrap">
                  Mã nhân viên thu
                </div>
                <div class="value">
                  <input v-model="txtMaNVTC" type="text" class="form-control">
                </div>
              </div>
            </div>
          </div>

          <div class='row'>
            <div class="col-sm-12 col-md-12 col-lg-6">
              <div class="info-row">
                <div class="key nowrap">
                  Một số khách hàng
                </div>
                <div class="value">
                  <input v-model="khachhang" type="text" class="form-control">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="report" class="box-form" v-show="showPanelReport">
      <div class="pdf-canvas-box">
        <div class="report">
          <report
            :thongTinThueBaos="thongTinThueBao"
            :thongTinThueBao2="thongTinThueBao2"
            :thongTinThueBao3="thongTinThueBao3"
            :thongTinThueBao4="thongTinThueBao4"
            :thongTinThueBao5="thongTinThueBao5"
            :fName="fName"
            :doRender="doRenderPDF" />
        </div>
      </div>
    </div>

  </div>
</div>
