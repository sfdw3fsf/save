<b-modal ref="NoidungDuyetTuchoiModal" size="xl" hide-header hide-header-close hide-footer body-class="p-0" no-close-on-backdrop
  @show="handleShowModal">
  <div class="modal-content popup-box">
    <div class="popup-header">
      <div class="title">
        <span class="icon one-notepad"></span>{{title}}
      </div>
      <div class="close -ap icon-close" @click="hideModal"></div>
    </div>
    <div class="list-actions-top">
      <ul class="list">
        <li>
          <a href="javascript: void(0)" title="Ghi lại" v-on:click.prevent="Ghilai_click">
            <span class="icon one-save"></span>Ghi lại
          </a>
        </li>
        <li>
          <a href="javascript: void(0)" title="Ghi lại" v-on:click.prevent="hideModal">
            <span class="icon one-save"></span>Thoát
          </a>
        </li>
      </ul>
    </div>
    <div class="popup-body">
      <div class="row">
        <div class="col-sm-12 col-12">
          <div class="info-row">
            <div class="key w90">{{labelInput}}</div>
            <div class="value">
              <textarea type="text" class="form-control  font-weight-bold text" v-model="noidung" ref="noidung"></textarea>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</b-modal>
