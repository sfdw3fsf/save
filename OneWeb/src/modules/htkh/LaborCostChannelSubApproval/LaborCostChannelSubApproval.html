<div>
    <vue-bread-crumb :header="header" />
    <vue-nav>
        <div class="list-actions-top">
            <ul class="list">
                <li>
                    <a href="javascript: void(0)" @click="btnTracuuClick" title="Tìm kiếm">
                        <span class="icon one-search"></span>Tra cứu
                    </a>
                </li>
                <li>
                    <a href="javascript: void(0)" @click="Pheduyet_click" title="Phê duyệt">
                        <span class="icon nc-icon-glyph ui-1_check-circle-08"></span>Phê duyệt
                    </a>
                </li>
                <li>
                    <a href="javascript: void(0)" @click="Tuchoi_click" title="Từ chối">
                        <span class="icon nc-icon-glyph ui-1_circle-remove"></span>Từ chối
                    </a>
                </li>
                <li>
                    <a href="#" @click.prevent="XuatDL_click" title="Xuất DL">
                        <span class="icon one-file-download"></span>Xuất DL
                    </a>
                </li>
                <li>
                    <a href="javascript: void(0)" @click="UploadVB_Click" title="Upload VB">
                        <span class="icon one-file-plus"></span>Upload VB
                    </a>
                </li>
            </ul>
        </div>
    </vue-nav>
    <div class="page-content">

        <div class="tab-content">
            <div class="grid-stack-box box-form">
                <div class="box-col" id="boxLeft" style="width: calc(50% - 8px);">
                    <div class="legend-title">Thông tin tra cứu</div>
                    <div class="row">
                        <div class="col-sm-12 col-12">
                            <div class="info-row">
                                <div class="key w110">Đơn vị QL <k-required-marker/></div>
                                <div class="value">
                                    <div class="select-custom">
                                        <SelectExt id="cbb_DonviQL" v-model="items.donvi_ql"
                                            :settings="{dropdownParent: $refs['dataDonviQL']}"
                                            :dataSource="dataDonviQLs" dataTextField="ten_dv"
                                            dataValueField="donvi_id" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-12 col-12">
                            <div class="info-row">
                                <div class="key w110">Mã tập import</div>
                                <div class="value">
                                    <input type="text" class="form-control  font-weight-bold text"
                                        v-model="items.ma_tap" ref="ma_tap" v-on:keyup.enter="txtMatap_KeyPress">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="gutter gutter-horizontal" style="width: 16px;"></div>
                <div class="box-col" id="boxRight" style="width: calc(50% - 8px);">
                    <div class="legend-title"><span></span><br></div>
                    <div class="row">
                        <div class="col-sm-12 col-12">
                            <div class="info-row">
                                <div class="key w110">Đơn vị BH</div>
                                <div class="value">
                                    <div class="select-custom">
                                        <SelectExt id="cbb_DonviBH" v-model="items.donvi_bh"
                                            :settings="{dropdownParent: $refs['dataDonviBH']}"
                                            :dataSource="dataDonviBHs" dataTextField="ten_dv"
                                            dataValueField="donvi_id" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-12 col-12">
                            <div class="info-row">
                                <div class="key w110">Mã khách hàng</div>
                                <div class="value">
                                    <input type="text" class="form-control" v-model="items.ma_kh"
                                        ref="ma_kh">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="box-form">
            <div class="legend-title">
                <div class="pull-left">
                    Danh sách thuê bao kênh truyền tính cước nhân công
                </div>
                <div class="clearfix"></div>
            </div>
            <div class="table-content">
                <DataGrid v-bind:columns="[
                            {fieldName: 'ma_tap', headerText: 'Mã tập import', allowFiltering: true, allowSorting: false, width: 90},
                            {fieldName: 'ma_tb', headerText: 'Mã thuê bao', allowFiltering: true, allowSorting: false, width: 90},
                            {fieldName: 'ten_donvi_ql', headerText: 'Đơn vị quản lý', allowFiltering: true, allowSorting: false, width: 150},
                            {fieldName: 'ten_donvi_bh', headerText: 'Đơn vị bán hàng', allowFiltering: true, allowSorting: false, width: 90},
                            {fieldName: 'ten_kh', headerText: 'khách hàng', allowFiltering: true, allowSorting: false, width: 90},
                            {fieldName: 'mst', headerText: 'Mã số thuế', allowFiltering: true, allowSorting: false, width: 90},
                            ]" v-bind:dataSource="DsThuebaos" :showFilter="true" :allowPaging="true" :showColumnCheckbox="true" :enabledSelectFirstRow="true"
                    ref="DsThuebaoGrid" :enablePagingServer="false" :allowExcelExport="true" @rowSelected="DsThuebaoSelected">
                </DataGrid>
            </div>
        </div>
        <HosoFile ref="HosoFileModal" :ma_tap="items.ma_tap" 
        @xacnhan="" />
        <NoidungDuyetTuchoi
            ref="NoidungDuyetTuchoiModal"
            :title= "title"
            :labelInput = "labelInput"
            :loai_xacnhan = "loai_xacnhan"
            @xacnhan="Pheduyet"
        />
    </div>
</div>
</div>
