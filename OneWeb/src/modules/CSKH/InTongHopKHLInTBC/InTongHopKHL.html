<div class="">
    <div class="list-actions-top">
        <ul class="list" style="overflow: visible !important; z-index: 99999;">
            <li>
                <a href="javascript: void(0)" @click="onTimKiemClicked">
                    <span class="icon one-search"></span>Tìm kiếm
                </a>
            </li>
            <li class="dropdown">
                <a href="javascript: void(0)" data-toggle="dropdown">
                    <span class="icon one-file-plus"></span> In
                </a>
                <ul class="dropdown-menu">
                    <li v-for="(item, index) in dsLoaiFile" :key="index">
                        <a href="javascript: void(0)" @click="onTBCTaoFile(item.LOAI_ID)" class="text-primary">
                            <span class="dropdown-icon one-download"></span> {{item.TEN_LOAI}}
                        </a>
                    </li>
                </ul>
            </li>
            <li>
                <a href="javascript: void(0)" @click="onExcelExport" title="Xuất excel">
                    <span class="icon one-excel"></span>Xuất Excel
                </a>
            </li>

        </ul>
    </div>
    <div class="page-content">
        <div class="box-form padt8 padb8">
            <div class="pull-right">
                <app-ky-cuoc  @handleChangeKyCuoc="handleKyHoaDon"></app-ky-cuoc>
            </div>
            <div class="clearfix"></div>
        </div>
        <div class="row">
            <div class="col-sm-6 col-12">
                <div class="box-form">
                    <div class="legend-title">Thông tin tìm kiếm</div>
                    <div class="info-row">
                        <div class="key w100">Nhân viên</div>
                        <div class="value">
                            <div class="select-custom">
                                <appSelect2
                                    v-model="pDsNhanVienSelected"
                                    :options="pDsNhanVien"
                                    class="form-control"
                                    >
                                </appSelect2>
                            </div>

                        </div>
                    </div>
                    <div class="info-row">
                        <div class="key w100">Tính cước</div>
                        <div class="value">
                            <div class="select-custom">
                                <b-form-select
                                    v-model="pDotTinhCuocSelected"
                                    :options="danhSachDotTinhCuoc"
                                    class="form-control"
                                    >
                                </b-form-select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-sm-6 col-12">
                <div class="box-form">
                    <div class="legend-title">Thông tin gửi mail </div>
                    <div class="info-row">
                        <div class="key w70">Kiểu in</div>
                        <div class="value">
                            <div class="select-custom">
                                <b-form-select
                                    v-model="pDsKieuInSelected"
                                    :options="danhSachKieuIn"
                                    class="form-control"
                                    >
                                </b-form-select>
                            </div>
                        </div>
                </div>
                <div class="info-row">
                    <div class="key w70">Tìm kiếm</div>
                    <div class="value">
                            <div class="select-custom">
                                <b-form-select
                                    v-model="pDsTimKiemSelected"
                                    :options="danhSachTimKiem"
                                    class="form-control"
                                >
                                </b-form-select>
                            </div>
                    </div>
                    <div class="value">
                        <input type="text" class="form-control" placeholder="Nhập nội dung tìm kiếm" v-model="pTxtTimKiem" ref="txtTimKiem">
                    </div>
                </div>
            </div>
        </div>
        </div>
        <div class="box-form">
            <div class="legend-title">
                <div class="pull-left">Danh sách khách hàng
                    <div class="check-action" style="margin-left: 30px;">
                        <input v-model="checkInAll" type="checkbox" class="check">
                        <span class="name text-danger">Chọn tất cả</span>
                    </div>
                </div>
                <div class="pull-right">
                    <button class="btn btn-second padt2 padb1" @click="openFilterDialog" title="Lọc dữ liệu theo số tiền">
                        <span class="icon one-search"></span>
                    </button>
                </div>
                <div class="clearfix"></div>
            </div>
            <div class="table-content">
                <DataGrid
                    v-bind:columns='[
                        { fieldName: "MANHOM", headerText: "Mã nhóm", allowFiltering: true, allowSorting: true, width:"5%"},
                        { fieldName: "TENNHOM", headerText: "Tên nhóm", allowFiltering: true, allowSorting: true, width:"30%"},
                        { fieldName: "NHOMKH_ID", headerText: "ID nhóm", allowFiltering: true, allowSorting: true, width:"5%"},
                        { fieldName: "LIENHE", headerText: "Liên hệ", allowFiltering: true, allowSorting: true, width:"15%"},
                        { fieldName: "SDT", headerText: "Số ĐT", allowFiltering: true, allowSorting: true, cssClass: "text-left", width:"10%"},
                        { fieldName: "TEN_NV", headerText: "Tên NV", allowFiltering: true, allowSorting: true, cssClass: "text-left", width:"10%"},
                        { fieldName: "MAIL", headerText: "Email", allowFiltering: true, allowSorting: true, width:"12%"},
                        { fieldName: "TIENNO_TEXT", headerText: "Số tiền", allowFiltering: true, allowSorting: true, cssClass: "text-SoTien", width:"8%"},
                        { fieldName: "DOT", headerText: "Đợt", allowFiltering: true, allowSorting: true, width:"5%"},
                    ]'
                    :gridLines="'Both'"
                    ref="gridDsKhachHang"
                    dataKeyField="NHOMKH_ID"
                    :dataSource="pDsKhachHang"
                    :showFilter="true"
                    :showSorting="true"
                    :showColumnCheckbox="true"
                    :enabledSelectFirstRow="false"
                    :enablePagingServer="false" :allowPaging="true"
                    @selectedRowChanged="onGridDsKhachHang_RowSelected"
                    :panelDataHeight='"400"'
                    >
                </DataGrid>
            </div>
        </div>
    </div>

    <!-- <ejs-dialog :enableResize='true' :visible="false" ref="thongtinlienhe" :header='"Cập nhật thông tin liên hệ"'
                showCloseIcon=true target=".main-wrapper" width='60%' height="85%" style="margin-top: 2%;">
        <ThongTinLienHe :khachhang_id="khachHangId"/>
    </ejs-dialog> -->
    <FilterDialog ref="refFilterDialog" @onAccept="onAcceptFilterHandler"></FilterDialog>
</div>
