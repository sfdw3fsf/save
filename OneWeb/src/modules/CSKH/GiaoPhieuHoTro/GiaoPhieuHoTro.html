<ejs-dialog class="popup-content" ref="popupGiaoPhieuHoTro" showCloseIcon=true :visible='false' :allowDragging='true'
    :target='dialog.target' :width='dialog.width' :header='"GIAO PHIẾU HỖ TRỢ"'
    :animationSettings='dialog.animationSettings' :open="openDialog" :close="closePopup" :position='dialog.position'>
    <div class="modal-content popup-box">
        <div class="list-actions-top">
            <ul class="list">
                <li>
                    <a @click="timKiem()">
                        <span class="icon one-search"></span>Tìm kiếm
                    </a>
                </li>
                <li :class="{disabled : !btnGiaoPhieu}">
                    <a @click="giaoPhieu()">
                        <span class="icon one-search"></span>Giao phiếu
                    </a>
                </li>
                <li :class="{disabled : btnGiaoPhieu}">
                    <a @click="huyGiao()">
                        <span class="icon one-search"></span>Hủy giao
                    </a>
                </li>
            </ul>
        </div>
        <div class="popup-body">
            <div class="box-form">
                <div class="legend-title">Thông tin tìm kiếm</div>
                <div class="row">
                    <div class="col-sm-3 col-12">
                        <div class="info-row">
                            <div class="key w100">
                                Mã thuê bao
                            </div>
                            <div class="value">
                                <input type="text" class="form-control" ref="maThueBao" v-model.trim="c_maThueBao">
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-3 col-12">
                        <div class="info-row">
                            <div class="key w100">
                                Ngày giao
                            </div>
                            <div class="value">
                                <ejs-datepicker v-model="c_NgayGiao" locale="vi" :allowEdit=false
                                    :showClearButton=false>
                                </ejs-datepicker>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-12">
                        <div class="info-row">
                            <div class="key w100">
                                Trạng thái
                            </div>
                            <div class="value">
                                <ejs-dropdownlist v-model="c_trangThai" :dataSource="listTrangThai"
                                    :fields="{ text: 'text', value: 'value' }" locale='vi-VN' :allowFiltering='true'>
                                </ejs-dropdownlist>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="box-form">
                <div class="legend-title">Thông tin giao phiếu</div>
                <div class="row">
                    <div class="col-sm-6 col-12">
                        <div class="info-row">
                            <div class="key w100">
                                Hướng giao
                            </div>
                            <div class="value">
                                <div class="select-custom">
                                    <div>
                                        <ejs-dropdownlist v-model="c_HuongGiao" :dataSource="listHuongGiao"
                                            :fields="{ text: 'HUONGGIAO', value: 'HUONGGIAO_ID' }" locale='vi-VN'
                                            :allowFiltering='true'>
                                        </ejs-dropdownlist>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-12">
                        <div class="info-row">
                            <div class="key w100">
                                Serial
                            </div>
                            <div class="value">
                                <input type="text" class="form-control highlight" v-model="c_Serial" disabled>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-sm-6 col-12">
                        <div class="info-row">
                            <div class="key w100">
                                Nội dung giao
                            </div>
                            <div class="value">
                                <input type="text" class="form-control" v-model="c_NoiDungGiao">
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-12">
                        <div class="info-row">
                            <div class="key w100">
                                Đơn vị xử lý<span class="required"> *</span>
                            </div>
                            <div class="value">
                                <div class="select-custom">
                                    <SelectExt v-model="c_DonViXuLy" :dataSource="listDonViXuLy" dataTextField="TEN_DV"
                                        dataValueField="DONVI_ID" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="box-form">
                <div class="legend-title">
                    <span class="title pull-left">Danh sách phiếu yêu cầu</span>
                    <div class="clearfix"></div>
                </div>
                <div class="table-content">
                    <DataGrid v-bind:columns="[
                    {fieldName: 'TEN_TINH', headerText: 'Tỉnh/TP'},
                                      {fieldName: 'MA_HT', headerText: 'Mã HT'},
                                      {fieldName: 'MA_TB', headerText: 'Mã TB'},
                                      {fieldName: 'LOAIHINH_TB', headerText: 'Loại hình'},
                                      {fieldName: 'TEN_TB', headerText: 'Tên TB'},
                                      {fieldName: 'DIACHI_LD', headerText: 'Địa chỉ LĐ', width: '140px', textAlign: 'right'},
                    ]" v-bind:dataSource="temp_dsThueBaoKhieuNaiChuaGiao" :showFilter="true" ref="GPBH"
                        :showColumnCheckbox="false" dataKeyField="PHIEUBH_ID" :defaultColumnCheckboxChecked="false"
                        :allowPaging="true" :totalRecords="listGiaoPhieuBaoHanh.length" :enablePagingServer="false"
                        :enableSelectFirstRow="true" @selectedRowChanged="gridDsThueBaoKhieuNaiChuaGiao_rowSelected">
                    </DataGrid>
                </div>
            </div>
        </div>
    </div>
</ejs-dialog>
