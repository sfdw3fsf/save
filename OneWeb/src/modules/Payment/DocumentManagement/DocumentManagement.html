<div class="main-wrapper">
    <breadcrumb :header="header" />
    <ActionTop :actions="actions1" @onActionClick="onActionClick" v-show="seen1"/>
    <ActionTop :actions="actions2" @onActionClick="onActionClick" v-show="seen2"/>
    <ActionTop :actions="actions3" @onActionClick="onActionClick" v-show="seen3"/>
    <ActionTop :actions="actions4" @onActionClick="onActionClick" v-show="seen4"/>
    <ActionTop :actions="actions5" @onActionClick="onActionClick" v-show="seen5"/>
    <ActionTop :actions="actions6" @onActionClick="onActionClick" v-show="seen6"/>
    <div class="page-content">
        <div class="nav tabs tab-over">
            <a href="#tab1" data-toggle="tab" @click.prevent="changeTab(1)" :class="{active: currentTab==1}">Import chứng từ (F2)</a>
            <a href="#tab2" data-toggle="tab" @click.prevent="changeTab(2)" :class="{active: currentTab==2}">Xử lý chứng từ tự động (F3)</a>
            <a href="#tab3" data-toggle="tab" @click.prevent="changeTab(3)" :class="{active: currentTab==3}">Xử lý nhân công (F4)</a>
            <a href="#tab3" data-toggle="tab" @click.prevent="changeTab(4)" :class="{active: currentTab==4}">Xử lý CT lệch âm (F5)</a>
            <a href="#tab3" data-toggle="tab" @click.prevent="changeTab(5)" :class="{active: currentTab==5}">Xử lý CT lệch dương (F6)</a>
            <a href="#tab3" data-toggle="tab" @click.prevent="changeTab(6)" :class="{active: currentTab==6}">Báo cáo (F7)</a>
        </div>
        <div class="tab-content" id="myTabContent" style="margin-bottom:30px;">
            <div class="tab-pane" :class="{active: currentTab==1}">
                
                <div class="row">
                    <div class="col-sm-12 col-12">
                        <div class="box-form">
                            <div class="row">
                                <div class="col-sm-12 col-12">
                                    <div style="margin-bottom: 10px; display: flex; align-items: center;">
                                        <span class="icon one-alert" style="color: orange;font-size: 20px; margin-right: 10px;"></span>
                                        <span style="font-weight: 500;">File excel gồm các trường: STT, MA_NH, NGAY_NH, TIEN_GHICO, ND_CT</span>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-sm-12 col-12">
                                    <div class="info-row">
                                        <div class="key">Đường dẫn</div>
                                        <div class="value" style="display: flex;">
                                            <div class="input-more-button">
                                                <button class="btn" @click="uploadFile">
                                                    <span class="-ap icon-more_horiz"></span>
                                                    <input ref="fileInput" type="file" id="upload" style="display:none" @change="importExcel"
                                                    accept=".xls, .xlsx" @click="$refs.fileInput.value=null" />
                                                </button>
                                            </div>
                                            <input class="form-control" v-model="tenFile"/>
                                        </div>
                                    </div>
                                </div>
                            </div>
                           
                        </div>
                        <ImportDocument :listCTTF="DsCTTF" :listCTIP="DsCTIP"></ImportDocument>
                    </div>
                </div>
            </div>
            <div class="tab-pane" :class="{active: currentTab==2}">
                <div class="row">
                    <div class="col-sm-12 col-12">
                        <ExecuteDocument></ExecuteDocument>
                    </div>
                </div>
            </div>
            <div class="tab-pane" :class="{active: currentTab==3}">
                <div class="row">
                    <div class="col-sm-12 col-12">
                        <ExecuteLabor></ExecuteLabor>
                    </div>
                </div>
            </div>
            <div class="tab-pane" :class="{active: currentTab==4}">
                <div class="row">
                    <div class="col-sm-12 col-12">
                        <ExecuteCTMinus></ExecuteCTMinus>
                    </div>
                </div>
            </div>
            <div class="tab-pane" :class="{active: currentTab==5}">
                <div class="row">
                    <div class="col-sm-12 col-12">
                        <ExecutePositiveVue></ExecutePositiveVue>
                    </div>
                </div>
            </div>
            <div class="tab-pane" :class="{active: currentTab==6}">
                <div class="row">
                    <div class="col-sm-12 col-12">
                        <Report></Report>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
