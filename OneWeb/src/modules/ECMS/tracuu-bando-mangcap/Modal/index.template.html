<b-modal ref="popupBanDo" size="xl" no-close-on-backdrop hide-footer hide-header @shown="onShownModal" @hidden="onHiddenModal" :id="id" hide-header-close>
  <div class="modal-content popup-box">
    <div class="popup-header">
      <div class="title"><span class="icon one-notepad"></span>Tra cứu bản đồ mạng cáp</div>
      <div class="close -ap icon-close" data-dismiss="modal" @click="$refs['popupBanDo'].hide()"></div>
    </div>
    <div class="list-actions-top">
      <ul class="list">
        <li>
          <a href="javascript:void(0)" @click="timKiemKC"> <span class="icon one-search"></span> Tìm kết cuối </a>
        </li>
      </ul>
    </div>
    <div class="popup-body">
      <div class="map-canvas-box">
        <div class="sitemap-chart-canvas relative" style="height: 100%">
          <BanDo :center="center" :markers="getMarkers" :radiusObj="radiusObj" @dblclickMap="dblclickMap" ref="map"> </BanDo>
        </div>
        <ModalChonDiaChi modalId="popupDiaChi" :data="this.dataSelected" @xacnhan="getDiaChi" />
        <div class="search-box">
          <div class="info-row">
            <div class="value">
              <div class="input-icon-left">
                <span class="icon nc-icon-outline ui-1_zoom"></span>
                <input id="inputDiachi" type="text" placeholder="" @input="debounceInput" class="form-control" v-model="diachi" v-on:keyup.enter="onEnter()" />
                <div class="list-address" v-if="isShowListAddress" id="listAddress">
                  <ul class="list-add-ul">
                    <li v-for="(item, index) in listAddress" class="address-item" @click="chonDiaChi(item)" :key="index">{{item.address}}</li>
                  </ul>
                </div>
              </div>
            </div>
            <div class="value nowrap w30">
              <button class="btn btn-second" v-b-modal.popupDiaChi>
                <span class="-ap icon-more_horiz"></span>
              </button>

              <button class="btn btn-main" @click="addMarker()">
                <span class="nc-icon-glyph location_position-pin"></span>
              </button>
            </div>
          </div>
        </div>
        <div class="action-right">
          <a href="javascript:void(0)" class="change-type" @click="thaydoiMapType">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRp_6mkJlHX8nZiFY5S_9xYVIJPbmpTwi4dKA&usqp=CAU" alt="" />
          </a>
          <div class="ranger-slider">
            <div class="title">Bán kính tìm kiếm {{this.defaultRadius}}(m)</div>
            <div class="slider">
              <div class="block">
                <el-slider v-model="value" :format-tooltip="formatTooltip" vertical @change="changeR" height="275px" float="right" margin-right="0px"> </el-slider>
              </div>
              <div class="dot">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
              </div>
            </div>
          </div>
          <div class="input-number-custom">
            <input type="number" min="0" max="1000" class="form-control tright" v-model="defaultRadius" />
          </div>
        </div>
      </div>
      <div class="map-position">
        <div class="row" style="margin-top: 10px">
          <div class="col-sm-3 col-12">
            <div class="info-row marb0">
              <div class="key w30 nowrap">Vĩ độ</div>
              <div class="value">
                <input type="text" class="form-control" v-model="viDo" :disabled="validated == 1" />
              </div>
            </div>
          </div>
          <div class="col-sm-3 col-12">
            <div class="info-row marb0">
              <div class="key w30 nowrap">Kinh độ</div>
              <div class="value">
                <input type="text" class="form-control" v-model="kinhDo" :disabled="validated == 1" />
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-12" style="border-left: 1px solid #e0e0e0">
            <div class="info-row marb0">
              <div class="key w30 nowrap">Bán kính tìm kiếm</div>
              <div class="value w60">
                <input type="text" min="50" max="1000" value="298" class="form-control" v-model="defaultRadius" :disabled="validated == 1" />
              </div>
              <div class="value w10 nowrap padr10">
                <div class="unit mart7">(m)</div>
              </div>
              <div class="value padl10" style="border-left: 1px solid #e0e0e0">
                <input type="text" class="form-control tright" value="Tìm thấy 36 kết cuối trong bán kính 298 m" v-model="ketquaTK" :disabled="validated == 1" />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</b-modal>
