<div>
  <div class="list-actions-top">
    <ul class="list">
      <li :class="{'disable-btn': disableBtnPrint}">
        <a @click="btnInTem" :class="{'disable-btn': disableBtnPrint}"> <span class="icon one-print"></span> In tem </a>
      </li>
      <li>
        <a @click="tsbtnMauEx_Click"> <span class="icon one-excel"></span>File mẫu Excel </a>
      </li>
      <li>
        <b-form-file id="fileUpload" v-model="arrayImportFile.filexcel" ref="fileUpload" @change="this.onChange" accept=".xls, .xlsx" class="-ap icon-more_horiz" v-show="arrayImportFile.ok"></b-form-file>
        <a @click="tsbtnExcelDK_Click"> <span class="icon one-xlsx"></span>Nhập từ Excel </a>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <div class="box-form tab-content">
      <div class="tab-pane active" id="tab2">
        <div class="legend-title">
          <div class="pull-left">Danh sách tài sản</div>
          <div class="clearfix"></div>
        </div>
        <div class="info-row">
          <div class="key w80">Số lần in</div>
          <div class="value w100">
            <input type="number" class="form-control tright" v-model="params.p_spMuc2" />
          </div>
          <div class="value w60 padl10 padt7">lần</div>
          <div class="value">
            <div class="list-checks red mart7">
              <b-form-radio-group v-model="params.p_rdioCKb" :options="RadioOptions"></b-form-radio-group>
            </div>
          </div>
        </div>
        <DataGrid
          v-bind:columns="[
                  {fieldName: 'ID_CHITIET', headerText: 'ID CHI TIẾT', textAlign: 'Left', allowFiltering: true,},
                  {fieldName: 'MA_DU_AN', headerText: 'MÃ DỰ ÁN', textAlign: 'Left', allowFiltering: true,},
                  {fieldName: 'KYHIEU', headerText: 'KÝ HIỆU', textAlign: 'Left', allowFiltering: true,},
                  {fieldName: 'TEN_TTVT', headerText: 'TỔ KỸ THUẬT', textAlign: 'Right', allowFiltering: true,},
                  {fieldName: 'TO_VT', headerText: 'TRUNG TÂM VIỄN THÔNG', textAlign: 'Left', allowFiltering: true,},
                  ]"
          v-bind:dataSource="grcDS_TS"
          ref="grvDS_TS"
          @rowSelected="onRowSelected"
          :showColumnCheckbox="true"
          :showFilter="true"
          :editSettings="{ allowEditing: true , mode:'Batch'}"
          :allowPaging="true"
          :enablePagingServer="false"
        >
        </DataGrid>
      </div>
      <vue-html2pdf
        :show-layout="controlOptions.showLayout"
        :float-layout="controlOptions.floatLayout"
        :enable-download="controlOptions.enableDownload"
        :preview-modal="controlOptions.previewModal"
        :filename="controlOptions.filename"
        :pdf-quality="controlOptions.pdfQuality"
        :pdf-orientation="controlOptions.pdfOrientation"
        :pdf-content-width="controlOptions.pdfContentWidth"
        :manual-pagination="controlOptions.manualPagination"
        :html-to-pdf-options="htmlToPdfOptions"
        :paginate-elements-by-height="controlOptions.paginateElementsByHeight"
        @beforeDownload="onBeforeDownload"
        ref="html2pdf"
      >
        <section slot="pdf-content" id="htmlContent"></section>
      </vue-html2pdf>
    </div>
  </div>
</div>
