<div>
    <div class="list-actions-top">
        <ul class="list">
          <input id="fileInput" type="file" style="display:none" ref="fileInput" @change="NapFileMapGoogle"/>
            <li>
                <a href="javascript:void(0)"  @click="napLai()" :class="{'disable-btn' : false}">
                    <span class="icon one-file-attach"></span> Nạp lại
                </a>
            </li>
            <li>
                <a id="tooltip-target-1" href="javascript:void(0)" @click="LuuRanhTram()" :class="{'disable-btn' : isLuuRanhTram}">
                    <span class="icon one-save"></span> Lưu ranh
                </a>
            </li>
            <li>
              <a href="javascript:void(0)" @click="openFileKML()" :class="{'disable-btn' : false}">
                <span class="icon one-file-attach"></span> Import file KML
              </a>
            </li>
            <li>
              <a href="javascript:void(0)" @click="exportExcel()" :class="{'disable-btn' : false}">
                <span class="icon one-xlsx"></span> Xuất Excel
              </a>
            </li>
        </ul>
    </div>
    <div class="page-content">
        <div class="grid-stack-box">
            <ejs-splitter id='splitter' class='splitterContent' ref="splitterObj" :separatorSize=1 width='100%'>
                <e-panes>
                    <e-pane ref="leftPaneContent" size="30%" min="30%" collapsible="true" :content="leftPaneContent">
                    </e-pane>
                    <e-pane ref="rightPaneContent" size="70%" min="70%" :content="rightPaneContent">
                    </e-pane>
                </e-panes>
            </ejs-splitter>
        </div>
    </div>
</div>
