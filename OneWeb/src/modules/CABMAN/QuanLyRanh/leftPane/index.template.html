<div>
  <div class="box-gridstack-ver fullh">
    <div class="box-col box-form marb0" id="boxTop">
      <div class="info-row">
        <div class="key w70">Loại ranh</div>
        <div class="value">
          <div class="select-custom">
            <select name="" id="" class="form-control" v-model="selectedLOAIRANH">
              <option v-for="loairanh in ds_loairanh" :value="{ LOAIRANH_ID : loairanh.LOAIRANH_ID, LOAI_RANH : loairanh.LOAI_RANH }">{{loairanh.LOAI_RANH}}</option>
            </select>
          </div>
        </div>
      </div>
      <div class="info-row">
        <div class="key w70">TTVT</div>
        <div class="value">
          <div class="select-custom">
            <select name="" id="" class="form-control" v-model="selectedTTVT">
              <option v-for="ttvt in ds_ttvt" :value="{ DONVI_ID : ttvt.DONVI_ID, TEN_DV : ttvt.TEN_DV }">{{ttvt.TEN_DV}}</option>
            </select>
          </div>
        </div>
      </div>
      <div class="info-row" v-if="selectedLOAIRANH && selectedLOAIRANH.LOAIRANH_ID === 3">
        <div class="key w70">Tổ VT</div>
        <div class="value">
          <SelectExt v-model="selectedTOKT" 
                      :dataSource="ds_tokt" 
                      dataTextField="TEN_DV"
                      dataValueField="DONVI_ID"/>
        </div>
      </div>
      <div class="table-content mt-3" style="height: calc(100% - 230px)">
        <div class="legend-title">
          <span class="title">Danh sách ranh</span>
        </div>
        <DataGrid
          ref="gridRanhTram"
          id="gridRanhTram"
          :allowResizing="true"
          @rowSelected="gridRanhTram_rowSelected"
          @recordDoubleClick="onDoubleClick"
          v-bind:columns="[
                {fieldName: '', headerText: '', visible: true,  headerAlign: 'Center', textAlign: 'Center', allowFiltering: false, width: '40', headerTemplate: getHeaderTemplateChonNhieu(this),  template: getColumnTemplateChonNhieu(this)},
                {fieldName: selectedLOAIRANH.LOAIRANH_ID === 3 ? 'MA_KV' : 'MA_TRAM', width : 90, headerText: selectedLOAIRANH.LOAIRANH_ID === 3 ? 'Mã khu vực' : 'Mã ranh', allowFiltering: true, allowSorting: false, template: getColumnTemplate(this)},
                {fieldName: selectedLOAIRANH.LOAIRANH_ID === 1 ? 'TEN_DV' : selectedLOAIRANH.LOAIRANH_ID === 2 ? 'TEN_PHUONG' : 'TEN_KV', width : 100, headerText: selectedLOAIRANH.LOAIRANH_ID === 3 ? 'Tên khu vực' : 'Tên ranh', allowFiltering: true, allowSorting: false}
            ]"
          v-bind:dataSource="ds_tram"
          :showFilter="true"
          @created="gridRanhTram_created"
          :enabledSelectFirstRow="true"
          :showColumnCheckbox="false"
          :selectionSettings="{type: 'Multiple', mode: 'Cell', cellSelectionMode: 'Box'}"
          :allowPaging="true"
        >
        </DataGrid>
      </div>
    </div>
  </div>
</div>
