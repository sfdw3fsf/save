<div>
  <div class="box-gridstack-ver fullh">
    <div class="box-col box-form marb0" id="boxTop">
        <div class="info-row">
            <div class="key w60">TTVT</div>
            <div class="value">
                <div class="select-custom">
                    <select name="" id="" class="form-control" v-model="selectedTTVT">
                        <option v-for="ttvt in ds_ttvt" :value="{ DONVI_ID : ttvt.DONVI_ID, TEN_DV : ttvt.TEN_DV }">{{ttvt.TEN_DV}}</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="table-content" style="height: calc(100% - 230px);">
            <DataGrid ref="gridRanhTram" id="gridRanhTram" :allowResizing='true' @rowSelected="gridRanhTram_rowSelected" @recordDoubleClick= 'onDoubleClick'
            v-bind:columns="[
            {fieldName: '', headerText: '', visible: true,  headerAlign: 'Center', textAlign: 'Center', allowFiltering: false, width: '40', headerTemplate: getHeaderTemplateChonNhieu(this),  template: getColumnTemplateChonNhieu(this)},
            {fieldName: 'MA_TRAM', width : 90, headerText: 'Ranh trạm', allowFiltering: true, allowSorting: false, template: getColumnTemplate(this)},
            {fieldName: 'TEN_DV', width : 100, headerText: '...', allowFiltering: true, allowSorting: false}
            ]" v-bind:dataSource="ds_tram" :showFilter="true"
            @created="gridRanhTram_created"
            :enabledSelectFirstRow="true"
            :showColumnCheckbox="false"
            :selectionSettings="{type: 'Multiple', mode: 'Cell', cellSelectionMode: 'Box'}"
            :allowPaging="false"></DataGrid>
        </div>
    </div>
  </div>
</div>
