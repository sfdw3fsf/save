<b-modal :id="modalId" ref="modalThemTuyenDuong" size="md" no-close-on-backdrop hide-footer hide-header hide-header-close @shown="focusMyElement" body-class="modal-body p-0">
  <div class="modal-content popup-box">
    <div class="popup-header">
      <div class="title"><span class="icon one-notepad"></span>Thêm mới tuyến đường</div>
      <div class="close -ap icon-close" data-dismiss="modal" @click="close()"></div>
    </div>
    <div class="list-actions-top">
      <ul class="list">
        <li @click="saveData()">
          <a href="javascript:void(0)"> <span class="icon one-save"></span> Ghi lại </a>
        </li>
      </ul>
    </div>
    <div class="popup-body body-suyhao" style="background-color: white">
      <div class="form-group">
        <label style="font-weight: 600;" for="tenTuyenDuong">Tên tuyến đường</label>
        <input type="text" class="form-control" id="tenTuyenDuong" v-model="dataSelected.tenTuyenDuong" />
      </div>
      <div class="form-group">
        <label style="font-weight: 600;" for="maTuyenDuong">Loại tuyến đường</label>
        <div class="select-custom">
          <SelectExt v-model.trim="dataSelected.loaiTuyenDuong" :dataSource="dsLoaiTuyenDuong" dataTextField="name" dataValueField="key" />
        </div>
      </div>
      <div class="form-group">
        <label style="font-weight: 600;" for="duongMotChieu">Đường một chiều</label>
          <div  style="display: flex; align-items: center; gap: 10px;">
            <input type="radio" name="duongMotChieu" value="true"> 1 Chiều </input>
          <input type="radio" name="duongMotChieu"> 2 Chiều </input>
          </div>
      </div>
      <div class="form-group">
        <label style="font-weight: 600;" for="cau">Cầu</label>
          <div  style="display: flex; align-items: center; gap: 10px;">
            <input type="radio" name="cau"> Có </input>
          <input type="radio" name="cau"> Không </input>
          </div>
      </div>
      <div class="form-group">
        <label style="font-weight: 600;" for="duongHam">Đường hầm</label>
          <div  style="display: flex; align-items: center; gap: 10px;">
            <input type="radio" name="duongHam"> Có </input>
          <input type="radio" name="duongHam"> Không </input>
          </div>
      </div>
    </div>
  </div>
</b-modal>
