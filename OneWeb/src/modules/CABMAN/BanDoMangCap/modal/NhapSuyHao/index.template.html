<b-modal :id="modalId" size="md" no-close-on-backdrop hide-footer hide-header hide-header-close @shown="focusMyElement" body-class="modal-body p-0">
  <div class="modal-content popup-box">
    <div class="popup-header">
      <div class="title"><span class="icon one-notepad"></span> {{this.loai}}: {{
          this.loaiModal == 1 ? this.dataSuyHao.ten_kc : this.dataSuyHao.ten_cap
        }}</div>
      <div class="close -ap icon-close" data-dismiss="modal" @click="$bvModal.hide(modalId)"></div>
    </div>
    <div class="list-actions-top">
      <ul class="list">
        <li @click="saveData()">
          <a href="javascript:void(0)"> <span class="icon one-save"></span> Ghi lại </a>
        </li>
      </ul>
    </div>
    <div class="popup-body body-suyhao" style="background-color: white">
      <div class="table-content" style="height: calc(100% - 230px); background-color: white">
        <ejs-grid ref="suyhao" :dataSource="dsSuyHao" :allowPaging="false" :allowSorting="true" :filterSettings="{showFilterBarOperator: false}" :allowFiltering="true" :rowTemplate="rowTemplateSuyHaoOption" :allowKeyboard="true" locale="vi-VN" clipMode="EllipsisWithTooltip" :allowExcelExport="true">
          <e-columns>
            <e-column field="vitri" headerText="Vị trí" :filter='{ operator: "contains" }' width="150" headerTextAlign="center"></e-column>
            <e-column field="suyhao" headerText="Suy hao (dBm)" :filter='{ operator: "contains" }' width="150" headerTextAlign="center"></e-column>
          </e-columns>
        </ejs-grid>
      </div>
    </div>
  </div>
</b-modal>
