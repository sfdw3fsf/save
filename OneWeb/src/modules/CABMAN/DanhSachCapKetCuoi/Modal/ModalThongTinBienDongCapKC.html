<b-modal ref="modalBienDong" :id="modalId" size="xl" title="Chi tiết thông tin biến động" hide-footer body-class="modal-body p-0">
  <div class="modal-content popup-box">
    <div class="popup-body">
      <div class="box-form" v-if="doi_tuong == 11">
        <DataGrid
          v-bind:columns="[
              {fieldName: 'TEN_CAP', headerText: 'Tên cáp', allowFiltering: true, width: '150' },
              {fieldName: 'KYHIEU', headerText: 'Ký hiệu', allowFiltering: true, width: '150' },
              {fieldName: 'SODOIDAY', headerText: 'Số đôi dây', allowFiltering: true, width: '100' },   
              {fieldName: 'KICHCO', headerText: 'Kích cỡ', allowFiltering: true, width: '100' },     
              {fieldName: 'CHIEUDAI', headerText: 'Chiều dài', allowFiltering: true, width: '100' },
              {fieldName: 'NOI_SX', headerText: 'Nơi sản xuất', allowFiltering: true, width: '130' },
              {fieldName: 'LOAI_CAP', headerText: 'Loại cáp', allowFiltering: true, width: '150' },
              {fieldName: 'KIEU_DC', headerText: 'Kiểu đi cáp', allowFiltering: true, width: '130' },
              {fieldName: 'LOP_MC', headerText: 'Lớp mạng cáp', allowFiltering: true, width: '130' },
              {fieldName: 'TEN_DV', headerText: 'Trạm', allowFiltering: true, width: '130' },
              {fieldName: 'TO_QL', headerText: 'Tổ quản lý', allowFiltering: true, width: '170' },       
              {fieldName: 'NGAY_LD', headerText: 'Ngày lắp đặt', allowFiltering: true, width: '150' },
              {fieldName: 'NGAY_SD', headerText: 'Ngày sử dụng', allowFiltering: true, width: '150' },
              {fieldName: 'TRANGTHAI_SD', headerText: 'Trạng thái sử dụng', allowFiltering: true, width: '150' },
              {fieldName: 'TEN_CAP_GOC', headerText: 'Tên cáp gốc', allowFiltering: true, width: '130' },
              {fieldName: 'NGAY_CN', headerText: 'Ngày cập nhật', allowFiltering: true, width: '150' },
              {fieldName: 'TEN_ND', headerText: 'Người cập nhật', allowFiltering: true, width: '150' },
              {fieldName: 'ACTION', headerText: 'Action', allowFiltering: true, width: '100' },
        ]"
          v-bind:dataSource="dsBienDong"
          :showFilter="true"
          :allowPaging="true"
          :enablePagingServer="false"
        ></DataGrid>
      </div>
    </div>

    <div class="popup-body">
      <div class="box-form" v-if="doi_tuong == 10">
        <DataGrid
          v-bind:columns="[
              {fieldName: 'TEN_KC', headerText: 'Tên kết cuối', allowFiltering: true, width: '130' },
              {fieldName: 'KYHIEU', headerText: 'Ký hiệu', allowFiltering: true, width: '130' },
              {fieldName: 'DIACHI', headerText: 'Địa chỉ', allowFiltering: true, width: '250' },
              {fieldName: 'LOAI_KC', headerText: 'Loại kết cuối', allowFiltering: true, width: '130' },
              {fieldName: 'KIEU_LAP', headerText: 'Kiểu lắp', allowFiltering: true, width: '130' },
              {fieldName: 'NOI_SX', headerText: 'Nơi sản xuất', allowFiltering: true, width: '130' },
              {fieldName: 'LOAI_VO', headerText: 'Loại vỏ', allowFiltering: true, width: '130' },
              {fieldName: 'TONGSO_DD', headerText: 'Số cổng', allowFiltering: true, width: '100' },
              {fieldName: 'TEN_DV', headerText: 'Tổ KT quản lý', allowFiltering: true, width: '150' },
              {fieldName: 'NGAY_LD', headerText: 'Ngày lắp đặt', allowFiltering: true, width: '150' },
              {fieldName: 'NGAY_SD', headerText: 'Ngày sử dụng', allowFiltering: true, width: '150' },
              {fieldName: 'TRANGTHAI_SD', headerText: 'Trạng thái sử dụng', allowFiltering: true, width: '150' },   
              {fieldName: 'TEN_CAP_GOC', headerText: 'Tên cáp gốc', allowFiltering: true, width: '130' },
              {fieldName: 'MA_TS', headerText: 'Mã tài sản', allowFiltering: true, width: '130' },
              {fieldName: 'MA_CT', headerText: 'Dự án', allowFiltering: true, width: '130' },              
              {fieldName: 'KINHDO', headerText: 'Kinh độ', allowFiltering: true, width: '130' },
              {fieldName: 'VIDO', headerText: 'Vĩ độ', allowFiltering: true, width: '130' },
              {fieldName: 'NGAY_CN', headerText: 'Ngày cập nhật', allowFiltering: true, width: '150' },
              {fieldName: 'TEN_ND', headerText: 'Người cập nhật', allowFiltering: true, width: '150' },
          ]"
          v-bind:dataSource="dsBienDong"
          :showFilter="true"
          :allowPaging="true"
          :enablePagingServer="false"
        ></DataGrid>
      </div>
    </div>
  </div>
</b-modal>
