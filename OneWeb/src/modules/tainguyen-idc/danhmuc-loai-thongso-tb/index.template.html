<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <a style="cursor: pointer;" href="javascript:;" @click="onClickNhapMoi" :class="{ 'disabled': !newBtn }">
          <span class="icon one-file-plus"></span>Nhập mới
        </a>
      </li>
      <li>
        <a style="cursor: pointer;" href="javascript:;" @click="onClickGhiLai" :class="{ 'disabled': !saveBtn }">
          <span class="icon one-save"></span> Ghi lại
        </a>
      </li>
      <li>
        <a style="cursor: pointer;" href="javascript:;" @click="onClickSua" :class="{ 'disabled': !editBtn }">
          <span class="icon one-edit"></span>Sửa
        </a>
      </li>
      <li>
        <a class="pointer" @click="onClickHuy" :class="{ 'disabled': !cancelBtn }">
          <span class="icon one-trash"></span> Hủy bỏ
        </a>
      </li>
      <li>
        <a style="cursor: pointer;" href="javascript:;" @click="onClickXoa" :class="{ 'disabled': !deleteBtn }">
          <span class="icon one-trash"></span>Xóa
        </a>
      </li>
      <li>
        <a style="cursor: pointer;" @click="onClickImport"> <span class="icon one-xlsx-import"></span>Import </a>
      </li>
      <li>
        <a style="cursor: pointer;" @click="onClickExport"> <span class="icon one-excel"></span>Export </a>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Thông tin loại thông số thiết bị</div>
          </div>

          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="col-sm-4 key">ID loại thông số thiết bị<span class="red">*</span></div>
                <div class="col-sm-8 value">
                  <input
                    type="number"
                    class="form-control"
                    :class="controls.idLoaiThongSoTB.invalid ? 'is-invalid' : ''"
                    disabled="true"
                    v-model="currentItem.idLoaiThongSoTB"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="col-sm-4 key">Hiệu lực</div>
                <div class="col-sm-8 value padt4">
                  <div class="check-action">
                    <input
                      type="checkbox"
                      class="check"
                      :disabled="!controls.hieuLuc.enabled"
                      v-model="currentItem.hieuLuc"
                      :true-value="1"
                      :false-value="0"
                    /><span class="name"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="col-sm-4 key">Loại thiết bị/ hệ thống <span class="red">*</span></div>
                <div class="col-sm-8 value">
                  <SelectExt
                    v-model="currentItem.idLoaiTB"
                    :disabled="!controls.idLoaiTB.enabled"
                    :class="controls.idLoaiTB.invalid ? 'invalidBox' : ''"
                    :dataSource="listLoaiThietBi"
                    dataTextField="text"
                    dataValueField="id"
                    :placeholder="'Chọn từ danh sách loại thiết bị/ hệ thống'"
                  >
                  </SelectExt>
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="col-sm-4 key">Giá trị định danh <span class="red">*</span></div>
                <div class="col-sm-8 value">
                  <input
                    type="number"
                    class="form-control"
                    :class="controls.giaTriDinhDanh.invalid ? 'is-invalid' : ''"
                    :disabled="!controls.giaTriDinhDanh.enabled"
                    v-model="currentItem.giaTriDinhDanh"
                  />
                </div>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="col-sm-4 key">Tên loại thông số thiết bị<span class="red">*</span></div>
                <div class="col-sm-8 value">
                  <input
                    type="text"
                    class="form-control"
                    :class="controls.tenLoaiThongSoTB.invalid ? 'is-invalid' : ''"
                    :disabled="!controls.tenLoaiThongSoTB.enabled"
                    v-model="currentItem.tenLoaiThongSoTB"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="col-sm-4 key">Trạng thái vận hành <span class="red">*</span></div>
                <div class="col-sm-8 value">
                  <SelectExt
                    v-model="currentItem.trangThaiVanHanhId"
                    :disabled="!controls.trangThaiVanHanhId.enabled"
                    :class="controls.trangThaiVanHanhId.invalid ? 'invalidBox' : ''"
                    :dataSource="listTrangThaiVanHanh"
                    dataTextField="text"
                    dataValueField="id"
                    :placeholder="'Chọn trạng thái vận hành'"
                  >
                  </SelectExt>
                </div>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="col-sm-4 key">Ghi chú</div>
                <div class="col-sm-8 value">
                  <input
                    type="text"
                    class="form-control"
                    :class="controls.ghiChu.invalid ? 'is-invalid' : ''"
                    :disabled="!controls.ghiChu.enabled"
                    v-model="currentItem.ghiChu"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Danh sách loại thông số thiết bị</div>
          </div>
          <div class="row">
            <div class="col-12">
              <DataGrid
                ref="gridItems"
                :allowPaging="true"
                :enablePagingServer="false"
                :showColumnCheckbox="true"
                :allowExcelExport="true"
                v-bind:columns="[
                  {fieldName: 'LOAITSTBI_ID', headerText: 'ID', textAlign: 'Left', width: '80px'},
                  {fieldName: 'LOAITBI_ID', headerText: 'Loại thiết bị', textAlign: 'Left', valueAccessor: mapToLoaiThietBi},
                  {fieldName: 'TEN', headerText: 'Tên loại thông số', textAlign: 'Left'},
                  {fieldName: 'GIATRI', headerText: 'Giá trị định danh', textAlign: 'Center', width: '120px'},
                  {fieldName: 'TRANGTHAI_VH_ID', headerText: 'Trạng thái vận hành', textAlign: 'Left', valueAccessor: mapToTrangThaiVanHanh},
                  {fieldName: 'SUDUNG', headerText: 'Hiệu lực', textAlign: 'Center', width: '100px', valueAccessor: mapToHieuLuc},
                ]"
                v-bind:dataSource="dataItems"
                @rowSelected="onRowSelected"
              >
              </DataGrid>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <ModalImportExcel
    ref="modalImportExcel"
    :title="importConfig.title"
    :tableColumns="importConfig.tableColumns"
    :gridColumns="importConfig.gridColumns"
    :templateFileName="importConfig.templateFileName"
    :processExcelData="processLoaiThongSoTBExcelData"
    :formatCellValue="formatLoaiThongSoTBCellValue"
    :validationRules="importConfig.validationRules"
    :checkDataResult="importConfig.checkDataResult"
    @check-data="handleCheckData"
  />
</div>
