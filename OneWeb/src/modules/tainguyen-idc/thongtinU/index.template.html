<div>
    <div class="list-actions-top">
        <ul class="list">
            <li>
                <b-link href="javascript:void(0)" @click="btnSearchClick">
                    <span class="icon one-search"></span>Tìm kiếm
                </b-link>
            </li>
            <li :class="{disabled: isDisableSave}">
                <a href="#" @click.prevent="updateThongTinU">
                    <span class="icon one-save"></span> Ghi Lại
                </a>
            </li>
            <li :class="{disabled: isDisableUpdate}">
                <a href="#" @click.prevent="editDanhSach">
                    <span class="icon one-edit"></span> Sửa
                </a>
            </li>
            <li>
                <b-link href="javascript:void(0)" @click="xuatExcel">
                    <span class="icon one-file-excel"></span>Export
                </b-link>
            </li>
        </ul>
    </div>
    <div class="page-content">
        <div class="box-form">
            <div class="legend-title">Thông tin U</div>
            <div class="row">
                <div class="col-sm-6 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            ID U<span style="color: red;">*</span>
                        </div>
                        <div class="value">
                            <input type="text" class="form-control" v-model.trim="form.pIdU" :disabled="true">
                        </div>
                    </div>
                </div>
                <div class="col-sm-2 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Hiệu lực
                        </div>
                        <div class="form-check ">
                            <input class="form-check-input" type="checkbox" v-model="form.pHieuLuc"
                                id="flexCheckDefault" :disabled="isDisableSave">
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            ID Rack<span style="color: red;">*</span>
                        </div>
                        <div class="value">
                            <input type="text" class="form-control" v-model.trim="form.pIDRack" :disabled="true">
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Trạng thái U<span style="color: red;">*</span>
                        </div>
                        <div class="value">
                            <SelectExt :dataSource="dsTrangThaiU"
                                :options="dsTrangThaiU.map(item => ({ id: item.ID, text: item.TEN }))"
                                dataTextField="TEN" dataValueField="ID" v-model="form.pTrangThaiU"
                                :disabled="isDisableSave" />
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Vị trí U<span style="color: red;">*</span>
                        </div>
                        <div class="value">
                            <input type="text" class="form-control" v-model.trim="form.pViTriU" :disabled="true">
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Ghi chú
                        </div>
                        <div class="value">
                            <input type="text" class="form-control" v-model.trim="form.pGhiChu"
                                :disabled="isDisableSave">
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="box-form">
            <div class="legend-title">Danh sách U</div>
            <DataGrid
                v-bind:columns="[
            {fieldName: 'IDU', headerText: 'ID U', allowFiltering: true, allowSorting: false},
            {fieldName: 'IDRack', headerText: 'ID Rack', allowFiltering: true, allowSorting: false},
            {fieldName: 'ViTriU', headerText: 'Vị trí U', allowFiltering: true, allowSorting: false},
            {fieldName: 'TrangThaiU', headerText: 'Trạng thái U', allowFiltering: true, allowSorting: false},
            {fieldName: 'HIEU_LUC_TEXT', headerText: 'Hiệu lực', allowFiltering: true, allowSorting: false, width: 100}]"
                :dataSource="dsThongTinU" :showFilter="true" :allowPaging="true" :enablePagingServer="false"
                @selectedItemsChanged="onSelectRowCheckbox" @rowSelected="onSelectRowChanged"
                :selectionSettings="selectionOptions" dataKeyField="ID" ref="dsTienTrinhGrid">
            </DataGrid>
        </div>
    </div>
</div>
