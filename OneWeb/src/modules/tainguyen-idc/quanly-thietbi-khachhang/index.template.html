    </div>
    <div class="row">
      <div class="box-form">
        <div class="row">
          <div class="legend-title d-flex justify-content-between align-items-center">
            Danh sách thiết bị khách hàng
          </div>
        </div>
        <div class="row">
          <div class="col-12">
            <DataGrid
              ref="grdItems"
              :allowPaging="true"
              :enablePagingServer="false"
              :showColumnCheckbox="false"
              :dataSource="dsThietBiKhachHang"
              :childGrid="childGrid"
              v-bind:columns="[
                                {fieldName: 'ID', headerText: 'ID Thiết bị', textAlign: 'Left', width: 120},
                                {fieldName: 'TEN', headerText: 'Tên thiết bị', textAlign: 'Left'},
                                {fieldName: 'SERIAL_NUMBER', headerText: 'Serial', textAlign: 'Left'},
                                {fieldName: 'CS_DINHDANH', headerText: 'Công suất tke', textAlign: 'Left'},
                                {fieldName: 'TOA_NHA', headerText: 'Tòa nhà', textAlign: 'Left', width: 120},
                                {fieldName: 'MATSAN', headerText: 'Mật sàn', textAlign: 'Left', width: 120},
                                {fieldName: 'PHONG', headerText: 'Phòng/Zone', textAlign: 'Left'},
                                {fieldName: 'RACK', headerText: 'Rack', textAlign: 'Left', width: 120},
                                {fieldName: 'U', headerText: 'U', textAlign: 'Center', width: 120},
                                {fieldName: 'TRANG_THAI_VAN_HANH', headerText: 'Trạng thái vận hành', textAlign: 'Left'},
                                {fieldName: 'ACTIONS', headerText: 'Thao tác', textAlign: 'Center', template: acctionColumn(this)},
                                ]"
              :enabledSelectFirstRow="true"
              v-if="showGrid"
              @detailDataBound="onDetailDataBound"
            >
            </DataGrid>
          </div>
        </div>
      </div>
    </div>

  <ModalChiTietThietBiKhachHang

    :modalID="'ModalChiTietThietBiKhachHang'"
