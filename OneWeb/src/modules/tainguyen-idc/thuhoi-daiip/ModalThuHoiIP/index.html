<ejs-dialog
  :enableResize="true"
  :allowDragging="true"
  :visible="false"
  ref="ModalCapIP"
  :animationSettings="animationSettings"
  :showHeader="false"
  :showCloseIcon="false"
  :isModal="true"
  width="80%"
  :target="target"
  :position="{ X: 'center', Y: 'center' }"
  :zIndex="1000"
  :overlayClick="false"
  @show="onModalShow"
>
  <div class="popup-box">
    <div class="popup-header">
      <div class="title">
        <span class="icon one-notepad"></span>
        Thu hồi IP cho thuê bao {{ thongTinCongViec.MA_THUEBAO }} - {{ thongTinCongViec.KHACH_HANG }}
      </div>
      <div class="close -ap icon-close" data-dismiss="modal" @click="closeDialog"></div>
    </div>

    <div class="modal-content p-2">
      <!-- Form search -->
      <div class="list-actions-top">
        <ul class="list">
          <li>
            <b-link href="javascript:void(0)" @click="onSearch">
              <span class="icon one-search"></span>Tìm kiếm
            </b-link>
          </li>
          <li>
            <b-link href="javascript:void(0)" @click="onAccept" :disabled="!selectedRowData">
              <span class="icon one-save"></span>Chấp nhận
            </b-link>
          </li>
        </ul>
      </div>
      <div class="box-form mt-2">
        <div class="row">
          <div class="legend-title d-flex justify-content-between align-items-center">
            <span>Điều kiện tìm kiếm</span>
          </div>
        </div>
        <div class="row">
          <div class="col-sm-6 col-12">
            <div class="info-row d-flex align-items-center">
              <div class="key w100">Địa chỉ IP</div>
              <div class="value flex-fill">
                <input v-model.trim="searchParams.ipAddress" type="text" class="form-control" placeholder="Nhập địa chỉ IP ..."/>
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-12">
            <div class="info-row d-flex align-items-center">
              <div class="key w100">Subnet</div>
              <div class="value flex-fill">
                <input v-model.trim="searchParams.tenSubnet" type="text" class="form-control" placeholder="Nhập Subnet ..."/>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Data grid -->
      <div class="box-form mt-3">
        <div class="row">
          <div class="legend-title d-flex justify-content-between align-items-center">
            <span>Danh sách IP sẵn sàng cấp phát tài nguyên</span>
          </div>
        </div>
        <div class="row">
          <div class="col-12">
            <DataGrid
              ref="grdIP"
              :allowPaging="true"
              :enablePagingServer="false"
              :showColumnCheckbox="false"
              :dataSource="IPData"
              v-bind:columns="[
                { fieldName: 'STT', headerText: 'STT', textAlign: 'Center', width: 70 },
                { fieldName: 'IP_ID', headerText: 'ID IP', textAlign: 'Left', width: 80 },
                { fieldName: 'IP', headerText: 'Địa chỉ IP', textAlign: 'Left', width: 120 },
                { fieldName: 'TEN_LOAIIP', headerText: 'Loại IP', textAlign: 'Left', width: 100 },
                { fieldName: 'TEN_DAI_IP', headerText: 'Dải IP', textAlign: 'Left', width: 110 },
                { fieldName: 'TEN_SUBNET', headerText: 'Subnet', textAlign: 'Left', width: 120 },
                { fieldName: 'TEN_THIETBI', headerText: 'Thiết bị', textAlign: 'Left', width: 100 },
                { fieldName: 'TEN_PORT', headerText: 'Port', textAlign: 'Center', width: 100 },
                { fieldName: 'TEN_TRANGTHAI_CAPPHAT', headerText: 'Trạng thái', textAlign: 'Center' }
              ]"
              :enabledSelectFirstRow="true"
              @rowSelected="onRowSelected"
            >
            </DataGrid>
          </div>
        </div>
      </div>
    </div>
  </div>
</ejs-dialog>
