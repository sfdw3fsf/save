<ejs-dialog
  :enableResize="true"
  :allowDragging="true"
  :visible="false"
  ref="ModalCapDaiIP"
  :animationSettings="animationSettings"
  :showHeader="false"
  :showCloseIcon="false"
  :isModal="true"
  width="80%"
  :target="target"
  :position="{ X: 'center', Y: 'center' }"
  :zIndex="1000"
  :overlayClick="false"
  @show="onModalShow"
>
  <div class="popup-box">
    <div class="popup-header">
      <div class="title">
        <span class="icon one-notepad"></span>
        Thu hồi dải IP cho thuê bao {{ thongTinCongViec.MA_THUEBAO }} - {{ thongTinCongViec.KHACH_HANG }}
      </div>
      <div class="close -ap icon-close" data-dismiss="modal" @click="closeDialog"></div>
    </div>

    <div class="modal-content p-2">
      <!-- Form search -->
      <div class="list-actions-top">
        <ul class="list">
          <li>
            <b-link href="javascript:void(0)" @click="onSearch">
              <span class="icon one-search"></span>Tìm kiếm
            </b-link>
          </li>
          <li>
            <b-link href="javascript:void(0)" @click="onAccept" :disabled="!hasSelectedItems">
              <span class="icon one-save"></span>Chấp nhận
            </b-link>
          </li>
        </ul>
      </div>
      <div class="box-form mt-2">
        <div class="row">
          <div class="legend-title d-flex justify-content-between align-items-center">
            <span>Điều kiện tìm kiếm</span>
          </div>
        </div>
        <div class="row">
          <div class="col-sm-4 col-12">
            <div class="info-row d-flex align-items-center">
              <div class="key w100">Tên dải IP</div>
              <div class="value flex-fill">
                <input v-model.trim="searchParams.tenDaiIp" type="text" class="form-control" placeholder="Nhập địa chỉ dải IP ..."/>
              </div>
            </div>
          </div>
          <div class="col-sm-4 col-12">
            <div class="info-row d-flex align-items-center">
              <div class="key w100">Đơn vị quản lý</div>
              <div class="value flex-fill">
                <input v-model.trim="searchParams.tenDonviQl" type="text" class="form-control" placeholder="Nhập đơn vị quản lý ..."/>
              </div>
            </div>
          </div>
          <div class="col-sm-4 col-12">
            <div class="info-row d-flex align-items-center">
              <div class="key w100">Subnet</div>
              <div class="value flex-fill">
                <input v-model.trim="searchParams.tenSubnet" type="text" class="form-control" placeholder="Nhập Subnet ..."/>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- Data grid -->
      <div class="box-form mt-3">
        <div class="row">
          <div class="legend-title d-flex justify-content-between align-items-center">
            <span>Danh sách dải IP sẵn sàng thu hồi tài nguyên</span>
            <span v-if="dsSelected && dsSelected.length > 0" class="text-info">
              Đã chọn: {{ dsSelected.length }} dải IP
            </span>
          </div>
        </div>
        <div class="row">
          <div class="col-12">
            <DataGrid
              :key="gridKey"
              ref="grDaiIP"
              :allowPaging="true"
              :enablePagingServer="false"
              :showColumnCheckbox="true"
              :dataSource="DaiIPData"
              v-bind:columns="[
                {fieldName: 'STT', headerText: 'STT', textAlign: 'Center', width: 70, allowFiltering: false, allowSorting: false},
                {fieldName: 'DAI_IP_ID', headerText: 'ID Dải IP', textAlign: 'Left', width: 100},
                {fieldName: 'TEN_DAI_IP', headerText: 'Dải IP', textAlign: 'Left', width: 130},
                {fieldName: 'TEN_SUBNET', headerText: 'Subnet', textAlign: 'Left', width: 120},
                {fieldName: 'TEN_LOAIIP', headerText: 'Loại Dải IP', textAlign: 'Left'},
                {fieldName: 'TEN_PHANLOAI_IP', headerText: 'Phân loại', textAlign: 'Left', width: 120},
                {fieldName: 'TEN_DONVI_QL', headerText: 'Đơn vị Quản lý', textAlign: 'Left', width: 120},
                {fieldName: 'SO_IP_CHUA_SU_DUNG', headerText: 'Số IP chưa sử dụng', textAlign: 'Left', width: 120},
                {fieldName: 'TEN_TRANGTHAI', headerText: 'Trạng thái ', textAlign: 'Left', width: 110}
              ]"
              :enabledSelectFirstRow="false"
              @rowSelected="onRowSelected"
              @selectedItemsChanged="onSelectRowCheckbox"
            >
            </DataGrid>
          </div>
        </div>
      </div>
    </div>
  </div>
</ejs-dialog>
