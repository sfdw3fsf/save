<div id="danhsach-congviec-idc">
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="onSearch">
          <span class="icon one-search"></span>Tìm kiếm
        </b-link>
      </li>
    </ul>
  </div>

  <div class="page-content">
    <!-- Search conditions -->
    <div class="box-form">
      <div class="row">
        <div class="legend-title d-flex justify-content-between align-items-center">
          Thông tin tìm kiếm
        </div>
      </div>

      <div class="row" v-if="!isLoaicvIdFromUrl">
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w100">Loại công việc</div>
            <div class="value">
              <SelectExt v-model="searchConditions.loaicvId" placeholder="-- Tất cả --" dataTextField="text"
                dataValueField="value" :dataSource="loaiCongViecList" :disabled="isLoaicvIdFromUrl" />
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w100">Phân loại</div>
            <div class="value">
              <SelectExt v-model="searchConditions.phanloai" placeholder="-- Tất cả --" dataTextField="text"
                dataValueField="value" :dataSource="phanLoaiList" />
            </div>
          </div>
        </div>

        <div class="col-sm-6 col-12" v-if="false">
          <div class="info-row">
            <div class="key w100">Phạm vi IDC</div>
            <div class="value">
              <SelectExt v-model="searchConditions.donviId" placeholder="-- Chọn phạm vi IDC --" dataTextField="text"
                dataValueField="value" :dataSource="donViList" @change="onChangeDonVi" />
            </div>
          </div>
        </div>

        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w100">IDC</div>
            <div class="value">
              <SelectExt v-model="searchConditions.idcId" placeholder="-- Tất cả --" dataTextField="text"
                dataValueField="value" :dataSource="idcByNhanVienList" />
            </div>
          </div>
        </div>

      </div>

      <div class="row" v-if="false">
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w100">IDC</div>
            <div class="value">
              <SelectExt v-model="searchConditions.idcId" placeholder="-- Tất cả --" dataTextField="text"
                dataValueField="value" :dataSource="idcList"
                :disabled="!searchConditions.donviId || searchConditions.donviId == 0" />
            </div>
          </div>
        </div>

        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w100">Nhân viên thực hiện</div>
            <div class="value">
              <SelectExt v-model="searchConditions.nhanvienId" placeholder="-- Tất cả --" dataTextField="text"
                dataValueField="value" :dataSource="nhanVienList"
                :disabled="!searchConditions.donviId || searchConditions.donviId == 0" />
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w100">Khách hàng</div>
            <div class="value">
              <input type="text" class="form-control" v-model="searchConditions.khachhang"
                placeholder="Mã thuê bao, mã giao dịch, số hợp đồng, tên thuê bao" />
            </div>
          </div>
        </div>

        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w100">Công việc</div>
            <div class="value">
              <input type="text" class="form-control" v-model="searchConditions.congviec"
                placeholder="Mã công việc, tên công việc" />
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <!-- Ngày yêu cầu -->
        <div class="col-sm-6 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Ngày yêu cầu</div>
            <div class="value">
              <ejs-datepicker v-model="searchConditions.ycBatdau" :format="'dd/MM/yyyy'" :allowEdit="false"
                style="background: white; color: #495057" ref="ycBatDau" :maxDate="searchConditions.ycKetthuc"
                placeholder="dd/mm/yyyy" />
            </div>
            <span class="separator"> ~ </span>
            <div class="value p-0">
              <ejs-datepicker v-model="searchConditions.ycKetthuc" :format="'dd/MM/yyyy'" :allowEdit="false"
                style="background: white; color: #495057" ref="ycKetThuc" :minDate="searchConditions.ycBatdau"
                placeholder="dd/mm/yyyy" />
            </div>
          </div>
        </div>

        <!-- Ngày yêu cầu hoàn thành -->
        <div class="col-sm-6 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Ngày yêu cầu hoàn thành</div>
            <div class="value">
              <ejs-datepicker v-model="searchConditions.ychtBatdau" :format="'dd/MM/yyyy'" :allowEdit="false"
                style="background: white; color: #495057" ref="ychtBatDau" :maxDate="searchConditions.ychtKetthuc"
                placeholder="dd/mm/yyyy" />
            </div>
            <span class="separator"> ~ </span>
            <div class="value p-0">
              <ejs-datepicker v-model="searchConditions.ychtKetthuc" :format="'dd/MM/yyyy'" :allowEdit="false"
                style="background: white; color: #495057" ref="ychtKetThuc" :minDate="searchConditions.ychtBatdau"
                placeholder="dd/mm/yyyy" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Data grid -->
    <div class="box-form">
      <div class="row">
        <div class="legend-title d-flex justify-content-between align-items-center">
          Danh sách nhiệm vụ/ công việc: {{ selectedLoaiCongViecText }}
        </div>
      </div>

      <div class="row">
        <div class="col-12">
          <!-- {fieldName: 'DONVI_THUCHIEN', headerText: 'Đơn vị thực hiện', textAlign: 'Left',  width: 150},
          {fieldName: 'CANHAN_THUCHIEN', headerText: 'Cá nhân thực hiện', textAlign: 'Left', width: 155}, -->
          <DataGrid ref="grdNhiemVu" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="false"
            :dataSource="danhSachCongViec" v-bind:columns="[
              {fieldName: 'MA_CV', headerText: 'Mã CV', textAlign: 'Left', width: 80, minWidth: 80, maxWidth: 80},
              {fieldName: 'HANGMUC_TRIENKHAI', headerText: 'Hạng mục công việc', textAlign: 'Left'},
              {fieldName: 'TEN_IDC', headerText: 'IDC', textAlign: 'Left', width: 100, minWidth: 100, maxWidth: 100},
              {fieldName: 'PHOIHOP_THUCHIEN', headerText: 'Phối hợp thực hiện', textAlign: 'Left', width: 100, minWidth: 100, maxWidth: 100, cssClass: 'phoi-hop-thuc-hien', disableHtmlEncode: false},
              {fieldName: 'NGAY_YC', headerText: 'Ngày yêu cầu', textAlign: 'Center', width: 80, minWidth: 80, maxWidth: 80},
              {fieldName: 'NGAY_YCHT', headerText: 'Ngày yêu cầu HT', textAlign: 'Center', width: 80, minWidth: 80, maxWidth: 80},
              {fieldName: 'KHACHHANG', headerText: 'Khách hàng', textAlign: 'Left', disableHtmlEncode: false},
              {fieldName: 'ACTIONS', headerText: 'Thao tác', allowSorting: false,
              allowFiltering: false, textAlign: 'Center', template: actionColumn(this), width: 50, minWidth: 50, maxWidth: 50}
            ]" :enabledSelectFirstRow="true">
          </DataGrid>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal components -->
  <ModalChiTietPhieuTacNghiep ref="ModalChiTietPhieuTacNghiep" />
  <CapPhatCongSuatDienPopup ref="CapPhatCongSuatDienPopup" />
</div>
