<div class="row">
  <div class="col-sm-6 col-12">
    <div class="info-row">
      <div class="key w160">Số cổng nguồn</div>
      <div class="value">
        <input
          type="number"
          class="form-control"
          v-model="currentItem.soCongNguon"
          :disabled="currentMode == 'VIEW' || !controls.txtSoCongNguon.enabled"
          :class="controls.txtSoCongNguon.invalid ? 'is-invalid' : ''"
          min="1"
          placeholder="Nhập số cổng nguồn"
        />
      </div>
    </div>
    <div class="info-row">
      <div class="key w160">Tên cổng nguồn</div>
      <div class="value">
        <input
          type="text"
          class="form-control"
          v-model="currentItem.tenCongNguon"
          :disabled="currentMode == 'VIEW' || !controls.txtTenCongNguon.enabled"
          :class="controls.txtTenCongNguon.invalid ? 'is-invalid' : ''"
          placeholder="Nhập tên cổng nguồn"
        />
      </div>
    </div>
    <div class="info-row">
      <div class="key w160">Dòng định danh</div>
      <div class="value">
        <input
          type="text"
          class="form-control"
          v-model="currentItem.dongDinhDanh"
          :disabled="currentMode == 'VIEW' || !controls.txtDongDinhDanh.enabled"
          :class="controls.txtDongDinhDanh.invalid ? 'is-invalid' : ''"
          placeholder="Nhập dòng định danh"
        />
      </div>
    </div>
    <div class="info-row">
      <div class="key w160">Điện áp định danh</div>
      <div class="value">
        <input
          type="number"
          class="form-control"
          v-model="currentItem.dienApDinhDanh"
          :disabled="currentMode == 'VIEW' || !controls.txtDienApDinhDanh.enabled"
          :class="controls.txtDienApDinhDanh.invalid ? 'is-invalid' : ''"
          min="1"
          placeholder="Nhập điện áp định danh"
        />
      </div>
    </div>
  </div>
  <div class="col-sm-6 col-12">
    <div class="info-row">
      <div class="key w160">Chuẩn đấu nối</div>
      <div class="value">
        <SelectExt
          v-model="currentItem.chuanDauNoiId"
          dataTextField="TEN"
          dataValueField="ID"
          :dataSource="[...chuanDauNoiList]"
          :settings="{allowClear:true, placeholder: 'Chọn chuẩn đấu nối'}"
          :disabled="currentMode == 'VIEW' || !controls.selectChuanDauNoi.enabled"
          :class="{invalidBox: controls.selectChuanDauNoi.invalid}"
        />
      </div>
    </div>
    <div class="info-row">
      <div class="key w160">Số lượng U cần đặt</div>
      <div class="value">
        <input
          type="number"
          class="form-control"
          v-model="currentItem.soLuongUCanDat"
          :disabled="currentMode == 'VIEW' || !controls.txtSoLuongUCanDat.enabled"
          :class="controls.txtSoLuongUCanDat.invalid ? 'is-invalid' : ''"
          min="1"
          placeholder="Nhập số lượng U cần đặt"
        />
      </div>
    </div>
  </div>
</div>
