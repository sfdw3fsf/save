<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="$refs.searchForm && $refs.searchForm.onSearch()" :class="{ disabled: false }">
          <span class="icon one-search"></span>Tìm kiếm</b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onResetSearch" :class="{ disabled: false }">
          <span class="icon fa one-refresh"></span>Làm mới</b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onAddNew" :disabled="!buttons.btnAddNew.enabled">
          <span class="icon one-file-plus"></span>Nhập mới
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onDelete" :disabled="!buttons.btnDelete.enabled">
          <span class="icon one-trash"></span>Xóa
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnImportExcel_Click" :class="{ disabled: false }">
          <span class="icon one-upload"></span>Import</b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnExportExcel_Click" :class="{ disabled: false }">
          <span class="icon one-download"></span>Export</b-link>
      </li>
    </ul>
  </div>

  <div class="page-content">
    <!-- SEARCH FORM -->
    <SearchForm
      ref="searchForm"
      :loaiTuDiaOptions="loaiTuDiaOptions"
      :hangSanXuatList="hangSanXuatList"
      @search="onSearch"
    />
    <!-- DataGrid -->
    <div class="box-form">
      <div class="legend-title">Danh sách chủng loại tủ đĩa</div>
      <DataGrid
        :columns="getDataCols"
        :dataSource="dsChungLoaiTuDia"
        :showFilter="true"
        :allowPaging="true"
        :enablePagingServer="false"
        :showColumnCheckbox="true"
        @selectedItemsChanged="onSelectRowCheckbox"
        @rowSelected="grdItems_RowSelected"
        dataKeyField="ID"
        ref="grdItems"
        :allowExcelExport="true"
      >
      </DataGrid>
    </div>
  </div>

  <!-- Dialog Form Component -->
  <ThongTinChiTiet
    :visible="showDialog"
    :currentMode="currentMode"
    :form="form"
    :controls="controls"
    :loaiTuDiaOptions="loaiTuDiaOptions"
    :hangSanXuatList="hangSanXuatList"
    :vaiTroThietBiList="vaiTroThietBiList"
    :fullDepthOptions="fullDepthOptions"
    :moduleList="moduleList"
    :mucDichSuDungList="mucDichSuDungList"
    :chuanDauNoiList="chuanDauNoiList"
    :loaiCongOptions="loaiCongOptions"
    :tabIndex="tab_index"
    @save="onSave"
    @close="closeModal"
    @change-tab="onChangeTab"
  />

  <ModalImportExcel
    ref="modalImportExcel"
    :title="importConfig.title"
    :tableColumns="importConfig.tableColumns"
    :templateFileName="importConfig.templateFileName"
    :processExcelData="processChungLoaiTuDiaExcelData"
    :formatCellValue="formatChungLoaiTuDiaCellValue"
    :validationRules="importConfig.validationRules"
    :checkDataResult="importConfig.checkDataResult"
    @check-data="handleCheckData"
  />
</div>
