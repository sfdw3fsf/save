<ejs-dialog
  :enableResize="true"
  :allowDragging="false"
  :visible="false"
  ref="ModalChonHeThong"
  :animationSettings="animationSettings"
  :showHeader="false"
  :showCloseIcon="false"
  width="80%"
  height="auto"
  :target="target"
>
  <div class="popup-box">
    <div class="popup-header">
      <div class="title">
        <span class="icon one-notepad"></span>
        Chọn hệ thống tác nghiệp
      </div>
      <div class="close -ap icon-close" data-dismiss="modal" @click="closeModal"></div>
    </div>
    <div class="list-actions-top">
      <ul class="list">
        <li>
          <b-link href="javascript:void(0)" @click="onChonHeThongThietBiKH">
            <span class="icon one-save"></span>Chọn
          </b-link>
        </li>
        <li>
          <b-link href="javascript:void(0)" @click="closeModal">
            <span class="icon ui-1_circle-remove nc-icon-glyph"></span>Đóng
          </b-link>
        </li>
      </ul>
    </div>
    <div class="modal-content p-2">
      <div class="box-form">
        <div class="legend-title">Thông tin công việc thực hiện</div>
        <div class="row">
          <div class="col-sm-4 col-12">
            <div class="info-row">
              <div class="key w160">IDC <span class="red">(*)</span></div>
              <div class="value">
                <SelectExt
                  v-model="searchForm.idcId"
                  dataTextField="TEN"
                  dataValueField="ID"
                  :dataSource="idcList"
                  placeholder="Chọn IDC"
                  disabled="true"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-4 col-12" v-if="isKhachHang">
            <div class="info-row">
              <div class="key w160">Khách hàng</div>
              <div class="value">
                <input type="text" class="form-control" v-model="searchForm.khachHang" disabled/>
              </div>
            </div>
          </div>
          <div class="col-sm-4 col-12" v-if="isKhachHang">
            <div class="info-row">
              <div class="key w160">Mã thuê bao</div>
              <div class="value">
                <input type="text" class="form-control" v-model="searchForm.maThueBao" disabled/>
              </div>
            </div>
          </div>
        </div>
      </div>
      <DataGrid
        v-if="isKhachHang"
        ref="grdItems"
        :allowPaging="true"
        :enablePagingServer="false"
        :showColumnCheckbox="false"
        :dataSource="dsHeThongThietBiKhachHang"
        v-bind:columns="[
                                {fieldName: 'HETHONGTBI_ID', headerText: 'ID Hệ thống', textAlign: 'Left', width: 120},
                                {fieldName: 'TEN', headerText: 'Tên hệ thống', textAlign: 'Left', width: 250},
                                {fieldName: 'IDC', headerText: 'IDC', textAlign: 'Left', width: 120},
                                {fieldName: 'KHACH_HANG_TEN', headerText: 'Khách hàng', textAlign: 'Left', width: 180},
                                {fieldName: 'MA_THUE_BAO', headerText: 'Mã thuê bao', textAlign: 'Left', width: 150},
                                {fieldName: 'TRANG_THAI_VAN_HANH', headerText: 'Trạng thái vận hành', textAlign: 'Left', width: 150},
                                ]"
        :enabledSelectFirstRow="true"
        @selectedRowChanged="onSelectedRowChanged"
      >
      </DataGrid>
      <DataGrid
        v-if="!isKhachHang"
        ref="grdItems"
        :allowPaging="true"
        :enablePagingServer="false"
        :showColumnCheckbox="false"
        :dataSource="dsHeThongThietBiKhachHang"
        v-bind:columns="[
                                {fieldName: 'HETHONGTBI_ID', headerText: 'ID Hệ thống', textAlign: 'Left', width: 120},
                                {fieldName: 'TEN', headerText: 'Tên hệ thống', textAlign: 'Left', width: 250},
                                {fieldName: 'IDC', headerText: 'IDC', textAlign: 'Left', width: 120},
                                {fieldName: 'DONVI_QL', headerText: 'Đơn vị quản lý', textAlign: 'Left', width: 180},
                                {fieldName: 'NHANVIEN_QL', headerText: 'Nhân viên quản lý', textAlign: 'Left', width: 150},
                                {fieldName: 'TRANG_THAI_VAN_HANH', headerText: 'Trạng thái vận hành', textAlign: 'Left', width: 150},
                                ]"
        :enabledSelectFirstRow="true"
        @selectedRowChanged="onSelectedRowChanged"
      >
      </DataGrid>
    </div>
  </div>
</ejs-dialog>
