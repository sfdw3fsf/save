<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" :disabled="!buttons.btnNhapMoi.enabled" @click="btnNewClick">
          <span class="icon one-file-plus"></span>Nhập mới
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" :disabled="!buttons.btnXoa.enabled" @click="btnDeleteClick">
          <span class="icon one-trash"></span>Xóa
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnImportExcel_Click">
          <span class="icon one-download"></span>Import
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnXuatExcel_Click">
          <span class="icon one-upload"></span>Export
        </b-link>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <div class="row">
      <div class="col-12">
        <!-- Grid danh sách mặt sàn -->
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Danh sách mặt sàn</div>
          </div>
          <div class="table-content">
            <DataGrid
              v-bind:columns="[
                  {fieldName: 'ID', headerText: 'ID', textAlign: 'Left', allowFiltering: true, width: 80 },
                  { fieldName: 'TEN', headerText: 'Tên mặt sàn', textAlign: 'Left', allowFiltering: true, width: 200 },
                  { fieldName: 'IDC_NAME', headerText: 'IDC', textAlign: 'Left', allowFiltering: true, width: 150 },
                  { fieldName: 'TOANHA_NAME', headerText: 'Toà nhà', textAlign: 'Left', allowFiltering: true, width: 150 },
                  { fieldName: 'DIEN_TICH', headerText: 'Diện tích (m²)', textAlign: 'Left', allowFiltering: true, width: 120 },
                  { fieldName: 'SUDUNG_TEXT', headerText: 'Hiệu lực', textAlign: 'Left', allowFiltering: true, width: 100 },
                  { fieldName: 'GHI_CHU', headerText: 'Ghi chú', textAlign: 'Left', allowFiltering: true, width: 200 },
                  { fieldName: 'ACTIONS', headerText: 'Thao tác', textAlign: 'Center', template: actionColumn(), width: 120 }
                ]"
              :dataSource="listMatSan"
              :showFilter="true"
              :allowPaging="true"
              :enablePagingServer="false"
              :showColumnCheckbox="true"
              :allowExcelExport="true"
              :enabledSelectFirstRow="true"
              @rowSelected="onSelectRowChanged"
              @selectedItemsChanged="onSelectRowCheckbox"
              dataKeyField="ID"
              ref="grdItems"
            />
          </div>
        </div>
      </div>
    </div>
  </div>
  <ModalImportExcel
    ref="modalImportExcel"
    :title="importConfig.title"
    :tableColumns="importConfig.tableColumns"
    :gridColumns="importConfig.gridColumns"
    :templateFileName="importConfig.templateFileName"
    :processExcelData="processMatSanExcelData"
    :formatCellValue="formatMatSanCellValue"
    :validationRules="importConfig.validationRules"
    :checkDataResult="importConfig.checkDataResult"
    @check-data="handleCheckData"
  />
  <!-- Popup Chi tiết Mặt sàn -->
  <PopupMatSanDetail ref="popupMatSan" :itemId="selectedItemId" :mode="dialogMode" @saved="handlePopupSaved" />
</div>
