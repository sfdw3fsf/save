<b-modal ref="modalDanhSachThietBi"  size="xl" title="Chi tiết danh sách thiết bị" hide-footer body-class="modal-body p-0">
  <div class="modal-content popup-box">
    <div class="popup-body">
      <div class="box-form">
        <DataGrid
                  v-bind:columns="[
                                  {fieldName: 'ID', headerText: 'ID Thiết bị', textAlign: 'Center', width: 80},
                                  {fieldName: 'UP_DOWN_UNITS', headerText: 'Vị trí U Trên/Dưới', textAlign: 'Left'},
                                  {fieldName: 'TEN_THIETBI', headerText: 'Tên thiết bị', textAlign: 'Left'},
                                  {fieldName: 'SERIAL_NUMBER', headerText: 'Serial number', textAlign: 'Left'},
                                  {fieldName: 'CS_THIETKE', headerText: 'Công suất thiết kế', textAlign: 'Left'},
                                  {fieldName: 'TEN_IDC', headerText: 'IDC', textAlign: 'Left'},
                                  {fieldName: 'TEN_TOANHA', headerText: 'Tòa nhà', textAlign: 'Left'},
                                  {fieldName: 'TEN_MATSAN', headerText: 'Mặt sàn',  textAlign: 'Left'},
                                  {fieldName: 'TEN_PHONG', headerText: 'Phòng',  textAlign: 'Left'},
                                  {fieldName: 'TEN_RACK', headerText: 'Rack', textAlign: 'Left'},
                                  {fieldName: 'TRANGTHAI_VANHANH', headerText: 'Trạng thái vận hành', width: 120, textAlign: 'Left'},
                                  {fieldName: 'MA_TB', headerText: 'Mã thuê bao', visible: this.soHuuRack == 0, textAlign: 'Left'},
                                  {fieldName: 'TEN_TB', headerText: 'Tên thuê bao', visible: this.soHuuRack == 0, textAlign: 'Left'},
                                  {fieldName: 'MA_TS', headerText: 'Mã tài sản', visible: this.soHuuRack == 1, textAlign: 'Left'},
                                  ]"
          v-bind:dataSource="thietbiItemList"
          :showFilter="true"
          :allowPaging="true"
          :enablePagingServer="false"
        ></DataGrid>
      </div>
    </div>
  </div>
</b-modal>
