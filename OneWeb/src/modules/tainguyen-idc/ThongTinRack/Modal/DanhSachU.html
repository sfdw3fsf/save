<b-modal ref="modalDanhSachU"  size="xl" title="Chi tiết danh sách U" hide-footer body-class="modal-body p-0">
  <div class="modal-content popup-box">
    <div class="popup-body">
      <div class="box-form">
        <DataGrid
                  v-bind:columns="[
                                  {fieldName: 'RACKUNIT_ID', headerText: 'ID U', textAlign: 'Center', width: 80},
                                  {fieldName: 'RACK_ID', headerText: 'ID RACK', textAlign: 'Right', width: 100},
                                  {fieldName: 'TEN_RACK', headerText: 'Tên Rack', textAlign: 'Left'},
                                  {fieldName: 'TEN_LOAIRACK', headerText: 'Loại Rack', textAlign: 'Left'},
                                  {fieldName: 'TEN_MATSAN', headerText: 'Mặt sàn', textAlign: 'Left'},
                                  {fieldName: 'TEN_PHONG', headerText: 'Phòng', textAlign: 'Left'},
                                  {fieldName: 'VITRI', headerText: 'Vị trí U', textAlign: 'Right', width: 100},
                                  {fieldName: 'TRANGTHAI_SUDUNG', headerText: 'Trạng thái sử dụng', width: 150, textAlign: 'Left'}
                                  ]"
          v-bind:dataSource="unitItemList"
          :showFilter="true"
          :allowPaging="true"
          :enablePagingServer="false"
        ></DataGrid>
      </div>
    </div>
  </div>
</b-modal>
