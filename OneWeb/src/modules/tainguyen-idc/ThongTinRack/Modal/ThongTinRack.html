<ejs-dialog :enableResize="true" :allowDragging="false" :visible="false" ref="ModalThongTinRack"
  :animationSettings="animationSettings" :showHeader="false" :showCloseIcon="false" width="60%" height="auto"
  :target="target" :isModal="true" :position="{ X: 'center', Y: 'center' }" :overlayClick="onOverlayClick">
  <div class="modal-content popup-box">
    <div class="popup-header">
      <div class="title" style="font-weight: 600;">{{ isNew ? 'Nhập mới Rack' : 'Chi tiết Rack' }}</div>
      <div class="close -ap icon-close" @click="closeDialog"></div>
    </div>
    <div class="list-actions-top">
      <ul class="list">
        <li>
          <b-link href="javascript:void(0)" @click="btnGhiLai_Click" :disabled="!buttons.btnGhiLai.enabled">
            <span class="icon one-save"></span> Ghi lại
          </b-link>
        </li>
        <template v-if="!isNew">
          <li>
            <b-link href="javascript:void(0)" @click="btnHuy_Click" :disabled="!buttons.btnHuy.enabled">
              <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Hủy bỏ
            </b-link>
          </li>
          <li>
            <b-link href="javascript:void(0)" @click="btnSua_Click" :disabled="!buttons.btnSua.enabled">
              <span class="icon one-print"></span>Sửa
            </b-link>
          </li>
        </template>
      </ul>
    </div>

    <div class="popup-body">
      <div class="row">
        <div class="col-12">
          <div class="box-form">
            <div class="row">
              <div class="legend-title">Thông tin Rack
              </div>
            </div>
            <!--  -->
            <div class="row">
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">ID Rack:<span class="red">*</span></div>
                  <div class="value">
                    <input type="text" class="form-control" disabled v-model.trim="dataItem.RACK_ID" />
                  </div>
                </div>
              </div>
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">Hiệu lực:</div>
                  <div class="value padt4">
                    <div class="check-action">
                      <input type="checkbox" v-model.trim="dataItem.SUDUNG" :disabled="!isEditMode" :true-value="1"
                        :false-value="0" /><span class="name"></span>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Tên Rack - Sở hữu Rack -->
            <div class="row">
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">Trạng thái vận hành:<span class="red">*</span></div>
                  <div class="value">
                    <SelectExt v-model.trim="dataItem.VANHANH" dataTextField="TRANGTHAI_VH" dataValueField="TTVH_ID"
                      :dataSource="vanHanhSelectList" :disabled="!isEditMode" />
                  </div>
                </div>
              </div>
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">Sở hữu Rack:<span class="red">*</span></div>
                  <div class="value d-flex">
                    <div class="item mr-3">
                      <div class="check-action">
                        <input type="radio" name="sohuu-rack-2" value='1' :disabled="!isEditMode"
                          v-model.trim="dataItem.SOHUU_RACK" />
                        <span class="name">IDC</span>
                      </div>
                    </div>
                    <div class="item" style="margin-left: 8% !important;">
                      <div class="check-action">
                        <input type="radio" name="sohuu-rack-2" value='0' :disabled="!isEditMode"
                          v-model.trim="dataItem.SOHUU_RACK">
                        <span class="name">Khách hàng</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Loại rack - Vận hành -->
            <div class="row">
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">Trạng thái CCDV:<span class="red">*</span></div>
                  <div class="value">
                    <SelectExt v-model.trim="dataItem.CCDV" dataTextField="TEN" dataValueField="TRANGTHAI_ID"
                      :dataSource="ccdvSelectList" :disabled="!isEditMode" />
                  </div>
                </div>
              </div>
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">Tên Rack:<span class="red">*</span></div>
                  <div class="value">
                    <input type="text" class="form-control" :disabled="!isEditMode" v-model="dataItem.TEN_RACK" />
                  </div>
                </div>
              </div>
            </div>

            <!-- Mã TS - CCDV -->
            <div class="row">
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">Trạng thái quy hoạch:<span class="red">*</span></div>
                  <div class="value">
                    <SelectExt v-model.trim="dataItem.QUYHOACH" dataTextField="TEN" dataValueField="TRANGTHAI_ID"
                      :dataSource="quyHoachSelectList" :disabled="!isEditMode" />
                  </div>
                </div>
              </div>
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">Loại Rack:<span class="red">*</span></div>
                  <div class="value">
                    <SelectExt v-model.trim="dataItem.LOAIRACK_ID" dataTextField="TEN" dataValueField="ID"
                      :dataSource="loaiRackSelectList" :disabled="!isEditMode" />
                  </div>
                </div>
              </div>

            </div>

            <!-- Ghi chú  - Quy hoạch -->
            <div class="row">
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">Ghi chú:</div>
                  <div class="value">
                    <input type="text" class="form-control" :disabled="!isEditMode" v-model.trim="dataItem.GHI_CHU" />
                  </div>
                </div>
              </div>
              <div class="col-sm-6 col-12"
                v-if="(dataItem.TS_NOIBO == 1 && dataItem.SOHUU_RACK == 1) || (isNew && dataItem.SOHUU_RACK == 1)">
                <div class="info-row">
                  <div class="key w160">Mã tài sản:<span class="red">*</span></div>
                  <div class="value">
                    <input type="text" class="form-control" :disabled="!isEditMode" v-model.trim="dataItem.MA_TS" />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row" v-if="!isNew">
        <div class="col-12">
          <div class="box-form">
            <div class="row">
              <div class="legend-title">Thông tin lắp đặt Rack
              </div>
            </div>
            <!-- Tên VRF - Hiệu lực -->
            <div class="row">
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">IDC </div>
                  <div class="value">
                    <input type="text" class="form-control" disabled v-model="dataItem.TEN_IDC" />
                    <!-- <SelectExt v-model.trim="dataItem.IDC_ID" @change="onChangeIDC()" dataTextField="TEN" dataValueField="ID"
                      :dataSource="idcSelectList" disabled /> -->
                  </div>
                </div>
              </div>
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">Tòa nhà</div>
                  <div class="value">
                    <input type="text" class="form-control" disabled v-model.trim="dataItem.TEN_TOANHA" />
                  </div>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">Mặt sàn</div>
                  <div class="value">
                    <input type="text" class="form-control" disabled v-model="dataItem.TEN_MATSAN" />
                    <!-- <SelectExt v-model.trim="dataItem.MATSAN_ID" @change="onChangeMatSan()" dataTextField="TEN" dataValueField="ID"
                      :dataSource="matSanSelectList" disabled /> -->
                  </div>
                </div>
              </div>
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">Phòng/Zone</div>
                  <div class="value">
                    <input type="text" class="form-control" disabled v-model="dataItem.TEN_PHONG" />
                    <!-- <SelectExt v-model.trim="dataItem.PHONG_ID"  dataTextField="TEN" dataValueField="ID"
                      :dataSource="phongSelectList" disabled /> -->
                  </div>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">Vị trí Rack</div>
                  <div class="value">
                    <input type="text" class="form-control" disabled v-model.trim="dataItem.VITRI_RACK" />
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ejs-dialog>
