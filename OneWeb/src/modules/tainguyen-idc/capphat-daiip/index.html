        </li>

      <!-- các trạng thái khác -->

          </b-link>
        </li>
      </template>
    </ul>
  </div>

     <!-- TAB NAVIGATION -->
     <div class="">
      <div class="nav tab-over tabs" style="margin-top: 20px;">
        <a
          href="#tabChonDaiIP"
          v-on:click="onChangeTab(1)"
          data-toggle="tab"
          class="tab"
          :class="{active: tab_index == 1}"
          >Cấp phát {{ this.isCapPhatDaiIP ? 'dải IP' : 'IP' }}</a
        >
        <a
          href="#tabLichSuThayDoi"
          v-on:click="onChangeTab(2)"
          data-toggle="tab"
          class="tab"
          :class="{active: tab_index == 2}"
          >Lịch sử tác động</a
        >
      </div>
    </div>

    <div class="tab-content" style="margin-bottom: 20px;">
      <div class="tab-pane" id="tabChonDaiIP" :class="{active: tab_index == 1}">
        <!-- Chọn dải IP cần cấp phát -->
        <div class="box-form">
          <div class="row w-100 d-flex justify-content-between">
            <div class="legend-title d-flex justify-content-between align-items-center">
              <div class="d-flex w-100 justify-content-between">
                <div>{{ this.isCapPhatDaiIP ? 'Chọn dải IP' : 'Chọn IP' }} cần cấp phát</div>
                <!-- Ẩn button chọn IP khi shouldHideButtons = true -->
                <div v-if="!shouldHideButtons && !isNhiemVuMoi">
                  <b-link 
                    href="javascript:void(0)" 
                    @click="openModalCapPhat"
                    :class="{ 'disabled': isChonIPDisabled }"
                    :style="{ 
                      opacity: isChonIPDisabled ? 0.5 : 1, 
                      cursor: isChonIPDisabled ? 'not-allowed' : 'pointer',
                      pointerEvents: isChonIPDisabled ? 'none' : 'auto'
                    }"
                  >
                    <span class="icon one-file-plus"></span>{{ this.isCapPhatDaiIP ? 'Chọn dải IP' : 'Chọn IP' }}
                  </b-link>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-12">
              <DataGrid
                :key="`grid-${isNhiemVuMoi}`"
                :allowPaging="true"
                :enablePagingServer="false"
                :showColumnCheckbox="false"
                :dataSource="danhSachDaiIP"
                :childGrid="childGridDaiIP"
                v-bind:columns="[
                  {fieldName: 'STT', headerText: 'STT', textAlign: 'Center', width: 70, allowFiltering: false, allowSorting: false},
                  {fieldName: 'IPSTORE_ID', headerText: 'ID Dải IP', textAlign: 'Left', width: 120},
                  {fieldName: 'TEN_IP_STORE', headerText: 'Dải IP', textAlign: 'Left', width: 120},
                  {fieldName: 'TEN_SUBNET', headerText: 'Subnet', textAlign: 'Left', width: 120},
                  {fieldName: 'TEN_LOAIIP', headerText: 'Loại Dải IP', textAlign: 'Left'},
                  {fieldName: 'TEN_PHANLOAI_IP', headerText: 'Phân loại', textAlign: 'Left', width: 150},
                  {fieldName: 'TEN_DONVI_QL', headerText: 'Đơn vị Quản lý', textAlign: 'Left', width: 150},
                  {fieldName: 'SO_IP_CHUA_SU_DUNG', headerText: 'Số IP chưa sử dụng', textAlign: 'Left', width: 140},
                  {fieldName: 'TEN_TRANGTHAI', headerText: 'Trạng thái CCDV', textAlign: 'Left', width: 140},
                  {fieldName: 'ACTIONS', headerText: 'Thao tác', textAlign: 'Center', template: this.actionColumnDaiIP(), width: 100}
                ]"
                :enabledSelectFirstRow="true"
                @detailDataBound="detailDataBound"
              >
              </DataGrid>
            </div>
          </div>
        </div>
      </div>
      <div class="tab-pane" id="tabLichSuThayDoi" :class="{active: tab_index == 2}">
        <!-- Lịch sử tác động -->
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Danh sách lịch sử tác động</div>
          </div>
          <div class="row">
            <div class="col-12">
              <TabHistory
                  :tenBang="''"
                  :tenCot="''"
                  :khoaDuLieu="phieutc"
                  ref="tabHistory"
                ></TabHistory>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal cấp IP -->
  <ModalCapIP ref="ModalCapIP" :thongTinCongViec="thongTinCongViec" :onSuccess="loadDanhSachDaiIP" />
  <ModalCapDaiIP ref="ModalCapDaiIP" :thongTinCongViec="thongTinCongViec" :onSuccess="loadDanhSachDaiIP" />
  <ModalCapThietBiVaPort 
    ref="ModalCapThietBiVaPort" 
    :thongtinIP="selectedIPData"
    :thongTinCongViec="thongTinCongViec"
    :onSuccess="loadDanhSachDaiIP"
  />
  <ModalChuyenXuly 
    modalID="ModalChuyenXuly" 
    ref="ModalChuyenXuly"
    @saved="chuyenXylySuccess">
  </ModalChuyenXuly>
  <ModalTraPhieu 
    modalID="ModalTraPhieu" 
    ref="ModalTraPhieu"
    @saved="traPhieuSuccess">
  </ModalTraPhieu>
  <ModalXemChiTiet 
    ref="ModalXemChiTiet"
    :thongTinCongViec="thongTinCongViec"
    :thongtinIP="selectedIPData"
  />
</div>
