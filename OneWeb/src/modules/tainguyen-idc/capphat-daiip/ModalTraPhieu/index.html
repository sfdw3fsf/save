<ejs-dialog
  :enableResize="true"
  :allowDragging="true"
  :visible="false"
  ref="ModalChuyenXuly"
  :animationSettings="animationSettings"
  :showHeader="false"
  :showCloseIcon="false"
  :isModal="true"
  width="80%"
  height="auto"
  :target="target"
  :position="{ X: 'center', Y: 'center' }"
  :zIndex="1000"
  :overlayClick="false"
>
  <div class="popup-box">
    <div class="popup-header">
      <div class="title"><span class="icon one-notepad"></span>
        Trả phiếu thi công
      </div>
      <div class="close -ap icon-close" data-dismiss="modal" @click="closeModal"></div>
    </div>
    <div class="list-actions-top">
      <ul class="list">
        <li>
          <b-link href="javascript:void(0)" @click="onSave" :disabled="currentMode == 'VIEW'">
            <span class="icon one-save"></span>Trả phiếu
          </b-link>
        </li>
      </ul>
    </div>
    <div class="modal-content p-2 ">
      <!-- THÔNG TIN CÔNG VIỆC -->
      <div class="row form-section">
        <div class="col-12">
            <div class="box-form">
                <div class="row">
                    <div class="legend-title">Lý do trả phiếu</div>
                </div>

                <div class="row">
                    <!-- Left column - 7 fields -->
                    <div class="col-sm-12 col-12">
                        <div class="info-row">
                            <div class="key">Lý do</div>
                            <div class="value">
                                <input 
                                  type="text" 
                                  class="form-control" 
                                  :class="{ 'error-border': controls.txtLyDo.invalid }"
                                  v-model="formData.lyDo"
                                  :disabled="currentMode == 'VIEW'"
                                  placeholder="Nhập lý do trả phiếu"
                                />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
      </div>
    </div>
  </div>
</ejs-dialog>
