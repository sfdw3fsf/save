<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <a style="cursor: pointer;" href="javascript:;" @click="onClickNhapMoi" :class="{ 'disabled': !newBtn }">
          <span class="icon one-file-plus"></span>Nhập mới
        </a>
      </li>
      <li>
        <a style="cursor: pointer;" href="javascript:;" @click="onClickGhiLai" :class="{ 'disabled': !saveBtn }">
          <span class="icon one-save"></span> Ghi lại
        </a>
      </li>
      <li>
        <a style="cursor: pointer;" href="javascript:;" @click="onClickSua" :class="{ 'disabled': !editBtn }">
          <span class="icon one-edit"></span>Sửa
        </a>
      </li>
      <li>
        <a class="pointer" @click="onClickHuy" :class="{ 'disabled': !cancelBtn }">
          <span class="icon one-trash"></span> Hủy bỏ
        </a>
      </li>
      <li>
        <a style="cursor: pointer;" href="javascript:;" @click="onClickXoa" :class="{ 'disabled': !deleteBtn }">
          <span class="icon one-trash"></span>Xóa
        </a>
      </li>
      <li>
        <a style="cursor: pointer;" @click="onClickImport"> <span class="icon one-xlsx-import"></span>Import </a>
      </li>
      <li>
        <a style="cursor: pointer;" @click="onClickExport"> <span class="icon one-excel"></span>Export </a>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <DataForm
      ref="dataForm"
      :parentId="null"
      :itemId="currentItemId"
      :itemData="currentItemData"
      :mode="formMode"
      @saveSuccessed="onDataFormSaved"
    >
    </DataForm>

    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Danh sách IDC</div>
          </div>
          <div class="row">
            <div class="col-12">
              <DataGrid
                ref="gridItems"
                :allowPaging="true"
                :enablePagingServer="false"
                :showColumnCheckbox="true"
                :allowExcelExport="true"
                v-bind:columns="[
                                {fieldName: 'ID_IDC', headerText: 'ID IDC', textAlign: 'Left', width: '100px'},
                                {fieldName: 'TEN_IDC', headerText: 'Tên IDC', textAlign: 'Left', width: '180px'},
                                {fieldName: 'TENTAT', headerText: 'Tên tắt IDC', textAlign: 'Left', width: '150px'},
                                {fieldName: 'TEN_DV', headerText: 'Tên đơn vị', textAlign: 'Left', width: '150px'},
                                {fieldName: 'THOIDIEM_VANHANH', headerText: 'Thời điểm vận hành', textAlign: 'Center', width: '120px', format: 'dd/MM/yyyy'},
                                {fieldName: 'ID_TRANGTHAI_VH', headerText: 'Trạng thái vận hành', textAlign: 'Left', width: '150px', valueAccessor: mapToTrangThaiVanHanh},
                                {fieldName: 'TONG_DIENTICH', headerText: 'Diện tích tổng thể (m²)', textAlign: 'Right', width: '150px'},
                                {fieldName: 'TONG_DIENTICH_PHONGMAY', headerText: 'DT Phòng máy (m²)', textAlign: 'Right', width: '150px'},
                                {fieldName: 'DIA_CHI', headerText: 'Địa chỉ', textAlign: 'Left', width: '200px'},
                                {fieldName: 'TOADO_X', headerText: 'Tọa độ X', textAlign: 'Right', width: '120px'},
                                {fieldName: 'TOADO_Y', headerText: 'Tọa độ Y', textAlign: 'Right', width: '120px'},
                                {fieldName: 'SL_RACK_THIETKE', headerText: 'Tổng Rack thiết kế', textAlign: 'Center', width: '150px'},
                                {fieldName: 'SL_RACK_DALAP', headerText: 'Tổng Rack đã lắp đặt', textAlign: 'Center', width: '170px'},
                                {fieldName: 'SL_RACK_CHUALAP', headerText: 'Tổng Rack còn lại', textAlign: 'Center', width: '150px'},
                                {fieldName: 'TONGCS_TB_DALAPDAT', headerText: 'CS Định danh TB', textAlign: 'Right', width: '150px'},
                                {fieldName: 'GHI_CHU', headerText: 'Ghi chú', textAlign: 'Left', width: '200px'},
                                {fieldName: 'SUDUNG', headerText: 'Hiệu lực', textAlign: 'Center', width: '100px', valueAccessor: mapToHieuLuc},
                               
                                ]"
                :dataSource="dataItems"
                @rowSelected="onRowSelected"
              >
              </DataGrid>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <ModalImportExcel
    ref="modalImportExcel"
    :title="importConfig.title"
    :tableColumns="importConfig.tableColumns"
    :gridColumns="importConfig.gridColumns"
    :templateFileName="importConfig.templateFileName"
    :processExcelData="processIDCExcelData"
    :formatCellValue="formatIDCCellValue"
    :validationRules="importConfig.validationRules"
    :checkDataResult="importConfig.checkDataResult"
    @check-data="handleCheckData"
  />
</div>
