<div id="ketqua-capphat-dien">
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="onSearch"> <span class="icon one-search"></span>Tìm kiếm </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="createCongSuatDien" class="text-primary">
          <span class="fa fa-plus"></span>
          Tạo mới thi công công suất điện
        </b-link>
      </li>
    </ul>
  </div>

  <div class="page-content">
    <!-- Search conditions -->
    <div class="box-form">
      <div class="row">
        <div class="legend-title d-flex justify-content-between align-items-center">
          Điều kiện tìm kiếm
        </div>
      </div>

      <div class="row">
        <!-- Loại công việc -->
        <div class="col-sm-6 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Loại công việc</div>
            <div class="value">
              <SelectExt
                v-model="searchConditions.loaiCvId"
                placeholder="-- Chọn loại công việc --"
                dataTextField="text"
                dataValueField="value"
                :dataSource="loaiCongViecList"
                :disabled="isLoaicvIdFromUrl"
              />
            </div>
          </div>
        </div>

        <!-- IDC -->
        <div class="col-sm-6 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">IDC</div>
            <div class="value">
              <SelectExt
                v-model="searchConditions.idcId"
                placeholder="-- Chọn IDC --"
                dataTextField="text"
                dataValueField="value"
                :dataSource="idcList"
              />
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <!-- Ngày yêu cầu -->
        <div class="col-sm-6 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Ngày yêu cầu</div>
            <div class="value">
              <ejs-datepicker
                v-model="searchConditions.ngayYcStart"
                placeholder="dd/mm/yyyy"
                :maxDate="searchConditions.ngayYcEnd"
              />
            </div>
            <span class="separator"> ~ </span>
            <div class="value p-0">
              <ejs-datepicker
                v-model="searchConditions.ngayYcEnd"
                placeholder="dd/mm/yyyy"
                :minDate="searchConditions.ngayYcStart"
              />
            </div>
          </div>
        </div>

        <!-- Ngày hoàn thành -->
        <div class="col-sm-6 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Ngày hoàn thành</div>
            <div class="value">
              <ejs-datepicker
                v-model="searchConditions.ngayHoanThanhStart"
                placeholder="dd/mm/yyyy"
                :maxDate="searchConditions.ngayHoanThanhEnd"
              />
            </div>
            <span class="separator"> ~ </span>
            <div class="value p-0">
              <ejs-datepicker
                v-model="searchConditions.ngayHoanThanhEnd"
                placeholder="dd/mm/yyyy"
                :minDate="searchConditions.ngayHoanThanhStart"
              />
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <!-- Trạng thái công việc -->
        <div class="col-sm-6 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Trạng thái thực hiện</div>
            <div class="value">
              <SelectExt
                v-model="searchConditions.trangThaiId"
                placeholder="-- Chọn trạng thái --"
                dataTextField="text"
                dataValueField="value"
                :dataSource="trangThaiList"
              />
            </div>
          </div>
        </div>

        <!-- Nhân viên thực hiện -->
        <div class="col-sm-6 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Người thực hiện</div>
            <div class="value">
              <SelectExt
                v-model="searchConditions.nhanVienThucHienId"
                placeholder="-- Chọn nhân viên --"
                dataTextField="text"
                dataValueField="value"
                :dataSource="nhanVienList"
              />
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <!-- Khách hàng -->
        <div class="col-sm-6 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Khách hàng</div>
            <div class="value">
              <input
                type="text"
                class="form-control"
                v-model="searchConditions.khachHang"
                placeholder="Nhập Mã thuê bao, Tên khách hàng, Số HĐ, Mã GD"
              />
            </div>
          </div>
        </div>

        <!-- Công việc -->
        <div class="col-sm-6 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Công việc</div>
            <div class="value">
              <input
                type="text"
                class="form-control"
                v-model="searchConditions.congViec"
                placeholder="Nhập tên/mã công việc"
              />
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <!-- Thiết bị -->
        <div class="col-sm-6 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Thiết bị</div>
            <div class="value">
              <input
                type="text"
                class="form-control"
                v-model="searchConditions.thietBi"
                placeholder="Nhập tên thiết bị"
              />
            </div>
          </div>
        </div>

        <!-- Ổ cắm -->
        <div class="col-sm-6 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Ổ cắm</div>
            <div class="value">
              <input
                type="text"
                class="form-control"
                v-model="searchConditions.oCamId"
                placeholder="Nhập ID ổ cắm"
                @input="validateOCam"
              />
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="box-form">
      <div class="row">
        <div class="legend-title d-flex justify-content-between align-items-center">
          Danh sách kết quả: {{ selectedLoaiCongViecText }} ({{ dsKetQua.length }})
        </div>
      </div>

      <div class="row">
        <div class="col-12">
          <DataGrid
            ref="grdKetQuaCapPhat"
            :allowPaging="true"
            :enablePagingServer="false"
            :showColumnCheckbox="false"
            :dataSource="dsKetQua"
            v-bind:columns="[
              {fieldName: 'maCv', headerText: 'Mã công việc', textAlign: 'Left', width: 100},
              {fieldName: 'tenCv', headerText: 'Hạng mục công việc', textAlign: 'Left', width: 180},
              {fieldName: 'tenLoaiCv', headerText: 'Loại công việc', textAlign: 'Left', width: 100},
              {fieldName: 'tenIDC', headerText: 'IDC', textAlign: 'Left', width: 120},
              {fieldName: 'nhanVienThucHien', headerText: 'Nhân viên thực hiện', textAlign: 'Left', width: 150},
              {fieldName: 'tenThietBi', headerText: 'Tên Thiết Bị', textAlign: 'Left', width: 150},
              {fieldName: 'tenRack', headerText: 'Tên Rack', textAlign: 'Left', width: 150},
              {fieldName: 'tenThanhNguon', headerText: 'Thanh nguồn', textAlign: 'Left', width: 150},
              {fieldName: 'idOCam', headerText: 'Ổ cắm', textAlign: 'Left', width: 100},
              {fieldName: 'ngayYeuCau', headerText: 'Ngày yêu cầu', textAlign: 'Left', width: 150},
              {fieldName: 'ngayYeuCauHoanThanh', headerText: 'Ngày yêu cầu hoàn thành', textAlign: 'Left', width: 150},
              {fieldName: 'trangThaiPTC', headerText: 'Trạng thái thực hiện', textAlign: 'Left', width: 150},
              {fieldName: 'khachHang', headerText: 'Khách hàng', textAlign: 'Left', width: 150, disableHtmlEncode: false},
              {fieldName: 'ACTIONS', headerText: 'Thao tác', allowSorting: false,
               allowFiltering: false, textAlign: 'Center', template: actionColumn(this), width: 100}
            ]"
            :enabledSelectFirstRow="true"
          >
          </DataGrid>
        </div>
      </div>
    </div>
  </div>
</div>
