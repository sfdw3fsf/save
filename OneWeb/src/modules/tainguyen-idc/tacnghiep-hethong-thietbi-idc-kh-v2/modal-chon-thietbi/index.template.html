<ejs-dialog
  :enableResize="true"
  :allowDragging="false"
  :visible="false"
  ref="ModalChonThietBi"
  :animationSettings="animationSettings"
  :showHeader="false"
  :showCloseIcon="false"
  :isModal="true"
  width="80%"
  height="auto"
  :target="target"
  :position="dialogPosition"
>
  <div class="popup-box">
    <div class="popup-header">
      <div class="title">
        <span class="icon one-notepad"></span>
        Chọn thiết bị tác nghiệp
      </div>
      <div class="close -ap icon-close" data-dismiss="modal" @click="closeModal"></div>
    </div>
    <div class="list-actions-top">
      <ul class="list">
        <li>
          <b-link href="javascript:void(0)" @click="onChonThietBiKH"> <span class="icon one-save"></span>Chọn </b-link>
        </li>
        <li>
          <b-link href="javascript:void(0)" @click="closeModal">
            <span class="icon ui-1_circle-remove nc-icon-glyph"></span>Đóng
          </b-link>
        </li>
      </ul>
    </div>
    <div class="modal-content p-2">
      <div class="box-form">
        <div class="legend-title">Thông tin hệ thống</div>
        <div class="row">
          <div class="col-sm-4 col-12">
            <div class="info-row">
              <div class="key w160">Hệ thống </div>
              <div class="value">
                <SelectExt
                  v-model="searchForm.heThongThietBiId"
                  dataTextField="TEN"
                  dataValueField="HETHONGTBI_ID"
                  :dataSource="heThongThietBiList"
                  :disabled="true"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-4 col-12" v-if="isKhachHang">
            <div class="info-row">
              <div class="key w160">Khách hàng</div>
              <div class="value">
                <input type="text" class="form-control" v-model="searchForm.khachHang" disabled />
              </div>
            </div>
          </div>
          <div class="col-sm-4 col-12" v-if="isKhachHang">
            <div class="info-row">
              <div class="key w160">Mã thuê bao</div>
              <div class="value">
                <input type="text" class="form-control" v-model="searchForm.maThueBao" disabled />
              </div>
            </div>
          </div>
        </div>
      </div>
      <DataGrid
        ref="grdItems"
        :allowPaging="true"
        :enablePagingServer="false"
        :showColumnCheckbox="false"
        :dataSource="dsThietBiKhachHang"
        v-bind:columns="[
                                {fieldName: 'ID', headerText: 'ID Hệ thống', textAlign: 'Left', width: 120},
                                {fieldName: 'TEN', headerText: 'Tên hệ thống', textAlign: 'Left', width: 250},
                                {fieldName: 'SERIAL_NUMBER', headerText: 'Serial', textAlign: 'Left'},
                                {fieldName: 'CS_DINHDANH', headerText: 'Công suất tke', textAlign: 'Left'},
                                {fieldName: 'TOA_NHA', headerText: 'Tòa nhà', textAlign: 'Left', width: 120},
                                {fieldName: 'MATSAN', headerText: 'Mật sàn', textAlign: 'Left', width: 120},
                                {fieldName: 'PHONG', headerText: 'Phòng/Zone', textAlign: 'Left'},
                                {fieldName: 'RACK', headerText: 'Rack', textAlign: 'Left', width: 120},
                                {fieldName: 'U', headerText: 'U', textAlign: 'Center', width: 120},
                                {fieldName: 'KHACH_HANG_TEN', headerText: 'Khách hàng', textAlign: 'Left', width: 180},
                                {fieldName: 'MA_THUE_BAO', headerText: 'Mã thuê bao', textAlign: 'Left', width: 150},
                                {fieldName: 'TRANG_THAI_VAN_HANH', headerText: 'Trạng thái vận hành', textAlign: 'Left', width: 150},
                                ]"
        :enabledSelectFirstRow="true"
        @selectedRowChanged="onSelectedRowChanged"
      >
      </DataGrid>
    </div>
  </div>
</ejs-dialog>
