<div>
  <!-- First DataGrid -->
  <div class="row datagrid-section">
    <div class="col-12">
      <div class="box-form">
        <div class="row">
          <div class="legend-title row align-items-center">
            <div class="col-10">
              Danh sách băng thông cần cấp phát cho khách hàng
            </div>
            <div class="col-2 text-end" v-if="trangThaiPhieu == 22">
              <button
                class="btn btn-outline-primary w40 p_10"
                @click="onNew"
              >
                <strong><span>+</span></strong>
              </button>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-12">
            <DataGrid ref="grd1" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="false"
              v-bind:columns="dataGrid1Columns" v-bind:dataSource="dsBangthongCapPhat" @rowSelected="grd1_RowSelected"
              :enabledSelectFirstRow="false">
            </DataGrid>
          </div>
        </div>
      </div>
    </div>
    <div class="col-12" v-if="trangThaiPhieu == 22">
      <div class="box-form">
        <div class="row">
        <div class="legend-title">Kết quả Danh sách băng thông đã cấp phát cho khách hàng </div>
        </div>
        <div class="row">
        <div class="col-12">
            <DataGrid ref="grd2" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="false"
            v-bind:columns="dataGrid2Columns" v-bind:dataSource="dsKetquaBangthongCapPhat"
            :enabledSelectFirstRow="false">
            </DataGrid>
        </div>
        </div>
    </div>
    </div>
  </div>
  <ModalThongtinBangthongMang 
    modalID="ModalThongtinBangthongMang" 
    ref="ModalThongtinBangthongMang"
    @saved="saveTempCapPhatList">
  </ModalThongtinBangthongMang>
</div>
