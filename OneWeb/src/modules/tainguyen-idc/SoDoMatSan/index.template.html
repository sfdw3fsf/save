<div class="so-do-mat-san p-4">
  <!-- HEADER WITH SEARCH, TITLE AND ADD BUTTON -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div class="position-relative" style="flex: 1; max-width: 450px;">
      <i
        class="fa fa-search position-absolute"
        style="left: 12px; top: 50%; transform: translateY(-50%); color: #999; z-index: 10;"
      ></i>
      <input
        type="text"
        class="form-control"
        style="padding-left: 35px; height: 38px;"
        placeholder="Tìm kiếm mặt sàn..."
        v-model="searchKeyword"
      />
    </div>
    <button class="btn btn-outline-primary btn-add-matsan ml-3" @click="onAddMatSan">
      <i class="fa fa-plus"></i> Thêm mặt sàn
    </button>
  </div>

  <!-- GRID OF MAT SAN CARDS -->
  <div class="row shadow-sm p-4 bg-white rounded">
    <div class="col-lg-4 col-md-6 mb-4" v-for="matSan in filteredMatSan" :key="matSan.id">
      <div class="card mat-san-card shadow-sm" @click="onViewDetail(matSan)">
        <!-- COLORED HEADER WITH ZONE LAYOUT -->
        <div class="card-header-visual">
          <div class="zone-layout">
            <!-- <div class="zone-boxes">
              <div class="zone-box" v-for="i in Math.min(matSan.soZone || 6, 6)" :key="i"></div>
            </div> -->
            <!-- Image preview -->
            <img
              :src="matSan.imageUrl || matSan.hinhAnh || 'https://t4.ftcdn.net/jpg/05/97/47/95/360_F_597479556_7bbQ7t4Z8k3xbAloHFHVdZIizWK1PdOo.jpg'"
              :alt="matSan.matSanName"
              class="zone-preview-img"
            />
          </div>
        </div>

        <!-- CARD BODY WITH INFO -->
        <div class="card-body">
          <h5 class="card-title pb-3">{{ matSan.matSanName }}</h5>
          <p class="card-subtitle text-muted mb-2">
            {{ matSan.toaNhaName }} • {{ matSan.dienTich }}<span v-if="matSan.dienTich">m²</span>
          </p>

          <hr class="my-2" />

          <div class="d-flex justify-content-between align-items-center">
            <div class="zone-count">
              <small class="text-muted">{{ matSan.soPhong }} zone</small>
            </div>
            <div class="usage-badge">
              {{ matSan.tiLeSuDung }}% sử dụng
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- EMPTY STATE -->
    <div class="col-12" v-if="!filteredMatSan || filteredMatSan.length === 0">
      <div class="card">
        <div class="card-body text-center py-5">
          <i class="fa fa-inbox fa-3x text-muted mb-2"></i>
          <p class="text-muted mb-0">{{ searchKeyword ? 'Không tìm thấy mặt sàn phù hợp' : 'Chưa có mặt sàn nào' }}</p>
        </div>
      </div>
    </div>
  </div>
</div>
