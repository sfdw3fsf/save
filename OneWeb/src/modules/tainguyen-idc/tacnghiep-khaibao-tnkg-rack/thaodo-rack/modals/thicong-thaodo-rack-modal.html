              </div>
            </div>

                <div class="info-row">
                  <div class="key w160">Lý do tháo dỡ<span class="red">*</span></div>
                  <div class="value">
                    <input type="text" class="form-control"  v-model="dataThicongRack.NOIDUNG" />

              <div class="col-sm-6 col-12">

                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
