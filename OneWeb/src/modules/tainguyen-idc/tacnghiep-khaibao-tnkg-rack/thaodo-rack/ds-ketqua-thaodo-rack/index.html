<div id="ketqua-thuhoi-rack">
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="onSearch">
          <span class="icon one-search"></span>Tìm kiếm
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="dsThaoDoRack" class="text-primary">
          <span class="fa icon one-file-plus"></span> Danh sách nhiệm vụ tháo dỡ Rack
        </b-link>
      </li>
    </ul>
  </div>

  <div class="page-content">
    <!-- Search conditions -->
    <div class="box-form">
      <div class="row">
        <div class="legend-title d-flex justify-content-between align-items-center">
          Điều kiện tìm kiếm
        </div>
      </div>

      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w120">Loại công việc:</div>
            <div class="value">
              <input
                type="text"
                v-model="searchConditions.tenCv"
                class="form-control"
                :readonly="true"
              />
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-12">
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row ">
                <div class="key w120">Ngày yêu cầu:</div>
                <div class="value">
                  <ejs-datepicker
                    v-model="searchConditions.ngayYcStart"
                    name="ngayYcStart"
                    placeholder="dd/mm/yyyy"
                    :maxDate="searchConditions.ngayYcEnd"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row ">
                <div class="key w120">Đến ngày</div>
                <div class="value ">
                  <ejs-datepicker
                    v-model="searchConditions.ngayYcEnd"
                    name="ngayYcStart"
                    placeholder="dd/mm/yyyy"
                    :minDate="searchConditions.ngayYcStart"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w120">Phân loại:</div>
                <div class="value">
                  <SelectExt
                    v-model="searchConditions.phanLoai"
                    placeholder="-- Chọn phân loại --"
                    dataTextField="text"
                    dataValueField="value"
                    :dataSource="phanLoaiList"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w120">Trạng thái TH:</div>
                <div class="value">
                  <SelectExt
                    v-model="searchConditions.trangthaiId"
                    placeholder="-- Chọn trạng thái --"
                    dataTextField="text"
                    dataValueField="value"
                    :dataSource="trangThaiList"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-12">
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row ">
                <div class="key w120">Ngày hoàn thành:</div>
                <div class="value">
                  <ejs-datepicker
                    v-model="searchConditions.ngayYchtStart"
                    name="ngayYchtStart"
                    placeholder="dd/mm/yyyy"
                    :maxDate="searchConditions.ngayYchtEnd"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row ">
                <div class="key w120">Đến ngày</div>
                <div class="value ">
                  <ejs-datepicker
                    v-model="searchConditions.ngayYchtEnd"
                    name="ngayYchtEnd"
                    placeholder="dd/mm/yyyy"
                    :minDate="searchConditions.ngayYchtStart"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w120">IDC:</div>
                <div class="value">
                  <SelectExt
                    v-model="searchConditions.idcId"
                    placeholder="-- Chọn IDC --"
                    dataTextField="text"
                    dataValueField="value"
                    :dataSource="idcByNhanVienList"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w120">Nhân viên TH:</div>
                <div class="value">
                  <SelectExt
                    v-model="searchConditions.nhanvienThId"
                    placeholder="-- Chọn nhân viên --"
                    dataTextField="text"
                    dataValueField="value"
                    :dataSource="nhanVienList"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-12">
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w120">Tên Rack:</div>
                <div class="value">
                  <input
                    type="text"
                    class="form-control"
                    v-model="searchConditions.tenRack"
                    placeholder="Nhập tên Rack..."
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w120">Loại Rack:</div>
                <div class="value">
                  <input
                    type="text"
                    class="form-control"
                    v-model="searchConditions.loaiRack"
                    placeholder="Nhập loại Rack..."
                  />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w120">Khách hàng:</div>
            <div class="value">
              <input
                type="text"
                class="form-control"
                v-model="searchConditions.khachHang"
                placeholder="Mã thuê bao, mã giao dịch, số hợp dồng, tên khách hàng"
              />
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w120">Công việc:</div>
            <div class="value">
              <input
                type="text"
                class="form-control"
                v-model="searchConditions.congViec"
                placeholder="Mã công việc, tên công việc"
              />
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="box-form">
      <div class="row">
        <div class="legend-title d-flex justify-content-between align-items-center">
          Kết quả thu hồi Rack ({{ danhSachKetQua.length }})
        </div>
      </div>

      <div class="row">
        <div class="col-12">
          <DataGrid
            ref="grdKetQua"
            :allowPaging="true"
            :enablePagingServer="false"
            :showColumnCheckbox="false"
            :dataSource="danhSachKetQua"
            v-bind:columns="[
              {fieldName: 'MA_CV', headerText: 'Mã công việc', textAlign: 'Left', width: 120},
              {fieldName: 'TEN_CV', headerText: 'Hạng mục triển khai', textAlign: 'Left', width: 150},
              {fieldName: 'TEN_IDC', headerText: 'IDC', textAlign: 'Left'},
              {fieldName: 'NHANVIEN_THUCHIEN', headerText: 'Nhân viên thực hiện', textAlign: 'Left', width: 150},
              {fieldName: 'PHOIHOP_THUCHIEN', headerText: 'Phối hợp thực hiện', textAlign: 'Left', width: 150},
              {fieldName: 'NGAY_TAO', headerText: 'Thời hạn thực hiện', textAlign: 'Left', width: 150},
              {fieldName: 'ID_RACK', headerText: 'Rack ID', textAlign: 'Left', width: 100},
              {fieldName: 'TEN_RACK', headerText: 'Tên Rack', textAlign: 'Left', width: 120},
              {fieldName: 'LOAI_RACK', headerText: 'Loại Rack', textAlign: 'Left'},
              {fieldName: 'NGAY_HT', headerText: 'Ngày Yêu cầu', textAlign: 'Left', width: 150},
              {fieldName: 'NGAY_YCHT', headerText: 'Ngày YC hoàn thành', textAlign: 'Left', width: 150},
              {fieldName: 'TRANGTHAI', headerText: 'Trạng thái', textAlign: 'Left', width: 150},
              {fieldName: 'TT_KHACHHANG', headerText: 'Khách hàng', textAlign: 'Left', disableHtmlEncode: false},
              {fieldName: 'ACTIONS', headerText: 'Thao tác', allowSorting: false,
              allowFiltering: false, textAlign: 'Center', template: actionColumn(this), width: 100}
            ]"
            :enabledSelectFirstRow="true"
          >
          </DataGrid>
        </div>
      </div>
    </div>
  </div>
</div>
