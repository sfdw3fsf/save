<ejs-dialog
  :enableResize="true"
  :allowDragging="false"
  :visible="false"
  ref="ModalThayDoiThanhNguon"
  :animationSettings="animationSettings"
  :showHeader="false"
  :showCloseIcon="false"
  :isModal="true"
  width="60%"
  height="'auto'"
  :target="target"
  :zIndex="1100"
  :position="{ X: 'center', Y: 'center' }"
  :overlayClick="onOverlayClick"
>
  <div class="modal-content popup-box">
    <div class="popup-header">
    <div class="title" style="font-weight: 600;">Thông tin chi tiết Thanh nguồn</div>
      <div class="close -ap icon-close" @click="closeDialog"></div>
    </div>
    <div class="list-actions-top">
      <ul class="list">
        <li>
          <b-link href="javascript:void(0)" @click="btnGhiLai_Click" :disabled="!buttons.btnGhiLai.enabled">
            <span class="icon one-save"></span> Ghi lại
          </b-link>
        </li>
        <li>
          <b-link href="javascript:void(0)" @click="btnHuy_Click" :disabled="!buttons.btnHuy.enabled">
            <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Hủy bỏ
          </b-link>
        </li>
        <li>
          <b-link href="javascript:void(0)" @click="btnSua_Click" :disabled="!buttons.btnSua.enabled">
            <span class="icon one-print"></span>Sửa
          </b-link>
        </li>
      </ul>
    </div>

    <div class="popup-body">
      <div class="row">
        <div class="col-12">
          <div class="box-form">
            <div class="row">
              <div class="legend-title">Thông tin thanh nguồn trên rack
              </div>
            </div>
            <div class="row">
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w150">ID Thanh nguồn <span class="red">*</span></div>
                  <div class="value">
                    <input type="text" class="form-control" v-model="thanhNguonId" :disabled=true />
                  </div>
                </div>
              </div>
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w150">Hiệu lực</div>
                  <div class="value padt4">
                    <div class="check-action">
                      <input type="checkbox" class="check"
                            v-model.trim="currentItem.SUDUNG"
                            :disabled="true" />
                      <span class="name"></span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w150">Loại thanh nguồn <span class="red">*</span></div>
                  <div class="value">
                    <input type="text" class="form-control" v-model="currentItem.TEN_LOAITN" :disabled="true"/>
                    <!-- <SelectExt
                      dataTextField="VALUE" dataValueField="ID"
                      :dataSource="loaiThanhNguonList"
                      v-model="currentItem.TEN_LOAITN"
                      :disabled="!isEditMode"
                    /> -->
                  </div>
                </div>
              </div>
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w150">Kiểu lắp đặt trên Rack <span class="red">*</span></div>
                  <div class="value">
                    <SelectExt
                      dataTextField="KIEU_LAPDAT" dataValueField="KIEU_LD"
                      :dataSource="kieuLapDatList"
                      v-model="currentItem.KIEU_LD"
                      :disabled="true"
                    />
                  </div>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w150">Tên thanh nguồn <span class="red">*</span></div>
                  <div class="value">
                    <input type="text" class="form-control"
                          v-model="currentItem.TEN_TN"
                          :disabled="true" maxlength="100"/>
                  </div>
                </div>
              </div>
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w150">Trạng thái <span class="red">*</span></div>
                  <div class="value">
                    <!-- <input type="text" class="form-control" v-model="currentItem.TRANGTHAI_ID" :disabled="true"/> -->
                    <SelectExt
                      dataTextField="TRANGTHAI_SUDUNG" dataValueField="TRANGTHAI_ID"
                      :dataSource="trangThaiList"
                      v-model="currentItem.TRANGTHAI_ID"
                      :disabled="!isEditMode"
                    />
                  </div>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w150">Rack <span class="red">*</span></div>
                  <div class="value">
                    <input type="text" class="form-control" v-model="currentItem.TEN_RACK" :disabled="true"/>
                    <!-- <SelectExt
                      dataTextField="TEN_RACK" dataValueField="RACK_ID"
                      :dataSource="rackList"
                      v-model="currentItem.RACK_ID"
                      :disabled="!isEditMode"
                    /> -->
                  </div>
                </div>
              </div>
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w150">Ghi chú</div>
                  <div class="value">
                    <input type="text" class="form-control" v-model="currentItem.GHICHU" :disabled="!isEditMode" maxlength="200"/>
                  </div>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-sm-6 col-12">
                <div class="info-row" >
                  <!-- v-if="!isEditMode" -->
                  <div class="key w150">Vị trí U<span class="red">*</span></div>
                  <div class="value">
                    <input type="text" class="form-control" v-model="currentItem.VITRI_LD" :disabled="true"/>
                  </div>
                </div>
                <!-- <div class="info-row" v-show="isEditMode">
                  <div class="key w150">Vị trí U<span class="red">*</span></div>
                  <div class="value">
                    <SelectExt
                      dataTextField="VITRI" dataValueField="VITRI"
                      :dataSource="viTriUnitList"
                      v-model="vitriLapDatNew"
                      :disabled="!isEditMode"
                    />
                  </div>
                </div> -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ejs-dialog>
