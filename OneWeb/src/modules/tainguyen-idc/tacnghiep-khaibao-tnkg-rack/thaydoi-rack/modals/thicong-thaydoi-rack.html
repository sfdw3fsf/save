          </b-link>
        </li>
        <li>
          <b-link href="javascript:void(0)" @click="btnHuy_Click" :disabled="!buttons.btnHuy.enabled">
            <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Hủy bỏ
          </b-link>
        </li>
        <li>
          <b-link href="javascript:void(0)" @click="btnSua_Click" :disabled="!buttons.btnSua.enabled">
            <span class="icon one-print"></span>Sửa
          </b-link>
        </li>
      </ul>

      <div class="row">
        <div class="col-12">
          <div class="box-form">
            <div class="row">
              <div class="legend-title">Thông tin Lắp đặt Rack
              </div>
            </div>
            <div class="row">
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">IDC<span class="red">*</span></div>
                  <div class="value">
                    <!-- <input type="text" class="form-control" :disabled="!isEditMode" v-model="dataRack.TEN_IDC" /> -->
                    <SelectExt v-model.trim="dataRack.IDC_ID" @change="onChangeIDC()" dataTextField="TEN" dataValueField="ID"
                      :dataSource="idcSelectList" :disabled="!isEditMode" />
                  </div>
                </div>
              </div>
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">Tòa nhà<span class="red">*</span></div>
                  <div class="value">
                    <!-- <input type="text" class="form-control" :disabled="!isEditMode" v-model="dataRack.TEN_IDC" /> -->
                    <SelectExt v-model.trim="dataRack.TOANHA_ID" @change="onChangeToanha()" dataTextField="TEN" dataValueField="ID"
                      :dataSource="toanhaSelectList" :disabled="!isEditMode" />
                  </div>
                </div>
              </div>

            </div>
            <div class="row">
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">Mặt sàn<span class="red">*</span></div>
                  <div class="value">
                    <!-- <input type="text" class="form-control" :disabled="!isEditMode" v-model="dataRack.TEN_MATSAN" /> -->
                    <SelectExt v-model.trim="dataRack.MATSAN_ID" @change="onChangeMatSan()" dataTextField="TEN" dataValueField="ID"
                      :dataSource="matSanSelectList" :disabled="!isEditMode"  />
                  </div>
                </div>
              </div>
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">Phòng/Zone<span class="red">*</span></div>
                  <div class="value">
                    <!-- <input type="text" class="form-control" :disabled="!isEditMode" v-model="dataRack.TEN_PHONG" /> -->
                    <SelectExt v-model.trim="dataRack.PHONG_ID"  dataTextField="TEN" dataValueField="ID"
                      :dataSource="phongSelectList" :disabled="!isEditMode" />
                  </div>
                </div>
              </div>

            </div>
            <div class="row">
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">Vị trí Rack<span class="red">*</span></div>
                  <div class="value">
                    <input type="text" class="form-control"  v-model.trim="dataRack.VITRI_RACK" :disabled="!isEditMode"/>
                  </div>
                </div>
              </div>
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w160">Lý do thay đổi<span class="red">*</span></div>
                  <div class="value">
                    <input type="text" class="form-control"  v-model.trim="dataThicongRack.NOIDUNG" :disabled="!isEditMode"/>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

      <div class="row">

              <div class="legend-title">Thông tin Thanh nguồn trên Rack

            </div>
            <DataGrid
                      v-bind:columns="[
                                      {fieldName: 'THANHNGUON_ID', headerText: 'ID Thanh nguồn', textAlign: 'Center', width: 80},
                                      {fieldName: 'TEN_LOAITN', headerText: 'Loại thanh nguồn', textAlign: 'Left'},
                                      {fieldName: 'TEN_TN', headerText: 'Tên thanh nguồn', textAlign: 'Left'},
                                      {fieldName: 'RACK_ID', headerText: 'ID Rack', textAlign: 'Right', width: 80},
                                      {fieldName: 'VITRI_LD', headerText: 'Vị trí lắp đặt', width: 100, textAlign: 'Right'},
                                      {fieldName: 'KIEU_LAPDAT', headerText: 'Kiểu lắp đặt', width: 120, textAlign: 'Left'},
                                      {fieldName: 'TRANGTHAI_SUDUNG', headerText: 'Trạng thái sử dụng', width: 100, textAlign: 'Left'}
                                      ]"
              v-bind:dataSource="thanhNguonItemList"
              :showFilter="true"
              :allowPaging="true"
              @recordDoubleClick="onThanhNguonRowDoubleClick"
              :enablePagingServer="false"
            ></DataGrid>
          </div>
        </div>
      </div>
    </div>
    <ThanhNguonModal ref="popupThanhNguon" @thanhNguonAllocated="onThanhNguonAllocated"/>
