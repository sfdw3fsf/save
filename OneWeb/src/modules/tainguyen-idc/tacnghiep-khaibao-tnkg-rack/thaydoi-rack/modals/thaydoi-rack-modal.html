<ejs-dialog
  :enableResize="true"
  :allowDragging="false"
  :visible="false"
  ref="dialogThayDoiRack"
  :animationSettings="animationSettings"
  :showHeader="false"
  :showCloseIcon="false"
  width="70%"
  height="auto"
  :isModal="true"
  :target="target"
  :zIndex="1050"
  :position="{ X: 'center', Y: 'center' }"
  :overlayClick="onOverlayClick"
>
    <div class="modal-content popup-box">
        <div class="popup-header">
            <div class="title" style="font-weight: 600;">Thay đổi Rack</div>
            <div class="close -ap icon-close" @click="closeDialog"></div>
        </div>
        <div class="list-actions-top">
            <ul class="list">
                <li>
                    <b-link href="javascript:void(0)" @click="onThayDoiRack()">
                        <span class="icon  nc-icon-glyph ui-1_check-circle-08"></span>Chọn
                    </b-link>
                </li>
                <li>
                    <b-link href="javascript:void(0)" @click="closeDialog">
                        <span class="icon ui-1_circle-remove nc-icon-glyph"></span>Hủy
                    </b-link>
                </li>
            </ul>
        </div>
    </div>
    <div class="popup-body">
      <div class="row">
        <div class="box-form" style="margin-top: 10px;">
          <div class="row">
            <div class="legend-title">Danh sách Rack sẵn sàng thay đổi</div>
          </div>
          <div class="row">
            <div class="col-12">
              <DataGrid
                :enablePagingServer="false"
                v-bind:columns="[
                                  {fieldName: 'RACK_ID', headerText: 'ID', width: 80, textAlign: 'Center'},
                                  {fieldName: 'TEN_RACK', headerText: 'Tên Rack', textAlign: 'Left'},
                                  {fieldName: 'TEN_LOAIRACK', headerText: 'Loại Rack', textAlign: 'Left'},
                                  {fieldName: 'TEN_HANGSX', headerText: 'Hãng sản xuất', width: 130, textAlign: 'Left'},
                                  {fieldName: 'TRANGTHAI_VH', headerText: 'Trạng thái vận hành', textAlign: 'Left'},
                                  {fieldName: 'TEN_QUYHOACH', headerText: 'Trạng thái theo quy hoạch', textAlign: 'Left'},
                                  {fieldName: 'TEN_CCDV', headerText: 'Trạng thái rack CCDV', textAlign: 'Left'},
                                  {fieldName: 'TEN_IDC', headerText: 'IDC', textAlign: 'Left'},
                                  {fieldName: 'TEN_TOANHA', headerText: 'Tòa nhà', textAlign: 'Left'},
                                  {fieldName: 'TEN_MATSAN', headerText: 'Mặt sàn', textAlign: 'Left'},
                                  {fieldName: 'TEN_PHONG', headerText: 'Phòng/Zone', textAlign: 'Left'},
                                  {fieldName: 'VITRI_RACK', headerText: 'Vị trí Rack', width: 100, textAlign: 'Left'},
                                  {fieldName: 'SOHUU_RACK', headerText: 'Sở hữu', width: 100, textAlign: 'Left'}
                                ]"
                :commands="[
                            {name: 'THANHNGUON', cssClass: 'btn-primary -ap icon one-file-plus', title: 'Thanh nguồn', width: 80}
                          ]"
                :commandColumn="{headerText: 'Thanh nguồn', width: 120, firstColumn: false, show: true}"
                v-bind:dataSource="rackDataSource"
                :allowPaging="true"
                @recordDoubleClick="onRackRowDoubleClick"
                @commandClicked="grid_onCommandClicked"
                @rowSelected="grd1_RowSelected"
                ref="rackListItems"
              >
              </DataGrid>
            </div>
          </div>
        </div>
      </div>
    </div>
    <ThongTinRackModal ref="popupChiTietRack" :phieuThiCongId="phieuThiCongId" />
    <DanhSachThanhNguon ref="popupDanhSachThanhNguon" />
  </div>
</ejs-dialog>
