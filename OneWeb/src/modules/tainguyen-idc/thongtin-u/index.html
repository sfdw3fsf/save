<div>
    <div class="list-actions-top">
        <ul class="list">
            <li>
                <b-link href="javascript:void(0)" @click="onSave" :disabled="!buttons.btnSave.enabled">
                    <span class="icon one-save"></span>Ghi lại
                </b-link>
            </li>
            <li>
                <b-link href="javascript:void(0)" @click="onEdit" :disabled="!buttons.btnEdit.enabled">
                    <span class="icon nc-icon-glyph ui-1_edit-72"></span>Sửa
                </b-link>
            </li>
        </ul>
    </div>
    <div class="page-content">
        <div class="row">
            <!-- Thông tin chung  -->
            <div class="col-12">
                <div class="box-form">
                    <div class="row">
                        <div class="legend-title">Thông tin U</div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w150">ID U<span class="red">*</span></div>
                                <div class="value">
                                    <input type="text" class="form-control" :disabled="true"
                                        v-model="currentItem.rackunit_id" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-3 col-12">
                            <div class="info-row">
                                <div class="key w150"></div>
                                <div class="value padt4">
                                    <div class="check-action">
                                       
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-3 col-12">
                            <div class="info-row">
                                <div class="value">

                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w150">ID Rack<span class="red">*</span></div>
                                <div class="value">
                                    <input type="text" class="form-control" :disabled="true"
                                        v-model="currentItem.rack_id" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w150">Mặt sàn<span class="red">*</span></div>
                                <div class="value">
                                    <input type="text" class="form-control" :disabled="true"
                                        v-model="currentItem.mat_san" />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w150">Tên Rack<span class="red">*</span></div>
                                <div class="value">
                                    <input type="text" class="form-control" :disabled="true"
                                        v-model="currentItem.ten_rack" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w150">Phòng/Zone<span class="red">*</span></div>
                                <div class="value">
                                    <input type="text" class="form-control" :disabled="true"
                                        v-model="currentItem.phong_zone" />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w150">Loại Rack<span class="red">*</span></div>
                                <div class="value">
                                    <input type="text" class="form-control" :disabled="true"
                                        v-model="currentItem.loai_rack" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w150">Vị trí U<span class="red">*</span></div>
                                <div class="value">
                                    <input type="text" class="form-control" :disabled="true"
                                        v-model="currentItem.vitri" />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w150">Ghi chú</div>
                                <div class="value">
                                    <input type="text" class="form-control" :disabled="true"
                                        v-model="currentItem.ghi_chu" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w150">Trạng thái U</div>
                                <div class="value">
                                    <ejs-dropdownlist class="form-control" v-model="currentItem.trangthai_id"
                                    :dataSource="dsTrangThai" :fields="{value:'ID', text: 'TEN'}"
                                    :allowFiltering="true" :enabled="controls.selectedTrangThaiU.enabled">
                                </ejs-dropdownlist>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Danh sách U -->
            <div class="col-12">
                <div class="row">
                    <div class="col-12">
                        <div class="box-form">
                            <div class="row">
                                <div class="legend-title">Danh sách U
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-12">
                                    <DataGrid ref="grdItems" :allowPaging="true" :enablePagingServer="false"
                                        :showColumnCheckbox="true" :columns="colsThongTinU" v-bind:dataSource="dsThongTinU"
                                        @rowSelected="grdItems_RowSelected" @rowDeselected="grdItems_RowDeselected" 
                                        style = 'background-color: transparent; color: blue; border: none;'
                                        :commands="[{
                                            name: 'DETAIL', 
                                            cssClass: 'fa fa-file-text-o custom-btn',
                                            text: '', width: 120,
                                            title: 'Thông tin thiết bị'
                                        }]"
                                        @commandClick="onNew"
                                        :commandColumn="{headerText: 'Thao tác', textAlign: 'Left', show: true, width: 120}"
                                        @queryCellInfo="onQueryCellInfo">
                                    </DataGrid>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <ModalThongtinThietBi 
        modalID="ModalThongtinThietBi" 
        ref="ModalThongtinThietBi">
    </ModalThongtinThietBi>
</div>
