<b-modal
  ref="ModalThongtinThietBi"
  :id="modalID"
  size="xl"
  hide-footer
  @hidden="closeModal"
>
  <template #modal-header>
      <h5 class="modal-title">
        <strong>THÔNG TIN THIẾT BỊ</strong>
      </h5>
      <button type="button" class="close" @click="closeModal">
        <span aria-hidden="true">&times;</span>
      </button>
    </template>

  <div class="popup-box">
    <div class="modal-content p-2">
      <!-- THÔNG TIN THIẾT BỊ -->
      <div class="box-form">

        <div class="row">
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w140">ID Thiết bị</div>
              <div class="value">
                <input
                  type="text"
                  class="form-control"
                  :class="controls.txtTenThietBi.invalid ? 'is-invalid' : ''"
                  :disabled=true
                  v-model="currentItem.ID"
                />
              </div>
            </div>
          </div>
        </div>          

        <div class="row">
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w140">Tên thiết bị</div>
              <div class="value">
                <input
                  type="text"
                  class="form-control"
                  :class="controls.txtDongSanPham.invalid ? 'is-invalid' : ''"
                  :disabled=true
                  v-model="currentItem.TEN"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w140">Serial</div>
              <div class="value">
                <input
                  type="text"
                  class="form-control"
                  :class="controls.txtDongSanPham.invalid ? 'is-invalid' : ''"
                  :disabled=true
                  v-model="currentItem.SERIAL_NUMBER"
                />
              </div>
            </div>
          </div>
         
        </div>

        <div class="row">
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w140">Công suất thực tế</div>
              <div class="value">
                <input
                  type="text"
                  class="form-control"
                  :class="controls.txtDongSanPham.invalid ? 'is-invalid' : ''"
                  :disabled=true
                  v-model="currentItem.CS_THUCTE"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w140">IDC</div>
              <div class="value">
                <input
                  type="text"
                  class="form-control"
                  :class="controls.txtDongSanPham.invalid ? 'is-invalid' : ''"
                  :disabled=true
                  v-model="currentItem.IDC"
                />
              </div>
            </div>
          </div> 
        </div>
        <div class="row">
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w140">Toà nhà</div>
              <div class="value" style="display: flex; align-items: center;">
                <input
                  type="text"
                  class="form-control"
                  :class="controls.txtCongSuatThietKe.invalid ? 'is-invalid' : ''"
                  :disabled=true
                  v-model="currentItem.TOANHA"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w140">Mặt sàn</div>
              <div class="value">
                <input
                  type="text"
                  class="form-control"
                  :class="controls.txtSoCongNguonDauVao.invalid ? 'is-invalid' : ''"
                  :disabled=true
                  v-model="currentItem.MATSAN"
                />
              </div>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w140">Phòng/Zone</div>
              <div class="value" style="display: flex; align-items: center;">
                <input
                  type="text"
                  class="form-control"
                  :class="controls.txtCongSuatThietKe.invalid ? 'is-invalid' : ''"
                  :disabled=true
                  v-model="currentItem.PHONG"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w140">Rack</div>
              <div class="value">
                <input
                  type="text"
                  class="form-control"
                  :class="controls.txtSoCongNguonDauVao.invalid ? 'is-invalid' : ''"
                  :disabled=true
                  v-model="currentItem.RACK"
                />
              </div>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w140">U</div>
              <div class="value" style="display: flex; align-items: center;">
                <input
                  type="text"
                  class="form-control"
                  :class="controls.txtCongSuatThietKe.invalid ? 'is-invalid' : ''"
                  :disabled=true
                  v-model="currentItem.U"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w140">Trạng thái vận hành</div>
              <div class="value">
                <input
                  type="text"
                  class="form-control"
                  :class="controls.txtSoCongNguonDauVao.invalid ? 'is-invalid' : ''"
                  :disabled=true
                  v-model="currentItem.TRANGTHAI_SD"
                />
              </div>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w140">Mã Tài sản</div>
              <div class="value" style="display: flex; align-items: center;">
                <input
                  type="text"
                  class="form-control"
                  :class="controls.txtCongSuatThietKe.invalid ? 'is-invalid' : ''"
                  :disabled=true
                  v-model="currentItem.MA_TS"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w140">Tên thuê bao</div>
              <div class="value">
                <input
                  type="text"
                  class="form-control"
                  :class="controls.txtSoCongNguonDauVao.invalid ? 'is-invalid' : ''"
                  :disabled=true
                  v-model="currentItem.HDTB_ID"
                />
              </div>
            </div>
          </div>
        </div>   
        <div class="row">
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w140">Mã thuê bao</div>
              <div class="value" style="display: flex; align-items: center;">
                <input
                  type="text"
                  class="form-control"
                  :class="controls.txtCongSuatThietKe.invalid ? 'is-invalid' : ''"
                  :disabled=true
                  v-model="currentItem.HDTB_ID"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</b-modal>
