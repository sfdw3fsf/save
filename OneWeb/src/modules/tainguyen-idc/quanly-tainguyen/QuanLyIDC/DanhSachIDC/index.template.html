<div class="idc-list-panel-wrapper">
  <div class="idc-list-body">
    <div v-for="(item, idx) in items" :key="item.ID || idx" class="idc-item" @click="handleIdcClick(item)">
      <div class="idc-avatar-skeleton" v-if="item._imgLoading"></div>
      <img
        v-else
        class="idc-avatar"
        :src="item.IMAGE_URL || ''"
        @error="onImgErr"
        alt="avatar"
      />
      <div class="idc-info">
        <div class="idc-name">{{ item.TEN || 'Chưa rõ tên' }}</div>
        <div class="idc-address" :title="item.DIA_CHI">{{ item.DIA_CHI || '—' }}</div>
      </div>
    </div>
  </div>
</div>
