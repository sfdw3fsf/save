        <b-link href="javascript:void(0)" @click="onSearch"> <span class="icon one-search"></span> Tìm kiếm </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onCreate"> <span class="icon one-file-plus"></span>Nhập mới </b-link>
      </li>

        <b-link href="javascript:void(0)" @click="btnXoa_Click"> <span class="icon one-trash"></span>Xóa </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnImport_Click">

    </ul>
  </div>

  <div class="page-content">
    <!-- ĐIỀU KIỆN TÌM KIẾM -->
    <div class="box-form">
      <div class="row">
        <div class="legend-title">Điều kiện tìm kiếm</div>
      </div>
      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w150">Tên lồng quây</div>
            <div class="value">
              <input
                type="text"
                class="form-control"
                v-model.trim="searchItem.keyWord"
                placeholder="Nhập tên lồng quây..."
              />
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w150">Trạng thái</div>
            <div class="value">
              <SelectExt
                v-model="searchItem.trangThaiId"
                :dataSource="listTrangThai"
                dataTextField="TEN"
                dataValueField="ID"
              />
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w150">Sở hữu</div>
            <div class="value">
              <SelectExt v-model="searchItem.soHuuId" :dataSource="listSoHuu" dataTextField="TEN" dataValueField="ID" />
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w150">Khóa</div>
            <div class="value">
              <SelectExt v-model="searchItem.khoaId" :dataSource="listKhoa" dataTextField="text" dataValueField="id" />
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- DANH SÁCH LỒNG QUÂY VÀ LỊCH SỬ THAY ĐỔI -->
    <div class="box-form">
      <div class="row">
        <div class="legend-title">Danh sách Lồng Quây</div>
      </div>
      <div class="row">
        <div class="col-12">
          <DataGrid
            :enablePagingServer="false"
            v-bind:columns="
                          [
                            {fieldName: 'LONGQUAY_ID', headerText: 'ID', width: 80, textAlign: 'Center'},
                            {fieldName: 'TEN', headerText: 'Tên lồng quây', textAlign: 'Left'},
                            {fieldName: 'KICH_THUOC', headerText: 'Kích thước (LxWxH)', width: 180, textAlign: 'Left'},
                            {fieldName: 'TEN_SOHUU', headerText: 'Sở hữu', width: 120, textAlign: 'Left'},
                            {fieldName: 'TEN_PHONG', headerText: 'Thuộc zone', textAlign: 'Left'},
                            {fieldName: 'SO_RACK', headerText: 'Số Rack', textAlign: 'Left', width: 100},
                            {fieldName: 'KHOA_LABEL', headerText: 'Khóa', width: 100, textAlign: 'Left'},
                            {fieldName: 'CAMERA_LABEL', headerText: 'Camera', width: 100, textAlign: 'Left'},
                            {fieldName: 'TRANGTHAI_VH_TEXT', headerText: 'Trạng thái VH', textAlign: 'Left'},
                            {fieldName: 'SUDUNG_TEXT', headerText: 'Hiệu lực', textAlign: 'Left',width: 120},
                            {fieldName: 'ACTIONS', headerText: 'Thao tác', allowSorting: false, allowFiltering: false, textAlign: 'Center', template: actionColumn(this), width: 100,  clipMode: 'None'}
                          ]"
            :dataSource="dsLongQuay"
            :allowPaging="true"
            ref="grdItems"
            :showColumnCheckbox="false"
            @rowSelected="grdItems_RowSelected"
          >
          </DataGrid>
        </div>
      </div>
    </div>
  </div>
  <ModalThongtinLongQuay ref="ModalThongTinLongQuay" :longquayId="currentItem.LONGQUAY_ID"></ModalThongtinLongQuay>
</div>
