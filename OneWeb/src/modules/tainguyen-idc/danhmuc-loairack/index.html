<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="btnNhapMoi_Click" :disabled="!buttons.btnNhapMoi.enabled">
          <span class="icon one-file-plus"></span>Nhập mới
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnGhiLai_Click" :disabled="!buttons.btnGhiLai.enabled">
          <span class="icon one-save"></span>Ghi lại
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnHuyBo_Click" :disabled="!buttons.btnHuyBo.enabled">
          <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnSua_Click" :disabled="!buttons.btnSua.enabled">
          <span class="icon nc-icon-glyph ui-1_edit-72"></span>Sửa
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnXoa_Click" :disabled="!buttons.btnXoa.enabled">
          <span class="icon one-trash"></span>Xóa
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnImportExcel_Click">
          <span class="icon one-download"></span>Import
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnXuatExcel_Click">
          <span class="icon one-upload"></span>Export
        </b-link>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Thông tin loại rack
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">ID Loại rack <span class="red">*</span></div>
                <div class="value">
                  <input type="text" class="form-control" v-model="currentItem.id" :disabled=true />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Hiệu lực</div>
                <div class="value padt4">
                  <div class="check-action">
                    <input type="checkbox" class="check" 
                           :checked="currentItem.suDung === 1" 
                           @change="currentItem.suDung = $event.target.checked ? 1 : 0"
                           :disabled="!controls.checkBoxSuDung.enabled" />
                    <span class="name"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Tên loại rack <span class="red">*</span></div>
                <div class="value">
                  <input type="text" class="form-control" 
                         :class="{ 'error-input': controls.txtTen.invalid && controls.txtTen.enabled  }"
                         v-model="currentItem.ten" 
                         :disabled="!controls.txtTen.enabled" maxlength="100"/>
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Số U trên rack <span class="red">*</span></div>
                <div class="value">
                  <input type="number" class="form-control" 
                         :class="{ 'error-input': controls.txtSoU.invalid && controls.txtSoU.enabled }" 
                         v-model="currentItem.soU" 
                         :disabled="!controls.txtSoU.enabled" />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Kích thước chiều dài <span class="red">*</span></div>
                <div class="value d-flex align-items-center">
                  <input type="number" class="form-control" 
                         :class="{ 'error-input': controls.txtDai.invalid && controls.txtDai.enabled   }" 
                         v-model="currentItem.dai" 
                         :disabled="!controls.txtDai.enabled" />
                  <input type="text" class="form-control input-unit" disabled value="cm"/>
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Kích thước chiều rộng <span class="red">*</span></div>
                <div class="value d-flex align-items-center">
                  <input type="number" class="form-control" 
                         :class="{ 'error-input': controls.txtRong.invalid && controls.txtRong.enabled  }" 
                         v-model="currentItem.rong" 
                         :disabled="!controls.txtRong.enabled" />
                  <input type="text" class="form-control input-unit" disabled value="cm"/>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Kích thước chiều cao <span class="red">*</span></div>
                <div class="value d-flex align-items-center">
                  <input type="number" class="form-control" 
                         :class="{ 'error-input': controls.txtCao.invalid && controls.txtCao.enabled }" 
                         v-model="currentItem.cao" 
                         :disabled="!controls.txtCao.enabled" />
                  <input type="text" class="form-control input-unit" disabled value="cm"/>
                </div>
              </div>
            </div>
                        <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Mã màu <span class="red">*</span></div>
                <div class="value d-flex align-items-center">
                  <input v-if="controls.txtMaMau.enabled || currentItem.maMau" 
                         type="color" class="form-control" 
                         style="width: 60px; height: 38px; padding: 2px; margin-right: 10px; cursor: pointer;"
                         v-model="currentItem.maMau" 
                         :disabled="!controls.txtMaMau.enabled" />
                  <input type="text" class="form-control" 
                         :class="{ 'error-input': controls.txtMaMau.invalid && controls.txtMaMau.enabled || (controls.txtMaMau.enabled && !currentItem.maMau) }"
                         v-model="currentItem.maMau" 
                         :disabled="!controls.txtMaMau.enabled" 
                         maxlength="50"
                         :placeholder="currentItem.maMau ? '#FF0000' : ''"
                         style="flex: 1;" />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Ghi chú</div>
                <div class="value">
                  <input type="text" class="form-control" v-model="currentItem.ghiChu" :disabled="!controls.txtGhiChu.enabled" maxlength="500"/>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Danh sách loại rack
            </div>
          </div>
          <div class="row">
            <div class="col-12">
              <DataGrid ref="gridItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true"
                v-bind:columns="[
                                {fieldName: 'ID', headerText: 'ID Loại Rack', textAlign: 'Left', width: 120},
                                {fieldName: 'TEN', headerText: 'Tên loại Rack', textAlign: 'Left'},
                                {fieldName: 'SO_U', headerText: 'Số U trên Rack', textAlign: 'Left', width: 120},
                                {fieldName: 'DAI', headerText: 'Kích thước chiều dài (cm)', textAlign: 'Left', width: 160},
                                {fieldName: 'RONG', headerText: 'Kích thước chiều rộng (cm)', textAlign: 'Left', width: 160},
                                {fieldName: 'CAO', headerText: 'Kích thước chiều cao (cm)', textAlign: 'Left', width: 160},
                                {fieldName: 'MA_MAU', headerText: 'Mã màu', textAlign: 'Left', width: 100},
                                {fieldName: 'TEN_SUDUNG', headerText: 'Hiệu lực', width: 100, textAlign: 'Left'},
                                ]" v-bind:dataSource="dataItems" @rowSelected="gridItems_RowSelected" @rowDeselected="
                gridItems_RowDeselected" @selectedItemsChanged="onSelectRowCheckbox"
                :allowExcelExport="true"></DataGrid>
              </DataGrid>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- ModalImportExcel -->
  <ModalImportExcel
    ref="modalImportExcel"
    :title="importConfig.title"
    :tableColumns="importConfig.tableColumns"
    :gridColumns="importConfig.gridColumns"
    :templateFileName="importConfig.templateFileName"
    :processExcelData="processLoaiRackExcelData"
    :formatCellValue="formatLoaiRackCellValue"
    :validationRules="importConfig.validationRules"
    :checkDataResult="importConfig.checkDataResult"
    @check-data="handleCheckData"
    :useHeaderMapping="true"
  />
</div>
