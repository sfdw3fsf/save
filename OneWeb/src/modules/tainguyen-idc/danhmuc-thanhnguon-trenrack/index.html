<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="btnNhapMoi_Click" :disabled="!buttons.btnNhapMoi.enabled">
          <span class="icon one-file-plus"></span>Nhập mới
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnGhiLai_Click" :disabled="!buttons.btnGhiLai.enabled">
          <span class="icon one-save"></span>Ghi lại
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnHuyBo_Click" :disabled="!buttons.btnHuyBo.enabled">
          <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnSua_Click" :disabled="!buttons.btnSua.enabled">
          <span class="icon nc-icon-glyph ui-1_edit-72"></span>Sửa
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnXoa_Click" :disabled="!buttons.btnXoa.enabled">
          <span class="icon one-trash"></span>Xóa
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnImportExcel_Click">
          <span class="icon one-download"></span>Import
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnXuatExcel_Click">
          <span class="icon one-upload"></span>Export
        </b-link>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Thông tin thanh nguồn trên rack
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">ID Thanh nguồn <span class="red">*</span></div>
                <div class="value">
                  <input type="text" class="form-control" v-model="currentItem.thanhNguonId" :disabled=true />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Hiệu lực</div>
                <div class="value padt4">
                  <div class="check-action">
                    <input type="checkbox" class="check" 
                           :checked="currentItem.suDung === 1" 
                           @change="currentItem.suDung = $event.target.checked ? 1 : 0"
                           :disabled="!controls.checkBoxSuDung.enabled" />
                    <span class="name"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Loại thanh nguồn <span class="red">*</span></div>
                <div class="value">
                  <SelectExt
                    :options="loaiThanhNguonOptionsComputed"
                    v-model="currentItem.loaiTnId"
                    :disabled="!controls.selectLoaiTn.enabled"
                    :class="{ 'error-input': controls.selectLoaiTn.invalid && controls.selectLoaiTn.enabled }"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Kiểu lắp đặt trên Rack <span class="red">*</span></div>
                <div class="value">
                  <SelectExt
                    :options="kieuLapDatOptionsComputed"
                    v-model="currentItem.kieuLd"
                    :disabled="!controls.selectKieuLd.enabled"
                    :class="{ 'error-input': controls.selectKieuLd.invalid && controls.selectKieuLd.enabled }"
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Tên thanh nguồn <span class="red">*</span></div>
                <div class="value">
                  <input type="text" class="form-control" 
                         :class="{ 'error-input': controls.txtTen.invalid && controls.txtTen.enabled }" 
                         v-model="currentItem.ten" 
                         :disabled="!controls.txtTen.enabled" maxlength="100"/>
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Trạng thái <span class="red">*</span></div>
                <div class="value">
                  <SelectExt
                    :options="trangThaiOptionsComputed"
                    v-model="currentItem.trangThaiId"
                    :disabled="!controls.selectTrangThai.enabled"
                    :class="{ 'error-input': controls.selectTrangThai.invalid && controls.selectTrangThai.enabled }"
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">ID Rack <span class="red">*</span></div>
                <div class="value">
                  <SelectExt
                    :options="rackOptionsComputed"
                    v-model="currentItem.rackId"
                    :disabled="!controls.selectRack.enabled"
                    :class="{ 'error-input': controls.selectRack.invalid && controls.selectRack.enabled }"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Ghi chú</div>
                <div class="value">
                  <input type="text" class="form-control" v-model="currentItem.ghiChu" :disabled="!controls.txtGhiChu.enabled" maxlength="200"/>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Vị trí U lắp thanh nguồn ngang <span class="red">*</span></div>
                <div class="value">
                  <SelectExt
                    :options="viTriUOptionsComputed"
                    v-model="currentItem.viTriLd"
                    :disabled="!controls.selectViTriLd.enabled"
                    :class="{ 'error-input': controls.selectViTriLd.invalid && controls.selectViTriLd.enabled }"
                  />
                </div>
              </div>
            </div>
            <!-- <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Mô tả</div>
                <div class="value">
                  <input type="text" class="form-control" v-model="currentItem.moTa" :disabled="!controls.txtMoTa.enabled" maxlength="500"/>
                </div>
              </div>
            </div> -->
          </div>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Danh sách thanh nguồn trên rack
            </div>
          </div>
          <div class="row">
            <div class="col-12">
              <DataGrid ref="gridItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true"
                v-bind:columns="[
                                {fieldName: 'THANHNGUON_ID', headerText: 'ID Thanh nguồn', textAlign: 'Left', width: 140},
                                {fieldName: 'TEN_LOAITN', headerText: 'Loại thanh nguồn', textAlign: 'Left', width: 160},
                                {fieldName: 'TEN', headerText: 'Tên thanh nguồn', textAlign: 'Left'},
                                {fieldName: 'RACK_ID', headerText: 'ID Rack', textAlign: 'Left', width: 160},
                                {fieldName: 'VITRI_LD', headerText: 'Vị trí U lắp thanh nguồn ngang', textAlign: 'Left', width: 230},
                                {fieldName: 'TEN_KIEU_LD', headerText: 'Kiểu lắp đặt trên Rack', textAlign: 'Left', width: 190},
                                {fieldName: 'TEN_TRANGTHAI', headerText: 'Trạng thái thanh nguồn', textAlign: 'Left', width: 190},
                                {fieldName: 'TEN_SUDUNG', headerText: 'Hiệu lực', width: 100, textAlign: 'Left'},
                                {fieldName: 'HOATDONG', headerText: 'Hoạt động', width: 160, allowSorting: false,
                                allowFiltering: false, template: getColumnHoatDongTemplate(), textAlign: 'Center'},
                                ]" v-bind:dataSource="dataItems" @rowSelected="gridItems_RowSelected" @rowDeselected="
                gridItems_RowDeselected" @selectedItemsChanged="onSelectRowCheckbox"
                :allowExcelExport="true"></DataGrid>
              </DataGrid>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- ModalImportExcel -->
  <ModalImportExcel
    ref="modalImportExcel"
    :title="importConfig.title"
    :tableColumns="importConfig.tableColumns"
    :gridColumns="importConfig.gridColumns"
    :templateFileName="importConfig.templateFileName"
    :processExcelData="processThanhNguonTrenRackExcelData"
    :formatCellValue="formatThanhNguonTrenRackCellValue"
    :validationRules="importConfig.validationRules"
    :checkDataResult="importConfig.checkDataResult"
    @check-data="handleCheckData"
    :useHeaderMapping="true"
  />
  
  <!-- ModalOCamInfo -->
  <ModalOCamInfo ref="modalOCamInfo" />
</div>
