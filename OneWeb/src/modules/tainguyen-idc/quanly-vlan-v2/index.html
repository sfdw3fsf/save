<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <a href="javascript:;" class="pointer" @click="onClickSearch">
          <span class="icon one-search"></span>Tìm kiếm
        </a>
      </li>
      <li>
        <a href="javascript:;" class="pointer" @click="onClickNhapMoi">
          <span class="icon one-file-plus"></span>Nhập mới
        </a>
      </li>
    </ul>
  </div>

  <div class="page-content">
    <div class="row">
      <!-- Filter Tìm kiếm -->
      <div class="box-form">
        <div class="row">
          <div class="legend-title">Trường tìm kiếm</div>
        </div>
        <div class="row">
          <div class="col-12">
            <div class="row">
              <div class="col-sm-4 col-12">
                <div class="info-row">
                  <div class="col-sm-4 key">Tên VLAN</div>
                  <div class="col-sm-8 value">
                    <input type="text" class="form-control" v-model="searchParams.ten" />
                  </div>
                </div>
              </div>
              <div class="col-sm-4 col-12">
                <div class="info-row">
                  <div class="col-sm-4 key">IDC</div>
                  <div class="col-sm-8 value">
                    <SelectExt
                      :dataSource="dropdowns.idcs"
                      :allowFiltering="true"
                      dataValueField="id"
                      dataTextField="ten"
                      v-model="searchParams.idc_id"
                      @change="onIdcChange"
                    ></SelectExt>
                  </div>
                </div>
              </div>
              <div class="col-sm-4 col-12">
                <div class="info-row">
                  <div class="col-sm-4 key">Hiệu lực</div>
                  <div class="col-sm-8 value padt4">
                      <SelectExt
                      :dataSource="dropdowns.hieuluc"
                      :allowFiltering="true"
                      dataValueField="id"
                      dataTextField="ten"
                      v-model="searchParams.hieu_luc"
                    ></SelectExt>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-12">
            <div class="row">
              <div class="col-sm-4 col-12">
                <div class="info-row">
                  <div class="col-sm-4 key">Zone</div>
                  <div class="col-sm-8 value">
                    <SelectExt
                      :dataSource="dropdowns.zones"
                      :allowFiltering="true"
                      dataValueField="id"
                      dataTextField="ten"
                      v-model="searchParams.zone_id"
                      :placeholder="searchParams.idc_id ? 'Chọn Zone' : 'Vui lòng chọn IDC trước'"
                      :disabled="!searchParams.idc_id"
                    ></SelectExt>
                  </div>
                </div>
              </div>
              <div class="col-sm-4 col-12">
                <div class="info-row">
                  <div class="col-sm-4 key">VRF</div>
                  <div class="col-sm-8 value">
                    <SelectExt
                      :dataSource="dropdowns.vrfs"
                      :allowFiltering="true"
                      dataValueField="id"
                      dataTextField="ten"
                      v-model="searchParams.vrf_id"
                      :placeholder="searchParams.idc_id ? 'Chọn VRF' : 'Vui lòng chọn IDC trước'"
                      :disabled="!searchParams.idc_id"
                    ></SelectExt>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Danh sách VLAN -->
      <div class="box-form">
        <div class="row">
          <div class="legend-title">Danh sách VLAN</div>
        </div>
        <div class="row">
          <div class="col-12">
            <DataGrid
              ref="gridItems"
              :allowPaging="true"
              :enablePagingServer="false"
              :showColumnCheckbox="true"
              :dataSource="grid.dataItems"
              :columns="grid.columns"
            >
            </DataGrid>
          </div>
        </div>
      </div>
    </div>

    <b-modal
      v-model="isModalOpen"
      :title="'Thông tin VLAN'"
      size="xl"
      hide-footer
      @hidden="handleModalClose"
      modal-class="modal-add-tainguyen"
    >
      <PopupChiTiet :currentItem="currentItem" :mode="mode" @saved-success="onVlanSaved"></PopupChiTiet>
    </b-modal>
  </div>
</div>
