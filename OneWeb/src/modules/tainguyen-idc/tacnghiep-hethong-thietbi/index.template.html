<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="onSearch"> <span class="icon one-search"></span>Tìm kiếm </b-link>
      </li>
    </ul>
  </div>
  <div class="page-content ">
    <div class="box-form">
      <div class="row">
        <div class="d-flex align-items-center gap-4">
          <label>Tác nghiệp hệ thống thiết bị IDC </label>
          <SelectExt
            style="width: 300px;"
            :dataTextField="'text'"
            :dataValueField="'value'"
            :placeholder="'Chọn loại tác nghiệp'"
            :allowClear="true"
            :dataSource="loaiTacNghiepList"
          >
          </SelectExt>
        </div>
      </div>
    </div>
    <div class="box-form">
      <div class="row">
        <div class="d-flex align-items-center gap-4">
          <label>Phạm vi IDC </label>
          <SelectExt
            style="width: 300px;"
            :dataTextField="'text'"
            :dataValueField="'value'"
            :placeholder="'Chọn phạm vi IDC'"
            :allowClear="true"
            :dataSource="IDCList"
          >
          </SelectExt>
        </div>
      </div>
    </div>

    <!-- Bảng Danh sách nhiệm vụ/ công việc -->
    <div class="box-form">
      <div class="row">
        <div class="legend-title d-flex justify-content-between align-items-center">
          Danh sách nhiệm vụ/ công việc: Khai báo tài nguyên
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <DataGrid
            ref="grdNhiemVu"
            :allowPaging="true"
            :enablePagingServer="false"
            :showColumnCheckbox="false"
            :dataSource="nhiemVuData"
            v-bind:columns="[
                              {fieldName: 'MA_CV', headerText: 'Mã CV', textAlign: 'Left', width: 100},
                              {fieldName: 'PHIEU_YC', headerText: 'Phiếu YC', textAlign: 'Left', width: 100},
                              {fieldName: 'HANG_MUC_TRIEN_KHAI', headerText: 'Hạng mục triển khai', textAlign: 'Left', width: 150},
                              {fieldName: 'LOAI_CONG_VIEC', headerText: 'Loại công việc', textAlign: 'Left', width: 150},
                              {fieldName: 'DON_VI_THUC_HIEN', headerText: 'Đơn vị thực hiện', textAlign: 'Left', width: 120},
                              {fieldName: 'CA_NHAN_THUC_HIEN', headerText: 'Cá nhân thực hiện', textAlign: 'Left', width: 150},
                              {fieldName: 'PHOI_HOP_THUC_HIEN', headerText: 'Phối hợp thực hiện', textAlign: 'Left', width: 150},
                              {fieldName: 'THOI_HAN_THUC_HIEN', headerText: 'Thời hạn thực hiện', textAlign: 'Center', width: 150},
                              {fieldName: 'TRANG_THAI_THUC_HIEN', headerText: 'Trạng thái thực hiện', textAlign: 'Left', width: 150},
                              {fieldName: 'ACTIONS', headerText: 'Thao tác', textAlign: 'Center', template: actionColumn(this), width: 180}
                              ]"
            :enabledSelectFirstRow="true"
            @detailDataBound="onDetailDataBound"
          >
          </DataGrid>
        </div>
      </div>
    </div>
  </div>
  <ModalChiTietPhieuTacNghiep ref="ModalChiTietPhieuTacNghiep" @refreshData="onRefreshData" />
</div>
