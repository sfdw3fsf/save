<ejs-dialog :enableResize="true" :allowDragging="false" :visible="false" ref="dialogThuHoiU"
    :animationSettings="animationSettings" :showHeader="false" :showCloseIcon="false" width="90%" height="auto"
    :target="target" :position="position" >
    <div class="modal-content popup-box">
        <div class="popup-header">
            <div class="title" style="font-weight: 600;">Thu hồi U</div>
            <div class="close -ap icon-close" @click="closeDialog"></div>
        </div>
        <div class="list-actions-top">
            <ul class="list">
                <li>
                    <b-link href="javascript:void(0)" @click="onThuHoiU">
                        <span class="icon  nc-icon-glyph ui-1_check-circle-08"></span>Thu hồi
                    </b-link>
                </li>
                <li>
                    <b-link href="javascript:void(0)" @click="closeDialog">
                        <span class="icon ui-1_circle-remove nc-icon-glyph"></span>Hủy
                    </b-link>
                </li>
            </ul>
        </div>
    </div>
    <div class="popup-body">
        <div class="row">
            <div class="box-form" style="margin-top: 10px;">
                <div class="legend-title">Chọn Rack</div>
                <div class="row">
                    <div class="col-12 col-md-6">
                        <div class="form-group">
                            <label>Chọn Rack <span style="color: red">*</span></label>
                            <SelectExt 
                                :dataSource="rackOptions"
                                v-model="selectedRackId"
                                @change="onRackChange"
                                placeholder="Chọn rack"
                                dataTextField="TEN_RACK"
                                dataValueField="ID_RACK"
                            />
                        </div>
                    </div>
                </div>
                
                <div v-if="selectedRackInfo" class="row" style="margin-top: 15px;">
                    <div class="legend-title">Thông tin Rack</div>
                </div>
                <div v-if="selectedRackInfo" class="row">
                    <div class="col-sm-3 col-6">
                        <div class="info-row">
                            <div class="key w80">ID Rack</div>
                            <div class="value">
                                <input type="text" class="form-control" :value="selectedRackInfo.ID_RACK" readonly />
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-3 col-6">
                        <div class="info-row">
                            <div class="key w80">Tên Rack</div>
                            <div class="value">
                                <input type="text" class="form-control" :value="selectedRackInfo.TEN_RACK" readonly />
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-3 col-6">
                        <div class="info-row">
                            <div class="key w80">Loại Rack</div>
                            <div class="value">
                                <input type="text" class="form-control" :value="selectedRackInfo.TEN_LOAIRACK" readonly />
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-3 col-6">
                        <div class="info-row">
                            <div class="key w80">IDC</div>
                            <div class="value">
                                <input type="text" class="form-control" :value="selectedRackInfo.TEN_IDC" readonly />
                            </div>
                        </div>
                    </div>
                </div>
                <div v-if="selectedRackInfo" class="row">
                    <div class="col-sm-3 col-6">
                        <div class="info-row">
                            <div class="key w80">Mặt sàn</div>
                            <div class="value">
                                <input type="text" class="form-control" :value="selectedRackInfo.TEN_MATSAN" readonly />
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-3 col-6">
                        <div class="info-row">
                            <div class="key w80">Phòng</div>
                            <div class="value">
                                <input type="text" class="form-control" :value="selectedRackInfo.TEN_PHONG" readonly />
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-3 col-6">
                        <div class="info-row">
                            <div class="key w80">Vị trí Rack</div>
                            <div class="value">
                                <input type="text" class="form-control" :value="selectedRackInfo.VITRI_RACK" readonly />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="box-form" style="margin-top: 10px;">
                <div class="legend-title">Danh sách U cần thu hồi</div>
                <div class="row">
                    <div class="col-12">
                        <DataGrid ref="grd1" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true"
                            :columns="dataGrid1Columns" :dataSource="dataGrid1Items"
                            @rowSelected="grd1_RowSelected" :enabledSelectFirstRow="false" @rowDeselected="grdItems_RowDeselected">
                        </DataGrid>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
</ejs-dialog>
