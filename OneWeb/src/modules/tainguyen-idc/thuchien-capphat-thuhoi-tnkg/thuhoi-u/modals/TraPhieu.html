<ejs-dialog
  :enableResize="true"
  :allowDragging="true"
  :visible="false"
  ref="ModalTraPhieu"
  :animationSettings="animationSettings"
  :showHeader="false"
  :showCloseIcon="false"
  :isModal="true"
  width="60%"
  height="auto"
  :target="target"
  :position="{ X: 'center', Y: 'center' }"
  :zIndex="1000"
  :overlayClick="false"
>
  <div class="popup-box">
    <div class="popup-header">
      <div class="title"><span class="icon one-file-back"></span>
        Trả phiếu thi công
      </div>
      <div class="close -ap icon-close" data-dismiss="modal" @click="closeModal"></div>
    </div>
    <div class="list-actions-top">
      <ul class="list">
        <li>
          <b-link href="javascript:void(0)" @click="onSave">
            <span class="icon one-save"></span>Xác nhận trả phiếu
          </b-link>
        </li>
      </ul>
    </div>
    <div class="modal-content p-2">
      <div class="row form-section">
        <div class="col-12">
          <div class="box-form">
            <div class="row">
              <div class="legend-title">Thông tin trả phiếu</div>
            </div>
            
            <div class="row">
              <div class="col-12">
                <div class="info-row">
                  <div class="key w160">Lý do trả phiếu <span class="red">(*)</span></div>
                  <div class="value">
                    <textarea 
                      v-model="lyDoTra"
                      class="form-control"
                      rows="4"
                      placeholder="Nhập lý do trả phiếu thi công..."
                      :class="{ 'error-border': controls.txtLyDoTra.invalid }"
                    ></textarea>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ejs-dialog>
