      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Phân loại</div>
                <div class="value">
                  <SelectExt v-model="searchConditions.phanLoai" placeholder="-- Chọn phân loại --" dataTextField="text"
                    dataValueField="value" :dataSource="phanLoaiList" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Trạng thái thực hiện</div>
                <div class="value">
                  <SelectExt v-model="searchConditions.trangthaiId" placeholder="-- Chọn trạng thái --"
                    dataTextField="text" dataValueField="value" :dataSource="trangThaiList" />
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-12">
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row ">
                <div class="key w150">Ngày yêu cầu</div>
                <div class="value">
                  <ejs-datepicker v-model="searchConditions.ngayYcStart" name="ngayYcStart" placeholder="Từ ngày"
                    :maxDate="searchConditions.ngayYcEnd" @change="onNgayYcStartChange" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row ">
                <div class="key w150">Đến ngày</div>
                <div class="value ">
                  <ejs-datepicker v-model="searchConditions.ngayYcEnd" name="ngayYcEnd" placeholder="Đến ngày"
                    :minDate="searchConditions.ngayYcStart" @change="onNgayYcEndChange" />
                </div>
              </div>
            </div>
          </div>
        </div>
        
      </div>
      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">IDC</div>
                <div class="value">
                  <SelectExt v-model="searchConditions.idcId" placeholder="-- Chọn IDC --" dataTextField="text"
                    dataValueField="value" :dataSource="idcByNhanVienList" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Người thực hiện</div>
                <div class="value">
                  <SelectExt v-model="searchConditions.nhanvienThId" placeholder="-- Chọn nhân viên thực hiện --"
                    dataTextField="text" dataValueField="value" :dataSource="nhanVienList" />
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-12">
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row ">
                <div class="key w150">Ngày yêu cầu HT</div>
                <div class="value">
                  <ejs-datepicker v-model="searchConditions.ngayYchtStart" name="ngayYchtStart" placeholder="Từ ngày"
                    :maxDate="searchConditions.ngayYchtEnd" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row ">
                <div class="key w150">Đến ngày</div>
                <div class="value ">
                  <ejs-datepicker v-model="searchConditions.ngayYchtEnd" name="ngayYchtEnd" placeholder="Đến ngày"
                    :minDate="searchConditions.ngayYchtStart" />
                </div>
              </div>
            </div>
          </div>
        </div>
        
      </div>
      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w150">Khách hàng</div>
            <div class="value">
              <input type="text" class="form-control" v-model="searchConditions.khachHang"
                placeholder="Nhập mã TB, mã GD, số HĐ, tên TB" />
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w150">Công việc</div>
            <div class="value">
              <input type="text" class="form-control" v-model="searchConditions.congViec"
                placeholder="Nhập mã/tên công việc" />
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="row">
            <div class="col-sm-12 col-12">
              <div class="info-row">
                <div class="key w150">Tên U</div>
                <div class="value">
                  <input type="text" class="form-control" v-model="searchConditions.tenU"
                    placeholder="Nhập tên U" />
                </div>
              </div>
            </div>
            <!-- <div class="col-sm-6 col-12">
              <div class="info-row">

                    placeholder="Nhập loại Rack..." />
                </div>
              </div>
            </div> -->
          </div>
        </div>
      </div>
    </div>

    <div class="box-form">
      <div class="row">
        <div class="legend-title d-flex justify-content-between align-items-center">
          Danh sách nhiệm vụ/ công việc: Thu hồi U ({{ danhSachKetQua.length }})
        </div>
      </div>

      <div class="row">
        <div class="col-12">
          <DataGrid ref="grdKetQua" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="false"
            :dataSource="danhSachKetQua" v-bind:columns="[
              {fieldName: 'MA_CV', headerText: 'Mã CV', textAlign: 'Left', width: 60},
              {fieldName: 'TEN_CV', headerText: 'Hạng mục công việc', textAlign: 'Left', width: 140},
              {fieldName: 'IDC', headerText: 'IDC', textAlign: 'Left', width: 90},
              {fieldName: 'NHANVIEN_THUCHIEN', headerText: 'Cá nhân thực hiện', textAlign: 'Left', width: 120},
              {fieldName: 'phoihop_thuchien', headerText: 'Phối hợp thực hiện', textAlign: 'Left', width: 120, disableHtmlEncode: false, cssClass: 'phoi-hop-thuc-hien'},
              {fieldName: 'TEN_U', headerText: 'Tên U', textAlign: 'Left', width: 140},
              {fieldName: 'NGAY_YC', headerText: 'Ngày yêu cầu', textAlign: 'Center', width: 100, template: formatDateTimeTemplate(this)},
              {fieldName: 'NGAY_YCHT', headerText: 'Ngày yêu cầu HT', textAlign: 'Center', width: 100, template: formatDateTimeTemplate(this)},
              {fieldName: 'khachhang', headerText: 'Khách hàng', textAlign: 'Left', width: 150, disableHtmlEncode: false, template: khachHangTemplate(this)},
              {fieldName: 'TRANGTHAI', headerText: 'Trạng thái thực hiện', textAlign: 'Left', width: 110},
              {fieldName: 'ACTIONS', headerText: 'Thao tác', allowSorting: false,
              allowFiltering: false, textAlign: 'Center', template: actionColumn(this), width: 65}
            ]" :enabledSelectFirstRow="true">
          </DataGrid>
        </div>
      </div>
    </div>
  </div>
</div>
