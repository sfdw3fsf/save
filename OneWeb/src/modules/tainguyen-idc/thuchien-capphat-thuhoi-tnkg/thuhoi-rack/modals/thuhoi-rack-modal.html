<ejs-dialog :enableResize="true" :allowDragging="false" :visible="false" ref="dialogThuHoiRack"
    :animationSettings="animationSettings" :showHeader="false" :showCloseIcon="false" width="90%" height="auto"
    :target="target" :position="position" >
    <div class="modal-content popup-box">
        <div class="popup-header">
            <div class="title" style="font-weight: 600;">Thu hồi Rack</div>
            <div class="close -ap icon-close" @click="closeDialog"></div>
        </div>
        <div class="list-actions-top">
            <ul class="list">
                <li>
                    <b-link href="javascript:void(0)" @click="onThuHoiRack">
                        <span class="icon  nc-icon-glyph ui-1_check-circle-08"></span>Thu hồi
                    </b-link>
                </li>
                <li>
                    <b-link href="javascript:void(0)" @click="closeDialog">
                        <span class="icon ui-1_circle-remove nc-icon-glyph"></span>Hủy
                    </b-link>
                </li>
            </ul>
        </div>
    </div>
    <div class="popup-body">
        <div class="row">
            <div class="box-form" style="margin-top: 10px;">
                <div class="legend-title">Danh sách Rack cần thu hồi</div>
                <div class="row">
                    <div class="col-12">
                        <DataGrid ref="grd1" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="false"
                            v-bind:columns="dataGrid1Columns" v-bind:dataSource="dataGrid1Items"
                            @rowSelected="grd1_RowSelected" :enabledSelectFirstRow="false">
                        </DataGrid>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
</ejs-dialog>
