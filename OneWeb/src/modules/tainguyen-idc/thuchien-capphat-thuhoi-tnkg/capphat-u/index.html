<div>
  <!-- Buttons -->
  <div class="list-actions-top">
    <ul class="list">
      <!-- Trang thai 21 -->
      <li :class="{'disabled-btn': isViewOnly}" v-if="phieuThiCongDetail && phieuThiCongDetail.TRANGTHAI_ID == 21">
        <b-link href="javascript:void(0)" @click="onSave"> <span class="icon one-save"></span>Ghi lại </b-link>
      </li>
      <li :class="{'disabled-btn': isViewOnly }" v-if="phieuThiCongDetail && phieuThiCongDetail.TRANGTHAI_ID == 21">
        <b-link href="javascript:void(0)" @click="onChuyenThucHien" :disabled="dataGrid2Items.length == 0"><span class="icon one-file-arrow-right"></span>Chuyển thực hiện
        </b-link>
      </li>

      <!-- Trang thai 22  -->
       <li :class="{'disabled-btn': isViewOnly}">
        <b-link href="javascript:void(0)" @click="onReturn" v-if="phieuThiCongDetail && phieuThiCongDetail.TRANGTHAI_ID == 22">
          <span class="icon one-file-back"></span>Trả phiếu
        </b-link>
      </li>
      <li :class="{'disabled-btn': isViewOnly}"  v-if="phieuThiCongDetail && (phieuThiCongDetail.TRANGTHAI_ID == 22 || phieuThiCongDetail.TRANGTHAI_ID == 81)">
        <b-link href="javascript:void(0)" @click="onTransfer" >
          <span class="icon one-file-arrow-right"></span>Chuyển xử lý
        </b-link>
      </li>
      <li :class="{'disabled-btn': isViewOnly}" v-if="phieuThiCongDetail && phieuThiCongDetail.TRANGTHAI_ID == 22">
        <b-link href="javascript:void(0)" @click="onComplete"  :disabled="dataGrid2Items.length == 0">
          <span class="icon one-file-check"></span>Hoàn thành
        </b-link>
      </li>
      <li :class="{'disabled-btn': isViewOnly}" v-if="phieuThiCongDetail && phieuThiCongDetail.TRANGTHAI_ID == 81">
        <b-link href="javascript:void(0)" @click="onXacNhanThucHien">
          <span class="icon one-file-check"></span>Xác nhận thực hiện
        </b-link>
      </li>
      <!-- <li>
        <b-link href="javascript:void(0)" @click="returnTicket" :class="{ disabled: !phieuThiCongDetail || !(phieuThiCongDetail.TRANGTHAI_ID == 22 || phieuThiCongDetail.TRANGTHAI_ID == 21) }">
          <span class="icon one-file-back"></span>Trả phiếu
        </b-link>
      </li> -->
      <!-- <li>
        <b-link href="javascript:void(0)" @click="onComplete" :class="{ disabled: !phieuThiCongDetail || !(phieuThiCongDetail.TRANGTHAI_ID == 22 || phieuThiCongDetail.TRANGTHAI_ID == 21) }">
          <span class="icon one-file-check"></span>Hoàn thành
        </b-link>
      </li> -->
      <!-- <li>
        <b-link href="javascript:void(0)" :class="{ disabled: !phieuThiCongDetail || !(phieuThiCongDetail.TRANGTHAI_ID == 22 || phieuThiCongDetail.TRANGTHAI_ID == 21) }">
          <span class="icon one-file-arrow-right"></span>Chuyển xử lý
        </b-link>
      </li> -->
    </ul>
  </div>

  <div class="page-content">
    <!-- Work Information Component -->
    <ThongTinCongViec ref="thongTinCongViec" :phieuThiCongId="phieutc" v-if="phieutc" @phieuThiCongLoaded="onPhieuThiCongLoaded" />

    <!-- Rack DataGrid -->
    <div class="row datagrid-section">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title d-flex justify-content-between align-items-center">
              <span>Thông tin Rack</span>
            </div>
          </div>
          <div class="row">
            <div class="col-12">
              <DataGrid ref="grdRack" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="false"
                :columns="rackDataGridColumns" :dataSource="rackDataGridItems" @rowSelected="grdRack_RowSelected"
                :enabledSelectFirstRow="false">
              </DataGrid>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Second DataGrid -->
    <div class="row datagrid-section">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title d-flex justify-content-between align-items-center">
              <span>Danh sách U </span>
              <div>
                <button class="btn btn-danger me-2" @click="xoaCapPhatUNhieuItem" :disabled="selectedItems.length === 0 || (phieuThiCongDetail && (phieuThiCongDetail.TRANGTHAI_ID != 81 || phieuThiCongDetail.TRANGTHAI_ID != 22))">
                  <span class="icon fa fa-trash"></span> Xóa cấp phát U ({{selectedItems.length}})
                </button>
                <button class="btn btn-primary me-2" @click="capPhatU" :disabled="phieuThiCongDetail && (phieuThiCongDetail.TRANGTHAI_ID != 81 && phieuThiCongDetail.TRANGTHAI_ID != 22)">
                  <span class="-ap icon icon-plus"></span> Cấp phát U
                </button>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-12">
              <DataGrid ref="grd2" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true"
                :columns="dataGrid2Columns" :dataSource="dataGrid2Items" @rowSelected="grd2_RowSelected" @rowDeselected="grd2_RowDeselected"
                :enabledSelectFirstRow="false">
              </DataGrid>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Modal Component -->
  <CapPhatUModal ref="capPhatUModal" :phieuThiCongId="phieutc" @uAllocated="onUAllocated" />

  <TraPhieu ref="popupTraPhieu" ></TraPhieu>
  <ChuyenXuLy ref="popupChuyenXuly" ></ChuyenXuLy>

  <!-- History Modal -->
  <b-modal v-model="showHistoryModal" title="Lịch sử tác động" size="xl" hide-footer>
    <TabHistory
      :tenBang="historyData.tenBang"
      :tenCot="historyData.tenCot"
      :khoaDuLieu="historyData.khoaDuLieu"
    />
  </b-modal>
</div>
