<div class="box-form">
  <div class="legend-title">Tìm kiếm</div>
  <div class="row">
    <div class="col-sm-3 col-12">
      <div class="info-row">
        <div class="key w160">Chủng loại ID</div>
        <div class="value">
          <input type="number" class="form-control" v-model="criteria.chungloaitbmId" @keyup.enter="onSearch" placeholder="Nhập ID chủng loại" />
        </div>
      </div>
    </div>
    <div class="col-sm-3 col-12">
      <div class="info-row">
        <div class="key w160">Model</div>
        <div class="value">
          <input type="text" class="form-control" v-model="criteria.modelThietbi" @keyup.enter="onSearch" placeholder="Nhập model thiết bị" />
        </div>
      </div>
    </div>
    <div class="col-sm-3 col-12">
      <div class="info-row">
        <div class="key w160">Hãng sản xuất</div>
        <div class="value">
          <SelectExt v-model="criteria.hangsxId" dataTextField="TEN" dataValueField="ID" :dataSource="[...hangSanXuatList]" :settings="{allowClear:true, placeholder: 'Chọn hãng sản xuất'}" />
        </div>
      </div>
    </div>
    <div class="col-sm-3 col-12">
      <div class="info-row">
        <div class="key w160">Loại thiết bị mạng</div>
        <div class="value">
          <SelectExt v-model="criteria.loaithietbimangId" dataTextField="TEN" dataValueField="ID" :dataSource="[...loaiThietBiMangOptions]" :settings="{allowClear:true, placeholder: 'Chọn loại thiết bị mạng'}" />
        </div>
      </div>
    </div>
  </div>
</div>
