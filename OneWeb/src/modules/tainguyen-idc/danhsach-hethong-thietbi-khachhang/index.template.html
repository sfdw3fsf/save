<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="onSearch"> <span class="icon one-search"></span>Tìm kiếm </b-link>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <div class="row">
      <div class="box-form">
        <div class="legend-title">Tìm kiếm hệ thống thiết bị khách hàng</div>
        <div class="row">
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w130">Sở hữu thiết bị</div>
              <div class="value">
                <SelectExt
                  v-model="soHuuThietBi"
                  @change="onChangeSoHuuThietBi"
                  dataTextField="TEN"
                  dataValueField="ID"
                  :dataSource="[...soHuuThietBiList]"
                  placeholder="Chọn Sở hữu thiết bị"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w130">Phạm vi IDC</div>
              <div class="value">
                <SelectExt
                  v-model="searchForm.idcId"
                  dataTextField="TEN"
                  dataValueField="ID"
                  :dataSource="idcList"
                  placeholder="Chọn Phạm vi IDC"
                />
              </div>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w130">ID Hệ thống</div>
              <div class="value">
                <input
                  v-model.trim="searchForm.idHeThong"
                  type="text"
                  class="form-control"
                  placeholder="Nhập ID hệ thống"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w130">Tên hệ thống</div>
              <div class="value">
                <input
                  v-model.trim="searchForm.tenHeThong"
                  type="text"
                  class="form-control"
                  placeholder="Nhập tên hệ thống"
                />
              </div>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w130">Trạng thái vận hành</div>
              <div class="value">
                <SelectExt
                  clearable="true"
                  v-model="searchForm.trangThaiVanHanh"
                  dataTextField="TEN"
                  dataValueField="ID"
                  :dataSource="trangThaiVanHanhList"
                  placeholder="Chọn trạng thái vận hành"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w130">Mảng thiết bị</div>
              <div class="value">
                <SelectExt
                  clearable="true"
                  v-model="searchForm.mangThietBi"
                  dataTextField="TEN"
                  dataValueField="ID"
                  :dataSource="mangThietBiList"
                  placeholder="Chọn mảng thiết bị"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="box-form">
        <div class="row">
          <div class="legend-title d-flex justify-content-between align-items-center">
            Danh sách hệ thống thiết bị khách hàng
          </div>
        </div>
        <div class="row">
          <div class="col-12">
            <DataGrid
              ref="grdItems"
              :allowPaging="true"
              :enablePagingServer="false"
              :showColumnCheckbox="false"
              :dataSource="listHeThongThietBiKhachHang"
              v-bind:columns="[
                                {fieldName: 'HETHONGTBI_ID', headerText: 'ID Hệ thống', textAlign: 'Left', width: 120},
                                {fieldName: 'TEN', headerText: 'Tên hệ thống', textAlign: 'Left', width: 250},
                                {fieldName: 'IDC', headerText: 'IDC', textAlign: 'Left', width: 120},
                                {fieldName: 'MANG_THIETBI', headerText: 'Mảng thiết bị', textAlign: 'Left', width: 120},
                                {fieldName: 'KHACH_HANG_TEN', headerText: 'Khách hàng', textAlign: 'Left', width: 180},
                                {fieldName: 'MA_THUE_BAO', headerText: 'Mã thuê bao', textAlign: 'Left', width: 150},
                                {fieldName: 'TRANG_THAI_VAN_HANH', headerText: 'Trạng thái vận hành', textAlign: 'Left', width: 100},
                                {fieldName: 'ACTIONS', headerText: 'Thao tác', textAlign: 'Center', template: acctionColumn(this), width: 120},
                                ]"
              :enabledSelectFirstRow="true"
              @detailDataBound="onDetailDataBound"
            >
            </DataGrid>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!-- Modal Chi tiết Hệ thống -->
  <ModalChiTietHeThongKhachHang ref="ModalChiTietHeThongKhachHang" @refreshData="onRefreshData" />
</div>
