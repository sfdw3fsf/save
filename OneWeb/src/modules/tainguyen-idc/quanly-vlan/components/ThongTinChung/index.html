<div>
  <div class="row">
    <div class="row">
      <div class="legend-title">Thông tin cơ bản</div>
    </div>

    <div class="row">
      <div class="col-sm-6 col-12">
        <div class="info-row">
          <div class="col-sm-4 key">ID VLAN</div>
          <div class="col-sm-8 value">
            <input type="text" class="form-control" disabled v-model="currentItem.id" placeholder="Tự sinh" />
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-12">
        <div class="info-row">
          <div class="col-sm-4 key">Hiệu lực</div>
          <div class="col-sm-8 value padt4">
            <div class="check-action checkbox-inline">
              <input
                type="checkbox"
                class="check"
                :disabled="!controls.hieu_luc.enabled"
                v-model="currentItem.hieu_luc"
                :true-value="1"
                :false-value="0"
              /><span class="name"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-sm-6 col-12">
        <div class="info-row">
          <div class="col-sm-4 key">Tên VLAN<span class="red">*</span></div>
          <div class="col-sm-8 value" :class="{ 'invalid-box': controls.ten.invalid }">
            <input
              type="text"
              class="form-control"
              :disabled="!controls.ten.enabled"
              v-model="currentItem.ten"
              placeholder="Nhập tên VLAN"
            />
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-sm-6 col-12">
        <div class="info-row">
          <div class="col-sm-4 key">IDC<span class="red">*</span></div>
          <div class="col-sm-8 value" :class="{ 'invalid-box': controls.idc_id.invalid }">
            <SelectExt
              :dataSource="dropdowns.idcs"
              dataValueField="id"
              dataTextField="ten"
              placeholder="-- Chọn IDC --"
              :enabled="controls.idc_id.enabled"
              v-model="currentItem.idc_id"
              @change="onIdcSelected"
            ></SelectExt>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-12">
        <div class="info-row">
          <div class="col-sm-4 key">Hạ tầng mạng<span class="red">*</span></div>
          <div class="col-sm-8 value" :class="{ 'invalid-box': controls.hatang_id.invalid }">
            <ItemSelectorModal
              ref="infrastructureSelectorModal"
              itemName="Hạ tầng mạng"
              :columns="[
                { fieldName: 'mahatang_infra', headerText: 'Mã hạ tầng', width: '150' },
                { fieldName: 'ten', headerText: 'Tên hạ tầng', width: '200' },
                { fieldName: 'hatang_congnghe', headerText: 'Công nghệ', width: '150' },
                { fieldName: 'trangthai_ccdv', headerText: 'Trạng thái CCDV', width: '150' },
              ]"
              :dataSource="dropdowns.infrastructures"
              :selected-item="currentItem.hatang_id"
              :parentId="currentItem.idc_id"
              :disabled="!controls.hatang_id.enabled || !currentItem.idc_id"
              placeholder="Vui lòng chọn IDC trước"
              @item-selected="onInfrastructureSelected"
            >
            </ItemSelectorModal>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-sm-6 col-12">
        <div class="info-row">
          <div class="col-sm-4 key">Thiết bị mạng<span class="red">*</span></div>
          <div class="col-sm-8 value" :class="{ 'invalid-box': controls.thietbi_id.invalid }">
            <ItemSelectorModal
              ref="thietBiSelectorModal"
              itemName="Thiết bị mạng"
              :columns="[
            { fieldName: 'mathietbi', headerText: 'Mã thiết bị', width: '100px' },
            { fieldName: 'ten', headerText: 'Tên thiết bị', width: '150px' },
            { fieldName: 'idc_rack', headerText: 'Rack', width: '150px' },
            { fieldName: 'ten_tttvh', headerText: 'Trạng thái VH' },]"
              :dataSource="dropdowns.devices"
              :selected-item="currentItem.thietbi_id"
              :parentId="getSelectedId(currentItem.hatang_id)"
              :disabled="!controls.thietbi_id.enabled || !hasSelectedId(currentItem.hatang_id)"
              placeholder="Vui lòng chọn Hạ tầng mạng trước"
              @item-selected="onThietBiSelected"
            >
            </ItemSelectorModal>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-12">
        <div class="info-row">
          <div class="col-sm-4 key">VRF<span class="red">*</span></div>
          <div class="col-sm-8 value" :class="{ 'invalid-box': controls.vrf_id.invalid }">
            <ItemSelectorModal
              ref="vrfSelectorModal"
              itemName="VRF"
              :columns="[
                { fieldName: 'id', headerText: 'ID', width: '80px' },
                { fieldName: 'ten', headerText: 'Tên VRF', width: '150px' },
                // TODO: thietbi or idc?
                { fieldName: 'ten_thietbi', headerText: 'Thuộc Thiết bị', width: '150px' },
                { fieldName: 'asn', headerText: 'ASN', width: '150px' },
                { fieldName: 'rd', headerText: 'RD', width: '150px' },
                { fieldName: 'rt_export', headerText: 'RT Export', width: '150px' },
                { fieldName: 'rt_import', headerText: 'RT Import', width: '150px' },
                { fieldName: 'hieu_luc', headerText: 'Hiệu lực', width: '150px' }
              ]"
              :dataSource="dropdowns.vrfs"
              :selected-item="currentItem.vrf_id"
              :parentId="getSelectedId(currentItem.hatang_id)"
              :disabled="!controls.vrf_id.enabled || !hasSelectedId(currentItem.hatang_id)"
              placeholder="Vui lòng chọn Hạ tầng mạng trước"
              @item-selected="onVrfSelected"
            >
            </ItemSelectorModal>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-sm-6 col-12">
        <div class="info-row">
          <div class="col-sm-4 key">Zone<span class="red">*</span></div>
          <div class="col-sm-8 value" :class="{ 'invalid-box': controls.zone_id.invalid }">
            <ItemSelectorModal
              ref="zoneSelectorModal"
              itemName="Zone"
              :columns="[
                { fieldName: 'id', headerText: 'ID', width: '80px' },
                { fieldName: 'ten', headerText: 'Tên Zone', width: '150px' },
                { fieldName: 'ten_thietbi', headerText: 'Thiết bị', width: '150px' },
                { fieldName: 'hieu_luc', headerText: 'Hiệu lực', width: '150px' },
              ]"
              :dataSource="dropdowns.zones"
              :selected-item="currentItem.zone_id"
              :parentId="getSelectedId(currentItem.vrf_id)"
              :disabled="!controls.zone_id.enabled || !hasSelectedId(currentItem.vrf_id)"
              placeholder="Vui lòng chọn VRF trước"
              @item-selected="onZoneSelected"
            >
            </ItemSelectorModal>
          </div>
        </div>
      </div>
      <div class="col-sm-6 col-12">
        <div class="info-row">
          <div class="col-sm-4 key">Ghi chú</div>
          <div class="col-sm-8 value" :class="{ 'invalid-box': controls.ghi_chu.invalid }">
            <input
              type="text"
              class="form-control"
              :disabled="!controls.ghi_chu.enabled"
              v-model="currentItem.ghi_chu"
            />
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
