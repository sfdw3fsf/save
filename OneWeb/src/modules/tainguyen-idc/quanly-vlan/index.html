<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <a href="javascript:;" class="pointer" @click="onClickSearch">
          <span class="icon one-search"></span>Tìm kiếm
        </a>
      </li>
      <li>
        <a href="javascript:;" class="pointer" @click="onClickNhapMoi">
          <span class="icon one-file-plus"></span>Nhập mới
        </a>
      </li>
    </ul>
  </div>

  <div class="page-content">
    <div class="row">
      <!-- Filter Tìm kiếm -->
      <div class="box-form">
        <div class="row">
          <div class="legend-title">Trường tìm kiếm</div>
        </div>
        <div class="row">
          <div class="col-12">
            <div class="row">
              <div class="col-sm-4 col-12">
                <div class="info-row">
                  <div class="col-sm-4 key">Tên VLAN<span class="red">*</span></div>
                  <div class="col-sm-8 value">
                    <input
                      type="text"
                      class="form-control"
                      v-model="searchParams.ten"
                    />
                  </div>
                </div>
              </div>
              <div class="col-sm-4 col-12">
                <div class="info-row">
                  <div class="col-sm-4 key">IDC<span class="red">*</span></div>
                  <div class="col-sm-8 value">
                    <SelectExt
                      :dataSource="[]"
                      :allowFiltering="true"
                      v-model="searchParams.idc_id"
                    ></SelectExt>
                  </div>
                </div>
              </div>
              <div class="col-sm-4 col-12">
                <div class="info-row">
                  <div class="col-sm-4 key">Hạ tầng mạng<span class="red">*</span></div>
                  <div class="col-sm-8 value">
                    <SelectExt
                      :dataSource="[]"
                      :allowFiltering="true"
                      v-model="searchParams.hatang_id"
                    ></SelectExt>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Danh sách VLAN -->
      <div class="box-form">
        <div class="row">
          <div class="legend-title">Danh sách VLAN</div>
        </div>
        <div class="row">
          <div class="col-12">
            <DataGrid
              ref="gridItems"
              :allowPaging="true"
              :enablePagingServer="false"
              :showColumnCheckbox="true"
              :dataSource="grid.dataItems"
              :columns="grid.columns"
            >
            </DataGrid>
          </div>
        </div>
      </div>
    </div>

    <b-modal
      v-model="isModalOpen"
      :title="'Thông tin VLAN'"
      size="xl"
      hide-footer
      @hidden="handleModalClose"
      modal-class="modal-add-tainguyen"
    >
      <PopupChiTiet :currentItem="currentItem" :mode="mode" ></PopupChiTiet>
    </b-modal>
  </div>
</div>
