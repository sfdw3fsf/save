<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="onAddNew" :disabled="!buttons.btnAddNew.enabled">
          <span class="icon one-file-plus"></span>Nhập mới
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onSave" :disabled="!buttons.btnSave.enabled">
          <span class="icon one-save"></span>Ghi lại
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onCancel" :disabled="!buttons.btnCancel.enabled">
          <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onEdit" :disabled="!buttons.btnEdit.enabled">
          <span class="icon nc-icon-glyph ui-1_edit-72"></span>Sửa
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onDelete" :disabled="!buttons.btnDelete.enabled">
          <span class="icon one-trash"></span>Xóa
        </b-link>
      </li>
      <li>
        <a @click="btnImportExcel_Click" style="cursor: pointer;"> <span class="icon one-upload"></span> Import </a>
      </li>
      <li>
        <a @click="btnExportExcel_Click" style="cursor: pointer;"> <span class="icon one-download"></span> Export </a>
      </li>
    </ul>
  </div>

  <div class="page-content">
    <!-- SECTION: Thông tin chuẩn đầu đấu nối -->
    <div class="box-form">
      <div class="legend-title">Thông tin chuẩn đầu đấu nối</div>

      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w200">ID</div>
            <div class="value">
              <input
                type="text"
                class="form-control"
                :value="form.id ? form.id : ''"
                :placeholder="!form.id ? 'Tự sinh' : ''"
                readonly
              />
            </div>
          </div>

          <div class="info-row">
            <div class="key w200">Chuẩn đấu nối <span class="required">*</span></div>
            <div class="value">
              <input
                type="text"
                class="form-control"
                v-model="form.chuanDauNoi"
                :disabled="!controls.txtTen.enabled"
                :class="controls.txtTen.invalid ? 'is-invalid' : ''"
              />
            </div>
          </div>

          <div class="info-row">
            <div class="key w200">Chuẩn <span class="required">*</span></div>
            <div class="value">
              <SelectExt
                v-model="form.chuan"
                dataTextField="TEN"
                dataValueField="ID"
                :dataSource="[...chuanOptions]"
                :disabled="!controls.selectChuan.enabled"
                :class="{invalidBox: this.controls.selectChuan.invalid}"
              />
            </div>
          </div>
        </div>

        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w200">Hiệu lực</div>
            <div class="value padt4">
              <div class="check-action">
                <input
                  type="checkbox"
                  class="check"
                  v-model="form.hieuLuc"
                  :true-value="1"
                  :false-value="0"
                  :disabled="!controls.chkHieuLuc.enabled"
                  style="cursor: pointer;"
                /><span class="name"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- DataGrid -->
    <div class="box-form">
      <div class="legend-title">Danh sách chuẩn đầu đấu nối</div>
      <DataGrid
        v-bind:columns="[
          {fieldName: 'ID', headerText: 'ID', width: 50, textAlign: 'Center'},
          {fieldName: 'TEN', headerText: 'Chuẩn đấu nối', allowFiltering: true},
          {fieldName: 'CHUAN_TEN', headerText: 'Chuẩn', allowFiltering: true},
          {fieldName: 'SUDUNG_TEXT', headerText: 'Hiệu lực', allowFiltering: true, width: 100, textAlign: 'Center'},
        ]"
        :dataSource="dsChuanDauDauNoi"
        :showFilter="true"
        :allowPaging="true"
        :enablePagingServer="false"
        :showColumnCheckbox="true"
        @selectedItemsChanged="onSelectRowCheckbox"
        @rowSelected="grdItems_RowSelected"
        dataKeyField="ID"
        ref="grdItems"
        :allowExcelExport="true"
      >
      </DataGrid>
    </div>
  </div>

  <ModalImportExcel
    ref="modalImportExcel"
    :title="importConfig.title"
    :tableColumns="importConfig.tableColumns"
    :templateFileName="importConfig.templateFileName"
    :processExcelData="processChuanDauDauNoiExcelData"
    :formatCellValue="formatChuanDauDauNoiCellValue"
    :validationRules="adjustedValidationRules"
    :checkDataResult="importConfig.checkDataResult"
    @check-data="handleCheckData"
  />
</div>
