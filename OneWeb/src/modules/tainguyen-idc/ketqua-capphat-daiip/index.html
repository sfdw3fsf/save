<div id="ketqua-capphat-daiip">
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="onSearch"> <span class="icon one-search"></span>Tìm kiếm </b-link>
      </li>
       <li>
        <b-link href="javascript:void(0)" @click="createCapPhatDaiIp" class="text-primary"> <span class="fa fa-plus"></span> 
        Tạo mới {{ selectedLoaiCongViecText }}
       </b-link>
      </li>
    </ul>
  </div>

  <div class="page-content">
    <!-- Search conditions -->
    <div class="box-form">
      <div class="row">
        <div class="legend-title d-flex justify-content-between align-items-center">
          Điều kiện tìm kiếm
        </div>
      </div>

      <div class="row">
        <div class="col-sm-3 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Phân loại</div>
            <div class="value">
              <SelectExt
                v-model="searchConditions.phanloai"
                placeholder="-- Tất cả --"
                dataTextField="text"
                dataValueField="value"
                :dataSource="phanLoaiList"
              />
            </div>
          </div>
        </div>
        <div class="col-sm-3 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Trạng thái thực hiện</div>
            <div class="value">
              <SelectExt
                v-model="searchConditions.trangthaiId"
                placeholder="-- Tất cả --"
                dataTextField="text"
                dataValueField="value"
                :dataSource="trangThaiList"
              />
            </div>
          </div>
        </div>
        <div class="col-sm-3 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Ngày yêu cầu</div>
            <div class="value">
              <ejs-datepicker
                v-model="searchConditions.ngayYcStart"
                placeholder="dd/mm/yyyy"
                :maxDate="searchConditions.ngayYcEnd"
              />
            </div>
          </div>
        </div>
        <div class="col-sm-3 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Đến ngày</div>
            <div class="value p-0">
              <ejs-datepicker
                v-model="searchConditions.ngayYcEnd"
                placeholder="dd/mm/yyyy"
                :minDate="searchConditions.ngayYcStart"
              />
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-3 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">IDC</div>
            <div class="value">
              <SelectExt
                v-model="searchConditions.idcId"
                placeholder="-- Tất cả --"
                dataTextField="text"
                dataValueField="value"
                :dataSource="idcByNhanVienList"
              />
            </div>
          </div>
        </div>
        <div class="col-sm-3 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Nhân viên thực hiện</div>
            <div class="value">
              <SelectExt
                v-model="searchConditions.nhanvienThId"
                placeholder="-- Tất cả --"
                dataTextField="text"
                dataValueField="value"
                :dataSource="nhanVienList"
              />
            </div>
          </div>
        </div>
        <div class="col-sm-3 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Ngày hoàn thành</div>
            <div class="value">
              <ejs-datepicker
                v-model="searchConditions.ngayHTStart"
                placeholder="dd/mm/yyyy"
                :maxDate="searchConditions.ngayHTEnd"
              />
            </div>
          </div>
        </div>
        <div class="col-sm-3 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Đến ngày</div>
            <div class="value p-0">
              <ejs-datepicker
                v-model="searchConditions.ngayHTEnd"
                placeholder="dd/mm/yyyy"
                :minDate="searchConditions.ngayHTStart"
              />
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Khách hàng</div>
            <div class="value">
              <input
                type="text"
                class="form-control"
                v-model="searchConditions.khachhang"
                placeholder="Mã thuê bao, mã giao dịch, số hợp đồng, tên thuê bao"
              />
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Công việc</div>
            <div class="value">
              <input
                type="text"
                class="form-control"
                v-model="searchConditions.congviec"
                placeholder="Mã công việc, tên công việc"
              />
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="info-row d-flex align-items-center">
            <div class="key w100">Dải IP</div>
            <div class="value">
              <input
                type="text"
                class="form-control"
                v-model="searchConditions.ipStoreName"
                placeholder="Địa chỉ dải IP"
              />
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="box-form">
        <div class="row">
          <div class="legend-title d-flex justify-content-between align-items-center">
            Danh sách kết quả: {{ selectedLoaiCongViecText }} ({{ danhSachCongViec.length }})
          </div>
        </div>

        <div class="row">
          <div class="col-12">
            <DataGrid
              ref="grdKetQuaCapPhat"
              :allowPaging="true"
              :enablePagingServer="false"
              :showColumnCheckbox="false"
              :dataSource="danhSachCongViec"
              v-bind:columns="[
              {fieldName: 'MA_CV', headerText: 'Mã CV', textAlign: 'Left', width: 120},
              {fieldName: 'TEN_CV', headerText: 'Tên công việc', textAlign: 'Left', width: 140},
              {fieldName: 'NHANVIEN_TH', headerText: 'Nhân viên TH', textAlign: 'Left', width: 120},
              {fieldName: 'NHANVIEN_PHOIHOP', headerText: 'Nhân viên phối hợp', textAlign: 'Left', width: 120},
              {fieldName: 'TEN_DAIIP', headerText: 'Tên dải IP', textAlign: 'Left', width: 120},
              {fieldName: 'LOAIDAI_IP', headerText: 'Loại dải IP', textAlign: 'Left', width: 100},
              {fieldName: 'PHANLOAI_IP', headerText: 'Phân loại IP', textAlign: 'Left', width: 120},
              {fieldName: 'NGAY_YC', headerText: 'Ngày yêu cầu', textAlign: 'Left', width: 140},
              {fieldName: 'NGAY_HT', headerText: 'Ngày hoàn thành', textAlign: 'Left', width: 140},
              {fieldName: 'TT_KHACHHANG', headerText: 'Khách hàng', textAlign: 'Left', disableHtmlEncode: false},
              {fieldName: 'TEN_IDC', headerText: 'IDC', textAlign: 'Left', width: 100},
              {fieldName: 'TRANGTHAI_PHIEUTC', headerText: 'Trạng thái', textAlign: 'Left', width: 110},
              {fieldName: 'ACTIONS', headerText: 'Thao tác', allowSorting: false,
              allowFiltering: false, textAlign: 'Center', template: actionColumn(this), width: 100}
            ]"
              :enabledSelectFirstRow="true"
            >
            </DataGrid>
          </div>
        </div>
      </div>
  </div>
</div>
