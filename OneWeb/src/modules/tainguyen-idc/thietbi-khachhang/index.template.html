<div>
  <div class="page-content">
    <div class="box-form">
      <!-- Danh sách tòa nhà  -->
      <div class="row">
        <div class="col-12">
          <div class="box-form">
            <div class="row">
              <div class="legend-title">Danh sách khách hàng</div>
            </div>
            <DataGrid
              ref="gridItems"
              :allowPaging="true"
              :enablePagingServer="false"
              :showColumnCheckbox="true"
              :allowExcelExport="true"
              v-bind:columns="[
                  { fieldName: 'STT', headerText: 'STT', textAlign: 'Center', width: '40px' },
                  { fieldName: 'MA_KH', headerText: 'Mã khách hàng', textAlign: 'Left', width: '100px' },
                  { fieldName: 'TEN_KH', headerText: 'Tên khách hàng', textAlign: 'Left', width: '100px' },
                  { fieldName: 'MA_HD', headerText: 'Mã HD', textAlign: 'Left', width: '80px' },
                  { fieldName: 'THOIHAN_HD', headerText: 'Thời hạn hợp đồng', textAlign: 'Left', width: '100px' },
                  { fieldName: 'SLA', headerText: 'Cam kết SLA', textAlign: 'Center', width: '60px' },
                  { fieldName: 'ACTIONS', headerText: 'Thao tác', textAlign: 'Center', template: actionColumn(this), width: '80px' }
                ]"
              :dataSource="dataItems"
              @rowSelected="onRowSelected"
            />
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
