<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="btnNhapMoi_Click" :disabled="!buttons.btnNhapMoi.enabled">
          <span class="icon one-file-plus"></span>Nhập mới
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnGhiLai_Click" :disabled="!buttons.btnGhiLai.enabled">
          <span class="icon one-save"></span> Ghi lại
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnHuy_Click" :disabled="!buttons.btnHuy.enabled">
          <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Hủy bỏ
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnSua_Click" :disabled="!buttons.btnSua.enabled">
          <span class="icon one-print"></span>Sửa
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnXoa_Click" :disabled="!buttons.btnXoa.enabled">
          <span class="icon one-trash"></span>Xóa
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnImport_Click" :disabled="!buttons.btnImport.enabled">
          <span class="icon one-file-excel"></span>Import
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnExport_Click" :disabled="!buttons.btnExport.enabled">
          <span class="icon one-file-excel"></span>Export
        </b-link>
      </li>
    </ul>
  </div>

  <div class="page-content">
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Thông tin loại IP
            </div>
          </div>
          <!--  Phân loại IP -->
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w120">ID Loại IP <span class="red">*</span></div>
                <div class="value">
                  <input type="text" class="form-control"
                    disabled v-model="currentItem.id" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w120">Hiệu lực</div>
                <div class="value padt4">
                  <div class="check-action">
                    <input type="checkbox" class="check" :disabled="!controls.chkHieuLuc.enabled"
                      v-model="currentItem.hieuLuc" :true-value="1" :false-value="0" /><span class="name"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w120">Tên loại IP <span class="red">*</span></div>
                <div class="value d-flex" >
                  <div class="item mr-3" >
                      <div class="check-action">
                          <input type="radio"
                            name="ten-ip"
                            :disabled="!controls.chkTen.enabled"
                            value='IP v4'
                            v-model="currentItem.ten"/>
                          <span class="name">IP v4</span>
                      </div>
                  </div>

                  <div class="item ">
                      <div class="check-action">
                          <input type="radio"
                            name="ten-ip"
                            :disabled="!controls.chkTen.enabled"
                            value='IP v6'
                            v-model="currentItem.ten">
                          <span class="name">IP v6</span>
                      </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w120">Phân loại <span class="red">*</span></div>
                <div class="value d-flex">
                  <div class="item mr-3">
                      <div class="check-action">
                          <input type="radio"
                            name="phanloai-ip-1"
                            value='Internet'
                            :disabled="!controls.chkPhanLoai.enabled"
                            v-model="currentItem.phanLoai"/>
                          <span class="name">Internet</span>
                      </div>
                  </div>

                  <div class="item">
                      <div class="check-action">
                          <input type="radio"
                            name="phanloai-ip-2"
                            value='Intranet'
                            :disabled="!controls.chkPhanLoai.enabled"
                            v-model="currentItem.phanLoai">
                          <span class="name">Intranet</span>
                      </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <!-- Thuộc thiết bị mạng(selection) - RD Export -->
          <div class="row mt-3">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w120">Ghi chú</div>
                <div class="value">
                  <input type="text" class="form-control" :disabled="!controls.txtGhiChu.enabled"
                    v-model="currentItem.ghiChu" />
                </div>
              </div>
            </div>
          </div>
          <!-- <div class="info-row">
            <div class="key w100">Ghi chú</div>
            <div class="value">
              <input type="text" class="form-control" :disabled="!controls.txtGhiChu.enabled"
                v-model="currentItem.ghiChu" />
            </div>
          </div> -->
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Danh sách Loại IP
            </div>
          </div>
          <div class="row">
            <div class="col-12">
              <DataGrid ref="grdItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true"
                v-bind:columns="[
                                {fieldName: 'ID', headerText: 'ID Loại IP', width: 100, textAlign: 'Center'},
                                {fieldName: 'TEN', headerText: 'Tên Loại IP', textAlign: 'Left'},
                                {fieldName: 'PHANLOAI_NAME', headerText: 'Phân Loại', textAlign: 'Left'},
                                {fieldName: 'GHI_CHU', headerText: 'Ghi Chú', textAlign: 'Left'},
                                {fieldName: 'HIEU_LUC', headerText: 'Hiệu lực', width: 100, template: getColumnHieuLucTemplate(), textAlign: 'Left'},
                                ]" v-bind:dataSource="ipItemList" @rowSelected="grdItems_RowSelected"
                                @rowDeselected="grdItems_RowDeselected" @selectedItemsChanged="onSelectRowCheckbox">
              </DataGrid>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <ModalImportExcel
    ref="modalImportExcel"
    :title="importConfig.title"
    :tableColumns="importConfig.tableColumns"
    :gridColumns="importConfig.gridColumns"
    :templateFileName="importConfig.templateFileName"
    :processExcelData="processLoaiIPExcelData"
    :formatCellValue="formatLoaiIPCellValue"
    :validationRules="importConfig.validationRules"
    :checkDataResult="importConfig.checkDataResult"
    @check-data="handleCheckData"
    :useHeaderMapping="true"
  />
</div>
