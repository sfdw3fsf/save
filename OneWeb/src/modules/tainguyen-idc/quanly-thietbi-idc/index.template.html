<div>
  <div class="list-actions-top">
    <ul class="list">
      <li @click="onSearch()">
        <b-link href="javascript:void(0)"> <span class="icon one-search"></span>Tìm kiếm</b-link>
      </li>
      <li @click="onResetSearch()">
        <b-link href="javascript:void(0)"> <span class="icon one-refresh"></span>Làm mới</b-link>
      </li>
      <li @click="onNew()">
        <b-link href="javascript:void(0)"> <span class="icon one-file-plus"></span>Nhập mới</b-link>
      </li>
    </ul>
  </div>
  <div class="page-content ">
    <div class="row">
      <div class="box-form">
        <div class="legend-title">Tìm kiếm thiết bị</div>
        <div class="row">
          <div class="col-sm-3 col-12">
            <div class="info-row">
              <div class="key w130">ID Thiết bị</div>
              <div class="value">
                <input v-model.trim="searchForm.idThietBi" type="text" class="form-control" placeholder="Nhập ID thiết bị" />
              </div>
            </div>
          </div>
          <div class="col-sm-3 col-12">
            <div class="info-row">
              <div class="key w130">Tên thiết bị</div>
              <div class="value">
                <input v-model.trim="searchForm.tenThietBi" type="text" class="form-control" placeholder="Nhập tên thiết bị" />
              </div>
            </div>
          </div>
          <div class="col-sm-3 col-12">
            <div class="info-row">
              <div class="key w130">Mảng thiết bị</div>
              <div class="value">
                <SelectExt
                  v-model="searchForm.mangThietBi"
                  dataTextField="TEN"
                  dataValueField="ID"
                  :dataSource="[{ID: -1, TEN: 'Tất cả'}, ...mangThietBiList]"
                  placeholder="Chọn mảng thiết bị"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-3 col-12">
            <div class="info-row">
              <div class="key w130">Loại thiết bị</div>
              <div class="value">
                <SelectExt
                  v-model="searchForm.loaiThietBi"
                  dataTextField="LOAI_TBI"
                  dataValueField="ID"
                  :dataSource="loaiThietBiList"
                  placeholder="Chọn loại thiết bị"
                />
              </div>
            </div>
          </div>
        </div>
          <div class="row">
          <div class="col-sm-4 col-12">
            <div class="info-row">
              <div class="key w130">Model</div>
              <div class="value">
                <input v-model.trim="searchForm.model" type="text" class="form-control" placeholder="Nhập model" />
              </div>
            </div>
          </div>
          <div class="col-sm-4 col-12">
            <div class="info-row">
              <div class="key w130">Serial Number</div>
              <div class="value">
                <input v-model.trim="searchForm.serial" type="text" class="form-control" placeholder="Nhập serial number" />
              </div>
            </div>
          </div>
          <div class="col-sm-4 col-12">
            <div class="info-row">
              <div class="key w130">Tag Number</div>
              <div class="value">
                <input v-model.trim="searchForm.tag" type="text" class="form-control" placeholder="Nhập tag number" />
              </div>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-sm-4 col-12">
            <div class="info-row">
              <div class="key w130">Toà nhà</div>
              <div class="value">
                <SelectExt
                  v-model="searchForm.toaNhaId"
                  dataTextField="TEN"
                  dataValueField="ID_TOANHA"
                  :dataSource="[{ID_TOANHA: 0, TEN: 'Tất cả'}, ...toaNhaList]"
                  placeholder="Chọn toà nhà"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-4 col-12">
            <div class="info-row">
              <div class="key w130">Mặt sàn</div>
              <div class="value">
                <SelectExt
                  v-model="searchForm.matSanId"
                  dataTextField="TEN"
                  dataValueField="ID"
                  :dataSource="matSanList"
                  placeholder="Chọn mặt sàn"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-4 col-12">
            <div class="info-row">
              <div class="key w130">Phòng/Zone</div>
              <div class="value">
                <SelectExt
                  v-model="searchForm.phongId"
                  dataTextField="TEN"
                  dataValueField="ID"
                  :dataSource="phongList"
                  placeholder="Chọn phòng/Zone"
                />
              </div>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-sm-4 col-12">
            <div class="info-row">
              <div class="key w130">Rack</div>
              <div class="value">
                <SelectExt
                  v-model="searchForm.rackId"
                  dataTextField="TEN"
                  dataValueField="ID"
                  :dataSource="rackList"
                  placeholder="Chọn rack"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-4 col-12">
            <div class="info-row">
              <div class="key w130">Trạng thái vận hành</div>
              <div class="value">
                <SelectExt
                  v-model="searchForm.trangThaiVanHanh"
                  dataTextField="TEN"
                  dataValueField="ID"
                  :dataSource="trangThaiVanHanhList"
                  placeholder="Chọn trạng thái vận hành"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-4 col-12">
            <div class="info-row">
              <div class="key w130">CS Thiết kế</div>
              <div class="value">
                <input v-model.trim="searchForm.congSuatTke" type="text" class="form-control" placeholder="Nhập công suất thiết kế" />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="box-form">
        <div class="row">
          <div class="legend-title d-flex justify-content-between align-items-center">
            Danh sách thiết bị
          </div>
        </div>
        <div class="row">
          <div class="col-12">
            <DataGrid
              v-if="showGrid"
              ref="grdItems"
              :allowPaging="true"
              :enablePagingServer="false"
              :showColumnCheckbox="false"
              :dataSource="listThietBi"
              :childGrid="childGrid"
              v-bind:columns="[
                                {fieldName: 'ID', headerText: 'ID', textAlign: 'Left', width: 80},
                                {fieldName: 'TEN', headerText: 'Tên thiết bị', textAlign: 'Left'},
                                {fieldName: 'SERIAL_NUMBER', headerText: 'Serial', textAlign: 'Left', width: 120},
                                {fieldName: 'CS_DINHDANH', headerText: 'Công suất thiết kế', textAlign: 'Left', width: 120},
                                {fieldName: 'TOANHA', headerText: 'Tòa nhà', textAlign: 'Left', width: 120},
                                {fieldName: 'MATSAN', headerText: 'Mặt sàn', textAlign: 'Left', width: 120},
                                {fieldName: 'PHONG', headerText: 'Phòng/Zone', textAlign: 'Left'},
                                {fieldName: 'IDC_RACK', headerText: 'Rack', textAlign: 'Left', width: 120},
                                {fieldName: 'U', headerText: 'U', textAlign: 'Center', width: 120},
                                {fieldName: 'TRANGTHAI_VH', headerText: 'Trạng thái vận hành', textAlign: 'Left', width: 120},
                                {fieldName: 'ACTIONS', headerText: 'Thao tác', textAlign: 'Center', template: acctionColumn(this), width: 80},
                                ]"
              :enabledSelectFirstRow="true"
              @detailDataBound="onDetailDataBound"
            >
            </DataGrid>
          </div>
        </div>
      </div>
    </div>
  </div>
  <ModalChiTietThietBi :modalID="'ModalChiTietThietBi'" ref="ModalChiTietThietBi"></ModalChiTietThietBi>
</div>
