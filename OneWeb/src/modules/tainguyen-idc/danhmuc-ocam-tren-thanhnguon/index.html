<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="btnGhiLai_Click" :disabled="!buttonsState.btnGhiLai.enabled">
          <span class="icon one-save"></span>Ghi lại
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnSua_Click" :disabled="!buttonsState.btnSua.enabled">
          <span class="icon nc-icon-glyph ui-1_edit-72"></span>Sửa
        </b-link>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Thông tin ổ cắm trên thanh nguồn
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">ID ổ cắm <span class="red">*</span></div>
                <div class="value">
                  <input type="text" v-model="currentItem.ocamId" class="form-control" :disabled="true" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Thiết bị</div>
                <div class="value">
                  <input type="text" v-model="currentItem.thietBiId" class="form-control" :disabled="true" />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Thanh nguồn <span class="red">*</span></div>
                <div class="value">
                  <input type="text" v-model="currentItem.tenThanhNguon" class="form-control" :disabled="true" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Ghi chú</div>
                <div class="value">
                  <input type="text" class="form-control" v-model="currentItem.ghiChu" :disabled="!controlsState.txtGhiChu.enabled" :class="{ 'error-input': controlsState.txtGhiChu.invalid }" />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Trạng thái cắm nguồn <span class="red">*</span></div>
                <div class="value">
                  <SelectExt 
                    v-model="currentItem.trangThaiHdId" 
                    :options="trangThaiHdOptions" 
                    :disabled="!controlsState.selectTrangThaiHd.enabled" 
                    :class="{ 'error-input': controlsState.selectTrangThaiHd.invalid && controlsState.selectTrangThaiHd.enabled }" 
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Trạng thái ổ cắm <span class="red">*</span></div>
                <div class="value">
                  <SelectExt 
                    v-model="currentItem.trangThaiId" 
                    :options="trangThaiOptions" 
                    :disabled="!controlsState.selectTrangThai.enabled" 
                    :class="{ 'error-input': controlsState.selectTrangThai.invalid && controlsState.selectTrangThai.enabled }" 
                  />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Danh sách ổ cắm
            </div>
          </div>
          <div class="row">
            <div class="col-12">
              <DataGrid ref="gridItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true"
                v-bind:columns="[
                                {fieldName: 'OCAM_ID', headerText: 'ID Ổ cắm', textAlign: 'Left', width: 120},
                                {fieldName: 'TEN_THANHNGUON', headerText: 'Thanh nguồn', textAlign: 'Left'},
                                {fieldName: 'TEN_LOAIOCAM', headerText: 'Loại ổ cắm', textAlign: 'Left', width: 120},
                                {fieldName: 'TEN_TRANGTHAI', headerText: 'Trạng thái ổ cắm', textAlign: 'Left', width: 160},
                                {fieldName: 'TEN_TRANGTHAI_HD', headerText: 'Trạng thái cắm nguồn', textAlign: 'Left', width: 160},
                                {fieldName: 'THIETBI_ID', headerText: 'ID thiết bị', textAlign: 'Left', width: 160},
                                ]" v-bind:dataSource="dataItems" @rowSelected="gridItems_RowSelected" @rowDeselected="
                gridItems_RowDeselected" @selectedItemsChanged="onSelectRowCheckbox"
                :allowExcelExport="true"></DataGrid>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
