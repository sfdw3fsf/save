<div>
    <div class="list-actions-top">
        <ul class="list">
            <li @click="nhapMoi">
                <a href="javascript:void(0)" :class="{'disable-btn': isDisableBtnNhapMoi}">
                    <span class="icon one-file-plus"></span>Nhập mới
                </a>
            </li>
            <li @click="ghiLai">
                <a href="javascript:void(0)" :class="{'disable-btn': isDisableBtnGhiLai}">
                    <span class="icon one-save"></span>Ghi lại
                </a>
            </li>
            <li @click="huy">
                <a href="javascript:void(0)" :class="{'disable-btn': isDisableBtnHuy}">
                    <span class="icon nc-icon-glyph ui-1_circle-remove"></span>Hủy
                </a>
            </li>
            <li @click="xoa">
                <a href="javascript:void(0)" :class="{'disable-btn': isDisableBtnXoa}">
                    <span class="icon one-trash"></span>Xóa
                </a>
            </li>
            <li @click="importFile">
                <a href="javascript:void(0)" :class="{'disable-btn': isDisableBtnImport}">
                    <span class="icon one-template"></span>Import
                </a>
            </li>
            <li @click="xuatExcel">
                <a href="javascript:void(0)" :class="{'disable-btn': isDisableBtnExport}">
                    <span class="icon one-xlsx"></span>Export
                </a>
            </li>
        </ul>
    </div>
    <div class="page-content">
        <div class="legend-title">Tọa độ Mặt sàn</div>
        <div class="row">
            <div class="col-12">
                <div class="box-form">
                    <div class="row">
                        <div class="legend-title">Thông tin chung</div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w150">ID tọa độ mặt sàn<span style="color: red;">*</span></div>
                                <div class="value">
                                    <input type="text" class="form-control" v-model.trim="form.pToadoMatsanId"
                                        :disabled="true">
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w150">Hiệu lực</div>
                                <div class="form-check ">
                                    <input class="form-check-input" type="checkbox" v-model="form.pHieuLuc"
                                        id="flexCheckDefault" :disabled="isDisableBtnGhiLai">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w150">Mặt sàn<span style="color: red;">*</span></div>
                                <div class="value">
                                    <SelectExt :dataSource="dsMatsan"
                                        :options="dsMatsan.map(item => ({ id: item.MATSAN_ID, text: item.MATSAN_TEN, idc_id: item.IDC_ID, idc_ten: item.IDC_TEN }))"
                                        dataTextField="MATSAN_TEN" dataValueField="MATSAN_ID" v-model="form.pMatsanId"
                                        @select="onSelectMatsan" :disabled="isDisableBtnGhiLai" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            &nbsp;
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w150">Tên Tọa độ<span style="color: red;">*</span></div>
                                <div class="value">
                                    <textarea class="form-control no-resize" v-model.trim="form.pToadoMatsanTen"
                                        :disabled="true" rows="2"></textarea>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="row">
                                <div class="info-row">
                                    <div class="key w150">Tọa độ trục dọc<span style="color: red;">*</span></div>
                                    <div class="value">
                                        <input type="text" class="form-control" v-model.trim="form.pTruc_Doc"
                                            maxlength="2" :disabled="isDisableBtnGhiLai">
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="info-row">
                                    <div class="key w150">Tọa độ trục ngang<span style="color: red;">*</span></div>
                                    <div class="value">
                                        <input type="text" class="form-control" v-model.trim="form.pTruc_Ngang"
                                            maxlength="2" :disabled="isDisableBtnGhiLai">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="info-row">
                        <div class="key w150">Ghi chú</div>
                        <div class="value">
                            <input type="text" class="form-control" :disabled="isDisableBtnGhiLai"
                                v-model="form.pGhiChu" />
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="box-form">
            <div class="legend-title">Danh sách Tọa độ mặt sàn</div>
            <DataGrid
                v-bind:columns="[
            {fieldName: 'TOADO_MATSAN_ID', headerText: 'ID Tọa độ mặt sàn', width: 120, allowFiltering: true, allowSorting: false},
            {fieldName: 'MATSAN_TEN', headerText: 'Tên Mặt sàn', width: 200, allowFiltering: true, allowSorting: false},
            {fieldName: 'TEN', headerText: 'Tên Tọa độ Mặt sàn', width: 400, allowFiltering: true, allowSorting: false},
            {fieldName: 'TRUC_DOC', headerText: 'Tọa độ trục dọc', width: 150, allowFiltering: true, allowSorting: false},
            {fieldName: 'TRUC_NGANG', headerText: 'Tọa độ trục ngang', width: 150, allowFiltering: true, allowSorting: false},
            {fieldName: 'HIEU_LUC_TEXT', headerText: 'Hiệu lực', width: 100, allowFiltering: true, allowSorting: false}]"
                :dataSource="dsToaDoMatSan" :showFilter="true" :allowPaging="true" :enablePagingServer="false"
                :enabledSelectFirstRow="false" :selectionSettings="selectionOptions" @rowSelected="onSelectRowChanged"
                dataKeyField="TOADO_MATSAN_ID" ref="dsTienTrinhGrid">
            </DataGrid>
        </div>
    </div>
    <template>
        <b-modal id="import-modal" v-model="showImportDialog" title="Import dữ liệu" size="lg">
            <div>
                <a href="javascript:void(0)" @click="taiFileMau"><span class="icon one-template"
                        style="font-size:24px;"></span>Tải file mẫu</a>
            </div>
            <div>&nbsp;</div>
            <div>
                <b-form-group label="File đính kèm *">
                    <b-form-file v-model="selectedFile" accept=".xls,.xlsx" browse-text="Nhập từ Excel"
                        placeholder="Chọn file Excel (xls, xlsx)..."></b-form-file>
                </b-form-group>
            </div>

            <div v-if="importSuccess" class="alert alert-success p-2">
                ✅ Import thành công:<br />
                {{ importSuccess }}
            </div>
            <div v-if="importError" class="alert alert-danger p-2">
                ⚠️ {{ importError }}
                <div v-if="fileError" class="alert alert-danger p-2">
                    <a href="javascript:void(0)" @click="taiFileError"><span class="icon one-template"
                        style="font-size:24px;"></span>Tải file lỗi</a>
                </div>
            </div>

            <!-- footer modal -->
            <template #modal-footer>
                <b-button variant="secondary" @click="showImportDialog = false">Đóng</b-button>
                <b-button variant="primary" @click="doImport">Import</b-button>
            </template>
        </b-modal>
    </template>
</div>
