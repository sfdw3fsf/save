<div>
  <div class="map-content">
    <div class="map-wrapper" :class="{ 'marker-mode': markerMode }">
      <div ref="mapContainer" class="vietnam-map"></div>
      <!-- Hover popup component -->
      <MarkerHoverPopup 
        :show="hoverPopup.show"
        :data="hoverPopup.data"
        :position="hoverPopup.position"
        @close="handlePopupClose"
        @edit="handlePopupEdit"
        @details="handlePopupDetails"
      />
    </div>
  </div>
</div>
