<b-modal
    :id="id"
    size="xl"
    no-close-on-backdrop
    hide-footer
    hide-header
    hide-header-close
    body-class="modal-body p-0"
    @hidden="onModalHidden">
    <div class="modal-content popup-box">
        <div class="popup-header">
            <div class="title">Khóa Phiếu Tạm</div>
            <div
                class="close -ap icon-close"
                data-dismiss="modal"
                @click="$bvModal.hide(id)">
            </div>
        </div>
        <div class="list-actions-top">
            <ul class="list">
                <li>
                    <a href="javascript:void(0)" @click="onClickKhoaPhieuTam">
                        Chấp nhận
                    </a>
                </li>
            </ul>
        </div>
        <div class="popup-body">
          <div class="col-md-12">
            <br/>
            <div class="info-row">
              <div class="key w110">Ghi chú</div>
              <div class="value">
                <input type="text" v-model="txtGhiChuKhoaPhieu" class="form-control" id="txtTenWifi">
              </div>
            </div>
            <br/>
            <br/>
          </div>
        </div>
    </div>
</b-modal>
