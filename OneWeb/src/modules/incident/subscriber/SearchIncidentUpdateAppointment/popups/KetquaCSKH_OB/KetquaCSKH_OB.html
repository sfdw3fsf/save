<b-modal ref="ketquaCSKH_OBModal" size="xl" hide-header hide-header-close hide-footer body-class="p-0"
  no-close-on-backdrop @show="handleShowModal">
  <div class="modal-content popup-box">
    <div class="popup-header">
      <div class="title">
        <span class="icon one-notepad"></span>Kết quả phiếu CSKH OB
      </div>
      <div class="close -ap icon-close" @click="hideModal"></div>
    </div>
    <div class="popup-body">
      <div class="box-form">
        <div class="legend-title">Danh sách kết quả phiếu CSKH OB</div>
        <DataGrid v-bind:columns="[
                            {fieldName: 'ketqua_ob', headerText: 'Tên kết quả OB', allowFiltering: true, allowSorting: false, width: 150},
                            {fieldName: 'ghi_chu', headerText: 'Ghi chú', allowFiltering: true, allowSorting: false, width: 150},
                            {fieldName: 'ngay_hen', headerText: 'Ngày hẹn từ', allowFiltering: true, allowSorting: false, width: 150},
                            {fieldName: 'ngayhen_den', headerText: 'Ngày hẹn đến', allowFiltering: true, allowSorting: false, width: 150},
                            {fieldName: 'ngay_cn', headerText: 'Ngày cập nhật', allowFiltering: true, allowSorting: false, width: 150},
                            {fieldName: 'ma_nv', headerText: 'Mã NV cập nhật', allowFiltering: true, allowSorting: false, width: 150},
                            {fieldName: 'ten_nv', headerText: 'Tên NV cập nhật', allowFiltering: true, allowSorting: false, width: 110},
                            {fieldName: 'ten_dv', headerText: 'Đơn vị NV cập nhật', allowFiltering: true, allowSorting: false, width: 110},
                            ]" v-bind:dataSource="DsKetquaCSKH_OB" :showFilter="true" :allowPaging="true" ref="KetquaCSKHOBGrid"
          :enablePagingServer="false" :allowExcelExport="true"  :allowGrouping="true">
        </DataGrid>

      </div>
    </div>
  </div>
</b-modal>
