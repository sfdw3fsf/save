<div>
  <div class="list-actions-top">
    <ul class="list">
      <li @click="onSearch">
        <b-link href="javascript:void(0)"> <span class="icon one-search"></span>Tìm kiếm</b-link>
      </li>
      <li @click="onResetSearch">
        <b-link href="javascript:void(0)"> <span class="icon one-refresh"></span>Làm mới</b-link>
      </li>
      <li @click="onNew">
        <b-link href="javascript:void(0)"> <span class="icon one-file-plus"></span>Nhập mới</b-link>
      </li>
    </ul>
  </div>

  <div class="page-content">
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="legend-title">Tìm kiếm IP Store</div>
          <div class="row">
            <div class="col-sm-3 col-12">
              <div class="info-row">
                <div class="key w130">Địa chỉ IP</div>
                <div class="value">
                  <input v-model.trim="searchForm.ip" type="text" class="form-control" placeholder="Nhập IP" />
                </div>
              </div>
            </div>
            <div class="col-sm-3 col-12">
              <div class="info-row">
                <div class="key w130">Loại IP</div>
                <div class="value">
                  <SelectExt
                    v-model.number="searchForm.loaiIP"
                    dataTextField="TEN"
                    dataValueField="ID"
                    :dataSource="[{ ID: -1, TEN: 'Tất cả' }, ...loaiIPList]"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-3 col-12">
              <div class="info-row">
                <div class="key w130">Phân loại IP</div>
                <div class="value">
                  <SelectExt
                    v-model.number="searchForm.phanLoaiIP"
                    dataTextField="TEN"
                    dataValueField="ID"
                    :dataSource="[{ ID: -1, TEN: 'Tất cả' }, ...phanLoaiIPList]"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-3 col-12">
              <div class="info-row">
                <div class="key w130">Thuộc IDC</div>
                <div class="value">
                  <SelectExt
                    v-model.number="searchForm.idc"
                    dataTextField="TEN"
                    dataValueField="ID"
                    :dataSource="[{ ID: -1, TEN: 'Tất cả' }, ...IDCList]"
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-3 col-12">
              <div class="info-row">
                <div class="key w130">VRF</div>
                <div class="value">
                  <input v-model.trim="searchForm.vrf" type="text" class="form-control" placeholder="Nhập VRF" />
                </div>
              </div>
            </div>
            <div class="col-sm-3 col-12">
              <div class="info-row">
                <div class="key w130">Zone</div>
                <div class="value">
                  <input v-model.trim="searchForm.zone" type="text" class="form-control" placeholder="Nhập zone" />
                </div>
              </div>
            </div>
            <div class="col-sm-3 col-12">
              <div class="info-row">
                <div class="key w130">VLAN</div>
                <div class="value">
                  <input v-model.trim="searchForm.vlan" type="text" class="form-control" placeholder="Nhập VLAN" />
                </div>
              </div>
            </div>
            <div class="col-sm-3 col-12">
              <div class="info-row">
                <div class="key w130">Hiệu lực</div>
                <div class="value">
                  <SelectExt
                    v-model.number="searchForm.hieuLuc"
                    dataTextField="text"
                    dataValueField="value"
                    :dataSource="hieuLucOptions"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="legend-title d-flex justify-content-between align-items-center">
            <span>Danh sách IP Store</span>
            <span class="total-records">Tổng: {{ filteredItems.length }} IP</span>
          </div>
          <div class="row">
            <div class="col-12">
              <DataGrid
                ref="gridItems"
                :allowPaging="true"
                :enablePagingServer="false"
                :showColumnCheckbox="false"
                :dataSource="filteredItems"
                :columns="ipStoreColumns"
                @rowSelected="onRowSelected"
              ></DataGrid>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <ThongTinChiTiet
    v-model="showModal"
    :title="modalTitle"
    :activeTab="activeTab"
    :currentItem="currentItem"
    :loaiIPList="loaiIPList"
    :phanLoaiIPList="phanLoaiIPList"
    :IDCList="IDCList"
    :VRFList="VRFList"
    :ZoneList="ZoneList"
    :VlanList="VlanList"
    :SubnetList="SubnetList"
    :QuyHoachSubnetList="QuyHoachSubnetList"
    :lichSuCapPhatList="lichSuCapPhatList"
    :lichSuCapPhatColumns="lichSuCapPhatColumns"
    :lichSuThayDoiList="lichSuThayDoiList"
    :lichSuThayDoiColumns="lichSuThayDoiColumns"
    :ip-invalid="ipInvalid"
    @close="closeModal"
    @save="saveCurrentItem"
    @hidden="onModalHidden"
    @update:activeTab="activeTab = $event"
  />
</div>
