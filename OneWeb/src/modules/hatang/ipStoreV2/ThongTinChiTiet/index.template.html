<ejs-dialog
  ref="ipStoreDialog"
  :visible="false"
  :isModal="true"
  :animationSettings="animationSettings"
  :target="dialogTarget"
  :header="title"
  showCloseIcon="true"
  width="80%"
  height="auto"
  :close="handleDialogClose"
  :open="handleDialogOpen"
>
<div class="list-actions-top">
  <ul class="list">
    <li>
      <b-link href="javascript:void(0)" @click="$emit('save')">
        <span class="icon one-save"></span>Ghi lại
      </b-link>
    </li>
    <li>
      <b-link href="javascript:void(0)" @click="$emit('close')">
        <span class="icon ui-1_circle-remove nc-icon-glyph"></span>Đóng
      </b-link>
    </li>
  </ul>
</div>
  <div class="box-form">
    <div class="tabs-wrapper">
      <div class="nav tab-over tabs">
        <a href="#tabThongTinChung" class="tab" :class="{ active: tabModel === 1 }" @click.prevent="changeTab(1)"
          >Thông tin chung</a
        >
        <a href="#tabLichSuCapPhat" class="tab" :class="{ active: tabModel === 2 }" @click.prevent="changeTab(2)"
          >Lịch sử cấp phát</a
        >
        <a href="#tabLichSuThayDoi" class="tab" :class="{ active: tabModel === 3 }" @click.prevent="changeTab(3)"
          >Lịch sử thay đổi</a
        >
      </div>
      <div class="tab-content">
          <div id="tabThongTinChung" class="tab-pane" :class="{ active: tabModel === 1 }">
            <ThongTinChung
              :currentItem="currentItem"
              :loaiIPList="loaiIPList"
              :phanLoaiIPList="phanLoaiIPList"
              :IDCList="IDCList"
              :VRFList="VRFList"
              :ZoneList="ZoneList"
              :VlanList="VlanList"
              :SubnetList="SubnetList"
              :QuyHoachSubnetList="QuyHoachSubnetList"
              :ip-invalid="ipInvalid"
            />
          </div>
        <div id="tabLichSuCapPhat" class="tab-pane" :class="{ active: tabModel === 2 }">
          <LichSuCapPhat :dataSource="lichSuCapPhatList" :columns="lichSuCapPhatColumns" />
        </div>
        <div id="tabLichSuThayDoi" class="tab-pane" :class="{ active: tabModel === 3 }">
          <LichSuThayDoi :dataSource="lichSuThayDoiList" :columns="lichSuThayDoiColumns" />
        </div>
      </div>
    </div>
  </div>
</ejs-dialog>
