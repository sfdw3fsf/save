<div>
    <div class="list-actions-top">
        <ul class="list">
            <li>
                <b-link href="javascript:void(0)" @click="onAddNew" :disabled="!buttons.btnAddNew.enabled">
                    <span class="icon one-file-plus"></span>Nhập
                </b-link>
            </li>
            <li>
                <b-link href="javascript:void(0)" @click="onSave" :disabled="!buttons.btnSave.enabled">
                    <span class="icon one-save"></span>Ghi lại
                </b-link>
            </li>
            <li>
                <b-link href="javascript:void(0)" @click="onDelete" :disabled="!buttons.btnSave.enabled">
                    <span class="icon one-save"></span>Xoá
                </b-link>
            </li>
        </ul>
    </div>
    <div class="page-content">
        <div class="row">
            <div class="col-12">
                <!-- Thông tin chung -->
                <div class="box-form">
                    <div class="row">
                        <div class="legend-title">Thông tin chung
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w180">Tên Disk (*) </div>
                                <div class="value">
                                    <input type="text" class="form-control" :disabled="!controls.text.enabled"
                                        v-model="current_item.ten" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w180">Hiệu lực</div>
                                <div class="value padt4">
                                    <div class="check-action">
                                        <input type="checkbox" class="check" :disabled="!controls.checkbox.enabled"
                                            v-model="current_item.hieu_luc" :true-value="1" :false-value="0" />
                                        <span class="name"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <!-- <div class="info-row">
                                <div class="key w180">Loại Disk (*) </div>
                                <div class="value">
                                    <SelectExt v-model="current_item.backup_loai_id" dataTextField="TEN"
                                        dataValueField="ID" :dataSource="select_loai_backup"
                                        :disabled="!controls.selection.enabled"
                                        :class="controls.selection.invalid ? 'is-invalid' : ''" />
                                </div>
                            </div> -->
                            <div class="info-row">
                                <div class="key w180">Loại Disk (*) </div>
                                <div class="value">
                                    <SelectExt v-model="current_item.loai_disk" dataTextField="TEN"
                                        dataValueField="ID" :dataSource="select_disk"
                                        :disabled="!controls.selection.enabled"/>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w180">Dung lượng cấp </div>
                                <div class="value">
                                    <input type="number" class="form-control"
                                        :disabled="!controls.selection.enabled"
                                        v-model="current_item.dung_luong" />
                                </div>
                                <div class="key w50" style="padding-left: 10px;font-weight: bold;">GB </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Danh sách -->
        <div class="row">
            <div class="col-12">
                <div class="box-form">
                    <div class="row">
                        <div class="legend-title">Danh sách Tài nguyên Disk VM
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-12">
                            <DataGrid ref="grdItems" :allowPaging="true" :enablePagingServer="false"
                                :showColumnCheckbox="true" v-bind:columns="[
                                {fieldName: 'stt', headerText: 'STT', textAlign: 'Center'},
                                {fieldName: 'ten', headerText: 'Tên Disk', textAlign: 'Center'},
                                {fieldName: 'loai_disk', headerText: 'Loại Disk', textAlign: 'Center'},
                                {fieldName: 'dung_luong', headerText: 'Dung lượng', textAlign: 'Center'},
                                {fieldName: 'hieu_luc', headerText: 'Hiệu lực', textAlign: 'Center'},
                                ]" v-bind:dataSource="item_list">
                                >
                            </DataGrid>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
