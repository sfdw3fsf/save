<b-modal
  ref="popup_them_mayao"
  size="xl"
  hide-header
  hide-header-close
  hide-footer
  body-class="p-0"
  no-close-on-backdrop
>
  <div class="modal-content popup-box">
    <div class="popup-header">
      <div class="title"><span class="icon one-notepad"></span> Thêm máy ảo</div>
      <div class="close -ap icon-close" @click="hideModal"></div>
    </div>
    <div class="popup-body">
      <div class="row">
        <div class="col-sm-4 col-12">
          <div class="info-row">
            <div class="value">
              <input type="text" 
                     class="form-control" 
                     @keyup.enter="onTimKiem"
                     v-model="search_param" />
            </div>
          </div>
        </div>
        <div class="col-sm-8 col-12">
          <div class="info-row">
            <button @click="onTimKiem" class="btn btn-second nocorner" style="width: 120px; margin-right: 5px;">
              <span class="icon one-search"></span> Tìm kiếm
            </button>
            <button @click="xacNhanThemMayAo" class="btn btn-second nocorner" style="width: 120px; margin-right: 5px;">
              <span class="icon nc-icon-glyph ui-1_check-circle-08"></span> Xác nhận
            </button>
            <button @click="hideModal" class="btn btn-second nocorner" style="width: 120px; margin-right: 5px;">
              <span class="icon nc-icon-glyph ui-1_circle-remove"></span> Thoát
            </button>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="grid-ext grid-ext-nodata">
          <DataGrid
            ref="grdItems"
            :allowPaging="true"
            :enablePagingServer="false"
            :showColumnCheckbox="true"
            v-bind:columns="[
                        {fieldName: 'ten', headerText: 'Tên máy ảo', textAlign: 'Left'},
                        {fieldName: 'hatangaohoa_ten', headerText: 'Hạ tầng ảo hóa', textAlign: 'Left'},
                        {fieldName: 'hatangidg_ten', headerText: 'Hạ tầng IDG', textAlign: 'Left'},
                        {fieldName: 'loaivaitro_ten', headerText: 'Vai trò', textAlign: 'Left'},
                        {fieldName: 'hedieuhanh_ten', headerText: 'Hệ điều hành', textAlign: 'Left'},
                        {fieldName: 'ngay_tao', headerText: 'Ngày tạo', textAlign: 'Left'},
                        {fieldName: 'ngay_hethan', headerText: 'Ngày hết hạn', textAlign: 'Left'},
                        {fieldName: 'phanloaihatang_ten', headerText: 'Phân loại HT', textAlign: 'Left'},
                        {fieldName: 'trangthaimayao_ten', headerText: 'Trạng thái', textAlign: 'Left'},
                        {fieldName: 'hieuluc', headerText: 'Hiệu lực', textAlign: 'Left'},
                        ]"
            v-bind:dataSource="thietbi_hinhthanh_hatang_list"
            >>
          </DataGrid>
        </div>
      </div>
    </div>
  </div>
</b-modal>
