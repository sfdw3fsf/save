<div class="quanly-subnet-wrapper">
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)"> <span class="icon one-search"></span>Tìm kiếm</b-link>
      </li>

      <li>
        <b-link @click="onAddSubnet()" href="javascript:void(0)">
          <span class="icon one-file-plus"></span>Nhập mới</b-link>
      </li>
    </ul>
  </div>

  <main class="page-content">
    <!-- Subnet Search Form -->
    <section class="box-form">
      <p class="legend-title">Tìm kiếm Subnet</p>

      <div class="row">
        <!-- Tên Subnet -->
        <div class="info-row col-sm-4 col-12">
          <label class="key w150">Tên Subnet</label>
          <div class="value">
            <input v-model.trim="form.name" type="text" class="form-control" placeholder="Nhập tên Subnet" />
          </div>
        </div>

        <!-- Subnet Mask -->
        <div class="info-row col-sm-4 col-12">
          <label class="key w150">Subnet Mask</label>
          <div class="value">
            <input v-model.trim="form.mask" type="text" class="form-control" placeholder="Ví dụ: 255.255.255.0" />
          </div>
        </div>

        <!-- Prefix / CIDR -->
        <div class="info-row col-sm-4 col-12">
          <label class="key w150">Subnet</label>
          <div class="value">
            <input v-model.trim="form.prefix" type="text" class="form-control" placeholder="/24" />
          </div>
        </div>

        <!-- Loại IP -->
        <div class="info-row col-sm-4 col-12">
          <label class="key w150">Loại IP</label>
          <div class="value">
            <SelectExt :dataSource="[]" dataTextField="TEN" dataValueField="ID" v-model="form.ipType" />
          </div>
        </div>

        <!-- Phân loại -->
        <div class="info-row col-sm-4 col-12">
          <label class="key w150">Phân loại</label>
          <div class="value">
            <SelectExt :dataSource="[]" dataTextField="TEN" dataValueField="ID" v-model="form.phanLoaiIp" />
          </div>
        </div>

        <!-- IDC -->
        <div class="info-row col-sm-4 col-12">
          <label class="key w150">IDC</label>
          <div class="value">
            <input v-model.trim="form.idc" type="text" class="form-control" placeholder="Nhập IDC" />
          </div>
        </div>

      </div>
    </section>

    <!-- Subnet Table -->
    <section class="box-form">
      <p class="legend-title">Danh sách Subnet</p>

      <DataGrid ref="gridItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="false"
        :dataSource="allSubnetList" :columns="subnetColumns" @rowSelected="onRowSelected">
      </DataGrid>

      <ModalSubnet @updated="reloadList" :subnetId="selectedSubnetId" :mode="modalMode" :visible="showModal"
        @close="showModal = false" @save="onSaveSubnet" />

      <AddSubnetModal :visible="showAddModal" @close="showAddModal = false" @save="createSubnet" />
    </section>
  </main>
</div>
