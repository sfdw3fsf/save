<div >
    <div class="list-actions-top">
        <ul class="list">
            <li  :class="{disabled: isDisableNew }">
                <a href="#" @click.prevent="onNew">
                    <span class="icon one-file-plus"></span> Nhập mới
                </a>
            </li>
            <li :class="{disabled: isDisableSave}">
                <a href="#" @click.prevent="setDanhSach" >
                    <span class="icon one-save"></span> Ghi Lại
                </a>
            </li>
            <li :class="{disabled: isDisableUpdate}">
                <a href="#" @click.prevent="editDanhSach">
                    <span class="icon one-edit"></span> Sửa
                </a>
            </li>
            <li :class="{disabled: isDisableDelete}">
                <a href="#" @click.prevent="deleteDanhSach" >
                    <span class="icon one-trash"></span> Xóa
                </a>
            </li>
        </ul>
    </div>
    <div class="page-content">
        <div class="box-form">
            <div class="legend-title">Thông tin hãng sản xuất</div>
            <div class="row">
                <div class="col-sm-6 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Tên<span style="color: red;">*</span>
                        </div>
                        <div class="value">
                            <input type="text" class="form-control" v-model.trim="form.pTen" :disabled="isDisableSave">
                        </div>
                    </div>
                </div>
                <div class="col-sm-4 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Mã hãng<span style="color: red;">*</span>
                        </div>
                        <div class="value">
                            <input type="text" class="form-control" v-model.trim="form.pMaHSX" :disabled="isDisableSave">
                        </div>
                    </div>
                </div>
                <div class="col-sm-2 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Hiệu lực
                        </div>
                        <div class="form-check ">
                            <input class="form-check-input" type="checkbox" v-model="form.pHieuLuc" id="flexCheckDefault" :disabled="isDisableSave">
                        </div>
                    </div>
                </div>
            </div>

            <div class="info-row">
                <div class="key w100">
                    Ghi chú
                </div>
                <div class="value">
                    <input type="text" class="form-control" v-model.trim="form.pGhiChu" :disabled="isDisableSave">
                </div>
            </div>

        </div>
        <div class="box-form">
            <div class="legend-title">Danh sách hãng sản xuất</div>
            <DataGrid v-bind:columns="[
            {fieldName: 'TEN', headerText: 'Tên', allowFiltering: true, allowSorting: false},
            {fieldName: 'HIEU_LUC_TEXT', headerText: 'Hiệu lực', allowFiltering: true, allowSorting: false, width: 100}]" 
            :dataSource="dsHangSanXuat" 
            :showFilter="true" 
            :allowPaging="true" 
            :enablePagingServer="false"            
            @selectedItemsChanged="onSelectRowCheckbox"                        
            @rowSelected="onSelectRowChanged"
            :selectionSettings="selectionOptions"
            dataKeyField="ID"  
                ref="dsTienTrinhGrid">
            </DataGrid>
        </div>
    </div>
</div>
