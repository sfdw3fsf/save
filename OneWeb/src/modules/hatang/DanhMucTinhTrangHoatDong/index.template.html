<div>
    <div class="list-actions-top">
        <ul class="list">
            <li>
              <b-link href="javascript:void(0)" @click="onNew" :disabled="!buttons.btnNhapMoi.enabled"> <span class="icon one-file-plus"></span>Nhập mới </b-link>
            </li>
            <li>
              <b-link href="javascript:void(0)" @click="createTinhTrangHoatDong" :disabled="!buttons.btnGhiLai.enabled"> <span class="icon one-save"></span>Ghi lại </b-link>
            </li>
            <li>
              <b-link href="javascript:void(0)" @click="canceleTinhTrangHoatDong" :disabled="!buttons.btnHuyBo.enabled"> <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ </b-link>
            </li>
            <li>
              <b-link href="javascript:void(0)" @click="updateTinhTrangHoatDong" :disabled="!buttons.btnSua.enabled"> <span class="icon nc-icon-glyph ui-1_edit-72"></span>Sửa </b-link>
            </li>
            <li>
              <b-link href="javascript:void(0)" @click="deleteDanhSach" :disabled="!buttons.btnXoa.enabled"> <span class="icon one-trash"></span>Xóa </b-link>
            </li>
        </ul>
    </div>
    <div class="page-content">
        <div class="box-form">
            <div class="legend-title">Thông tin Tình trạng hoạt động</div>
            <div class="row">
                <div class="col-sm-6 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Tên<span class="required"> *</span>
                        </div>
                        <div class="value">
                            <input type="text" class="form-control" v-model="form.ten" :disabled="!controls.txtTen.enabled">
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Hiệu lực
                        </div>
                        <div class="form-check ">
                            <input class="form-check-input" type="checkbox" v-model="form.hieuluc" id="flexCheckDefault" :disabled="!controls.checkHieuLuc.enabled">
                        </div>
                    </div>
                </div>
            </div>
            <div class="info-row">
                <div class="key w100">
                    Ghi chú
                </div>
                <div class="value">
                    <input type="text" class="form-control" v-model="form.ghichu" :disabled="!controls.txtGhiChu.enabled">
                </div>
            </div>

        </div>
        <div class="box-form">
            <div class="legend-title">Danh sách Tình trạng hoạt động</div>
            <DataGrid v-bind:columns="[
            {fieldName: 'TEN', headerText: 'Tên', allowFiltering: true, allowSorting: false},
            {fieldName: 'HIEU_LUC_TEXT', headerText: 'Hiệu lực', allowFiltering: true, allowSorting: false, width: 100}]"
            :dataSource="dsTinhTrangHoatDong"
            :showFilter="true"
            :allowPaging="true"
            :enablePagingServer="false"
            :showColumnCheckbox="true"
            @selectedItemsChanged="onSelectRowCheckbox"
            @rowSelected="onSelectRowChanged"
            dataKeyField="ID"
                ref="dsTinhTrangHoatDong">
            </DataGrid>
        </div>
    </div>
</div>
