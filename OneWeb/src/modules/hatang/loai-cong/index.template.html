<div>
    <div class="list-actions-top">
        <ul class="list">
            <li>
                <b-link href="javascript:void(0)" @click="btnNhapMoi_Click" :disabled="!buttons.btnNhapMoi.enabled">
                    <span class="icon one-file-plus"></span>Nhập mới
                </b-link>
            </li>
            <li>
                <b-link href="javascript:void(0)" @click="btnGhiLai_Click" :disabled="!buttons.btnGhiLai.enabled">
                    <span class="icon one-save"></span>Ghi lại
                </b-link>
            </li>
            <li>
                <b-link href="javascript:void(0)" @click="btnHuyBo_Click" :disabled="!buttons.btnHuyBo.enabled">
                    <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
                </b-link>
            </li>
            <li>
                <b-link href="javascript:void(0)" @click="btnSua_Click" :disabled="!buttons.btnSua.enabled">
                    <span class="icon nc-icon-glyph ui-1_edit-72"></span>Sửa
                </b-link>
            </li>
            <li>
                <b-link href="javascript:void(0)" @click="btnXoa_Click" :disabled="!buttons.btnXoa.enabled">
                    <span class="icon one-trash"></span>Xóa
                </b-link>
            </li>
        </ul>
    </div>
    <div class="page-content">
        <div class="row">
            <div class="col-12">
                <div class="box-form">
                    <div class="row">
                        <div class="legend-title">Thông tin Loại cổng
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Tên <span class="red">*</span></div>
                                <div class="value">
                                    <input type="text" class="form-control"
                                        :class="controls.txtName.invalid ? 'is-invalid' : ''"
                                        :disabled="!controls.txtName.enabled" v-model="currentItem.ten" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="row">
                                <div class="col-sm-6 col-12">
                                    <div class="info-row">
                                        <div class="key w100">Hiệu lực</div>
                                        <div class="value padt4">
                                            <div class="check-action">
                                                <input type="checkbox" class="check"
                                                    :disabled="!controls.checBoxHieuLuc.enabled"
                                                    v-model="currentItem.hieuLuc" :true-value="1"
                                                    :false-value="0" /><span class="name"></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-sm-6 col-12">
                                    <div class="info-row">
                                        <div class="key w160">Cho phép cắm module</div>
                                        <div class="value padt4">
                                            <div class="check-action">
                                                <input type="checkbox" class="check"
                                                    :disabled="!controls.checBoxCamModule.enabled"
                                                    v-model="currentItem.camModule" :true-value="1"
                                                    :false-value="0" /><span class="name"></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Phân loại <span class="red">*</span></div>
                                <div class="value">
                                    <!-- :settings="{allowClear: true}" -->
                                    <SelectExt :settings="{placeholder: 'Interface, Power, Console'}"
                                        :dataSource="dsPhanLoaiCong" dataTextField="Name" dataValueField="ID"
                                        :disabled="!controls.comboboxPhanLoai.enabled" v-model="currentItem.phanLoai" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Thuộc nhóm</div>
                                <div class="value">
                                    <SelectExt :settings="{placeholder: 'Serial, USB, Other'}" :dataSource="dsNhomCong"
                                        dataTextField="Name" dataValueField="ID"
                                        :disabled="!controls.comboboxNhom.enabled" v-model="currentItem.thuocNhom" />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Tốc độ PORT <span class="red">*</span></div>
                                <div class="value">
                                    <input type="text" class="form-control"
                                        :class="controls.txtTocDoPort.invalid ? 'is-invalid' : ''"
                                        :disabled="!controls.txtTocDoPort.enabled" v-model="currentItem.tocDoPort" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Ghi chú</div>
                                <div class="value">
                                    <input type="text" class="form-control" :disabled="!controls.txtGhiChu.enabled"
                                        v-model="currentItem.ghiChu" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-12">
                <div class="box-form">
                    <div class="row">
                        <div class="legend-title">Danh sách Loại cổng
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-12">
                            <DataGrid ref="gridItems" :allowPaging="true" :enablePagingServer="false"
                                :showColumnCheckbox="true" v-bind:columns="[
                                {fieldName: 'TEN', headerText: 'Tên', textAlign: 'Left'},
                                {fieldName: 'PHANLOAI_NAME', headerText: 'Phân loại', width: 100, textAlign: 'Left'},
                                {fieldName: 'THUOCNHOM_NAME', headerText: 'Thuộc nhóm', width: 100, textAlign: 'Left'},
                                {fieldName: 'CAM_MODULE', headerText: 'Cắm module', width: 75, template: getColumnCamModuleTemplate(), textAlign: 'Center'},
                                {fieldName: 'TOCDO_PORT', headerText: 'Tốc độ PORT', width: 100, textAlign: 'Left'},
                                {fieldName: 'GHI_CHU', headerText: 'Ghi chú', textAlign: 'Left'},
                                {fieldName: 'HIEU_LUC', headerText: 'Hiệu lực', width: 70, template: getColumnHieuLucTemplate(), textAlign: 'Left'}
                                ]" v-bind:dataSource="dataItems" @selectedRowChanged="gridItems_RowSelected"
                                @rowDeselected="gridItems_RowDeselected">
                            </DataGrid>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
