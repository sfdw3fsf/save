<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="onAddNew" :disabled="currentMode != 'VIEW'">
          <span class="icon one-file-plus"></span>Nhập mới
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onSave" :disabled="currentMode == 'VIEW'">
          <span class="icon one-save"></span>Ghi lại
        </b-link>
      </li>
      <!-- <li>
        <b-link href="javascript:void(0)" @click="onCancel" :disabled="!buttons.btnCancel.enabled">
          <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
        </b-link>
      </li> -->
      <li>
        <b-link href="javascript:void(0)" @click="onEdit" :disabled="currentMode != 'VIEW'">
          <span class="icon nc-icon-glyph ui-1_edit-72"></span>Sửa
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onDelete" :disabled="currentMode != 'VIEW'">
          <span class="icon one-trash"></span>Xóa
        </b-link>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Thông tin chung
            </div>
          </div>
          <!-- Tên VRF - Model thiết bị -->
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Model thiết bị <span class="red">*</span></div>
                <div class="value">
                  <input type="text" class="form-control" :class="controls.txtModelThietBi.invalid ? 'is-invalid' : ''"
                    :disabled="currentMode == 'VIEW'" v-model="currentItem.modelThietBi" />
                </div>
              </div>
            </div>
            <div class="col-sm-3 col-6">
              <div class="info-row">
                <div class="key w100">Hiệu lực</div>
                <div class="value padt4">
                  <div class="check-action">
                    <input type="checkbox" class="check" :disabled="currentMode == 'VIEW'" v-model="currentItem.hieuLuc"
                      :true-value="1" :false-value="0" /><span class="name"></span>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-sm-3 col-6">
              <div class="info-row">
                <div class="key w100">Full Depth</div>
                <div class="value padt4">
                  <div class="check-action">
                    <input type="checkbox" class="check" :disabled="currentMode == 'VIEW'"
                      v-model="currentItem.fulldepth" :true-value="1" :false-value="0" /><span class="name"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <!-- Thuộc IDC(selection) - RD -->
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Nhà sản xuất <span class="red">*</span></div>
                <div class="value">
                  <SelectExt v-model="currentItem.hangSanXuatId" @change="onChangeHangSanXuat()" dataTextField="TEN"
                    dataValueField="ID" :class="controls.selectNhaSanXuat.invalid ? 'is-invalid' : ''"
                    :dataSource="selectNhaSanXuatList" :disabled="currentMode == 'VIEW'" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Thuộc chủng loại TB </div>
                <div class="value">
                  <SelectExt dataTextField="MODEL" dataValueField="ID" :disabled="true"
                    v-model="currentItem.thuocChungLoaiId" :dataSource="chungLoaiTbItemList" />
                </div>
              </div>
            </div>
          </div>
          <!-- Thuộc thiết bị mạng(selection) - RD Export -->
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Chiều cao (U) </div>
                <div class="value">
                  <input type="number" class="form-control" :disabled="currentMode == 'VIEW'"
                    :class="controls.txtChieuCao.invalid ? 'is-invalid' : ''" v-model="currentItem.chieuCao" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Công suất định danh </div>
                <div class="value" style="display: flex; align-items: center;">
                  <input type="number" class="form-control" :disabled="currentMode == 'VIEW'"
                    :class="controls.txtCongSuatDinhDanh.invalid ? 'is-invalid' : ''"
                    v-model="currentItem.congSuatDinhDanh" />
                  <div style="margin-left: 5px;">W</div>
                </div>
              </div>
            </div>

          </div>
          <div class="info-row">
            <div class="key w100">Ghi chú</div>
            <div class="value">
              <input type="text" class="form-control" :disabled="currentMode == 'VIEW'" v-model="currentItem.ghiChu" />
            </div>
          </div>
          <div class="nav tab-over tabs" style="margin-top: 30px;">
            <!-- Tab 1 -->
            <a v-if="currentMode == 'ADD' || currentItem.phanLoai == null || currentItem.phanLoai == 1"
              href="#tabInterface" v-on:click="tab_index = 1" data-toggle="tab" class="tab"
              :class="{active: currentItem.phanLoai == null || currentItem.phanLoai == 1}">Interface</a>
            <!-- Tab 2 -->
            <a v-if="currentMode == 'ADD' || currentItem.phanLoai == null || currentItem.phanLoai == 2" href="#tabPower"
              v-on:click="tab_index = 2" data-toggle="tab" class="tab"
              :class="{active: currentItem.phanLoai == 2}">Power</a>
            <!-- Tab 3 -->
            <a v-if="currentMode == 'ADD' || currentItem.phanLoai == null || currentItem.phanLoai == 3"
              href="#tabConsole" v-on:click="tab_index = 3" data-toggle="tab" class="tab"
              :class="{active: currentItem.phanLoai == 3}">Console</a>
          </div>

          <div class="tab-content">
            <div v-if="currentMode == 'ADD' || currentItem.phanLoai == null || currentItem.phanLoai == 1"
              class="tab-pane" id="tabInterface"
              :class="{active: currentItem.phanLoai == null || currentItem.phanLoai == 1}">
              <interface-component :thongTinCard="currentItem" :listOfManufacturers="selectNhaSanXuatList"
                :modelParent.sync="currentItem.modelThietBi" :chungLoaiThietBiId="currentItem.id"
                :currentMode="currentMode"></interface-component>
            </div>
            <!-- Tab 2 -->
            <div v-if="currentMode == 'ADD' || currentItem.phanLoai == null || currentItem.phanLoai == 2"
              class="tab-pane" id="tabPower" :class="{active: currentItem.phanLoai == 2}">
              <power-component :thongTinCard="currentItem" :listOfManufacturers="selectNhaSanXuatList"
                :modelParent.sync="currentItem.modelThietBi" :chungLoaiThietBiId="currentItem.id"
                :currentMode="currentMode"></power-component>
            </div>
            <!-- Tab 3 -->
            <div v-if="currentMode == 'ADD' || currentItem.phanLoai == null || currentItem.phanLoai == 3"
              class="tab-pane" id="tabConsole" :class="{active: currentItem.phanLoai == 3}">
              <console-component :thongTinCard="currentItem" :listOfManufacturers="selectNhaSanXuatList"
                :modelParent.sync="currentItem.modelThietBi" :chungLoaiThietBiId="currentItem.id"
                :currentMode="currentMode"></console-component>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Lịch sử thay đổi -->
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Lịch sử thay đổi
            </div>
          </div>
          <div class="row">
            <div class="col-12">
              <DataGrid ref="grdItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="false"
                v-bind:columns="[
                                {fieldName: 'ORDER', headerText: 'STT', textAlign: 'Left', width: 50},
                                {fieldName: 'TACDONG', headerText: 'Tên tác động', textAlign: 'Left'},
                                {fieldName: 'FIELD', headerText: 'Trường thông tin thay đổi', textAlign: 'Left'},
                                {fieldName: 'OLD_VALUE', headerText: 'Giá trị cũ', textAlign: 'Left'},
                                {fieldName: 'NEW_VALUE', headerText: 'Giá trị mới', textAlign: 'Left'},
                                {fieldName: 'NGUOI_CN', headerText: 'Người thực hiện', textAlign: 'Left'},
                                {fieldName: 'NGAY_CN', headerText: 'Thời điểm', textAlign: 'Left'},
                                ]" v-bind:dataSource="historyChangesList"
                :enabledSelectFirstRow="false">
              </DataGrid>

            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Danh sách chủng loại thiết bị -->
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Danh sách chủng loại thiết bị
            </div>
          </div>
          <div class="row">
            <div class="col-12">
              <DataGrid ref="grdItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="false"
                v-bind:columns="[
                                {fieldName: 'MODEL', headerText: 'Model thiết bị', textAlign: 'Left'},
                                {fieldName: 'HANG_SX_ID', headerText: 'Nhà sản xuất', textAlign: 'Left', template: getHangSanXuatColumnTemplate(this)},
                                {fieldName: 'CHUNGLOAITHIETBI_ID', headerText: 'Thuộc chủng loại TB', textAlign: 'Left', template: getChungLoaiThietBiChaColumnTemplate(this)},
                                {fieldName: 'CHIEUCAO', headerText: 'Chiều cao (U)', textAlign: 'Left'},
                                {fieldName: 'CS_DINHDANH', headerText: 'Công suất', textAlign: 'Left'},
                                {fieldName: 'TENFULLDEPTH', headerText: 'Full depth', width: 100, textAlign: 'Left'},
                                {fieldName: 'TENHIEULUC', headerText: 'Hiệu lực', width: 100, textAlign: 'Left'},
                                ]" v-bind:dataSource="chungLoaiTbItemList" @rowSelected="grdItems_RowSelected"
                :enabledSelectFirstRow="true">
              </DataGrid>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
