<ejs-dialog :enableResize="true" :allowDragging="false" :visible="false" ref="dialogInterfaceThemCard"
    :animationSettings="animationSettings" :showHeader="false" :showCloseIcon="false" width="80%" height="auto"
    :target="target">
    <div class="modal-content popup-box">
        <div class="popup-header">
            <div class="title" style="font-weight: 600;">Khai báo Card</div>
            <div class="close -ap icon-close" @click="closeModalThemCard"></div>
        </div>
        <div class="popup-body">
            <div class="row">
                <div class="list-actions-top">
                    <ul class="list">
                        <li>
                            <b-link href="javascript:void(0)" @click="onSave">
                                <span class="icon one-save"></span>Ghi lại
                            </b-link>
                        </li>
                        <li>
                            <b-link href="javascript:void(0)" @click="closeModalThemCard">
                                <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
                            </b-link>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="row">
                <div class="box-form" style="margin-top: 10px;">
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Model thiết bị <span class="red">*</span></div>
                                <div class="value">
                                    <input type="text" class="form-control" v-model="card.model" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-3 col-6">
                            <div class="info-row">
                                <div class="key w100">Hiệu lực</div>
                                <div class="value padt4">
                                    <div class="check-action">
                                        <input type="checkbox" class="check" v-model="card.validity" :true-value="1"
                                            :false-value="0" /><span class="name"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-3 col-6">
                            <div class="info-row">
                                <div class="key w100">Full Depth</div>
                                <div class="value padt4">
                                    <div class="check-action">
                                        <input type="checkbox" class="check" v-model="card.fullDepth" :true-value="1"
                                            :false-value="0" /><span class="name"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Nhà sản xuất <span class="red">*</span></div>
                                <div class="value">
                                    <SelectExt v-model="card.manufacturer" dataTextField="TEN" dataValueField="ID"
                                        :dataSource="listOfManufacturers" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w140">Thuộc chủng loại TB </div>
                                <div class="value">
                                    <input type="text" class="form-control" v-model="card.parent" :disabled="true" />
                                    <!-- <SelectExt v-model="currentItem.thuocChungLoaiId" dataTextField="TEN" dataValueField="ID"
                                            :class="controls.selectChungLoaiTb.invalid ? 'is-invalid' : ''" :dataSource="thuocChungLoaiTbList"
                                            :disabled="!controls.selectChungLoaiTb.enabled" :settings="{allowClear:true}" /> -->
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Chiều cao (U) </div>
                                <div class="value">
                                    <input type="number" class="form-control" v-model="card.height" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w140">Công suất định danh </div>
                                <div class="value" style="display: flex; align-items: center;">
                                    <input type="number" class="form-control" v-model="card.capacity" />
                                    <div style="margin-left: 5px;">KWH</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="info-row">
                        <div class="key w100">Ghi chú</div>
                        <div class="value">
                            <input type="text" class="form-control" v-model="card.note" />
                        </div>
                    </div>
                </div>
            </div>
