<!-- Trường hợp linecard != 0 -->
<div>
  <div v-if="thongTinCard.soPowerModule != 0">
    <!-- Tab 1 Inteface-->
    <div class="table-content">
      <div class="row">
        <div class="col-md-1 col-12">
          <div class="info-row">
            <div class="key w100">Số Power Module <span class="red">*</span></div>
          </div>
        </div>
        <div class="col-md-9 col-12">
          <div class="info-row">
            <div class="value">
              <input type="number" class="form-control" :disabled="currentMode == 'VIEW'"
                v-model="thongTinCard.soPowerModule" />
            </div>
          </div>
        </div>
        <div class="col-md-2 col-12">
          <div class="info-row text-center">
            <button class="btn btn-second" style="width: 180px" @click="openModalThemCard">
              Thêm Module
            </button>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-1 col-12">
          <div class="info-row">
            <div class="key w100">Tổng số Port của TB </div>
          </div>
        </div>
        <div class="col-md-9 col-12">
          <div class="info-row">
            <div class="value">
              <input type="number" class="form-control" :disabled="true" v-model="sumPorts" />
            </div>
          </div>
        </div>
        <div class="col-md-2 col-12">
          <div class="info-row text-center">
            <button class="btn btn-second" style="width: 180px" @click="xemDanhSach">Xem danh sách</button>
            <DanhSachPortTheoLineCard ref="dialogDanhSachPortTheoLineCard" :thongTinCard="thongTinCard" />
          </div>
        </div>
      </div>
      <!-- Danh sách card -->
      <div class="row" style="padding-top: 20px;">
        <div class="legend-title">Danh sách Module
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <DataGrid ref="grdItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="false"
            v-bind:columns="[
                              {fieldName: 'MODEL', headerText: 'Model thiết bị', textAlign: 'Left'},
                              {fieldName: 'HANGSANXUAT_ID', headerText: 'Nhà sản xuất', textAlign: 'Left', template: getColumnManuFacturerTemplate()},
                              {fieldName: 'CHIEUCAO', headerText: 'Chiều cao', textAlign: 'Left'},
                              {fieldName: 'FULLDEPTH', headerText: 'Full Depth', textAlign: 'Left', template: getColumnFullDepthTemplate()},
                              {fieldName: 'CS_DINHDANH', headerText: 'Công suất định danh', textAlign: 'Left'},
                              {fieldName: 'HIEU_LUC', headerText: 'Hiệu lực', textAlign: 'Left', template: getColumnHieuLucTemplate()},
                              {headerText: 'Chi tiết', textAlign: 'Center', template: getColumnDetailsTemplate(this)},
                            ]" v-bind:dataSource="listOfModule" :enabledSelectFirstRow="false">
            >
          </DataGrid>
        </div>
      </div>

      <!-- Lịch sử thay đổi -->
      <!-- <div class="row" style="padding-top: 20px;"> 
        <div class="legend-title">Lịch sử thay đổi
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <DataGrid ref="grdItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true"
            v-bind:columns="[
                              {fieldName: 'SOTHUTU', headerText: 'STT', textAlign: 'Left'},
                              {fieldName: 'TACDONG', headerText: 'Tên tác động', textAlign: 'Left'},
                              {fieldName: 'FIELD', headerText: 'Trường thông tin thay đổi', textAlign: 'Left'},
                              {fieldName: 'OLD_VALUE', headerText: 'Giá trị cũ', textAlign: 'Left'},
                              {fieldName: 'NEW_VALUE', headerText: 'Giá trị mới', textAlign: 'Left'},
                              {fieldName: 'NGUOI_CN', headerText: 'Người thực hiện', textAlign: 'Left'},
                              {fieldName: 'NGAY_CN', headerText: 'Thời điểm', textAlign: 'Left'},
                              ]" v-bind:dataSource="lichSuItemList" @rowSelected="grdItems_RowSelected"
            @rowDeselected="grdItems_RowDeselected">
            >
          </DataGrid>
        </div>
      </div> -->
    </div>
  </div>
  <!-- Trường hợp linecard = 0 -->
  <div v-else>
    <!-- Tab 1 Inteface-->
    <div class="table-content">
      <div v-if="thongTinCard.phanLoai == null" class="row">
        <div class="col-12">
          <div class="info-row">
            <div class="key w150">Số Power Module <span class="red">*</span></div>
            <div class="value">
              <input type="number" class="form-control" :disabled="currentMode == 'VIEW'"
                v-model="thongTinCard.soPowerModule" />
            </div>
          </div>
        </div>
      </div>


      <!-- Khai báo Loại Cổng Interface -->
      <div class="row" style="padding-top: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
          <div class="title" style="font-weight: 600;">Khai báo Loại Cổng Power</div>
          <button class="btn btn-outline-primary" style="margin-left: 10px;"
            @click="khaiBaoCong"><strong><span>+</span></strong></button>
        </div>
        <div class="legend-title"></div>
      </div>
      <div class="row">
        <div class="col-12">
          <DataGrid ref="grdItems" :dataSource="listOfPowerModulePortTypes" :showColumnCheckbox="false" v-bind:columns="[
                                  {fieldName: 'loaicong_id', headerText: 'Loại cổng', textAlign: 'Left', template: getColumnLoaiCongTemplate()},
                                  {fieldName: 'so_cong', headerText: 'Số cổng', textAlign: 'Left'},
                                  {fieldName: 'bat_dau', headerText: 'Bắt đầu từ', textAlign: 'Left'},
                                  {fieldName: 'dinhdang_ten', headerText: 'Định dạng tên', textAlign: 'Left'},
                                  {fieldName: 'mucdichsudung_cong_id', headerText: 'Mục đích sử dụng', textAlign: 'Left', template: getColumnMucDichSuDungCongTemplate()},
                                  {fieldName: 'bangthongcong_id', headerText: 'Băng thông', textAlign: 'Left', template: getColumnBangThongCongTemplate()},
                                  {fieldName: 'thongtinmodule_id', headerText: 'Thông tin Module', textAlign: 'Left', template: getColumnThongTinModuleTemplate()},
                                  {fieldName: 'ketnoi', headerText: 'Kết nối', textAlign: 'Left', template: getColumnKetNoiTemplate()},
            ]" v-bind:commands="[
            {name: 'SUA', cssClass: 'btn-primary fa fa-pencil-square-o', width: 20},
            {name: 'XOA', cssClass: 'btn-primary fa fa-trash-o', width: 20}
            ]" v-bind:commandColumn="{headerText: 'Thao tác', textAlign: 'Left', show: true}"
            @commandClicked="grid_onCommandClicked" :enabledSelectFirstRow="false" :allowPaging="true"
            :enablePagingServer="false" />

        </div>
      </div>

      <!-- Danh sách Cổng Interface -->
      <div class="row" style="padding-top: 20px;">
        <div class="legend-title">Danh sách Cổng Power
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <DataGrid ref="grdItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="false"
            :enabledSelectFirstRow="false" v-bind:columns="[
                                {fieldName: 'sothutu', headerText: 'Số thứ tự', textAlign: 'Left'},
                                {fieldName: 'ten', headerText: 'Tên cổng', textAlign: 'Left'},
                                {fieldName: 'loaicong_id', headerText: 'Loại cổng', textAlign: 'Left', template: getColumnLoaiCongTemplate()},
                                {fieldName: 'mucdichsudung_cong_id', headerText: 'Mục đích sử dụng', textAlign: 'Left', template: getColumnMucDichSuDungCongTemplate()},
                                {fieldName: 'bangthongcong_id', headerText: 'Băng thông', textAlign: 'Left', template: getColumnBangThongCongTemplate()},
                                {fieldName: 'thongtinmodule_id', headerText: 'Thông tin Module', textAlign: 'Left', template: getColumnThongTinModuleTemplate()},
                                {fieldName: 'ketnoi', headerText: 'Kết nối', textAlign: 'Left', template: getColumnKetNoiTemplate()},
                                {fieldName: 'trangthaisd', headerText: 'Trạng thái sử dụng', textAlign: 'Left', template: getColumnStatusTemplate(this)},
                                ]"
            v-bind:dataSource="listOfPowerModulePorts">
            >
          </DataGrid>
        </div>
      </div>
    </div>

  </div>

  <KhaiBaoCongInterface ref="dialogKhaiBaoCongInterface" :thongTinCard="thongTinCard"
    @loadDsCongPower="loadDsCongPower" :fromTab="'power'"/>

  <!-- Button Thêm Card -->
  <ModalThemCard ref="dialogInterfaceThemCard" :listOfManufacturers="listOfManufacturers"
    :modelParent.sync="modelParent" :chungLoaiThietBiId="chungLoaiThietBiId" @loadDsModule="loadDsModule">
  </ModalThemCard>
</div>
