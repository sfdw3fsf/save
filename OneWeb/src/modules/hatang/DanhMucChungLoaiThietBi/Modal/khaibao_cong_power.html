<ejs-dialog :enableResize="true" :allowDragging="false" :visible="false" ref="dialogKhaiBaoCongPower"
    :animationSettings="animationSettings" :showHeader="false" :showCloseIcon="false" width="80%" height="auto"
    :target="target">
    <div class="modal-content popup-box">
        <div class="popup-header">
            <div class="title" style="font-weight: 600;">Khai báo Loại Cổng Power</div>
            <div class="close -ap icon-close" @click="closeDialog"></div>
        </div>
        <div class="popup-body">
            <div class="row" >
                <div class="list-actions-top">
                    <ul class="list">
                      <li>
                        <b-link href="javascript:void(0)" @click="onSave" >
                          <span class="icon one-save"></span>Cập nhật
                        </b-link>
                      </li>
                      <li>
                        <b-link href="javascript:void(0)" @click="closeDialog">
                          <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
                        </b-link>
                      </li>
                    </ul>
                </div>
            </div>
            <div class="row" >
                <div class="box-form" style="margin-top: 10px;">
                    <div class="legend-title">Thông tin loại cổng Power</div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                          <div class="info-row">
                            <div class="key w100">Loại cổng <span class="red">*</span></div>
                            <div class="value">
                              <SelectExt dataTextField="TEN"
                                dataValueField="ID" :class="controls.selectLoaiCong.invalid ? 'is-invalid' : ''"
                                :dataSource="loaiCongListItems" v-model="thongTinCong.loaicongId"/>
                            </div>
                          </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Số cổng <span class="red">*</span></div>
                              <div class="value">
                                <input type="number" class="form-control"
                                  :class="controls.txtSoCong.invalid ? 'is-invalid' : ''" v-model="thongTinCong.soCong"/>
                              </div>
                            </div>
                          </div>
                      </div>
                      <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Bắt đầu từ <span class="red">*</span></div>
                                <div class="value">
                                    <input type="number" class="form-control"
                                        :class="controls.txtBatDauTu.invalid ? 'is-invalid' : ''" v-model="thongTinCong.batdauTu"/>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Định dạng tên <span class="red">*</span></div>
                                <div class="value">
                                    <input type="number" class="form-control"
                                        :class="controls.txtDinhDangTen.invalid ? 'is-invalid' : ''" v-model="thongTinCong.dinhdangTen"/>
                                </div>
                            </div>
                        </div>
                       
                      </div>
                     
                </div>

            </div>
        </div>
    </div>
</ejs-dialog>
