<ejs-dialog :enableResize="true" :allowDragging="false" :visible="false" ref="dialogKhaiBaoCongInterface"
    :animationSettings="animationSettings" :showHeader="false" :showCloseIcon="false" width="80%" height="auto"
    :target="target">
    <div class="modal-content popup-box">
        <div class="popup-header">
            <div class="title" style="font-weight: 600;">Khai báo Loại Cổng {{fromTab}}</div>
            <div class="close -ap icon-close" @click="closeDialog"></div>
        </div>
        <div class="popup-body">
            <div class="row">
                <div class="list-actions-top">
                    <ul class="list">
                        <li>
                            <b-link href="javascript:void(0)" @click="onSave">
                                <span class="icon one-save"></span>Ghi lại
                            </b-link>
                        </li>
                        <li>
                            <b-link href="javascript:void(0)" @click="closeDialog">
                                <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
                            </b-link>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="row">
                <div class="box-form" style="margin-top: 10px;">
                    <div class="legend-title">Thông tin loại cổng {{fromTab}}</div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Loại cổng <span class="red">*</span></div>
                                <div class="value">
                                    <SelectExt dataTextField="TEN" dataValueField="ID"
                                        :class="controls.selectLoaiCong.invalid ? 'is-invalid' : ''"
                                        :dataSource="loaiCongListItems" v-model="interfacePortType.loaiCongId" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Số cổng <span class="red">*</span></div>
                                <div class="value">
                                    <input type="number" class="form-control" min="0"
                                        :class="controls.txtSoCong.invalid ? 'is-invalid' : ''"
                                        v-model="interfacePortType.soCong" />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Bắt đầu từ <span class="red">*</span></div>
                                <div class="value">
                                    <input type="number" class="form-control"
                                        :class="controls.txtBatDauTu.invalid ? 'is-invalid' : ''"
                                        v-model="interfacePortType.batDauTu" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Định dạng tên <span class="red">*</span></div>
                                <div class="value">
                                    <input type="text" class="form-control"
                                        :class="controls.txtDinhDangTen.invalid ? 'is-invalid' : ''"
                                        v-model="interfacePortType.dinhDangTen" />
                                </div>
                            </div>
                        </div>

                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Mục đích sử dụng </div>
                                <div class="value">
                                    <SelectExt dataTextField="TEN" dataValueField="ID"
                                        :dataSource="mucDichSdCongListItems" v-model="interfacePortType.mucDichId" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Băng thông </div>
                                <div class="value">
                                    <SelectExt dataTextField="TEN" dataValueField="ID" :dataSource="bangThongListItems"
                                        v-model="interfacePortType.bangThongId" />
                                </div>
                            </div>
                        </div>

                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Thông tin module </div>
                                <div class="value">
                                    <SelectExt dataTextField="TEN" dataValueField="ID"
                                        :dataSource="thongTinModuleListItems"
                                        v-model="interfacePortType.thongTinModuleId" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Kết nối </div>
                                <div class="value">
                                    <SelectExt dataTextField="TEN" dataValueField="ID" :dataSource="ketNoiListItems"
                                        v-model="interfacePortType.ketNoiId" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</ejs-dialog>
