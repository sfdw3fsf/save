<div class="main-wrapper">
  <div class="list-actions-top">
    <ul class="list">
      <li>
          <a href="javascript:void(0)" :class="{'disable-btn': !tsbtnThemMoi}" @click="tsbtnThemMoi_Click">
              <span class="icon one-file-plus"></span> Nhập mới
          </a>
      </li>
      <li>
          <a href="javascript:void(0)" :class="{'disable-btn': !tsbtnGhiLai}" @click="tsbtnGhiLai_Click">
              <span class="icon one-save"></span> Ghi Lại
          </a>
      </li>
      <li>
        <a href="javascript:void(0)" :class="{'disable-btn' : !tsbtnHuyBo}" @click="tsbtnHuyBo_Click">
            <span class="icon nc-icon-glyph ui-1_circle-remove"></span>Hủy
        </a>
      </li>
      <li>
          <a href="javascript:void(0)" :class="{'disable-btn': !tsbtnXoa}" @click="tsbtnXoa_Click">
              <span class="icon one-trash"></span> Xóa
          </a>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <div class="box-form">
      <div class="legend-title">
        <div class="pull-left">Thông tin chung</div>
        <div class="clearfix"></div>
      </div>

      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w150">Loại vật liệu <span class="required">(*)</span></div>
            <div class="value">
              <ejs-dropdownlist
                  locale='vi-VN'
                  v-model="loai_vatlieu"
                  :dataSource='loaivatlieuOptions'
                  :allowFiltering='true'
                  :filtering='onFilteringLoaiVatLieu'
                  :fields="{value:'ID', text: 'TEN'}" >
              </ejs-dropdownlist>
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-12">
          <div class="info-row">
              <div class="key w150">Thông số kỹ thuật</div>
              <div class="value">
                <input ref="thongso_kythuat" type="text" class="form-control" v-model.trim="thongso_kythuat">
              </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w150">Tên vật liệu kết nối <span class="required">(*)</span></div>
            <div class="value">
              <input ref="ten_vatlieu_ketnoi" type="text" class="form-control" v-model.trim="ten_vatlieu_ketnoi">
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-12">
          <div class="info-row">
              <div class="key w150">Ghi chú</div>
              <div class="value">
                <input ref="ghichu" type="text" class="form-control" v-model.trim="ghichu">
              </div>
          </div>
        </div>
      </div>

    </div>
    <!-- end box form -->

    <div class="box-form">
      <div class="legend-title">
        <div class="pull-left">Danh sách Loại vật liệu kết nối mạng</div>
        <div class="clearfix"></div>
      </div>
      <div class="table-content">
        <div class="grid-ext grid-ext-nodata">
          <ejs-grid
              ref='dsHaTang'
              :dataSource="dsLoaiVatLieu"
              :allowPaging='false' :allowResizing='true' :allowExcelExport="true" :allowFiltering="true" locale="vi-VN"
              @recordClick="onRecordClick"
              @checkBoxChange="onCheckBoxChange"
              >
              <e-columns>
                <e-column type='checkbox' :allowSorting='false' width=40></e-column>
                <e-column field='ID' :visible="false"></e-column>
                <e-column field='ID_LOAIVATLIEU' headerTextAlign='Center' headerText='ID loại vật liệu' width=80></e-column>
                <e-column field='TEN_LOAIVATLIEU' headerTextAlign='Center' headerText='Loại vật liệu' width=130></e-column>
                <e-column field='TEN_VATLIEUKETNOI' headerTextAlign='Center' headerText='Tên vật liệu kết nối' width=300></e-column>
                <e-column field='THONGSO_KYTHUAT' headerTextAlign='Center' headerText='Thông số kỹ thuật' width=300></e-column>
                <e-column field='GHI_CHU' headerTextAlign='Center' headerText='Ghi chú' width=300></e-column>
              </e-columns>
          </ejs-grid>
        </div>
      </div>
    </div>

  </div>
</div>
