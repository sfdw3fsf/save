<div>
  <div class="row">
    <div class="col-12">
      <div class="nav tabs tab-over">
        <a href="#tabVM" data-toggle="tab" :class="{active: currentTab === 1}">VM</a>
        <a href="#tabNFS" data-toggle="tab" :class="{active: currentTab === 2}">NFS</a>
      </div>
      <div class="tab-content">
        <!-- VM -->
        <div class="tab-pane" id="tabVM" :class="{active: currentTab === 1}">
          <div class="row">
            <div class="box-form">
              <DataGrid :columns="VMCols" :dataSource="VMList" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true" ref="grdVM"></DataGrid>
            </div>
          </div>
        </div>
        <!-- NFS -->
        <div class="tab-pane" id="tabNFS" :class="{active: currentTab === 2}">
          <div class="row">
            <div class="box-form">
              <DataGrid :columns="NFSCols" :dataSource="NFSList" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true" ref="rgdNFS"></DataGrid>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-12">
      <div class="nav tabs tab-over">
        <a href="#tabController" data-toggle="tab" :class="{active: currentTab === 1}">Bộ điều khiển (Controller)</a>
        <a href="#tabShelves" data-toggle="tab" :class="{active: currentTab === 2}">Khay đĩa (Shelves)</a>
        <a href="#tabHistory" data-toggle="tab" :class="{active: currentTab === 3}">Lịch sử thay đổi</a>
      </div>
      <div class="tab-content">
        <!-- Controller -->
        <div class="tab-pane" id="tabController" :class="{active: currentTab === 1}">
          <div class="row">
            <div class="box-form">
              <DataGrid :columns="controllerCols" :dataSource="controllerList" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true" ref="grdController"></DataGrid>
            </div>
          </div>
        </div>
        <!-- Shelves -->
        <div class="tab-pane" id="tabShelves" :class="{active: currentTab === 2}">
          <div class="row">
            <div class="box-form">
              <DataGrid :columns="shelvesCols" :dataSource="shelvesList" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true" ref="grdShelves"></DataGrid>
            </div>
          </div>
        </div>
        <!-- Lịch sử -->
        <div class="tab-pane" id="tabHistory" :class="{active: currentTab === 3}">
          <div class="row">
            <div class="box-form">
              <DataGrid :columns="historyCols" :dataSource="historyList" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true" ref="grdHistory"></DataGrid>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
