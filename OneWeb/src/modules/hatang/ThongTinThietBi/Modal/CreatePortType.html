<ejs-dialog
  :enableResize="true"
  :allowDragging="false"
  :visible="false"
  ref="modalPortType"
  :animationSettings="animationSettings"
  :showHeader="false"
  :showCloseIcon="false"
  width="80%"
  height="auto"
  :target="target"
>
  <div class="modal-content popup-box">
    <div class="popup-header">
      <div class="title" style="font-weight: 600;">Khai báo Loại Cổng {{portTypeName}}</div>
      <div class="close -ap icon-close" @click="closeDialog"></div>
    </div>
    <div class="popup-body">
      <div class="row">
        <div class="list-actions-top">
          <ul class="list">
            <li>
              <b-link href="javascript:void(0)" @click="onSave"> <span class="icon one-save"></span> Ghi lại </b-link>
            </li>
            <li>
              <b-link href="javascript:void(0)" @click="closeDialog">
                <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
              </b-link>
            </li>
          </ul>
        </div>
      </div>
      <div class="row">
        <div class="box-form" style="margin-top: 10px;">
          <div class="legend-title">Thông tin loại cổng {{ portTypeName }}</div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Loại cổng <span class="red">*</span></div>
                <div class="value">
                  <SelectExt
                    dataTextField="TEN"
                    dataValueField="ID"
                    :dataSource="portTypeSelect"
                    :class="controls.select_loaicong_id.invalid ? 'invalidBox' : ''"
                    v-model="portTypeData.loaicong_id"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Số cổng <span class="red">*</span></div>
                <div class="value">
                  <input
                    type="number"
                    class="form-control"
                    :class="controls.txt_so_cong.invalid ? 'is-invalid' : ''"
                    v-model="portTypeData.so_cong"
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Bắt đầu từ <span class="red">*</span></div>
                <div class="value">
                  <input
                    type="number"
                    class="form-control"
                    :class="controls.txt_bat_dau.invalid ? 'is-invalid' : ''"
                    v-model="portTypeData.bat_dau"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Định dạng tên <span class="red">*</span></div>
                <div class="value">
                  <input
                    type="text"
                    class="form-control"
                    :class="controls.txt_port_fname.invalid ? 'is-invalid' : ''"
                    v-model="portTypeData.port_fname"
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="row" v-show="isInterface">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Mục đích sử dụng</div>
                <div class="value">
                  <SelectExt
                    dataTextField="TEN"
                    dataValueField="ID"
                    :dataSource="mucDichSelect"
                    v-model="portTypeData.mucdichsudung_cong_id"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Băng thông</div>
                <div class="value">
                  <SelectExt
                    dataTextField="TEN"
                    dataValueField="ID"
                    :dataSource="bangThongSelect"
                    v-model="portTypeData.bangthongcong_id"
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="row" v-show="isInterface">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Thông tin Module</div>
                <div class="value">
                  <!-- <input type="text" class="form-control" v-model="portTypeData.thongtinmodule_id" /> -->
                  <SelectExt
                    dataTextField="TEN"
                    dataValueField="ID"
                    :dataSource="moduleSelect"
                    v-model="portTypeData.thongtinmodule_id"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Kết nối</div>
                <div class="value">
                  <SelectExt
                    dataTextField="name"
                    dataValueField="id"
                    :dataSource="ketNoiSelect"
                    v-model="portTypeData.ketnoi"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ejs-dialog>
