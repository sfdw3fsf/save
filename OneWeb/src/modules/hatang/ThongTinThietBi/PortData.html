<div>
  <!-- -	Trường hợp LineCard != 0, Module != 0, Control Card != 0 (Thiết bị mạng, Thiết bị máy chủ) -->
  <template v-if="hasLineNumber">
    <div class="row pt-3">
      <div class="col-12">
        <div class="legend-title">Danh sách {{deviceDataLabel}}</div>
      </div>
    </div>
    <DataGrid
      :columns="deviceCols"
      :dataSource="deviceData"
      :allowPaging="true"
      :enablePagingServer="false"
      :commands="[
    {name: 'SUA', cssClass: 'btn-primary fa fa-pencil-square-o', width: 20},
    {name: 'XOA', cssClass: 'btn-primary fa fa-trash-o', width: 20}
    ]"
      :commandColumn="{headerText: 'Thao tác', textAlign: 'Left', show: true}"
      @commandClicked="cardGridCommandClicked"
    ></DataGrid>
  </template>
  <!-- End -->

  <!-- Trường hợp LineCard = 0, Module = 0, Control Card = 0 (Thiết bị mạng, Thiết bị máy chủ, Thiết bị IDC) -->
  <template v-else>
    <div class="row pt-3">
      <div class="col-12">
        <div class="title-with-btn">
          <div class="title">Khai báo loại Cổng {{portType}}</div>
          <button class="btn btn-outline-primary" style="margin-left: 10px;" @click="onCreatePortType">
            <strong><span>+</span></strong>
          </button>
        </div>
        <div class="legend-title"></div>
      </div>
    </div>
    <DataGrid
      :columns="portTypeCols"
      :dataSource="portTypeData"
      :allowPaging="true"
      :enablePagingServer="false"
      :showColumnCheckbox="true"
      :commands="[
            {name: 'SUA', cssClass: 'btn-primary fa fa-pencil-square-o', width: 20},
            {name: 'XOA', cssClass: 'btn-primary fa fa-trash-o', width: 20}
            ]"
      :commandColumn="{headerText: 'Thao tác', textAlign: 'Left', show: true}"
      @commandClicked="grid_onCommandClicked"
    ></DataGrid>

    <div class="row pt-3">
      <div class="col-12">
        <div class="legend-title">Danh sách Cổng {{portType}}</div>
      </div>
    </div>
    <DataGrid
      :columns="portListCols"
      :dataSource="portListData"
      :allowPaging="true"
      :enablePagingServer="false"
      :showColumnCheckbox="true"
    ></DataGrid>
  </template>
  <!-- End -->
</div>
