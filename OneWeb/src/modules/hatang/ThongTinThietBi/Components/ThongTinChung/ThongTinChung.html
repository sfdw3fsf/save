<div class="row">
  <div class="col-12">
    <div class="legend-title">Thông tin chung</div>
  </div>
  <div class="col-6">
    <div class="info-row">
      <div class="key w150">Mã thiết bị</div>
      <div class="value">
        <input type="text" class="form-control" disabled v-model="currentItem.mathietbi" />
      </div>
    </div>
    <div class="info-row">
      <div class="key w150">Tên thiết bị<span class="red">*</span></div>
      <div class="value">
        <input
          type="text"
          class="form-control"
          v-model="currentItem.ten"
          :disabled="!thongTinChungControls.txt_ten.enabled"
          :class="{'is-invalid': thongTinChungControls.txt_ten.invalid}"
        />
      </div>
    </div>
    <div class="info-row">
      <div class="key w150">Ký hiệu TB</div>
      <div class="value">
        <input
          type="text"
          class="form-control"
          v-model="currentItem.kyhieu"
          :disabled="!thongTinChungControls.txt_kyhieu.enabled"
        />
      </div>
    </div>
    <div class="info-row">
      <div class="key w150">Mã TB CĐS ĐHIT</div>
      <div class="value">
        <input
          type="text"
          class="form-control"
          v-model="currentItem.mathietbi_infra"
          :disabled="!thongTinChungControls.txt_mathietbi_infra.enabled"
        />
      </div>
    </div>
    <div class="info-row">
      <div class="key w150">Thiết bị cha</div>
      <div class="value">
        <SelectExt
          :dataSource="parentDeviceList"
          dataTextField="ten"
          dataValueField="id"
          v-model="currentItem.thietbicha_id"
          :disabled="!thongTinChungControls.select_thietbicha_id.enabled"
        />
      </div>
    </div>
    <!-- Show khi loại thiết bị là tử đĩa -->
    <div v-show="isDiskShelf" class="info-row">
      <div class="key w150">Loại tủ đĩa<span class="red">*</span></div>
      <div class="value">
        <SelectExt
          :dataSource="discTypeList"
          dataTextField="TEN"
          dataValueField="ID"
          v-model="currentItem.loaitudia_id"
          :disabled="!thongTinChungControls.select_loaitudia_id.enabled"
          :class="{invalidBox: this.thongTinChungControls.select_loaitudia_id.invalid}"
        />
      </div>
    </div>
    <!-- Show khi loại thiết bị là thiết bị mạng -->
    <div v-show="isNetwork" class="info-row">
      <div class="key w150">Chủng loại thiết bị<span class="red">*</span></div>
      <div class="value">
        <SelectExt
          :dataSource="equipmentCategoryList"
          dataTextField="MODEL"
          dataValueField="ID"
          v-model="currentItem.chungloaithietbi_id"
          :disabled="!thongTinChungControls.select_chungloaithietbi_id.enabled"
          :class="{invalidBox: this.thongTinChungControls.select_chungloaithietbi_id.invalid}"
        />
      </div>
    </div>
    <!-- Cho phép chọn nhiều -->
    <div class="info-row">
      <div class="key w150">IP Quản trị</div>
      <div class="value">
        <!-- <SelectExt /> -->
        <treeselect
          :multiple="true"
          v-model="currentItem.ip_ids"
          :options="IPAddressList"
          placeholder="IP Address"
          :disable-branch-nodes="false"
          :append-to-body="true"
          style="overflow-y:auto;"
          :disabled="!thongTinChungControls.select_ip_ids.enabled"
          :normalizer="normalizer"
        ></treeselect>
      </div>
    </div>
  </div>
  <div class="col-6">
    <div class="row">
      <div class="info-row col-6">
        <div class="key w150">Hiệu lực</div>
        <div class="value padt4">
          <div class="check-action">
            <input
              type="checkbox"
              class="check"
              :true-value="1"
              :false-value="0"
              v-model="currentItem.hieu_luc"
              :disabled="!thongTinChungControls.checkbox_hieu_luc.enabled"
            /><span class="name"></span>
          </div>
        </div>
      </div>
      <!-- Show khi loại thiết bị là thiết bị máy chủ -->
      <div v-show="isServer" class="info-row col-6">
        <div class="key w150">Thiết bị HSM</div>
        <div class="value padt4">
          <div class="check-action">
            <input
              type="checkbox"
              class="check"
              :true-value="1"
              :false-value="0"
              v-model="currentItem.hsm"
              :disabled="!thongTinChungControls.checkbox_hsm.enabled"
            /><span class="name"></span>
          </div>
        </div>
      </div>
    </div>
    <div class="info-row">
      <div class="key w150">Loại thiết bị <span class="red">*</span></div>
      <div class="value">
        <SelectExt
          :dataSource="deviceTypeList"
          dataTextField="TEN"
          dataValueField="ID"
          v-model="currentItem.loaithietbi_id"
          :disabled="!thongTinChungControls.select_loaithietbi_id.enabled"
          :class="{invalidBox: thongTinChungControls.select_loaithietbi_id.invalid}"
        />
      </div>
    </div>
    <div class="info-row">
      <div class="key w150">Loại khách hàng</div>
      <div class="value">
        <SelectExt
          :dataSource="customerTypeList"
          dataTextField="name"
          dataValueField="id"
          v-model="currentItem.loaikhachhang"
          :disabled="!thongTinChungControls.select_loaikhachhang.enabled"
        />
      </div>
    </div>
    <div class="info-row">
      <div class="key w150">Serial Number</div>
      <div class="value">
        <input
          type="text"
          class="form-control"
          v-model="currentItem.serial_number"
          :disabled="!thongTinChungControls.txt_serial_number.enabled"
        />
      </div>
    </div>
    <div class="info-row">
      <div class="key w150">Model thiết bị</div>
      <div class="value">
        <input
          type="text"
          class="form-control"
          v-model="currentItem.model"
          :disabled="!thongTinChungControls.txt_part_number.enabled"
        />
      </div>
    </div>
    <div class="info-row">
      <div class="key w150">Part Number</div>
      <div class="value">
        <input
          type="text"
          class="form-control"
          v-model="currentItem.part_number"
          :disabled="!thongTinChungControls.txt_model.enabled"
        />
      </div>
    </div>
  </div>
  <div class="col-12 px-3">
    <div class="info-row">
      <div class="key w150">Ghi chú</div>
      <div class="value">
        <input
          type="text"
          class="form-control"
          v-model="currentItem.ghi_chu"
          :disabled="!thongTinChungControls.txt_ghi_chu.enabled"
        />
      </div>
    </div>
  </div>
</div>
