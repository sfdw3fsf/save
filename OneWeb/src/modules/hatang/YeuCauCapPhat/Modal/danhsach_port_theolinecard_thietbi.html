<ejs-dialog :enableResize="true" :allowDragging="false" :visible="false" ref="dialogDanhSachPortTheoLineCardThietBi"
    :animationSettings="animationSettings" :showHeader="false" :showCloseIcon="false" width="80%" height="95%"
    :target="target">
    <div class="modal-content popup-box">
        <div class="popup-header">
            <div class="close -ap icon-close" @click="closeDialog"></div>
        </div>
        <div class="popup-body">
            <div class="row">
                <div class="box-form">
                    <div class="legend-title">Danh sách Port theo LineCard của thiết bị</div>
                    <div class="row">
                        <div class="col-12">

                            <DataGrid ref="grdItems" :dataSource="listPorts" panelDataHeight="187px" :columns="[
                            {fieldName: 'SO_LINECARD', headerText: 'LineCard', textAlign: 'Left'},
                            {fieldName: 'SOTHUTU', headerText: 'Số thứ tự', textAlign: 'Left'},
                            {fieldName: 'TEN', headerText: 'Tên cổng', textAlign: 'Left'},
                            {fieldName: 'TEN_LOAICONG', headerText: 'Loại cổng', textAlign: 'Left'},
                            {fieldName: 'TEN_MUCDICHSUDUNG_CONG', headerText: 'Mục đích', textAlign: 'Left'},
                            {fieldName: 'TEN_BANGTHONGCONG', headerText: 'Băng thông', textAlign: 'Left'},
                            {fieldName: 'TEN_HIEULUC', headerText: 'Hiệu lực', textAlign: 'Left'},
                                ]" v-bind:commands="[
                                {name: 'CHITIET', cssClass: 'btn btn-outline-primary w100', text: 'Click'},
                                ]" v-bind:commandColumn="{headerText: 'Chi tiết',firstColumn: false, show: true}"
                                @commandClicked="chiTietClick" :enabledSelectFirstRow="false" :allowPaging="true"
                                :enablePagingServer="false" @rowSelected="rowSelected_Port" />
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>
</ejs-dialog>
