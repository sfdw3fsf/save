<ejs-dialog
  :enableResize="true"
  :allowDragging="false"
  :visible="false"
  ref="IDGDialog"
  :animationSettings="animationSettings"
  :showHeader="false"
  :showCloseIcon="false"
  width="80%"
  height="auto"
  :target="target"
>
  <div class="modal-content popup-box">
    <div class="popup-header">
      <div class="title" style="font-weight: 600;">Thông tin nhu cầu</div>
      <div class="close -ap icon-close" @click="closeDialog"></div>
    </div>
    <div class="popup-body">
      <div class="row">
        <div class="list-actions-top">
          <ul class="list">
            <li>
              <b-link href="javascript:void(0)" @click="onSave"> <span class="icon one-save"></span>Cập nhật </b-link>
            </li>
            <li>
              <b-link href="javascript:void(0)" @click="closeDialog">
                <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
              </b-link>
            </li>
          </ul>
        </div>
      </div>
      <div class="row">
        <div class="box-form" style="margin-top: 10px;">
          <div class="legend-title">IDG</div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Kiến trúc/Thành phần</div>
                <div class="value">
                  <SelectExt
                    :dataSource="kientrucList"
                    dataTextField="name"
                    dataValueField="id"
                    v-model="currentItem.thanhphan"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Thời gian khởi tạo <span class="red">*</span></div>
                <div class="value">
                  <!-- <input
                    type="date"
                    class="form-control"
                    v-model="currentItem.ngaytao"
                    :class="controls.txtThoiGianKhoiTao.invalid ? 'is-invalid' : ''"
                    :min="minDate"
                  /> -->
                  <ejs-datepicker
                    class="form-control bg-none bor0 fw6 text"
                    :class="controls.txtThoiGianKhoiTao.invalid ? 'is-invalid' : ''"
                    :format="'dd/MM/yyyy'"
                    :showClearButton="false"
                    v-model="currentItem.ngaytao"
                    :min="new Date()"
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Thời gian bắt đầu <span class="red">*</span></div>
                <div class="value">
                  <!-- <input
                    type="date"
                    class="form-control"
                    v-model="currentItem.batdau"
                    :class="controls.txtThoiGianBatDau.invalid ? 'is-invalid' : ''"
                    :min="minDate"
                  /> -->
                  <ejs-datepicker
                    class="form-control bg-none bor0 fw6 text"
                    :class="controls.txtThoiGianBatDau.invalid ? 'is-invalid' : ''"
                    :format="'dd/MM/yyyy'"
                    :showClearButton="false"
                    v-model="currentItem.batdau"
                    :min="new Date()"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Thời gian kết thúc <span class="red">*</span></div>
                <div class="value">
                  <!-- <input
                    type="date"
                    class="form-control"
                    v-model="currentItem.ketthuc"
                    :class="controls.txtThoiGianKetThuc.invalid ? 'is-invalid' : ''"
                    :min="minDate"
                  /> -->
                  <ejs-datepicker
                    class="form-control bg-none bor0 fw6 text"
                    :class="controls.txtThoiGianKetThuc.invalid ? 'is-invalid' : ''"
                    :format="'dd/MM/yyyy'"
                    :showClearButton="false"
                    v-model="currentItem.ketthuc"
                    :min="new Date()"
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Mã gói RabitMQ</div>
                <div class="value">
                  <input type="text" class="form-control" v-model="currentItem.ma_rabbitmq" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Object</div>
                <div class="value">
                  <input
                    type="number"
                    class="form-control"
                    v-model="currentItem.idg_object"
                    @blur="formatPositive('idg_object')"
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Mã gói Kafka</div>
                <div class="value">
                  <input type="text" class="form-control" v-model="currentItem.ma_kafka" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Mã gói API Gateway</div>
                <div class="value">
                  <input type="text" class="form-control" v-model="currentItem.ma_api_gateway" />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Mã gói MongoDB</div>
                <div class="value">
                  <input type="text" class="form-control" v-model="currentItem.ma_mongo" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Mã gói MySQL</div>
                <div class="value">
                  <input type="text" class="form-control" v-model="currentItem.ma_mysql" />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Mã gói Search Engine</div>
                <div class="value">
                  <input type="text" class="form-control" v-model="currentItem.ma_search_engine" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ejs-dialog>
