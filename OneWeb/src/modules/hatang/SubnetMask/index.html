<div>
    <div class="list-actions-top">
        <ul class="list">
            <li>
                <b-link href="javascript:void(0)" @click="onAddNew" :disabled="!buttons.btnAddNew.enabled">
                    <span class="icon one-file-plus"></span>Nhập mới
                </b-link>
            </li>
            <li>
                <b-link href="javascript:void(0)" @click="onSave" :disabled="!buttons.btnSave.enabled">
                    <span class="icon one-save"></span>Ghi lại
                </b-link>
            </li>
            <li>
                <b-link href="javascript:void(0)" @click="onCancel" :disabled="!buttons.btnCancel.enabled">
                    <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
                </b-link>
            </li>
            <li>
                <b-link href="javascript:void(0)" @click="onEdit" :disabled="!buttons.btnEdit.enabled">
                    <span class="icon nc-icon-glyph ui-1_edit-72"></span>Sửa
                </b-link>
            </li>
            <li>
                <b-link href="javascript:void(0)" @click="onDelete" :disabled="!buttons.btnDelete.enabled">
                    <span class="icon one-trash"></span>Xóa
                </b-link>
            </li>
        </ul>
    </div>
    <div class="page-content">
        <div class="row">
            <div class="col-12">
                <div class="box-form">
                    <div class="row">
                        <div class="legend-title">Thông tin Subnet mask
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Subnet mask <span class="red">*</span></div>
                                <div class="value">
                                    <input type="text" class="form-control"
                                        :class="controls.subnetMask.invalid ? 'is-invalid' : ''"
                                        :disabled="!controls.subnetMask.enabled" v-model="currentItem.subnetMask" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w70">Hiệu lực</div>
                                <div class="value padt4">
                                    <div class="check-action">
                                        <input type="checkbox" class="check"
                                            :disabled="!controls.chkHieuLuc.enabled" v-model="currentItem.hieuLuc"
                                            :true-value="1" :false-value="0" /><span class="name"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>    
                    <div class="row">                                
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w100">Phân loại IP <span class="red">*</span></div>
                                <div class="value">
                                   
                                    <ejs-dropdownlist
                                        class="form-control"
                                        :class="controls.phanLoaiId.invalid ? 'is-invalid' : ''"
                                        :enabled="controls.phanLoaiId.enabled"
                                        ref="phanLoaiId"
                                        locale='vi'
                                        v-model="currentItem.phanLoaiId"
                                        :dataSource='DSLoaiIP' 
                                        :fields="{value:'ID', text: 'TEN'}"
                                        :allowFiltering="true"
                                        >
                                    </ejs-dropdownlist>                                
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w160">Cho phép sinh IP store</div>
                                <div class="value padt4">
                                    <div class="check-action">
                                        <input type="checkbox" class="check"
                                            :disabled="!controls.ipStore.enabled" v-model="currentItem.ipStore"
                                            :true-value="1" :false-value="0" /><span class="name"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                                  
                    <div class="info-row">
                        <div class="key w100">Ghi chú</div>
                        <div class="value">
                            <input type="text" class="form-control" :disabled="!controls.txtGhiChu.enabled"
                                v-model="currentItem.ghiChu" />
                        </div>
                    </div>
                </div>    
               
            </div>
        </div>
        <div class="row">
            <div class="col-12">
                <div class="box-form">
                    <div class="row">
                        <div class="legend-title">Danh sách Subnet mask
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-12">
                            <DataGrid ref="grdItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true" v-bind:columns="[
                                {fieldName: 'SUBNETMASK', headerText: 'Subnet mask', allowFiltering: true, allowSorting: false}, 
                                {fieldName: 'TEN_PHANLOAI', headerText: 'Phân loại IP', allowFiltering: true, allowSorting: false}, 
                                {fieldName: 'IP_STORE_TEXT', headerText: 'Cho phép sinh IP store', allowFiltering: true, allowSorting: false},               
                                {fieldName: 'HIEU_LUC_TEXT', headerText: 'Hiệu lực', allowFiltering: true, allowSorting: false,  width: 100}
                                ]" v-bind:dataSource="dataSource"
                                  @rowSelected="grdItems_RowSelected"
                                  @rowDeselected="grdItems_RowDeselected">
                            >
                            </DataGrid>e
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
