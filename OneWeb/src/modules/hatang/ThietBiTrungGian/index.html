<div>
    <div class="list-actions-top">
        <ul class="list">
            <li @click.prevent="onNew">
                <a href="#" :class="{'disable-btn': isDisableNew}">
                    <span class="icon one-file-plus"></span> Nhập mới
                </a>
            </li>
            <li @click.prevent="setDanhSach" >
                <a href="#" :class="{'disable-btn': isDisableSave}">
                    <span class="icon one-save"></span> Ghi Lại
                </a>
            </li>
            <li @click.prevent="onUpdate">
                <a href="#" :class="{'disable-btn': isDisableUpdate}">
                    <span class="icon one-edit"></span> Sửa
                </a>
            </li>
            <li @click.prevent="onDelete" >
                <a href="#" :class="{'disable-btn': isDisableDelete}">
                    <span class="icon one-trash"></span> Xóa
                </a>
            </li>
        </ul>
    </div>
    <div class="page-content">
        <div class="box-form">
            <div class="legend-title">Thông tin thiết bị</div>
            <div class="row">
                <div class="col-sm-6 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Tên
                        </div>
                        <div class="value">
                            <input type="text" class="form-control" v-model="form.pTen" :readonly="isDisableItems">
                        </div>
                    </div>
                </div>                
                <div class="col-sm-2 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Hiệu lực
                        </div>
                        <div class="form-check ">
                            <input class="form-check-input" type="checkbox" v-model="form.pHieuLuc" id="flexCheckDefault" :readonly="isDisableItems">
                        </div>
                    </div>
                </div>
            </div>

            <div class="info-row">
                <div class="key w100">
                    Ghi chú
                </div>
                <div class="value">
                    <input type="text" class="form-control" v-model="form.pGhiChu" :readonly="isDisableItems">
                </div>
            </div>

        </div>
        <div class="box-form">
            <div class="legend-title">Danh sách thiết bị trung gian</div>
            <DataGrid v-bind:columns="[
            {fieldName: 'TEN', headerText: 'Tên', allowFiltering: true, allowSorting: false},
            {fieldName: 'HIEU_LUC', headerText: 'Hiệu lực', allowFiltering: true, allowSorting: false, width: 100}]" 
            :dataSource="dsThietBiTrungGian" 
            :showFilter="true" 
            :allowPaging="true" 
            :enablePagingServer="false"
            :showColumnCheckbox="true"
            @selectedItemsChanged="onSelectRowCheckbox"                        
            @rowSelected="onSelectRowChanged"
            dataKeyField="ID"  
                ref="dsTienTrinhGrid">
            </DataGrid>
        </div>
    </div>
</div>
