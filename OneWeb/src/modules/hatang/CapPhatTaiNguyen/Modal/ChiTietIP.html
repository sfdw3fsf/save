<ejs-dialog
  :enableResize="true"
  :allowDragging="false"
  :visible="false"
  ref="dialogChiTietIP"
  :animationSettings="animationSettings"
  :showHeader="false"
  :showCloseIcon="false"
  width="70%"
  height="auto"
  :target="target"
>
  <div class="modal-content popup-box">
    <div class="popup-header">
      <div class="title" style="font-weight: 600;">Chi tiết phiếu cấp phát IP</div>
      <div class="close -ap icon-close" @click="closeDialog"></div>
    </div>
    <div class="popup-body">
      <div class="row">
        <div class="col-sm-3 col-12">
          <div class="info-row">
            <div class="key w150">Nguồn yêu cầu</div>
            <div class="value">
              <input ref="nguon_yeucau" type="text" class="form-control" v-model.trim="dataItem.TEN_NGUON_YC" disabled />
            </div>
          </div>
        </div>
        <div class="col-sm-3 col-12">
          <div class="info-row">
            <div class="key w150">Phiếu yêu cầu</div>
            <div class="value">
              <input ref="so_phieu" type="text" class="form-control" v-model.trim="dataItem.PHIEU_YC" disabled />
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w120">IP Store</div>
            <div class="value">
              <input ref="ip_store" type="text" class="form-control" v-model.trim="dataItem.IP_STORE_TEN" disabled />
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w150">Trạng thái cấp phát</div>
            <div class="value">
              <input ref="trangthai_capphat" type="text" class="form-control" v-model.trim="dataItem.TRANGTHAI_CAPPHAT" disabled />
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w120">Phân loại IP</div>
            <div class="value">
              <input ref="phanloai_ip" type="text" class="form-control" v-model.trim="dataItem.PHANLOAI_IP_TEN" disabled />
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w150">Đơn vị sử dụng</div>
            <div class="value">
              <input type="text" class="form-control highlight" v-model.trim="dataItem.DONVI_SUDUNG" ref="donvi_sudung" disabled />
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w120">Subnet</div>
            <div class="value">
              <input ref="subnet" type="text" class="form-control" v-model.trim="dataItem.SUBNET_TEN" disabled />
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w150">Người sử dụng</div>
            <div class="value">
              <input ref="nguoi_sudung" type="text" class="form-control" v-model.trim="dataItem.NGUOI_SUDUNG_TEN" disabled />
            </div>
          </div>
        </div>
        <div class="col-sm-6 col-12">
          <div class="info-row">
            <div class="key w120">Hạ tầng mạng</div>
            <div class="value">
              <input ref="so_phieu" type="text" class="form-control" v-model.trim="dataItem.HATANGMANG_TEN" disabled />
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-3 col-12">
          <div class="info-row">
            <div class="key w150">Người cấp</div>
            <div class="value">
              <input ref="so_phieu" type="text" class="form-control" v-model.trim="dataItem.NGUOI_CAP_TEN" disabled />
            </div>
          </div>
        </div>
        <div class="col-sm-3 col-12">
          <div class="info-row">
            <div class="key w120">Ngày cấp</div>
            <div class="value">
              <input ref="ngay_cap" type="text" class="form-control" v-model.trim="dataItem.NGAY_CAP" disabled />
            </div>
          </div>
        </div>
        <div class="col-sm-3 col-12">
          <div class="info-row">
            <div class="key w120">Ngày tạo</div>
            <div class="value">
              <input ref="ngay_tao" type="text" class="form-control" v-model.trim="dataItem.NGAY_TAO" disabled />
            </div>
          </div>
        </div>
        <div class="col-sm-3 col-12">
          <div class="info-row">
            <div class="key w120">Ngày hết hạn</div>
            <div class="value">
              <input ref="ngay_hethan" type="text" class="form-control" v-model.trim="dataItem.NGAY_HETHAN" disabled />
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 col-12">
          <div class="info-row">
            <div class="key w150">Ghi chú</div>
            <div class="value">
              <input ref="so_phieu" type="text" class="form-control" v-model.trim="dataItem.GHICHU" maxlength="400" disabled />
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ejs-dialog>
