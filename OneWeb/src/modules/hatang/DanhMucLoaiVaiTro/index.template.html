<div>
  <div class="list-actions-top">
      <ul class="list">
          <li>
              <b-link href="javascript:void(0)" @click="btnNhapMoi_Click" :disabled="!buttons.btnNhapMoi.enabled">
                  <span class="icon one-file-plus"></span>Nhập mới
              </b-link>
          </li>
          <li>
              <b-link href="javascript:void(0)" @click="btnGhiLai_Click" :disabled="!buttons.btnGhiLai.enabled">
                  <span class="icon one-save"></span>Ghi lại
              </b-link>
          </li>
          <li>
              <b-link href="javascript:void(0)" @click="btnHuyBo_Click" :disabled="!buttons.btnHuyBo.enabled">
                  <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
              </b-link>
          </li>
          <li>
              <b-link href="javascript:void(0)" @click="btnSua_Click" :disabled="!buttons.btnSua.enabled">
                  <span class="icon nc-icon-glyph ui-1_edit-72"></span>Sửa
              </b-link>
          </li>
          <li>
              <b-link href="javascript:void(0)" @click="btnXoa_Click" :disabled="!buttons.btnXoa.enabled">
                  <span class="icon one-trash"></span>Xóa
              </b-link>
          </li>
      </ul>
  </div>
  <div class="page-content">
      <div class="row">
          <div class="col-12">
              <div class="box-form">
                  <div class="row">
                      <div class="legend-title">Thông tin loại vai trò
                      </div>
                  </div>
                  <div class="row">
                      <div class="col-sm-6 col-12">
                          <div class="info-row">
                              <div class="key w400">Tên <span class="red">*</span></div>
                              <div class="value">
                                  <input type="text" class="form-control"
                                      :class="controls.txtName.invalid ? 'is-invalid' : ''"
                                      :disabled="!controls.txtName.enabled" v-model="currentItem.ten" />
                              </div>
                          </div>
                      </div>
                      <div class="col-sm-6 col-12">
                          <div class="info-row">
                              <div class="key w300">Hiệu lực</div>
                              <div class="value padt4">
                                  <div class="check-action">
                                      <input type="checkbox" class="check"
                                          :disabled="!controls.checBoxHieuLuc.enabled" v-model="currentItem.hieuLuc"
                                          :true-value="1" :false-value="0" /><span class="name"></span>
                                  </div>
                              </div>
                          </div>
                      </div>
                  </div>
                  <div class="row">
                    <div class="col-sm-6 col-12">
                      <div class="info-row">
                          <div class="key w1000">Dùng cho đối tượng</div>
                          <div class="value">
                              <SelectExt :settings="{placeholder: 'Máy ảo, Thiết bị mạng, Thiết bị máy chủ'}" :dataSource="dsDoiTuong"
                                  dataTextField="ten" dataValueField="id"
                                  :disabled="!controls.comboboxDoiTuong.enabled"
                                  v-model="currentItem.doiTuong" />
                          </div>
                      </div>
                  </div>
                    <div class="col-sm-6 col-12">
                        <div class="info-row">
                            <div class="key w300">Ảnh đại diện</div>
                            <div class="value">
                              <b-form-file id="fileUpload" v-model="currentItem.anhDaiDien" :placeholder="dynamicPlaceholder" accept=".png, .gif, .jpec"
                              :disabled="!controls.formFileAnhDaiDien.enabled" browse-text="tên file"></b-form-file>
                            </div>
                        </div>
                    </div>
                </div>
                  <div class="row">
                      <div class="col-sm-12 col-12">
                          <div class="info-row">
                              <div class="key w400">Ghi chú</div>
                              <div class="value">
                                  <input type="text" class="form-control" :disabled="!controls.txtGhiChu.enabled"
                                      v-model="currentItem.ghiChu" />
                              </div>
                          </div>
                      </div>
                  </div>
              </div>
          </div>
      </div>
      <div class="row">
          <div class="col-12">
              <div class="box-form">
                  <div class="row">
                      <div class="legend-title">Danh sách loại vai trò
                      </div>
                  </div>
                  <div class="row">
                      <div class="col-12">
                          <DataGrid ref="gridItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true" v-bind:columns="[
                              {fieldName: 'TEN', headerText: 'Tên', textAlign: 'Left'},
                              {fieldName: 'TEN_DOI_TUONG', headerText: 'Dùng cho đối tượng', textAlign: 'Left', width: 100},
                              {fieldName: 'HIEU_LUC', headerText: 'Hiệu lực', width: 50, template: getColumnHieuLucTemplate(), textAlign: 'Left'},
                              ]" v-bind:dataSource="dataItems" @rowSelected="gridItems_RowSelected" @rowDeselected="gridItems_RowDeselected"
                              >
                          </DataGrid>
                      </div>
                  </div>
              </div>
          </div>
      </div>
  </div>
</div>
