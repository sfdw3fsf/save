<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="btnNhapMoi_Click" :disabled="!buttons.btnNhapMoi.enabled"> <span class="icon one-file-plus"></span>Nhập mới </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnGhiLai_Click" :disabled="!buttons.btnGhiLai.enabled"> <span class="icon one-save"></span>Ghi lại </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnHuyBo_Click" :disabled="!buttons.btnHuyBo.enabled"> <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnSua_Click" :disabled="!buttons.btnSua.enabled"> <span class="icon nc-icon-glyph ui-1_edit-72"></span>Sửa </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnXoa_Click" :disabled="!buttons.btnXoa.enabled"> <span class="icon one-trash"></span>Xóa </b-link>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Thông tin chung</div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">IP <span class="red">*</span></div>
                <div class="value">
                  <input type="text" class="form-control" :class="controls.txtIP.invalid ? 'is-invalid' : ''" :disabled="!controls.txtIP.enabled" v-model="currentItem.ip" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Hiệu lực</div>
                <div class="value padt4">
                  <div class="check-action"><input type="checkbox" class="check" :disabled="!controls.checBoxHieuLuc.enabled" v-model="currentItem.hieuLuc" :true-value="1" :false-value="0" /><span class="name"></span></div>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Loại IP <span class="red">*</span></div>
                <div class="value">
                  <SelectExt dataTextField="TEN" dataValueField="ID" :dataSource="loaiIPList" :disabled="!controls.selectLoaiIP.enabled" v-model="currentItem.loaiIP">
                    <option value="0">Chọn loại IP</option>
                  </SelectExt>
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Thuộc VLAN <span class="red">*</span></div>
                <div class="value">
                  <SelectExt
                    @change="onChangeVlan($event)"
                    :dataSource="VlanList"
                    dataTextField="TEN" dataValueField="ID"
                    :disabled="!controls.selectVLAN.enabled"
                    v-model="currentItem.vlan">
                    <option value="0">Chọn VLAN</option>
                  </SelectExt>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Phân loại IP <span class="red">*</span></div>
                <div class="value">
                  <SelectExt dataTextField="TEN" dataValueField="ID" :dataSource="phanLoaiIPList" :disabled="!controls.selectPhanLoaiIP.enabled" v-model="currentItem.phanLoaiIP">
                    <option value="0">Chọn phân loại IP</option>
                  </SelectExt>
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Thuộc subnet <span class="red">*</span></div>
                <div class="value">
                  <SelectExt
                     @change="changeSubnet($event)"
                    dataTextField="TEN" dataValueField="ID"
                    :dataSource="SubnetList"
                   :disabled="!controls.selectSubnet.enabled"
                   v-model="currentItem.subnet">
                    <option value="0">Chọn subnet</option>
                  </SelectExt>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Thuộc IDC <span class="red">*</span></div>
                <div class="value">
                  <SelectExt
                  @change="onChangeIDC($event)"
                  dataTextField="TEN" dataValueField="ID"
                  :dataSource="IDCList" @ :disabled="!controls.selectIDC.enabled" v-model="currentItem.idc">
                    <option value="0">Chọn IDC</option>
                  </SelectExt>
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Mục đích sử dụng</div>
                <div class="value">
                  <SelectExt
                  :dataSource="QuyHoachSubnetList"
                  dataTextField="TEN" dataValueField="ID"
                  :disabled="!controls.selectMucDichSuDung.enabled"
                  v-model="currentItem.mucDichSuDung">
                    <option value="0">Chọn mục đích sử dụng</option>
                  </SelectExt>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Thuộc VRF <span class="red">*</span></div>
                <div class="value">
                  <SelectExt
                    @change="onChangeVRF($event)"
                    dataTextField="TEN" dataValueField="ID"
                  :dataSource="VRFList"
                  :disabled="!controls.selectVRF.enabled"
                  v-model="currentItem.vrf">
                    <option value="0">Chọn VRF</option>
                  </SelectExt>
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Thuộc hạ tầng mạng</div>
                <div class="value">
                  <input type="text" class="form-control" :disabled="!controls.selectHaTangMang.enabled" v-model="currentItem.haTangMang"/>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Thuộc Zone <span class="red">*</span></div>
                <div class="value">
                  <SelectExt
                    @change="onChangeZone($event)"
                    dataTextField="TEN" dataValueField="ID"
                    :dataSource="ZoneList"
                    :disabled="!controls.selectZone.enabled"
                    v-model="currentItem.zone">
                    <option value="0">Chọn zone</option>
                  </SelectExt>
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Thuộc thiết bị</div>
                <div class="value">
                  <input type="text" class="form-control" :disabled="!controls.inputThietBi.enabled" v-model="currentItem.thietBi"/>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-12 col-12">
              <div class="info-row">
                <div class="key w100">Ghi chú</div>
                <div class="value">
                  <input type="text" class="form-control" :disabled="!controls.txtGhiChu.enabled" v-model="currentItem.ghiChu" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Lịch sử cấp phát</div>
          </div>
          <div class="row">
            <div class="col-12">
              <DataGrid
                ref="gridItems"
                :allowPaging="true"
                :enablePagingServer="false"
                :enabledSelectFirstRow="true"
                :showColumnCheckbox="true"
                v-bind:columns="[
                                {fieldName: 'STT', headerText: 'STT', width: 50, textAlign: 'Center'},
                                {fieldName: 'IP', headerText: 'IP', textAlign: 'Left'},
                                {fieldName: 'TRANG_THAI_CAP_PHAT', headerText: 'Trạng thái cấp phát', textAlign: 'Left'},
                                {fieldName: 'NGUOI_CAP', headerText: 'Người cấp', textAlign: 'Left'},
                                {fieldName: 'MUC_DICH_SU_DUNG', headerText: 'Mục đích sử dụng', textAlign: 'Left'},
                                {fieldName: 'THOI_GIAN_CAP', headerText: 'Thời gian cấp', textAlign: 'Left'},
                                {fieldName: 'THOI_GIAN_THU_HOI', headerText: 'Thời gian thu hồi', textAlign: 'Left'},
                                {fieldName: 'DON_VI_DUOC_CAP', headerText: 'Đơn vị được cấp', textAlign: 'Left'},
                                {fieldName: 'SO_CU', headerText: 'Sở cứ', textAlign: 'Left'}
                            ]"
                v-bind:dataSource="lichSuCapPhatList"
              ></DataGrid>
            </div>
          </div>
        </div>
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Danh sách IP Store</div>
          </div>
          <div class="row">
            <div class="col-12">
              <DataGrid
                ref="gridItems"
                :allowPaging="true"
                :enablePagingServer="false"
                :showColumnCheckbox="true"
                v-bind:columns="[
                                {fieldName: 'IP', headerText: 'IP', textAlign: 'Left'},
                                {fieldName: 'IP_LOAI', headerText: 'Loại IP', textAlign: 'Left'},
                                {fieldName: 'IP_PHANLOAI', headerText: 'Phân loại IP', textAlign: 'Left'},
                                {fieldName: 'IDC', headerText: 'Thuộc IDC', textAlign: 'Left'},
                                {fieldName: 'VRF', headerText: 'Thuộc VRF', textAlign: 'Left'},
                                {fieldName: 'ZONE', headerText: 'Thuộc Zone', textAlign: 'Left'},
                                {fieldName: 'VLAN', headerText: 'Thuộc VLAN', textAlign: 'Left'},
                                {fieldName: 'SUBNET', headerText: 'Thuộc subnet', textAlign: 'Left'},
                                {fieldName: 'SUBNET_QUYHOACH', headerText: 'Mục đích', textAlign: 'Left'},
                                {fieldName: 'HATANGMANG', headerText: 'Thuộc HTM', textAlign: 'Left'},
                                {fieldName: 'THIETBI', headerText: 'Thuộc TB', textAlign: 'Left'},
                                {fieldName: 'HIEU_LUC_TEXT', headerText: 'Hiệu lực', textAlign: 'Left'},
                                {fieldName: 'GHI_CHU', headerText: 'Ghi chú', textAlign: 'Left'}
                            ]"
                v-bind:dataSource="dataItems"
                @rowSelected="gridItems_RowSelected"
                @rowDeselected="gridItems_RowDeselected"
              ></DataGrid>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
