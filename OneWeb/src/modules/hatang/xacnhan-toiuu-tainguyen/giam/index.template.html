<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="onSearch" :disabled="!buttons.btnTimKiem.enabled">
          <span class="icon one-search"></span>Tìm kiếm
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onExport" :disabled="!buttons.btnExport.enabled">
          <span class="icon one-file-excel"></span>Export file
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onConfirm" :disabled="!buttons.btnXacNhanToiUu.enabled">
          <span class="icon one-file-check"></span>Xác nhận tối ưu
        </b-link>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <div class="row">
      <div class="col-18">
        <div class="box-form">
          <div class="row">
            <div class="col-sm-4 col-18">
              <div class="info-row">
                <div class="key w100">Tháng <span class="red">*</span></div>
                <!-- <div class="value">
                  <SelectExt :settings="{placeholder: '1,2,3'}" :options="dsThangTimKiem"
                    v-model="currentFilter.thangTimKiem" :required="true" />
                </div> -->
                <div class="value">
                  <SelectExt
                    :dataSource="dsThangTimKiem"
                    dataTextField="TEN"
                    dataValueField="ID"
                    :disabled="false"
                    v-model="currentFilter.thangTimKiem"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-4 col-18">
              <div class="info-row">
                <div class="key w100">Loại tối ưu <span class="red">*</span></div>
                <div class="value">
                  <ejs-dropdownlist locale='vi-VN' v-model="currentFilter.loaiToiUu" :dataSource='dsLoaiToiUu'
                    :fields="{value:'Id', text: 'Name'}" :disabled="true">
                  </ejs-dropdownlist>
                </div>
              </div>
            </div>
            <div class="col-sm-4 col-18">
              <div class="info-row">
                <div class="key w150">Trạng thái xác nhận </div>
                <div class="value">
                  <ejs-dropdownlist locale='vi-VN' v-model="currentFilter.trangThaiXacNhan"
                    :dataSource='dsTrangThaiXacNhan' :fields="{value:'Id', text: 'Name'}">
                  </ejs-dropdownlist>
                </div>
              </div>
            </div>
          </div>
          <DataGrid ref="gridMayChuToiUuItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true"
            v-bind:columns="dynamicColumns" v-bind:dataSource="dsMayChuToiUu" @rowSelected="gridMayChuToiUuItems_RowSelected"
            @rowDeselected="gridMayChuToiUuItems_RowDeselected" @checkBoxChange="gridMayChuToiUuItems_CheckBoxChange" :allowExcelExport="true">
          </DataGrid>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="legend-title">Danh sách Yêu cầu tối ưu</div>
          <DataGrid ref="gridYeuCauToiUuItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true"
            v-bind:columns="[
                        {fieldName: 'STT', headerText: 'STT', width: 70, textAlign: 'Center'},
                        {fieldName: 'THANG_TEN', headerText: 'Tháng', textAlign: 'Center'},
                        {fieldName: 'PHANLOAI_TEN', headerText: 'Loại tối ưu', textAlign: 'Center'}
                        ]" v-bind:dataSource="dsYeuCauToiUu" @rowSelected="gridYeuCauToiUuItems_RowSelected"
            @rowDeselected="gridYeuCauToiUuItems_RowDeselected">
          </DataGrid>
        </div>
      </div>
    </div>
  </div>
</div>
