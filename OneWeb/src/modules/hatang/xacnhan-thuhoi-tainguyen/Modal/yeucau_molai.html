<ejs-dialog :enableResize="true" :allowDragging="false" :visible="false" ref="dialogYeuCauMoLai"
    :animationSettings="animationSettings" :showHeader="false" :showCloseIcon="false" width="80%" height="auto"
    :target="target">
    <div class="modal-content popup-box">
        <div class="popup-header">
            <div class="title" style="font-weight: 600;">Yêu cầu mở lại</div>
            <div class="close -ap icon-close" @click="closeDialog"></div>
        </div>
        <div class="popup-body">
            <div class="row" >
                <div class="list-actions-top">
                    <ul class="list">
                      <li>
                        <b-link href="javascript:void(0)" @click="onSave" >
                          <span class="icon one-save"></span>Xác nhận
                        </b-link>
                      </li>
                      <li>
                        <b-link href="javascript:void(0)" @click="closeDialog">
                          <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
                        </b-link>
                      </li>
                    </ul>
                </div>
            </div>
            <div class="row" >
                <div class="box-form" style="margin-top: 10px;">
                    <!-- <div class="legend-title">Thông tin loại cổng Interface</div> -->
                    <div class="col-12">
                        <div class="info-row">
                            <div class="key w180">Sở cứ mở lại <span class="red">*</span> </div>
                            <div class="value">
                                <input type="text" class="form-control" 
                                v-model="currentItem.socu_molai"/>
                            </div>
                        </div>
                    </div>
                      </div>
                
                      </div>
                </div>

            </div>
        </div>
    </div>
</ejs-dialog>
