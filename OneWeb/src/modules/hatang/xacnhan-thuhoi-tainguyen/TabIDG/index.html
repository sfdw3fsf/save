<div>
  <div class="row" style="padding-top: 0px;">
    <div style="display: flex; justify-content: flex-end; align-items: center; width: 100%;">
      <!-- <div class="title" style="font-weight: 600;"></div> -->
      <button class="btn btn-outline-primary" style="margin-left: 10px; margin-bottom: 2px;" @click="khaiBaoCong">
        <strong><span>+</span></strong>
      </button>
      <IDGModal ref="IDGModal" />
    </div>
  </div>

  <div class="row">
    <div class="col-12">
      <DataGrid
        ref="grdItems"
        :dataSource="IDGList"
        :showColumnCheckbox="true"
        v-bind:columns="IDGCols"
        v-bind:commands="[
          {name: 'SUA', cssClass: 'btn-primary fa fa-pencil-square-o', width: 20},
          {name: 'XOA', cssClass: 'btn-primary fa fa-trash-o', width: 20}
          ]"
        v-bind:commandColumn="{headerText: 'Thao tác', textAlign: 'Left', show: true}"
        @commandClicked="grid_onCommandClicked"
        :enabledSelectFirstRow="false"
        :allowPaging="true"
        :enablePagingServer="false"
        @rowSelected="grdItems_RowSelected"
        @rowDeselected="grdItems_RowDeselected"
      />
    </div>
  </div>
</div>
