<div>
    <div class="list-actions-top">
        <ul class="list">
            <li>
                <b-link href="javascript:void(0)" @click="onAddNew" :disabled="!buttons.btnAddNew.enabled">
                    <span class="icon one-file-plus"></span>Nhập mới
                </b-link>
            </li>
            <li>
                <b-link href="javascript:void(0)" @click="onSave" :disabled="!buttons.btnSave.enabled">
                    <span class="icon one-save"></span>Ghi lại
                </b-link>
            </li>
            <li>
                <b-link href="javascript:void(0)" @click="onCancel" :disabled="!buttons.btnCancel.enabled">
                    <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
                </b-link>
            </li>
            <li>
                <b-link href="javascript:void(0)" @click="onEdit" :disabled="!buttons.btnEdit.enabled">
                    <span class="icon nc-icon-glyph ui-1_edit-72"></span>Sửa
                </b-link>
            </li>
            <li>
                <b-link href="javascript:void(0)" @click="onDelete" :disabled="!buttons.btnDelete.enabled">
                    <span class="icon one-trash"></span>Xóa
                </b-link>
            </li>
        </ul>
    </div>
    <div class="page-content">
        <div class="row">
            <div class="col-12">
                <div class="box-form">
                    <div class="row">
                        <div class="legend-title">Thông tin đơn giá </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w150">Công nghệ sử dụng <span class="red">*</span></div>
                                <div class="value">
                                  <SelectExt :dataSource="dsCongNghe"
                                      dataTextField="TEN" dataValueField="ID"
                                      :disabled="!controls.cboCongNghe.enabled"
                                      v-model="currentItem.congNgheId" />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w150">Hiệu lực</div>
                                <div class="value padt4">
                                    <div class="check-action">
                                        <input type="checkbox" class="check"
                                            :disabled="!controls.chkHieuLuc.enabled" v-model="currentItem.hieuLuc"
                                            :true-value="1" :false-value="0" /><span class="name"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                      <div class="col-sm-6 col-12">
                          <div class="info-row">
                              <div class="key w150">Phân loại hạ tầng <span class="red">*</span></div>
                              <div class="value">
                                <SelectExt :dataSource="dsHaTangPhanLoai"
                                    dataTextField="TEN" dataValueField="ID"
                                    :disabled="!controls.cboPhanLoai.enabled"
                                    v-model="currentItem.haTangPhanLoaiId" />
                              </div>
                          </div>
                      </div>
                      <div class="col-sm-6 col-12">
                          <div class="info-row">
                              <div class="key w150">Đơn giá CPU</div>
                              <div class="value">

                                <ejs-numerictextbox
                                format="###,###.###"
                                placeholder="CPU/Month"
                                decimals="3"
                                :validateDecimalOnType="true"
                                :min="0"
                                :showSpinButton="false"
                                :enabled="controls.txtDonGiaCPU.enabled"
                                v-model="currentItem.donGiaCPU">
                              </ejs-numerictextbox>
                            </div>
                            <span  style="margin: 0 10px;" class="currency-label">VNĐ</span>
                          </div>
                      </div>
                  </div>
                  <div class="row">
                    <div class="col-sm-6 col-12">
                        <div class="info-row">
                            <div class="key w150">Phân loại hạ tầng tính toán <span class="red">*</span></div>
                            <div class="value">
                              <SelectExt :dataSource="dsHaTangPhanLoaiTT"
                                  dataTextField="TEN" dataValueField="ID"
                                  :disabled="!controls.cboPhanLoaiTT.enabled"
                                  v-model="currentItem.haTangPhanLoaiTtId"/>
                            </div>
                        </div>
                    </div>
                    <div class="col-sm-6 col-12">
                        <div class="info-row">
                            <div class="key w150">Đơn giá RAM</div>
                            <div class="value">
                              <ejs-numerictextbox
                                format="###,###.###"
                                placeholder="RAM/Month"
                                decimals="3"
                                :validateDecimalOnType="true"
                                :min="0"
                                :showSpinButton="false"
                                :enabled="controls.txtDonGiaRAM.enabled"
                                v-model="currentItem.donGiaRAM">
                              </ejs-numerictextbox>
                            </div>
                            <span style="margin: 0 10px;" class="currency-label">VNĐ</span>
                        </div>
                    </div>
                </div>
                <div class="row">
                  <div class="col-sm-3 col-12">
                    <div class="info-row">
                      <div class="key w150">Thời gian áp dụng từ:</div>
                      <div class="value">
                        <ejs-datepicker :enabled="controls.txtTuNgay.enabled"
                          v-model="currentItem.batDau" :format="'dd/MM/y'" :allowEdit=true
                        :showClearButton=false ref='txtTuNgay' class="form-control bg-none bor0 fw6">
                        </ejs-datepicker>
                      </div>
                    </div>
                  </div>
                  <div class="col-sm-3 col-12">
                    <div class="info-row">
                      <div class="key w100">Đến ngày</div>
                      <div class="value">
                        <ejs-datepicker :enabled="controls.txtDenNgay.enabled"
                        v-model="currentItem.ketThuc" :format="'dd/MM/y'" :allowEdit=true
                        :showClearButton=false class="form-control bg-none bor0 fw6">
                        </ejs-datepicker>
                      </div>
                    </div>
                  </div>
                  <div class="col-sm-6 col-12">
                      <div class="info-row">
                          <div class="key w150">Đơn giá Disk</div>
                          <div class="value">
                            <ejs-numerictextbox
                              format="###,###.###"
                              placeholder="10GB DISK/Month"
                              decimals="3"
                              :validateDecimalOnType="true"
                              :min="0"
                              :showSpinButton="false"
                              :enabled="controls.txtDonGiaDisk.enabled"
                              v-model="currentItem.donGiaDISK">
                            </ejs-numerictextbox>

                            <!-- <input type="text" class="form-control" placeholder="10GB DISK/Month" :disabled="!controls.txtDonGiaDisk.enabled"
                              v-model="currentItem.donGiaDISK" />
                             -->
                          </div>
                          <span style="margin: 0 10px;" class="currency-label">VNĐ</span>
                      </div>
                  </div>
              </div>

              <div class="row">
                <div class="col-sm-3 col-12">
                    <div class="info-row">
                        <div class="key w150">Số văn bản <span class="red"></span></div>
                        <div class="value">
                          <input type="text" class="form-control" :disabled="!controls.txtSoVanBan.enabled"
                              v-model="currentItem.soVanBan" />
                        </div>
                    </div>
                </div>
                <div class="col-sm-3 col-12">
                  <div class="info-row">
                      <div class="key w100">Ngày văn bản</div>
                      <div class="value">
                        <ejs-datepicker :enabled="controls.txtNgayVanBan.enabled"
                        v-model="currentItem.ngayVanBan" :format="'dd/MM/y'" :allowEdit=true
                        :showClearButton=false ref='txtNgayVanBan' class="form-control bg-none bor0 fw6">
                        </ejs-datepicker>
                      </div>
                  </div>
              </div>
                <div class="col-sm-6 col-12">
                    <div class="info-row">
                        <div class="key w150">% Giảm giá</div>
                        <div class="value">
                          <input type="text" class="form-control" :disabled="!controls.txtGiamGia.enabled"
                              v-model="currentItem.tyLeGiam" />
                        </div>
                    </div>
                </div>
              </div>
            <div class="info-row">
                  <div class="key w150">Ghi chú</div>
                  <div class="value">
                      <input type="text" class="form-control" :disabled="!controls.txtGhiChu.enabled"
                          v-model="currentItem.ghiChu" />
                  </div>
              </div>

                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-12">
                <div class="box-form">
                    <div class="row">
                        <div class="legend-title">Danh sách đơn giá
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-12">
                            <DataGrid ref="grdItems" :allowPaging="true"
                              :enablePagingServer="false"
                              :showColumnCheckbox="true"
                              v-bind:columns="[
                                {fieldName: 'CONGNGHE_SUDUNG', headerText: 'Công nghệ sử dụng', textAlign: 'Left'},
                                {fieldName: 'HATANG_PHANLOAI', headerText: 'Phân loại hạ tầng', textAlign: 'Left'},
                                {fieldName: 'HATANG_PHANLOAITT', headerText: 'Phân loại hạ tầng tính toán', textAlign: 'Left'},
                                {fieldName: 'DONGIA_CPU', headerText: 'Đơn giá CPU', textAlign: 'Right'},
                                {fieldName: 'DONGIA_RAM', headerText: 'Đơn giá RAM', textAlign: 'Right'},
                                {fieldName: 'DONGIA_DISK', headerText: 'Đơn giá Disk', textAlign: 'Right'},
                                {fieldName: 'BATDAU', headerText: 'Áp dụng từ', textAlign: 'Left'},
                                {fieldName: 'KETTHUC', headerText: 'Đến ngày', textAlign: 'Left'},
                                {fieldName: 'SOVANBAN', headerText: 'Số văn bản', textAlign: 'Left'},
                                {fieldName: 'NGAYVANBAN', headerText: 'Ngày văn bản', textAlign: 'Left'},
                                {fieldName: 'TYLE_GIAM', headerText: '% Tỷ lệ giảm ', textAlign: 'Right'},
                                {fieldName: 'GHI_CHU', headerText: 'Ghi chú', textAlign: 'Left'},
                                {fieldName: 'HIEU_LUC', headerText: 'Hiệu lực', width: 50, template: getColumnHieuLucTemplate(), textAlign: 'Left'},
                                ]" v-bind:dataSource="dataSource"
                                  @rowSelected="grdItems_RowSelected"
                                  @rowDeselected="grdItems_RowDeselected">
                            >
                            </DataGrid>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
