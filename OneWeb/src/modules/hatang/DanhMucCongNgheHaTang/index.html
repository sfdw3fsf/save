<div>
    <div class="list-actions-top">
        <ul class="list">
            <li @click.prevent="onNew">
                <a href="#" :class="{'disable-btn': isDisableNew}">
                    <span class="icon one-file-plus"></span> Nhập mới
                </a>
            </li>
            <li @click.prevent="createCongNgheHaTang" >
                <a href="#" :class="{'disable-btn': isDisableSave}">
                    <span class="icon one-save"></span> Ghi Lại
                </a>
            </li>
            <li @click.prevent="updateCongNgheHaTang">
                <a href="#" :class="{'disable-btn': isDisableUpdate}">
                    <span class="icon one-edit"></span> Sửa
                </a>
            </li>
            <!-- <li>
              <b-link href="javascript:void(0)" @click="btnHuyBo_Click" :disabled="!buttons.btnHuyBo.enabled">
                  <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
              </b-link>
          </li> -->

            <li @click.prevent="deleteDanhSach" >
                <a href="#" :class="{'disable-btn': isDisableDelete}">
                    <span class="icon one-trash"></span> Xóa
                </a>
            </li>
        </ul>
    </div>
    <div class="page-content">
        <div class="box-form">
            <div class="legend-title">Thông tin công nghệ hạ tầng</div>
            <div class="row">
                <div class="col-sm-6 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Tên<span class="required"> *</span>
                        </div>
                        <div class="value">
                            <input type="text" class="form-control" v-model="form.ten">
                        </div>
                    </div>
                </div>
                <div class="col-sm-3 col-12">
                  <div class="info-row">
                  </div>
                </div>

                <div class="col-sm-3 col-6">
                    <div class="info-row">
                        <div class="key w100">
                            Hiệu lực
                        </div>
                        <div class="form-check ">
                            <input class="form-check-input" type="checkbox" v-model="form.hieuLuc" id="flexCheckDefault">
                        </div>
                    </div>
                </div>
            </div>

              <div class="info-row">
                  <div class="key w100">
                      Loại hạ tầng
                  </div>
                  <div class="value">
                      <select class="form-control" v-model="form.haTang" @change="onLoaiHaTangChange">
                          <option disabled value="">Chọn loại hạ tầng</option>
                          <option v-for="item in loaiHaTangOptions" :key="item.ID" :value="item.ID">
                              {{ item.NAME }}
                          </option>
                      </select>
                  </div>
              </div>


            <div class="info-row">
                <div class="key w100">
                    Ghi chú
                </div>
                <div class="value">
                    <input type="text" class="form-control" v-model="form.ghiChu">
                </div>
            </div>

        </div>
        <div class="box-form">
            <div class="legend-title">Danh sách công nghệ hạ tầng</div>
            <DataGrid v-bind:columns="[
            {fieldName: 'TEN', headerText: 'Tên', allowFiltering: true, allowSorting: false},
            {fieldName: 'GHI_CHU', headerText: 'Ghi chú', allowFiltering: true, allowSorting: false},
            {fieldName: 'TEN_HATANG', headerText: 'Hạ tầng', allowFiltering: true, allowSorting: false},
            {fieldName: 'HIEU_LUC_TEXT', headerText: 'Hiệu lực', allowFiltering: true, allowSorting: false, width: 100}]"
            :dataSource="dsCongNgheHaTang"
            :showFilter="true"
            :allowPaging="true"
            :enablePagingServer="false"
            :showColumnCheckbox="false"
            @selectedItemsChanged="onSelectRowCheckbox"
            @rowSelected="onSelectRowChanged"
            dataKeyField="ID"
                ref="dsCongNgheHaTang">
            </DataGrid>
        </div>
    </div>
</div>
