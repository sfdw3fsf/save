<ejs-dialog :enableResize="true" :allowDragging="false" :visible="false" ref="dialogNfsSmb"
    :animationSettings="animationSettings" :showHeader="false" :showCloseIcon=false width="80%" height="60%"
    :target="target">

    <div class="modal-content popup-box">
        <div class="popup-header">
            <!-- <div class="title" style="font-weight: 600;">Danh sách tài nguyên NFS</div> -->
            <div class="close -ap icon-close" @click="close"></div>
        </div>
        <div class="popup-body">
            <div class="row">
                <div class="list-actions-top">
                    <ul class="list">
                        <li>
                            <b-link href="javascript:void(0)" @click="onSave">
                                <span class="icon one-save"></span>Lưu
                            </b-link>
                        </li>
                        <li>
                            <b-link href="javascript:void(0)" @click="close">
                                <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
                            </b-link>
                        </li>
                    </ul>
                </div>
            </div>
            <!-- Máy ảo -->
            <div v-if="typeModal == 'VM'" class="row">
                <div class="box-form" style="margin-top: 10px;">
                    <div class="legend-title">Danh sách máy ảo</div>
                    <div class="row">
                        <div class="col-12">
                            <DataGrid ref="grdDialogItems" :allowPaging="true" :enablePagingServer="false"
                                :showColumnCheckbox="true" v-bind:columns="[
                                        {fieldName: 'TEN', headerText: 'Tên máy ảo', textAlign: 'Left'},
                                        {fieldName: 'IP', headerText: 'Network', textAlign: 'Left'},
                                    ]" v-bind:dataSource="dataSource" @rowSelected="grdDialogItems_RowSelected"
                                @rowDeselected="grdDialogItems_RowDeselected">
                            </DataGrid>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Hạ tầng ảo hóa/SmartCloud -->
            <div v-if="typeModal == 'V_SMARTCLOUD'" class="row">
                <div class="box-form" style="margin-top: 10px;">
                    <div class="legend-title">Danh sách hạ tầng ảo hóa/SmartCloud</div>
                    <div class="row">
                        <div class="col-12">
                            <DataGrid ref="grdDialogItems" :allowPaging="true" :enablePagingServer="false"
                                :showColumnCheckbox="true" v-bind:columns="[
                                        {fieldName: 'MAHATANG', headerText: 'Mã hạ tầng', textAlign: 'Left'},
                                        {fieldName: 'TENHATANG', headerText: 'Tên hạ tầng', textAlign: 'Left'},
                                        {fieldName: 'HINHTHUCDAUTU', headerText: 'Hình thức đầu tư', textAlign: 'Left', template: getColumnHinhThucDauTuTemplate(this)},
                                        {fieldName: 'LOAIHATANG_TEXT', headerText: 'Loại hạ tầng', textAlign: 'Left'},
                                        {fieldName: 'PHANLOAIHT_TEXT', headerText: 'Phân loại HT', textAlign: 'Left'},
                                        {fieldName: 'CONGNGHE_TEXT', headerText: 'Công nghệ', textAlign: 'Left'},
                                        {fieldName: 'IDC_TEXT', headerText: 'IDC', textAlign: 'Left'},
                                        {fieldName: 'HATANGMANG', headerText: 'Hạ tầng mạng', textAlign: 'Left'}
                                    ]" v-bind:dataSource="dataSource" @rowSelected="grdDialogItems_RowSelected"
                                @rowDeselected="grdDialogItems_RowDeselected">
                            </DataGrid>
                        </div>
                    </div>
                </div>
            </div>
            <!-- NFS/SMB -->
            <div v-if="typeModal == 'NFS'" class="row">
                <div class="box-form" style="margin-top: 10px;">
                    <div class="legend-title">Danh sách tài nguyên NFS</div>
                    <div class="row">
                        <div class="col-12">
                            <DataGrid ref="grdDialogItems" :allowPaging="true" :enablePagingServer="false"
                                :showColumnCheckbox="true" v-bind:columns="[
                                        {fieldName: 'TEN', headerText: 'Tên NFS', textAlign: 'Left'},
                                        {fieldName: 'LINK', headerText: 'Đường dẫn', textAlign: 'Left'},
                                        {fieldName: 'DUNGLUONG', headerText: 'Dung lượng', textAlign: 'Left'},
                                        {fieldName: 'LOAI_LUUTRU', headerText: 'Loại dung lượng', textAlign: 'Left'},
                                        {fieldName: 'HATANG_LUUTRU', headerText: 'Hạ tầng lưu trữ', textAlign: 'Left'},
                                        {fieldName: 'LOAI_HATANG_LUUTRU', headerText: 'Loại hạ tầng lưu trữ', textAlign: 'Left'},
                                        {fieldName: 'GHI_CHU', headerText: 'Ghi chú', textAlign: 'Left'},
                                    ]" v-bind:dataSource="dataSource" @rowSelected="grdDialogItems_RowSelected"
                                @rowDeselected="grdDialogItems_RowDeselected">
                            </DataGrid>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Thiết bị -->
            <div v-if="typeModal == 'DEVICE'" class="row">
                <div class="box-form" style="margin-top: 10px;">
                    <div class="legend-title">Danh sách thiết bị</div>
                    <div class="row">
                        <div class="col-12">
                            <DataGrid ref="grdDialogItems" :allowPaging="true" :enablePagingServer="false"
                                :showColumnCheckbox="true" v-bind:columns="[
                                        {fieldName: 'MATHIETBI', headerText: 'Mã thiết bị', textAlign: 'Left'},
                                        {fieldName: 'TEN', headerText: 'Tên thiết bị', textAlign: 'Left'},
                                        {fieldName: 'KYHIEU', headerText: 'Ký hiệu TB', textAlign: 'Left'},
                                        {fieldName: 'IP', headerText: 'IP quản trị', textAlign: 'Left'},
                                        {fieldName: 'LOAITHIETBI_TEXT', headerText: 'Loại thiết bị', textAlign: 'Left'},
                                        {fieldName: 'LOAIKHACHHANG', headerText: 'Khách hàng', textAlign: 'Left', template: getColumnLoaiKhachHangTemplate(this)},
                                        {fieldName: 'SERIAL_NUMBER', headerText: 'Serial Number', textAlign: 'Left'},
                                        {fieldName: 'MODEL', headerText: 'Model thiết bị', textAlign: 'Left'},
                                        {fieldName: 'PART_NUMBER', headerText: 'Part Number', textAlign: 'Left'},
                                    ]" v-bind:dataSource="dataSource" @rowSelected="grdDialogItems_RowSelected"
                                @rowDeselected="grdDialogItems_RowDeselected">
                            </DataGrid>
                        </div>
                    </div>
                </div>
            </div>


            <!-- <div style="text-align: right; margin-top: 1em;">
                <button class="btn btn-primary" @click="onSave"><strong><span>Lưu</span></strong></button>
            </div> -->
        </div>
    </div>
</ejs-dialog>
