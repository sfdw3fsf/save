<div class="device-template-search-form">
  <div class="box-form">
    <div class="legend-title">Tìm kiếm thiết bị mẫu</div>
    <div class="row">
      <div class="col-sm-3 col-12">
        <div class="info-row">
          <div class="key w160">Mã chủng loại TB</div>
          <div class="value">
            <input
              v-model.trim="searchForm.maChungLoaiTB"
              type="text"
              class="form-control"
              placeholder="Nhập mã chủng loại TB"
            />
          </div>
        </div>
      </div>
      <div class="col-sm-3 col-12">
        <div class="info-row">
          <div class="key w160">Tên chủng loại thiết bị</div>
          <div class="value">
            <input
              v-model.trim="searchForm.tenChungLoaiTB"
              type="text"
              class="form-control"
              placeholder="Nhập tên chủng loại thiết bị"
            />
          </div>
        </div>
      </div>
      <div class="col-sm-3 col-12">
        <div class="info-row">
          <div class="key w160">Công suất định danh</div>
          <div class="value">
            <input
              v-model.trim="searchForm.congSuatDinhDanh"
              type="text"
              class="form-control"
              placeholder="Nhập công suất định danh"
            />
          </div>
        </div>
      </div>
      <div class="col-sm-3 col-12">
        <div class="info-row">
          <div class="key w160">Hãng sản xuất</div>
          <div class="value">
            <SelectExt
              v-model="searchForm.hangSanXuat"
              dataTextField="TEN"
              dataValueField="ID"
              :dataSource="hangSanXuatList"
              placeholder="Chọn hãng sản xuất"
            />
          </div>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-sm-3 col-12">
        <div class="info-row">
          <div class="key w160">Mảng thiết bị</div>
          <div class="value">
            <SelectExt
              v-model="searchForm.mangThietBi"
              dataTextField="TEN"
              dataValueField="ID"
              :dataSource="mangThietBiList"
              placeholder="Chọn mảng thiết bị"
            />
          </div>
        </div>
      </div>
      <div class="col-sm-3 col-12">
        <div class="info-row">
          <div class="key w160">Loại thiết bị</div>
          <div class="value">
            <SelectExt
              v-model="searchForm.loaiThietBi"
              dataTextField="TEN"
              dataValueField="ID"
              :dataSource="loaiThietBiList"
              placeholder="Chọn loại thiết bị"
            />
          </div>
        </div>
      </div>
      <div class="col-sm-3 col-12">
        <div class="info-row">
          <div class="key w160">Phân loại thiết bị</div>
          <div class="value">
            <SelectExt
              v-model="searchForm.phanLoaiThietBi"
              dataTextField="TEN"
              dataValueField="ID"
              :dataSource="phanLoaiThietBiList"
              placeholder="Chọn phân loại thiết bị"
            />
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
