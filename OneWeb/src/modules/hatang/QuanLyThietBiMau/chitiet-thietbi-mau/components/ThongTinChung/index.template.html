<div>
  <div class="thong-tin-chung">
    <!-- THÔNG TIN TIÊU CHUẨN HỆ THỐNG -->
    <div class="legend-title">Thông tin tiêu chuẩn hệ thống</div>
  
    <div class="row">
      <div v-if="isFieldVisible('mangThietBiId')" :class="getSectionColClass('system')">
        <div class="info-row">
          <div class="key w200">Mảng thiết bị <span v-if="isFieldRequired('mangThietBiId')" class="red">(*)</span></div>
          <div class="value">
            <SelectExt
              v-model="currentItem.mangThietBiId"
              dataTextField="nhom_tbi"
              dataValueField="nhomtbi_id"
              :class="isFieldInvalid('mangThietBiId') ? 'is-invalid' : ''"
              :dataSource="mangThietBiList"
              :disabled="currentMode == 'VIEW' || (thongTinChungControl.selectMangThietBi && !thongTinChungControl.selectMangThietBi.enabled)"
              placeholder="Chọn mảng thiết bị"
            />
          </div>
        </div>
      </div>
      <div v-if="isFieldVisible('loaiThietBiId')" :class="getSectionColClass('system')">
        <div class="info-row">
          <div class="key w200">Loại thiết bị <span v-if="isFieldRequired('loaiThietBiId')" class="red">(*)</span></div>
          <div class="value">
            <SelectExt
              v-model="currentItem.loaiThietBiId"
              dataTextField="loai_tbi"
              dataValueField="loaitbi_id"
              :class="isFieldInvalid('loaiThietBiId') ? 'is-invalid' : ''"
              :dataSource="loaiThietBiList"
              :disabled="currentMode == 'VIEW' || (thongTinChungControl.selectLoaiThietBi && !thongTinChungControl.selectLoaiThietBi.enabled)"
              placeholder="Chọn loại thiết bị"
            />
          </div>
        </div>
      </div>
      <div v-if="isFieldVisible('phanLoaiThietBiId')" :class="getSectionColClass('system')">
        <div class="info-row">
          <div class="key w200">Phân loại TB <span v-if="isFieldRequired('phanLoaiThietBiId')" class="red">(*)</span></div>
          <div class="value">
            <SelectExt
              v-model="currentItem.phanLoaiThietBiId"
              dataTextField="ten"
              dataValueField="phanloaitbi_id"
              :class="isFieldInvalid('phanLoaiThietBiId') ? 'is-invalid' : ''"
              :dataSource="phanLoaiThietBiList"
              :disabled="currentMode == 'VIEW'"
              placeholder="Chọn phân loại TB"
            />
          </div>
        </div>
      </div>
    </div>

    <!-- THÔNG TIN CƠ BẢN -->
    <div class="legend-title" style="margin-top: 10px;">Thông tin cơ bản</div>
  
    <template v-for="(row, rowIndex) in thongTinChungRows">
      <div :key="rowIndex" class="row">
        <div v-for="(fieldKey, fieldIndex) in row" :key="fieldKey" :class="getSectionColClass('thongTinChung')">
          <div class="info-row">
            <div class="key w200">
              {{ getFieldLabel(fieldKey) }}
              <span v-if="isFieldRequired(fieldKey)" class="red">(*)</span>
            </div>
            <div class="value">
              <!-- Mã chủng loại thiết bị (ẩn) -->
              <template v-if="fieldKey === 'maChungLoaiTB'">
                <input
                  type="text"
                  class="form-control"
                  :class="isFieldInvalid('maChungLoaiTB') ? 'is-invalid' : ''"
                  :disabled="currentMode == 'VIEW'"
                  v-model="currentItem.maChungLoaiTB"
                  placeholder="Nhập mã chủng loại TB"
                />
              </template>
              <!-- Tên chủng loại TB -->
              <template v-else-if="fieldKey === 'tenChungLoaiTB'">
                <input
                  type="text"
                  class="form-control"
                  :class="isFieldInvalid('tenChungLoaiTB') ? 'is-invalid' : ''"
                  :disabled="currentMode == 'VIEW'"
                  v-model="currentItem.tenChungLoaiTB"
                  placeholder="Nhập tên chủng loại TB"
                />
              </template>
              <!-- Hiệu lực -->
              <template v-else-if="fieldKey === 'hieuLuc'">
                <div class="padt4">
                  <div class="check-action">
                    <input
                      type="checkbox"
                      class="check"
                      :true-value="1"
                      :false-value="0"
                      v-model="currentItem.hieuLuc"
                      style="cursor: pointer;"
                      :disabled="currentMode == 'VIEW'"
                    />
                    <span class="name"></span>
                  </div>
                </div>
              </template>
              <!-- Hãng sản xuất -->
              <template v-else-if="fieldKey === 'hangSanXuatId'">
                <SelectExt
                  v-model="currentItem.hangSanXuatId"
                  dataTextField="ten"
                  dataValueField="hangsx_id"
                  :class="isFieldInvalid('hangSanXuatId') ? 'is-invalid' : ''"
                  :dataSource="hangSanXuatList"
                  :disabled="currentMode == 'VIEW'"
                  placeholder="Chọn hãng sản xuất"
                />
              </template>
              <!-- Mã vật tư -->
              <template v-else-if="fieldKey === 'maVatTu'">
                <input
                  type="text"
                  class="form-control"
                  :class="isFieldInvalid('maVatTu') ? 'is-invalid' : ''"
                  :disabled="currentMode == 'VIEW'"
                  v-model="currentItem.maVatTu"
                  placeholder="Nhập mã vật tư"
                />
              </template>
              <!-- Ghi chú -->
              <template v-else-if="fieldKey === 'ghiChu'">
                <textarea
                  class="form-control"
                  :class="isFieldInvalid('ghiChu') ? 'is-invalid' : ''"
                  :disabled="currentMode == 'VIEW'"
                  v-model="currentItem.ghiChu"
                  rows="3"
                  placeholder="Nhập ghi chú..."
                ></textarea>
              </template>
              <!-- Ảnh đại diện -->
              <template v-else-if="fieldKey === 'anhDaiDien'">
                <div class="avatar-upload">
                  <div class="d-flex align-items-center">
                    <button
                      type="button"
                      class="btn btn-primary lh14 mr-2"
                      @click="triggerAvatarUpload"
                      :disabled="currentMode == 'VIEW' || uploadingAvatar"
                    >
                      {{ uploadingAvatar ? 'Đang tải...' : 'Chọn ảnh' }}
                    </button>
                  </div>
                  <div class="avatar-preview mt-2" v-if="displayAvatarUrl">
                    <img :src="displayAvatarUrl" alt="Ảnh đại diện" class="avatar-thumb img-thumbnail" />
                  </div>
                  <input
                    ref="avatarInput"
                    type="file"
                    accept="image/*"
                    style="display: none"
                    @change="onAvatarFileChange"
                  />
                </div>
              </template>
              <!-- Không gian lắp đặt -->
              <template v-else-if="fieldKey === 'khongGianLapDat'">
                <input
                  type="number"
                  class="form-control"
                  :class="isFieldInvalid('khongGianLapDat') ? 'is-invalid' : ''"
                  :disabled="currentMode == 'VIEW'"
                  v-model="currentItem.khongGianLapDat"
                  step="1"
                  placeholder="Nhập không gian lắp đặt"
                />
              </template>
              <!-- Full depth -->
              <template v-else-if="fieldKey === 'fullDepth'">
                <div class="padt4">
                  <div class="check-action">
                    <input
                      type="checkbox"
                      class="check"
                      :true-value="1"
                      :false-value="0"
                      v-model="currentItem.fullDepth"
                      :disabled="currentMode == 'VIEW'"
                    />
                    <span class="name"></span>
                  </div>
                </div>
              </template>
              <!-- Công suất định danh -->
              <template v-else-if="fieldKey === 'congSuatDinhDanh'">
                <input
                  type="number"
                  class="form-control"
                  :class="isFieldInvalid('congSuatDinhDanh') ? 'is-invalid' : ''"
                  :disabled="currentMode == 'VIEW'"
                  v-model="currentItem.congSuatDinhDanh"
                  step="0.01"
                  placeholder="Nhập công suất định danh"
                />
              </template>
              <!-- Điện áp định danh -->
              <template v-else-if="fieldKey === 'dienApDinhDanh'">
                <input
                  type="number"
                  class="form-control"
                  :class="isFieldInvalid('dienApDinhDanh') ? 'is-invalid' : ''"
                  :disabled="currentMode == 'VIEW'"
                  v-model="currentItem.dienApDinhDanh"
                  step="0.01"
                  placeholder="Nhập điện áp định danh"
                />
              </template>
              <!-- Loại nguồn điện -->
              <template v-else-if="fieldKey === 'loaiNguonDien'">
                <SelectExt
                  v-model="currentItem.loaiNguonDien"
                  dataTextField="TEN"
                  dataValueField="ID"
                  :class="isFieldInvalid('loaiNguonDien') ? 'is-invalid' : ''"
                  :dataSource="loaiNguonDienList"
                  :disabled="currentMode == 'VIEW'"
                  placeholder="Chọn loại nguồn điện"
                />
              </template>
              <!-- Hệ số cos phi -->
              <template v-else-if="fieldKey === 'heSoCosPhi'">
                <input
                  type="number"
                  class="form-control"
                  :class="isFieldInvalid('heSoCosPhi') ? 'is-invalid' : ''"
                  :disabled="currentMode == 'VIEW'"
                  v-model="currentItem.heSoCosPhi"
                  step="0.01"
                  min="0"
                  max="1"
                  placeholder="Nhập hệ số cos phi"
                />
              </template>
              <!-- Chiều dài -->
              <template v-else-if="fieldKey === 'chieuDai'">
                <input
                  type="number"
                  class="form-control"
                  :class="isFieldInvalid('chieuDai') ? 'is-invalid' : ''"
                  :disabled="currentMode == 'VIEW'"
                  v-model="currentItem.chieuDai"
                  step="0.01"
                  placeholder="Nhập chiều dài (cm)"
                />
              </template>
              <!-- Chiều rộng -->
              <template v-else-if="fieldKey === 'chieuRong'">
                <input
                  type="number"
                  class="form-control"
                  :class="isFieldInvalid('chieuRong') ? 'is-invalid' : ''"
                  :disabled="currentMode == 'VIEW'"
                  v-model="currentItem.chieuRong"
                  step="0.01"
                  placeholder="Nhập chiều rộng (cm)"
                />
              </template>
              <!-- Chiều cao -->
              <template v-else-if="fieldKey === 'chieuCao'">
                <input
                  type="number"
                  class="form-control"
                  :class="isFieldInvalid('chieuCao') ? 'is-invalid' : ''"
                  :disabled="currentMode == 'VIEW'"
                  v-model="currentItem.chieuCao"
                  step="0.01"
                  placeholder="Nhập chiều cao (cm)"
                />
              </template>
              <!-- Loại máy -->
              <template v-else-if="fieldKey === 'loaiMay'">
                <SelectExt
                  v-model="currentItem.loaiMay"
                  dataTextField="TEN"
                  dataValueField="ID"
                  :class="isFieldInvalid('loaiMay') ? 'is-invalid' : ''"
                  :dataSource="loaiMayList"
                  :disabled="currentMode == 'VIEW'"
                  placeholder="Chọn loại máy"
                />
              </template>
              <!-- Cấu hình hệ thống -->
              <template v-else-if="fieldKey === 'cauHinhHeThong'">
                <input
                  type="text"
                  class="form-control"
                  :class="isFieldInvalid('cauHinhHeThong') ? 'is-invalid' : ''"
                  :disabled="currentMode == 'VIEW'"
                  v-model="currentItem.cauHinhHeThong"
                  placeholder="Nhập cấu hình hệ thống"
                />
              </template>
              <!-- Dòng định danh -->
              <template v-else-if="fieldKey === 'dongDienDinhDanh'">
                <input
                  type="number"
                  class="form-control"
                  :class="isFieldInvalid('dongDienDinhDanh') ? 'is-invalid' : ''"
                  :disabled="currentMode == 'VIEW'"
                  v-model="currentItem.dongDienDinhDanh"
                  step="0.01"
                  placeholder="Nhập dòng định danh (A)"
                />
              </template>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>
  
  <!-- CỔNG KẾT NỐI -->
  <CongKetNoi
    ref="CongKetNoi"
    :currentItem="currentItem"
    :currentMode="currentMode"
    :controls="controls"
    :equipmentType="equipmentType"
  />
</div>
