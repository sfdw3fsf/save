<div>
  <div class="row">
    <div class="col-12">
      <div class="row">
        <div class="col-md-4">
          <div class="info-row">
            <div class="key w150">Số cổng <span class="red">*</span></div>
            <div class="value">
              <input
                type="number"
                class="form-control"
                v-model="currentItem.so_cong"
                min="1"
                :disabled="currentMode == 'VIEW'"
              />
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="info-row">
            <div class="key w150">Đã sử dụng</div>
            <div class="value">
              <input type="number" class="form-control" v-model="currentItem.da_su_dung" disabled />
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="info-row">
            <div class="key w150">Còn trống</div>
            <div class="value">
              <input type="number" class="form-control" v-model="currentItem.con_trong" disabled />
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-4">
          <div class="info-row">
            <div class="key w150">Định dạng tên <span class="red">*</span></div>
            <div class="value">
              <input
                type="text"
                class="form-control"
                v-model="currentItem.dinh_dang_ten"
                :disabled="currentMode == 'VIEW'"
              />
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="info-row">
            <div class="key w150">Bắt đầu từ <span class="red">*</span></div>
            <div class="value">
              <input
                type="number"
                class="form-control"
                v-model="currentItem.bat_dau_cong"
                :disabled="currentMode == 'VIEW'"
                min="1"
              />
            </div>
          </div>
        </div>
      </div>
      <div class="row pt-4">
        <div class="col-12">
          <div class="legend-title d-flex justify-content-between align-items-center">
            <span>Danh sách cổng nguồn</span>
            <div>
              <button 
                class="btn btn-sm btn-outline-primary" 
                title="Sinh cổng tự động" 
                @click="onGeneratePowerPort()"
                :disabled="currentMode == 'VIEW'"
              >
                <i class="fa fa-plus"></i> Sinh cổng
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <KDataGrid
            :columns="getDataCols"
            :dataSource="listCongNguon"
            :allowPaging="true"
            :pageSettings="{ pageSize: 10 }"
            ref="grdItems"
          />
        </div>
      </div>
    </div>
  </div>
</div>
