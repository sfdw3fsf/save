<div v-if="visible" class="device-detail-form">
  <!-- TAB NAVIGATION -->
  <div>
    <div class="nav tab-over tabs" v-if="availableTabs.length">
      <a
        v-for="(tab, index) in availableTabs"
        :key="tab.id"
        v-if="shouldRenderTab(tab)"
        :href="`#tab-${tab.id}`"
        v-on:click="onChangeTab(index + 1)"
        data-toggle="tab"
        class="tab"
        :class="{active: tab_index === index + 1}"
      >
        {{ tab.label }}
      </a>
    </div>
  </div>
  <div class="tab-content">
    <div
      v-for="(tab, index) in availableTabs"
      :key="`content-${tab.id}`"
      v-if="shouldRenderTab(tab)"
      v-show="tab_index === index + 1"
      :class="tab.wrapperClass || null"
    >
      <div v-if="tab.legend" class="legend-title">{{ tab.legend }}</div>
      <component
        :is="tab.component"
        :ref="tab.ref"
        v-bind="resolveTabProps(tab)"
        @uploading-changed="onUploadingChanged"
      />
    </div>
  </div>
</div>
