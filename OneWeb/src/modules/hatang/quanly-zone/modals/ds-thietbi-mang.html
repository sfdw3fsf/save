<b-modal
  ref="modalDsThietBiMang"
  size="xl"
  title="Danh sách thiết bị mạng"
  hide-footer
  body-class="modal-body p-0"
  centered

>
  <div class="modal-content popup-box">
    <div class="popup-body">
      <div class="box-form">
        <div class="row">
          <div class="list-actions-top">
            <ul class="list">
              <li>
                <b-link href="javascript:void(0)" @click="onSearch"> <span class="icon one-search"></span> Tìm kiếm </b-link>
              </li>
              <li>
                <b-link href="javascript:void(0)" @click="onChoose"> <span class="icon nc-icon-glyph ui-1_check-circle-08"></span>Chọn </b-link>
              </li>
              <li>
                <b-link href="javascript:void(0)" @click="closeModal">
                  <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
                </b-link>
              </li>
            </ul>
          </div>
        </div>
        <div class="row">
          <!-- --------------CPU------------------- -->
          <div class="col-12">
            <div class="box-form">
              <div class="row">
                <div class="legend-title">Danh sách thiết bị mạng</div>
              </div>
              <div class="row">
                <div class="col-12">
                  <DataGrid ref="grdItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true"
                    v-bind:columns="[
                                    {fieldName: 'TEN', headerText: 'Tên Zone', textAlign: 'Left'},
                                    {fieldName: 'TEN_IDC', headerText: 'Thuộc IDC', textAlign: 'Left'},
                                    {fieldName: 'TEN_VRF', headerText: 'Thuộc VRF', textAlign: 'Left'},
                                    {fieldName: 'TEN_THIETBI', headerText: 'Thuộc thiết bị', textAlign: 'Left'},
                                    {fieldName: 'GHI_CHU', headerText: 'Ghi chú', textAlign: 'Left'}
                                    ]" v-bind:dataSource="dataSource"
                    >
                    >
                  </DataGrid>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</b-modal>
