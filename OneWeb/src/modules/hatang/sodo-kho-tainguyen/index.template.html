<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="btnPhongTo_Click"> <span
            class="icon ui-1_zoom-in nc-icon-outline"></span>Phóng to </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnThuNho_Click"> <span
            class="icon ui-1_zoom-out nc-icon-outline"></span>Thu nhỏ </b-link>
      </li>
    </ul>
  </div>
  <div class="page-content" style="flex-direction: column; padding: 0px;">
    <div class="row" style="padding: 16px 16px 5px;">
      <div class="col-3">
        <div class="info-row">
          <div class="key w120">Hạ tầng IDC</div>
          <div class="value">
            <SelectExt :dataSource="dsIDC" dataTextField="TEN" dataValueField="ID" v-model="currentItem.IDC"
              @change="combobox_Changed" />
          </div>
        </div>
      </div>
    </div>
    <div class="row-diagram">
      <ejs-diagram ref="diagram" :width="width" :height="height" :layout="layout" :getNodeDefaults="getNodeDefaults"
        :selectedItems="selectedItems" :getConnectorDefaults="getConnectorDefaults" :snapSettings="snapSettings"
        :contextMenuSettings="contextMenuSettings" :contextMenuOpen="diagram_contextMenuOpen"
        :contextMenuClick="diagram_contextMenuClick" :tool="tool" :constraints="constraints"></ejs-diagram>
    </div>
  </div>
  <b-modal ref="modalChiTietIDC" title="Chi tiết thuộc tính IDC" centered hide-footer size="lg"
    @shown="modalChiTietIDC_Shown">
    <template #default="{ ok }">
      <ComponentChiTietIDC ref="formChiTietIDC"></ComponentChiTietIDC>
    </template>
  </b-modal>
  <b-modal ref="modalDsTbLienQuan" title="Danh sách thiết bị liên quan" centered hide-footer size="lg"
    @shown="modalDsTbLienQuan_Shown">
    <template #default="{ ok }">
      <ComponentDsTbLienQuan ref="formDsTbLienQuan"></ComponentDsTbLienQuan>
    </template>
  </b-modal>
  <b-modal ref="modalDauNoiHaTangAoHoa" title="Đấu nối hạ tầng" centered hide-footer size="lg" dialog-class="bss-modal"
    @shown="modalDauNoiHaTangAoHoa_Shown">
    <template #default="{ ok }">
      <div class="list-actions-top">
        <ul class="list">
          <li>
            <a href="javascript:void(0)" @click="modalDauNoiHaTangAoHoaLuu_Click"><span class="icon one-save"></span>
              Lưu</a>
          </li>
          <li>
            <a href="javascript:void(0)" @click="modalDauNoiHaTangAoHoaHuyBo_Click"><span
                class="icon one-cancel"></span> Hủy bỏ</a>
          </li>
        </ul>
      </div>
      <ComponentDauNoiHaTangAoHoa ref="formDauNoiHaTangAoHoa"></ComponentDauNoiHaTangAoHoa>
    </template>
  </b-modal>
  <b-modal ref="modalDauNoiHaTangIDG" title="Đấu nối hạ tầng" centered hide-footer size="lg" dialog-class="bss-modal"
    @shown="modalDauNoiHaTangIDG_Shown">
    <template #default="{ ok }">
      <div class="list-actions-top">
        <ul class="list">
          <li>
            <a href="javascript:void(0)" @click="modalDauNoiHaTangIDGLuu_Click"><span class="icon one-save"></span>
              Lưu</a>
          </li>
          <li>
            <a href="javascript:void(0)" @click="modalDauNoiHaTangIDGHuyBo_Click"><span class="icon one-cancel"></span>
              Hủy bỏ</a>
          </li>
        </ul>
      </div>
      <ComponentDauNoiHaTangIDG ref="formDauNoiHaTangIDG"></ComponentDauNoiHaTangIDG>
    </template>
  </b-modal>
  <b-modal ref="modalGoDauNoiHaTangIDG" title="Gỡ đấu nối hạ tầng" centered hide-footer size="lg"
    dialog-class="bss-modal" @shown="modalGoDauNoiHaTangIDG_Shown">
    <template #default="{ ok }">
      <div class="list-actions-top">
        <ul class="list">
          <li>
            <a href="javascript:void(0)" @click="modalGoDauNoiHaTangIDGLuu_Click"><span class="icon one-save"></span> Gỡ
              đấu nối</a>
          </li>
          <li>
            <a href="javascript:void(0)" @click="modalGoDauNoiHaTangIDGHuyBo_Click"><span
                class="icon one-cancel"></span> Hủy bỏ</a>
          </li>
        </ul>
      </div>
      <ComponentGoDauNoiHaTangIDG ref="formGoDauNoiHaTangIDG"></ComponentGoDauNoiHaTangIDG>
    </template>
  </b-modal>
  <b-modal ref="modalKhoHTM" title="Kho hạ tầng mạng" centered hide-footer size="xl" dialog-class="bss-modal"
    @shown="modalKhoHTM_Shown">
    <template>
      <ComponentKhoHTM ref="formKhoHTM" :modalItemID="selectedHTMID"></ComponentKhoHTM>
    </template>
  </b-modal>
  <b-modal ref="modalKhoHTAH" title="Kho hạ tầng ảo hóa" centered hide-footer size="xl" dialog-class="bss-modal"
    @shown="modalKhoHTAH_Shown">
    <template>
      <ComponentKhoHTAH ref="formKhoHTAH" :modalItemID="selectedHTAHID"></ComponentKhoHTAH>
    </template>
  </b-modal>
  <b-modal ref="modalKhoHTCLOUD" title="Kho hạ tầng smart cloud" centered hide-footer size="xl" dialog-class="bss-modal"
    @shown="modalKhoHTCLOUD_Shown">
    <template>
      <ComponentKhoHTCLOUD ref="formKhoHTCLOUD" :modalItemID="selectedHTCLOUDID"></ComponentKhoHTCLOUD>
    </template>
  </b-modal>
  <b-modal ref="modalKhoHTIDG" title="Kho hạ tầng IDG" centered hide-footer size="xl" dialog-class="bss-modal"
    @shown="modalKhoHTIDG_Shown">
    <template>
      <ComponentKhoHTIDG ref="formKhoHTIDG" :modalItemID="selectedHTIDGID"></ComponentKhoHTIDG>
    </template>
  </b-modal>
  <b-modal ref="modalSoDoMucThietBi" title="Sơ đồ đi dây đấu nối thiết bị" centered hide-footer size="xl"
    @shown="modalSoDoMucThietBi_Shown">
    <template>
      <ComponentSoDoMucThietBi ref="formSoDoMucThietBi"></ComponentSoDoMucThietBi>
    </template>
  </b-modal>
  <b-modal ref="modalDsDichVu" title="Danh sách các dịch vụ chạy trên hạ tầng" centered hide-footer size="lg"
    @shown="modalDsDichVu_Shown">
    <template>
      <ComponentDsDichVu ref="formDsDichVu"></ComponentDsDichVu>
    </template>
  </b-modal>
  <b-modal ref="modalDsKhachHang" title="Danh sách khách hàng sử dụng dịch vụ chạy trên hạ tầng" centered hide-footer
    size="xl" @shown="modalDsKhachHang_Shown">
    <template>
      <ComponentDsKhachHang ref="formDsKhachHang"></ComponentDsKhachHang>
    </template>
  </b-modal>
</div>
