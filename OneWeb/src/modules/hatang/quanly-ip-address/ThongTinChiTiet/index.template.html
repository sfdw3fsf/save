<ejs-dialog
  :enableResize="true"
  :allowDragging="false"
  :visible="false"
  ref="ThongTinChiTiet"
  :animationSettings="animationSettings"
  :showHeader="false"
  :showCloseIcon="false"
  width="70%"
  height="auto"
  :target="target"
  :isModal="true"
  :position="{ X: 'center', Y: 'center' }"
  :zIndex="1050"
>
  <div class="modal-content popup-box">
    <div class="popup-header">
      <div class="title"><span class="icon one-notepad"></span> Thông tin chi tiết IP Address</div>
      <div class="close -ap icon-close" data-dismiss="modal" @click="closeModal"></div>
    </div>
    <div class="list-actions-top">
      <ul class="list">
        <li v-if="modalMode !== 'view' && currentTab === TAB_INDICES.THONG_TIN_CHUNG">
          <b-link href="javascript:void(0)" @click="onSave"> <span class="icon one-save"></span>Ghi lại</b-link>
        </li>
        <li v-if="modalMode !== 'view' && currentTab === TAB_INDICES.THONG_TIN_CHUNG">
          <b-link href="javascript:void(0)" @click="onCancel">
            <span class="icon nc-icon-glyph ui-1_circle-remove"></span>Hủy</b-link
          >
        </li>
        <!-- <li v-if="modalMode !== 'view' && currentTab === TAB_INDICES.THONG_TIN_CHUNG">
          <b-link href="javascript:void(0)" @click="closeModal">
            <span class="icon ui-1_circle-remove nc-icon-glyph"></span>Đóng</b-link
          >
        </li> -->
      </ul>
    </div>
    <div class="popup-body">
      <div class="device-detail-form">
        <!-- TAB NAVIGATION -->
        <div class="">
          <div class="nav tab-over tabs">
            <a
              href="#thongTinChung"
              data-toggle="tab"
              :class="{active: currentTab === TAB_INDICES.THONG_TIN_CHUNG}"
              @click="onChangeTab(TAB_INDICES.THONG_TIN_CHUNG)"
            >
              Thông tin chung
            </a>

            <!-- <a
              href="#subnet"
              class="flex-grow-1"
              data-toggle="tab"
              :class="{active: currentTab === TAB_INDICES.SUBNET}"
              @click="onChangeTab(TAB_INDICES.SUBNET)"
            >
              Subnet
            </a>
            <a
              href="#ipStore"
              class="flex-grow-1"
              data-toggle="tab"
              :class="{active: currentTab === TAB_INDICES.IP_STORE}"
              @click="onChangeTab(TAB_INDICES.IP_STORE)"
            >
              IP Store
            </a>
            <a
              href="#haTangAoHoa"
              class="flex-grow-1"
              data-toggle="tab"
              :class="{active: currentTab === TAB_INDICES.HA_TANG_AO_HOA}"
              @click="onChangeTab(TAB_INDICES.HA_TANG_AO_HOA)"
            >
              Hạ tầng ảo hóa/ Smart Cloud/ IDG/ Backup
            </a> -->
            <a
              href="#lichSuThayDoi"
              data-toggle="tab"
              :class="{active: currentTab === TAB_INDICES.LICH_SU_THAY_DOI}"
              @click="onChangeTab(TAB_INDICES.LICH_SU_THAY_DOI)"
            >
              Lịch sử thay đổi
            </a>
          </div>
        </div>
        <div class="tab-content">
          <!-- Tab 1: Thông tin chung -->
          <div class="tab-pane" id="thongTinChung" :class="{active: currentTab === TAB_INDICES.THONG_TIN_CHUNG}">
            <ThongTinChung :ip_id="ip_id" :modalMode="modalMode" ref="ThongTinChung" />
          </div>
          <!-- Tab 2: Subnet -->
          <!-- <div class="tab-pane" id="subnet" :class="{active: currentTab === TAB_INDICES.SUBNET}">
            <Subnet />
          </div> -->
          <!-- Tab 3: IP Store -->
          <!-- <div class="tab-pane" id="ipStore" :class="{active: currentTab === TAB_INDICES.IP_STORE}">
            <IPStore />
          </div> -->
          <!-- Tab 4: Hạ tầng ảo hóa -->
          <!-- <div class="tab-pane" id="haTangAoHoa" :class="{active: currentTab === TAB_INDICES.HA_TANG_AO_HOA}">
            <HaTangAoHoa ref="HaTangAoHoa" :id="id" />
          </div> -->

          <!-- Tab 5: Lịch sử thay đổi -->
          <div class="tab-pane" id="lichSuThayDoi" :class="{active: currentTab === TAB_INDICES.LICH_SU_THAY_DOI}">
            <TabHistory :tenBang="'IP'" :tenCot="''" :khoaDuLieu="ip_id" ref="grdLichSu"></TabHistory>
          </div>
        </div>
      </div>
    </div>
