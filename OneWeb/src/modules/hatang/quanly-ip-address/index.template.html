<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="onSearch"> <span class="icon one-search"></span> Tìm kiếm </b-link>
      </li>
      <!-- <li>
        <b-link href="javascript:void(0)" @click="onCreate"> <span class="icon one-file-plus"></span>Nhập mới</b-link>
      </li> -->
      <li>
        <b-link href="javascript:void(0)"> <span class="icon one-plus"></span>Cấp phát</b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)"> <span class="icon one-undo"></span>Thu hồi</b-link>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <!-- ĐIỀU KIỆN TÌM KIẾM -->
    <div class="box-form">
      <div class="row">
        <div class="legend-title">Điều kiện tìm kiếm</div>
      </div>

      <div class="row">
        <div class="col-sm-3 col-12">
          <div class="info-row">
            <div class="key w120">IDC</div>
            <div class="value">
              <SelectExt
                v-model="searchItem.idcId"
                :dataSource="dsIDC"
                dataTextField="TEN"
                dataValueField="ID"
                @change="onChangeIDC"
              />
            </div>
          </div>
        </div>
        <div class="col-sm-3 col-12">
          <div class="info-row">
            <div class="key w120">Hạ tầng mạng</div>
            <div class="value">
              <SelectExt
                v-model="searchItem.haTangMangId"
                :dataSource="dsHaTangMang"
                dataTextField="TEN"
                dataValueField="ID"
                @change="loadSubnet"
              />
            </div>
          </div>
        </div>
        <div class="col-sm-3 col-12">
          <div class="info-row">
            <div class="key w120">Loại IP</div>
            <div class="value">
              <SelectExt
                v-model="searchItem.loaiIpId"
                :dataSource="dsLoaiIP"
                dataTextField="TEN"
                dataValueField="ID"
                @change="loadSubnet"
              />
            </div>
          </div>
        </div>
        <div class="col-sm-3 col-12">
          <div class="info-row">
            <div class="key w120">Phân loại IP</div>
            <div class="value">
              <SelectExt
                v-model="searchItem.phanLoaiIpId"
                :dataSource="dsPhanLoaiIP"
                dataTextField="TEN"
                dataValueField="ID"
                @change="loadSubnet"
              />
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-sm-3 col-12">
          <div class="info-row">
            <div class="key w120">Subnet</div>
            <div class="value">
              <SelectExt v-model="searchItem.subnetId" :dataSource="dsSubnet" dataTextField="TEN" dataValueField="ID" />
            </div>
          </div>
        </div>
        <div class="col-sm-3 col-12">
          <div class="info-row">
            <div class="key w120">Trạng thái CCDV</div>
            <div class="value">
              <SelectExt
                v-model="searchItem.trangThaiCcdvId"
                :dataSource="dsTrangThaiCCDV"
                dataTextField="TEN"
                dataValueField="ID"
              />
            </div>
          </div>
        </div>
        <div class="col-sm-3 col-12">
          <div class="info-row">
            <div class="key w120">Đối tượng sử dụng</div>
            <div class="value">
              <SelectExt
                v-model="searchItem.doiTuongSdId"
                :dataSource="dsDoiTuongSuDung"
                dataTextField="TEN"
                dataValueField="ID"
              />
            </div>
          </div>
        </div>
        <div class="col-sm-3 col-12">
          <div class="info-row">
            <div class="key w120">Đơn vị quản lý</div>
            <div class="value">
              <SelectExt
                v-model="searchItem.donViQuanLyId"
                :dataSource="dsDonViQuanLy"
                dataTextField="TEN"
                dataValueField="ID"
              />
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- DANH SÁCH IP ADDRESS -->
    <div class="box-form">
      <div class="row">
        <div class="legend-title">Danh sách IP Address</div>
      </div>
      <div class="row">
        <div class="col-12">
          <div style="overflow-x: auto;">
            <DataGrid
              :enablePagingServer="false"
              :enabledSelectFirstRow="true"
              v-bind:columns="
                            [
                              {fieldName: 'DIACHI_IP', headerText: 'IP', width: 130, textAlign: 'Left'},
                              {fieldName: 'LOAI_IP', headerText: 'Loại IP', width: 90, textAlign: 'Left'},
                              {fieldName: 'PHANLOAI_IP', headerText: 'Phân loại IP', width: 100, textAlign: 'Left'},
                              {fieldName: 'IDC_TEN', headerText: 'IDC', width: 140, textAlign: 'Left'},
                              {fieldName: 'VRF_TEN', headerText: 'VRF', width: 140, textAlign: 'Left'},
                              {fieldName: 'ZONE_TEN', headerText: 'Zone', width: 140, textAlign: 'Left'},
                              {fieldName: 'VLAN_TEN', headerText: 'VLAN', width: 140, textAlign: 'Left'},
                              {fieldName: 'SUBNET_TEN', headerText: 'Subnet', width: 150, textAlign: 'Left'},
                              {fieldName: 'MUC_DICH_SD', headerText: 'Mục đích', width: 150, textAlign: 'Left'},
                              {fieldName: 'HATANG_MANG', headerText: 'Hạ tầng mạng', width: 140, textAlign: 'Left'},
                              {fieldName: 'DOITUONG_SD', headerText: 'Đối tượng sử dụng IP', width: 170, textAlign: 'Left'},
                              {fieldName: 'TRANGTHAI_CCDV', headerText: 'Trạng thái CCDV', width: 150, textAlign: 'Left'},
                              {fieldName: 'ACTIONS', headerText: 'Thao tác', allowSorting: false, allowFiltering: false, textAlign: 'Center', template: actionColumn(this), width: 100,  clipMode: 'None'}
                            ]"
              :dataSource="dsIpAddresses"
              :allowPaging="true"
              ref="grdItems"
              :showColumnCheckbox="true"
              @rowSelected="grdItems_RowSelected"
              @recordDoubleClick="onDoubleClick"
            >
            </DataGrid>
          </div>
        </div>
      </div>
    </div>
  </div>
  <ThongTinChiTietIPAddress ref="ThongTinChiTiet" />
</div>
