<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="btnGhiLai_Click" :disabled="!buttons.btnGhiLai.enabled">
          <span class="icon one-save"></span>Ghi lại
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnSua_Click" :disabled="!buttons.btnSua.enabled">
          <span class="icon nc-icon-glyph ui-1_edit-72"></span>Sửa
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnTimKiem_Click" :disabled="!buttons.btnTimKiem.enabled">
          <span class="icon one-search"></span>Tìm kiếm
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onExport" :disabled="!buttons.btnSua.enabled">
          <span class="icon one-file-excel"></span>Export file
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnHoanThanh_Click" :disabled="!buttons.btnSua.enabled">
          <span class="icon one-file-check"></span>Hoàn thành
        </b-link>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <div class="row">
      <div class="col-18">
        <div class="box-form">
          <div class="row">
            <div class="col-sm-4 col-18">
              <div class="info-row">
                <div class="key w100">Tháng <span class="red">*</span></div>
                <div class="value">
                  <SelectExt
                    :dataSource="dsThangNamToiUu"
                    dataTextField="TEN"
                    dataValueField="ID"
                    :disabled="false"
                    v-model="currentItem.thangNamToiUu"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-4 col-16">
              <div class="info-row">
                <div class="key w100">Loại tối ưu <span class="red">*</span></div>
                <div class="value">
                  <SelectExt
                    :dataSource="dsLoaiToiUu"
                    dataTextField="TEN"
                    dataValueField="ID"
                    :disabled="false"
                    v-model="currentItem.loaiToiUuId"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-4 col-18">
              <div class="info-row">
                <div class="key w150">Trạng thái tối ưu</div>
                <div class="value">
                  <SelectExt
                    :dataSource="dsTrangThaiToiUu"
                    dataTextField="TEN"
                    dataValueField="ID"
                    :disabled="false"
                    v-model="currentItem.trangThaiToiUuId"
                  />
                </div>
              </div>
            </div>
          </div>
          <DataGrid
            ref="gridItems"
            :allowPaging="true"
            :editSettings="editSettings"
            :enablePagingServer="false"
            :allowExcelExport="true"
            :showColumnCheckbox="true"
            v-bind:columns="[
                        {fieldName: 'STT', headerText: 'STT', width: 70, textAlign: 'Center'},
                        {fieldName: 'TEN_MAYCHU', headerText: 'Tên máy chủ', textAlign: 'Center'},
                        {fieldName: 'IP', headerText: 'IP', width: 70, textAlign: 'Center'},
                        {fieldName: 'SP_DICHVU', headerText: 'Sản phẩm dịch vụ', textAlign: 'Center'},
                        {fieldName: 'DONVI_CHUQUAN', headerText: 'Đơn vị chủ quản', textAlign: 'Center'},
                        {fieldName: 'PDM_SANPHAM', headerText: 'PDM Sản phẩm', textAlign: 'Center'},
                        {fieldName: 'DV_VANHANH', headerText: 'Đơn vị vận hành', textAlign: 'Center'},
                        {fieldName: 'SIZING_HIENTAI', headerText: 'Sizing hiện tại', textAlign: 'Center', columns:sizingHienTaiColumns},
                        {fieldName: 'MUC_DO_SD_CAO_NHAT', headerText: 'Mức độ SD cao nhất (%)', textAlign: 'Center', columns:mucDoSDCaoNhatColumns},
                        {fieldName: 'SL_VUOTNGUONG_CHOPHEP', headerText: 'Số lần vượt ngưỡng cho phép', textAlign: 'Center', width: 300},
                        {fieldName: 'SO_LAN_VUOTNGUONG', headerText: 'Số lần đã vượt ngưỡng', textAlign: 'Center', columns:soLanVuotNguongColumns},
                        {fieldName: 'SIZING_CAN_TANG', headerText: 'Sizing cần giảm', textAlign: 'Center', columns:sizingCanTangColumns, allowEditing: true},
                        {fieldName: 'SIZING_SAU_KHI_TANG', headerText: 'Sizing sau khi giảm', textAlign: 'Center', columns:sizingSauKhiTangColumns},
                        {fieldName: 'THOIDIEM_TANG', headerText: 'Thời điểm giảm',textAlign: 'Center'},
                    ]"
            v-bind:dataSource="dataItems"
            @rowSelected="gridItems_RowSelected"
            @cellSaved="cellSaved"
            @rowDeselected="gridItems_RowDeselected"
          >
          </DataGrid>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="legend-title">Danh sách Yêu cầu tối ưu</div>
          <DataGrid
            ref="gridDS"
            :allowPaging="true"
            :enablePagingServer="false"
            :showColumnCheckbox="false"
            v-bind:columns="[
                        {fieldName: 'STT', headerText: 'STT', width: 70, textAlign: 'Center'},
                        {fieldName: 'THANG', headerText: 'Tháng', textAlign: 'Center'},
                        {fieldName: 'LOAI_TOI_UU', headerText: 'Loại tối ưu', textAlign: 'Center'},
                        {fieldName: 'TT_XACNHAN', headerText: 'Trạng thái xác nhận', textAlign: 'Center'},
                        ]"
            v-bind:dataSource="dsYeuCauToiUu"
            @rowSelected="gridDS_RowSelected"
            @rowDeselected="gridDS_RowDeselected"
          >
          </DataGrid>
        </div>
      </div>
    </div>
  </div>
</div>
