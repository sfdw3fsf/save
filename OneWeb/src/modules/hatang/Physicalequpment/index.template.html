<div class="main-wrapper">
  <breadcrumb :header="header" />
  <div class="list-actions-top">
    <ul class="list">
      <!-- Actions list -->
      <li @click="onSearch()">
          <b-link href="javascript:void(0)"> <span class="icon one-search"></span>Tìm kiếm</b-link>
        </li>
        <li @click="onResetSearch()">
          <b-link href="javascript:void(0)"> <span class="icon one-refresh"></span>Làm mới</b-link>
        </li>
        <li @click="onAddNew()">
          <b-link href="javascript:void(0)"> <span class="icon one-file-plus"></span>Nhập mới</b-link>
        </li>
    </ul>
  </div>
  <div class="page-content" style="top: 75px">
    <div class="row">
      <div class="box-form">
        <div class="legend-title">Tìm kiếm thiết bị</div>
        <div class="row">
           <div class="col-sm-3 col-12">
            <div class="info-row">
              <div class="key w130">IDC</div>
              <div class="value">
                <SelectExt
                  v-model="searchForm.idcId"
                  dataTextField="TEN_IDC"
                  dataValueField="ID_IDC"
                  :dataSource="[{ID_IDC: -1, TEN_IDC: 'Tất cả'}, ...danhMucIdcList]"
                  placeholder="Chọn idc"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-3 col-12">
            <div class="info-row">
              <div class="key w130">Loại TB</div>
              <div class="value">
                <SelectExt
                  v-model="searchForm.loaiThietBiId"
                  dataTextField="loai_tbi"
                  dataValueField="loaitbi_id"
                  :dataSource="[{loaitbi_id: -1, loai_tbi: 'Tất cả'}, ...loaiThietBiList]"
                  placeholder="Chọn loại thiết bị"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-3 col-12">
            <div class="info-row">
              <div class="key w130">Tên thiết bị</div>
              <div class="value">
                <input v-model.trim="searchForm.tenThietBi" type="text" class="form-control" placeholder="Nhập tên thiết bị" />
              </div>
            </div>
          </div>
          <div class="col-sm-3 col-12">
            <div class="info-row">
              <div class="key w130">Serial Number</div>
              <div class="value">
                <input v-model.trim="searchForm.serial" type="text" class="form-control" placeholder="Nhập serial number" />
              </div>
            </div>
          </div>
           
        </div>
          <div class="row">
          <div class="col-sm-3 col-12">
            <div class="info-row">
              <div class="key w130">Toà nhà</div>
              <div class="value">
                <SelectExt
                  v-model="searchForm.toaNhaId"
                  dataTextField="TEN_TOANHA"
                  dataValueField="ID_TOANHA"
                  :dataSource="[{ID_TOANHA: -1, TEN_TOANHA: 'Tất cả'}, ...toaNhaList]"
                  placeholder="Chọn toà nhà"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-3 col-12">
            <div class="info-row">
              <div class="key w130">Mặt sàn</div>
              <div class="value">
                <SelectExt
                  v-model="searchForm.matSanId"
                  dataTextField="TEN"
                  dataValueField="ID"
                  :dataSource="matSanList"
                  placeholder="Chọn mặt sàn"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-3 col-12">
            <div class="info-row">
              <div class="key w130">Phòng/Zone</div>
              <div class="value">
                <SelectExt
                  v-model="searchForm.phongId"
                  dataTextField="TEN"
                  dataValueField="ID"
                  :dataSource="phongList"
                  placeholder="Chọn phòng/Zone"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-3 col-12">
            <div class="info-row">
              <div class="key w130">Rack</div>
              <div class="value">
                <SelectExt
                  v-model="searchForm.rackId"
                  dataTextField="TEN"
                  dataValueField="ID"
                  :dataSource="rackList"
                  placeholder="Chọn rack"
                />
              </div>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-sm-3 col-12">
            <div class="info-row">
              <div class="key w130">Model</div>
              <div class="value">
                <input v-model.trim="searchForm.model" type="text" class="form-control" placeholder="Nhập model" />
              </div>
            </div>
          </div>
          <div class="col-sm-3 col-12">
            <div class="info-row">
              <div class="key w130">Thẻ tài sản</div>
              <div class="value">
                <input v-model.trim="searchForm.maTs" type="text" class="form-control" placeholder="Nhập thẻ tài sản" />
              </div>
            </div>
          </div>
          <div class="col-sm-3 col-12">
            <div class="info-row">
              <div class="key w130">Công suất định danh</div>
              <div class="value">
                <input v-model.trim="searchForm.csDinhDanh" type="text" class="form-control" placeholder="Nhập công suất" />
              </div>
            </div>
          </div>
          <div class="col-sm-3 col-12">
            <div class="info-row">
              <div class="key w130">Đơn vị quản lý</div>
              <div class="value">
                <SelectExt
                  v-model="searchForm.donViQLyId"
                  dataTextField="ten"
                  dataValueField="id"
                  :dataSource="[{id: -1, ten: 'Tất cả'}, ...donviQLList]"
                  placeholder="Chọn đơn vị quản lý"
                />
              </div>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-sm-4 col-12">
            <div class="info-row">
               <div class="key w130">Cá nhân quản lý</div>
              <div class="value">
                <input v-model.trim="searchForm.cnQL" type="text" class="form-control" placeholder="Nhập cá nhân quản lý" />
              </div>
            </div>
          </div>
          <div class="col-sm-4 col-12">
            <div class="info-row">
              <div class="key w130">Trạng thái vận hành</div>
              <div class="value">
                <SelectExt
                  v-model="searchForm.trangThaiVhId"
                  dataTextField="trangthai_vh"
                  dataValueField="ttvh_id"
                  :dataSource="trangThaiVanHanhList"
                  placeholder="Chọn trạng thái vận hành"
                />
              </div>
            </div>
          </div>
          <div class="col-sm-4 col-12">
            <div class="info-row">
              <div class="key w130">Hệ thông/Thiết bị</div>
              <div class="value">
                <SelectExt
                  v-model="searchForm.heThongTbiId"
                  dataTextField="ten"
                  dataValueField="hethongtbi_id"  
                  :dataSource="[{hethongtbi_id: -1, ten: 'Tất cả'}, ...HTTBList]"
                  placeholder="Chọn hệ thống/thiết bị"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="box-form">
        <div class="row">
          <div class="legend-title d-flex justify-content-between align-items-center">
            Danh sách thiết bị
          </div>
        </div>
        <div class="row">
          <div class="col-12">
            <DataGrid
              v-if="showGrid"
              ref="grdItems"
              :allowPaging="true"
              :enablePagingServer="false"
              :showColumnCheckbox="false"
              :dataSource="listThietBi"
              :childGrid="childGrid"
              v-bind:columns="[
                                {fieldName: 'TEN', headerText: 'Tên thiết bị', textAlign: 'Left'},
                                {fieldName: 'CS_DINHDANH', headerText: 'Công suất định danh', textAlign: 'Left'},
                                {fieldName: 'SERIAL_NUMBER', headerText: 'Serial', textAlign: 'Left'},
                                {fieldName: 'MODEL', headerText: 'Module', textAlign: 'Left'},
                                {fieldName: 'LOAI_TBI', headerText: 'Loại TB', textAlign: 'Left'},
                                {fieldName: 'ZONE', headerText: 'Zone', textAlign: 'Left'},
                                {fieldName: 'HETHONG_THIETBI', headerText: 'Hệ thống/Thiết bị', textAlign: 'Left'},
                                {fieldName: 'RACK', headerText: 'Rack', textAlign: 'Left'},
                                {fieldName: 'TEN_DONVI_QUANLY', headerText: 'Đơn vị quản lý', textAlign: 'Left'},
                                {fieldName: 'TRANGTHAI_VH', headerText: 'Trạng thái vận hành', textAlign: 'Left'},
                                {fieldName: 'ACTIONS', headerText: 'Thao tác', textAlign: 'Center', width: 120, template: acctionColumn(this)},
                                ]"
              :enabledSelectFirstRow="true"
              @detailDataBound="onDetailDataBound"
              @recordDoubleClick="onRecordDoubleClick"
            >
            </DataGrid>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
