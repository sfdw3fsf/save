<div class="danh-sach-o-cam">
  <div class="legend-title">
    <div class="d-flex justify-content-between align-items-center">
      <div>Danh sách ổ cắm trên thanh nguồn</div>
      <div class="header-actions">
        <!-- <b-link 
          href="javascript:void(0)" 
          @click="onAdd" 
          :class="{ disabled: disableActions }"
          title="Thêm mới"
          class="btn-add-icon"
        >
          +
        </b-link> -->
      </div>
    </div>
  </div>

  <!-- Modal thêm/sửa ổ cắm -->
  <b-modal
    ref="modalOCam"
    v-model="showModal"
    :title="modalTitle"
    size="lg"
    @hide="closeModal"
  >
    <div class="popup-body">
      <div class="row">
        <div class="col-12">
          <div class="info-row">
            <div class="key w150">Tên ổ cắm <span class="text-danger">*</span></div>
            <div class="value">
              <input 
                type="text" 
                class="form-control"
                v-model="currentItem.TEN"
                :disabled="true"
                placeholder="Nhập tên ổ cắm"
              />
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <div class="info-row">
            <div class="key w150">Loại ổ cắm</div>
            <div class="value">
              <SelectExt
                v-model="currentItem.LOAIOCAM_ID"
                :dataSource="[...loaiOCamList]"
                dataTextField="ten"
                dataValueField="id"
                :disabled="true"
                placeholder="-- Chọn loại ổ cắm --"
              />
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <div class="info-row">
            <div class="key w150">Trạng thái ổ cắm</div>
            <div class="value">
              <SelectExt
                v-model="currentItem.TRANGTHAI_PORT"
                :dataSource="[...trangThaiOCamOptions]"
                dataTextField="text"
                dataValueField="value"
                placeholder="-- Chọn trạng thái ổ cắm --"
              />
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <div class="info-row">
            <div class="key w150">Trạng thái kết nối</div>
            <div class="value">
              <SelectExt
                v-model="currentItem.TRANGTHAIKN_ID"
                :dataSource="[...trangThaiKetNoiOptions]"
                dataTextField="text"
                dataValueField="value"
                placeholder="-- Chọn trạng thái kết nối --"
              />
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <div class="info-row">
            <div class="key w150">Thiết bị kết nối</div>
            <div class="value">
              <SelectExt
                v-model="currentItem.THIETBIKN_ID"
                :dataSource="[...thietBiList]"
                dataTextField="ten"
                dataValueField="id"
                placeholder="-- Chọn thiết bị --"
              />
            </div>
          </div>
        </div>
      </div>
    </div>
    <template #modal-footer>
      <button class="btn btn-primary" @click="saveItem">
        <span class="icon one-save"></span> Lưu
      </button>
      <button class="btn btn-secondary" @click="closeModal">
        <span class="icon ui-1_circle-remove"></span> Hủy
      </button>
    </template>
  </b-modal>

  <div class="row">
    <div class="col-12">
      <DataGrid
        ref="grdItems"
        :dataSource="dataList"
        :showColumnCheckbox="true"
        :columns="columns"
        :commands="commands"
        :commandColumn="{headerText: 'Thao tác', textAlign: 'Center', show: true}"
        @commandClicked="grid_onCommandClicked"
        :enabledSelectFirstRow="false"
        :allowPaging="true"
        :enablePagingServer="false"
        :pageSize="10"
      />
    </div>
  </div>
</div>
