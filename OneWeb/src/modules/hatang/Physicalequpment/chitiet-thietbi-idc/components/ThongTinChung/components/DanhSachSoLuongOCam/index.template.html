<div>
  <div class="legend-title mt-4">
    <div class="d-flex justify-content-between align-items-center">
    <span>Danh sách số lượng ổ cắm trên thanh nguồn</span>
    <b-link 
      href="javascript:void(0)" 
      @click="onAdd" 
      :class="{ disabled: disableActions }"
      title="Thêm mới"
      class="btn-add-icon"
    >
      +
    </b-link>
    </div>
  </div>

  <!-- Modal thêm/sửa số lượng ổ cắm -->
  <b-modal
    ref="modalSoLuongOCam"
    v-model="showModal"
    :title="isEditMode ? 'Sửa số lượng ổ cắm' : 'Thêm mới số lượng ổ cắm'"
    size="lg"
    @hide="closeModal"
  >
    <div class="popup-body">
      <div class="row">
        <div class="col-12">
          <div class="info-row">
            <div class="key w150">Loại ổ cắm <span class="text-danger">*</span></div>
            <div class="value">
              <SelectExt
                v-model="modalItem.loaiOCamId"
                :dataSource="[...loaiOCamList]"
                dataTextField="ten"
                dataValueField="id"
                placeholder="-- Chọn loại ổ cắm --"
              />
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <div class="info-row">
            <div class="key w150">Tên ổ cắm <span class="text-danger">*</span></div>
            <div class="value">
              <input 
                type="text" 
                class="form-control"
                v-model="modalItem.tenOCam"
                placeholder="Nhập tên ổ cắm"
              />
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <div class="info-row">
            <div class="key w150">Số lượng <span class="text-danger">*</span></div>
            <div class="value">
              <input 
                type="number" 
                class="form-control"
                v-model.number="modalItem.soLuong"
                placeholder="Nhập số lượng"
                :min="isEditMode ? originalSoLuong : 1"
              />
            </div>
          </div>
        </div>
      </div>
    </div>
    <template #modal-footer>
      <button class="btn btn-primary" @click="saveModal">
        <span class="icon one-save"></span> Lưu
      </button>
      <button class="btn btn-secondary" @click="closeModal">
        <span class="icon ui-1_circle-remove"></span> Hủy
      </button>
    </template>
  </b-modal>

  <div class="row">
    <div class="col-12">
      <DataGrid
        ref="grdItems"
        :dataSource="dataList"
        :showColumnCheckbox="true"
        :columns="columns"
        :commands="commands"
        :commandColumn="{headerText: 'Thao tác', textAlign: 'Center', show: true}"
        @commandClicked="grid_onCommandClicked"
        :enabledSelectFirstRow="false"
        :allowPaging="true"
        :enablePagingServer="false"
        :pageSize="10"
      />
    </div>
  </div>
</div>
