<b-modal
  ref="popupChonThietBiHinhThanh"
  size="xl"
  hide-header
  hide-header-close
  hide-footer
  body-class="p-0"
  no-close-on-backdrop
>
  <div class="modal-content popup-box">
    <div class="popup-header">
      <div class="title"><span class="icon one-notepad"></span> Chọn thiết bị hình thành hạ tầng</div>
      <div class="close -ap icon-close" @click="hideModal"></div>
    </div>
    <div class="popup-body">
      <div class="row">
        <div class="grid-ext grid-ext-nodata">
          <DataGrid
            ref="grdItems"
            :allowPaging="true"
            :enablePagingServer="false"
            :showColumnCheckbox="true"
            v-bind:columns="fromHTM ? colsTableHTM : colsTable"
            v-bind:dataSource="thietbi_hinhthanh_hatang_list"
            >
          </DataGrid>
        </div>
        <div class="group-buttons -bottom center">
          <button @click="xacNhanThemThietBi" class="btn btn-second nocorner" style="width: 120px">
            <span class="icon nc-icon-glyph ui-1_check-circle-08"></span> Xác nhận
          </button>
          <button @click="hideModal" class="btn btn-second nocorner" style="width: 120px">
            <span class="icon nc-icon-glyph ui-1_circle-remove"></span> Thoát
          </button>
        </div>
      </div>
    </div>
  </div>
</b-modal>
