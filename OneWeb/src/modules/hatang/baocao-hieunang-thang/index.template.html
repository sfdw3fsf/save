<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="btnNewClick"> <span class="icon one-search"></span>Tìm
          kiếm</b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="xuatExcel"> <span class="icon one-file-excel"></span>Export
          file</b-link>
      </li>

    </ul>
  </div>
  <div class="page-content">
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Tháng </div>
                <div class="value">
                  <DatePicker type="month" :format="monthFormat" :value-type="'format'" v-model="thangTimKiem.value"
                    ref="thangTimKiem" @change="onChangeThangTimKiem" :input-attr="{title: 'Tháng hiện tại'}"
                    class="w-100">
                  </DatePicker>
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Sản phẩm dịch vụ <span class="required">(*)</span></div>
                <div class="value">
                  <treeselect :multiple="true" v-model="spdvIds" :options="dsSpDichVu" placeholder="">
                  </treeselect>
                </div>
              </div>
            </div>


          </div>
          <div class="row" style="padding-top: 20px;">
            <div class="legend-title">Danh sách Yêu cầu thu hồi</div>
          </div>
          <div class="table-content">
            <div class="grid-ext grid-ext-nodata">
              <DataGrid ref="gridItems" v-bind:columns="[
                  { fieldName: 'STT', headerText: 'STT', textAlign: 'Left', allowFiltering: true, allowSorting: false },
                  { fieldName: 'TEN_MAYCHU', headerText: 'Tên máy chủ', textAlign: 'Left', allowFiltering: true, allowSorting: false },
                  { fieldName: 'IP', headerText: 'IP', textAlign: 'Left', allowFiltering: true, allowSorting: false },
                  { fieldName: 'SPDV_ID', headerText: 'Sản phẩm dịch vụ', textAlign: 'Left', allowFiltering: true, allowSorting: false },
                  { fieldName: 'DONVI_CHUQUAN', headerText: 'Đơn vị chủ quản', textAlign: 'Left', allowFiltering: true, allowSorting: false },
                  { fieldName: 'DONVI_VANHANH', headerText: 'Đơn vị vận hành', textAlign: 'Left', allowFiltering: true, allowSorting: false },
                  { fieldName: 'TEN_QUANTRIVIEN', headerText: 'Quản trị viên', textAlign: 'Left', allowFiltering: true, allowSorting: false },
                  { fieldName: 'VCPU', headerText: 'vCPU', textAlign: 'Left', allowFiltering: true, allowSorting: false },
                  { fieldName: 'VRAM', headerText: 'RAM', textAlign: 'Left', allowFiltering: true, allowSorting: false },
                  { fieldName: 'VCPU_USE_MAX', headerText: 'CPU USE MAX (%)', textAlign: 'Left', allowFiltering: true, allowSorting: false },
                  { fieldName: 'VRAM_USE_MAX', headerText: 'RAM USE MAX (%)', textAlign: 'Left', allowFiltering: true, allowSorting: false },
                  
                ]" :showFilter="true" :allowPaging="true" :enablePagingServer="false" :dataSource="dataSource">
              </DataGrid>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
