          <span class="icon one-file-plus"></span>Nhập mới
        </b-link>
      </li>

        <b-link href="javascript:void(0)" @click="onSave" :disabled="!buttons.btnSave.enabled">

      </li>

  </div>


  <div class="page-content">
  <!-- Danh sách VRF -->
    <div class="row">
      <div class="col-12">
        <div class="nav tabs tab-over">
          <a href="#tabVrf" data-toggle="tab" :class="{active: currentTab===1}">Danh sách</a>
          <a href="#tabHistory" data-toggle="tab" :class="{active: currentTab===2}">Lịch sử thay đổi</a>
        </div>
        <div class="tab-content">
          <div class="tab-pane" :class="{active: currentTab===1}" id="tabVrf">
            <div class="row">
              <div class="box-form">
                <div class="row">
                  <div class="legend-title">Danh sách VRF
                  </div>
                </div>
                <div class="row">
                  <div class="col-12">
                    <DataGrid ref="grdItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true"
                      v-bind:columns="[
                                      {fieldName: 'VRF_ID', headerText: 'ID VRF', width: 80, textAlign: 'Center'},
                                      {fieldName: 'TEN_VRF', headerText: 'Tên VRF', textAlign: 'Left'},
                                      {fieldName: 'TEN_IDC', headerText: 'IDC', textAlign: 'Left'},
                                      {fieldName: 'ASN', headerText: 'ASN', textAlign: 'Left'},
                                      {fieldName: 'RD', headerText: 'RD', textAlign: 'Left'},
                                      {fieldName: 'RT_IMPORT', headerText: 'RT Import', textAlign: 'Left'},
                                      {fieldName: 'RT_EXPORT', headerText: 'RT Export', textAlign: 'Left'},
                                      {fieldName: 'GHI_CHU', headerText: 'Ghi chú', textAlign: 'Left'},
                                      {fieldName: 'HIEU_LUC', headerText: 'Hiệu lực', width: 100, template: getColumnHieuLucTemplate(), textAlign: 'Left'},
                                      {fieldName: 'THAOTAC', headerText: 'Thao tác', textAlign: 'Center', template: actionColumn(this), width: 120, allowFiltering: false}
                                      ]" v-bind:dataSource="vrfDataList" @rowSelected="grdItems_RowSelected"
                      @rowDeselected="grdItems_RowDeselected" @selectedItemsChanged="onSelectRowCheckbox">
                      >
                    </DataGrid>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="tab-pane" :class="{active: currentTab===2}" id="tabHistory">
            <div class="row">
              <div class="box-form">
                <div class="row">
                  <div class="legend-title">Lịch sử thay đổi
                  </div>
                </div>
                <div class="row">
                  <div class="col-12">
                    <DataGrid
                        :enablePagingServer="false"
                        v-bind:columns="
                              [
                                {fieldName: 'STT', headerText: 'STT', textAlign: 'Center', width: 80},
                                {fieldName: 'TEN_VRF', headerText: 'Tên VRF', textAlign: 'Left', width: 200},
                                {fieldName: 'HANHDONG', headerText: 'Tên tác động', textAlign: 'Left', width: 150},
                                {fieldName: 'TENCOT', headerText: 'Trường thông tin thay đổi', textAlign: 'Left', width: 200},
                                {fieldName: 'GIATRI_CU', headerText: 'Giá trị cũ', textAlign: 'Left', width: 150},
                                {fieldName: 'GIATRI_MOI', headerText: 'Giá trị mới', textAlign: 'Left', width: 150},
                                {fieldName: 'NGUOI_CN', headerText: 'Người thực hiện', textAlign: 'Left', width: 130},
                                {fieldName: 'NGAY_CN', headerText: 'Thời điểm', textAlign: 'Left', width: 150}
                              ]"
                        v-bind:dataSource="dsLichSu"
                        :allowPaging="true"
                        ref="grdHistory">
                    </DataGrid>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <ThongTinChungVrfModal ref="modalThongTinChungVrf" @vrfAllocated="onVrfAllocated"/>
</div>
