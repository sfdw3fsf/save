<ejs-dialog :enableResize="true" :allowDragging="false" :visible="false" ref="dialogChiTietCongThietBi"
  :animationSettings="animationSettings" :showHeader="false" :showCloseIcon="false" width="80%" height="auto"
  :target="target">
  <div class="modal-content popup-box">
    <div class="popup-header">
      <div class="title" style="font-weight: 600;">Khai báo Loại Cổng Interface</div>
      <div class="close -ap icon-close" @click="closeDialog"></div>
    </div>
    <div class="popup-body">
      <div class="row">
        <div class="list-actions-top">
          <ul class="list">
            <!-- <li>
                        <b-link href="javascript:void(0)" :disabled="!buttons.btnSave.enabled" @click="handleSaveClick"><span class="icon one-save"></span>Ghi lại</b-link>
                      </li>
                      <li>
                        <b-link href="javascript:void(0)" :disabled="!buttons.btnCancel.enabled" @click="handleCancelClick"><span class="icon ui-1_circle-remove nc-icon-glyph"></span>Hủy bỏ</b-link>
                      </li>
                      <li>
                        <b-link href="javascript:void(0)" :disabled="!buttons.btnEdit.enabled" @click="handleEditClick"><span class="icon nc-icon-glyph ui-1_edit-72"></span>Sửa</b-link>
                      </li> -->
            <li>
              <b-link href="javascript:void(0)" @click="handleSaveClick">
                <span class="icon one-save"></span>Cập nhật
              </b-link>
            </li>
            <li>
              <b-link href="javascript:void(0)" @click="closeDialog">
                <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
              </b-link>
            </li>
          </ul>
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <div class="box-form">
            <div class="row ">
              <div class="col-6">
                <div class="row">
                  <div class="legend-title">Thông tin chung</div>
                </div>
                <div class="row">
                  <div class="col-12">
                    <div class="info-row">
                      <div class="key w150">Thiết bị cha</div>
                      <div class="value">
                        <input type="text" class="form-control" disabled v-model="currentItem.parentDevice" />
                      </div>
                    </div>
                  </div>
                  <div class="col-12">
                    <div class="info-row">
                      <div class="key w150">Số thứ tự</div>
                      <div class="value">
                        <input type="text" class="form-control" disabled v-model="currentItem.no" />
                      </div>
                    </div>
                  </div>
                  <div class="col-12">
                    <div class="info-row">
                      <div class="key w150">Tên cổng</div>
                      <div class="value">
                        <input type="text" class="form-control" disabled v-model="currentItem.portName" />
                      </div>
                    </div>
                  </div>
                  <div class="col-12">
                    <div class="info-row">
                      <div class="key w150">Phân loại cổng</div>
                      <div class="value">
                        <input type="text" class="form-control" disabled v-model="currentItem.namePortClassification" />
                      </div>
                    </div>
                  </div>
                  <div class="col-12">
                    <div class="info-row">
                      <div class="key w150">Mục đích sử dụng cổng</div>
                      <div class="value">
                        <SelectExt :dataSource="portPurposeData" dataTextField="TEN" dataValueField="ID"
                          v-model="currentItem.portPurpose" />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="col-6">
                <div class="row">
                  <div class="legend-title">Đặc tính</div>
                </div>
                <div class="row">
                  <div class="col-12">
                    <div class="info-row">
                      <div class="key w150">Hiệu lực</div>
                      <div class="value padt4">
                        <div class="check-action"><input type="checkbox" class="check" v-model="currentItem.validity"
                            :true-value="1" :false-value="0" /><span class="name"></span></div>
                      </div>
                    </div>
                  </div>
                  <div class="col-12">
                    <div class="info-row">
                      <div class="key w150">Loại cổng</div>
                      <div class="value">
                        <SelectExt :dataSource="portTypeData" dataTextField="TEN" dataValueField="ID"
                          v-model="currentItem.portType" />
                      </div>
                    </div>
                  </div>
                  <template >
                    <div class="col-12" v-show="currentItem.portClassification === 1">
                      <div class="info-row">
                        <div class="key w150">Băng thông cổng</div>
                        <div class="value">
                          <SelectExt :dataSource="portBandwidthData" dataTextField="TEN" dataValueField="ID"
                            v-model="currentItem.portBandWidth" />
                        </div>
                      </div>
                    </div>
                    <div class="col-12" v-show="currentItem.portClassification === 1">
                      <div class="info-row">
                        <div class="key w150">Thông tin module</div>
                        <div class="value">
                          <SelectExt :dataSource="moduleInfoData" dataTextField="TEN" dataValueField="ID"
                            v-model="currentItem.moduleInfo" />
                        </div>
                      </div>
                    </div>
                    <div class="col-12" v-show="currentItem.portClassification === 1">
                      <div class="info-row">
                        <div class="key w150">Kết nối</div>
                        <div class="value">
                          <SelectExt
                          :dataSource="connectorData"
                          dataTextField="TEN"
                          dataValueField="ID"
                          :disabled="!controls.comboboxConnection.enable"
                          v-model="currentItem.connection"
                        />
                          <!-- <input type="text" class="form-control" v-model="currentItem.connection" /> -->
                        </div>
                      </div>
                    </div>
                  </template>
                  <div class="col-12">
                    <div class="info-row">
                      <div class="key w150">Trạng thái sử dụng</div>
                      <div class="value">
                        <SelectExt :dataSource="trangthaiSuDungData" dataTextField="TEN" dataValueField="ID"
                          v-model="currentItem.usingState" />
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <!-- <div class="col-12">
                <div class="col-12">
                  <div class="info-row">
                    <div class="key w150">Trạng thái sử dụng</div>
                    <div class="value">
                      <SelectExt :dataSource="trangthaiSuDungData" dataTextField="TEN" dataValueField="ID"
                        v-model="currentItem.usingState" />
                    </div>
                  </div>
                </div>
              </div> -->

              <div class="col-12">
                <div class="col-12">
                  <div class="info-row">
                    <div class="key w150">Ghi chú</div>
                    <div class="value"><input type="text" class="form-control" v-model="currentItem.note" /></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Danh sách Tab -->
      <div class="row">
        <div class="col-12">
          <div class="nav tabs tab-over">
            <!-- <a href="#tabInfo" data-toggle="tab" :class="{active: currentTab === 1}">Thông tin đấu nối với thiết bị</a> -->
            <a href="#tabHistory" data-toggle="tab" :class="{active: currentTab === 2}">Lịch sử thay đổi</a>
          </div>
          <div class="tab-content">
            <!-- Tab Thông tin -->
            <!-- <div class="tab-pane" id="tabInfo" :class="{active: currentTab === 1}">
              <div class="row">
                <div class="box-form">
                  <DataGrid :columns="connectorCols" :allowPaging="true"
                    :enablePagingServer="false" :showColumnCheckbox="true" ref="grdConnector"></DataGrid>
                </div>
              </div>
            </div> -->
            <!-- Tab Lịch sử -->
            <div class="tab-pane" id="tabHistory" :class="{active: currentTab === 2}">
              <div class="row">
                <div class="box-form">
                  <DataGrid :columns="historyCols" :dataSource="historyList" :allowPaging="true"
                    :enablePagingServer="false" :showColumnCheckbox="true" ref="grdHistory"></DataGrid>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ejs-dialog>
