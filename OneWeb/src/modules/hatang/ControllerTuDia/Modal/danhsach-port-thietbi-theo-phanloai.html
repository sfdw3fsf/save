    <div class="popup-header">
      <div class="close -ap icon-close" @click="closeDialog"></div>
    </div>
    <div class="popup-body">
      <div class="row">
        <div class="box-form">
          <div class="legend-title">Danh sách Port theo {{ thongtinCard.title }} của thiết bị</div>
          <div class="row">
            <div class="col-12">
              <DataGrid ref="grdItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="false"
                v-bind:columns="computedColumns" v-bind:dataSource="listPorts">
              </DataGrid>
            </div>
          </div>
        </div>

      </div>
      <ChiTietCongThietBi ref="dialogChiTietCongThietBi" @chitietCongThietBiTraVe="chitietCongThietBiTraVe" />
