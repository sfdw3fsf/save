<!-- Tab 1 Inteface-->
<div class="table-content">
  <div class="row">
    <div :class="[interfaceItem.so_linecard == 0 ? 'col-sm-12' : 'col-sm-10', 'col-12']">
      <div class="info-row">
        <div class="key"
          :style="{ width: interfaceItem.so_linecard == 0 || interfaceItem.so_linecard === null ? '100px' : '180px'}">Số
          LineCard <span class="red">*</span></div>
        <div class="value">
          <input type="number" class="form-control" :class="controls.txtSoLineCard.invalid ? 'is-invalid' : ''"
            :disabled="!controls.txtSoLineCard.enabled" v-model="interfaceItem.so_linecard" />
        </div>
      </div>
    </div>
    <div class="col-sm-2 col-12" v-show="interfaceItem.so_linecard > 0">
      <div class="info-row">
        <div class="value"><!-- :class="{disabled:!buttons.btnThongTinKhac}" -->
          <button class="btn btn-second fullw" @click="showThongTinThietBi">Thêm Card</button>
        </div>
      </div>
    </div>
  </div>
  <div class="row" v-show="interfaceItem.so_linecard > 0">
    <div class="col-sm-10 col-12">
      <div class="info-row">
        <div class="key" :style="{ width: '180px'}">Tổng số Port của thiết bị</div>
        <div class="value">
          <input type="text" class="form-control" :class="controls.txtTongSoPort.invalid ? 'is-invalid' : ''"
            :disabled="true" v-model="tongsoPortThietbi" />
        </div>
      </div>
    </div>
    <div class="col-sm-2 col-12">
      <div class="info-row">
        <div class="value"><!-- :class="{disabled:!buttons.btnThongTinKhac}" -->
          <button class="btn btn-second fullw" @click="xemDanhSachPortThietBi">Xem danh sách</button>
        </div>
      </div>
    </div>
  </div>
  <div class="row" v-show="interfaceItem.so_linecard == 0">
    <div class="col-sm-4 col-12">
      <div class="info-row">
        <div class="key w100">Số Interface <span class="red">*</span></div>
        <div class="value">
          <input type="number" class="form-control" :class="controls.txtSoInterface.invalid ? 'is-invalid' : ''"
            :disabled="!controls.txtSoInterface.enabled" v-model="interfaceItem.so_interface" />
        </div>
      </div>
    </div>
    <div class="col-sm-4 col-12">
      <div class="info-row">
        <div class="key w100">Bắt đầu từ <span class="red">*</span></div>
        <div class="value">
          <input type="number" class="form-control" :class="controls.txtInterfaceStart.invalid ? 'is-invalid' : ''"
            :disabled="!controls.txtInterfaceStart.enabled" v-model="interfaceItem.interface_start" />
        </div>
      </div>
    </div>
    <div class="col-sm-4 col-12">
      <div class="info-row">
        <div class="key w100">Định dạng tên <span class="red">*</span></div>
        <div class="value">
          <input type="text" class="form-control" :class="controls.txtInterfaceFname.invalid ? 'is-invalid' : ''"
            :disabled="!controls.txtInterfaceFname.enabled" v-model="interfaceItem.interface_fname" />
        </div>
      </div>
    </div>
  </div>

  <!-- Danh sách card -->
  <div class="row" style="padding-top: 20px;" v-show="interfaceItem.so_linecard == 0">
    <div class="legend-title">Danh sách Port Interface
    </div>
  </div>
  <div class="row" v-show="interfaceItem.so_linecard == 0">
    <div class="col-12">
      <DataGrid ref="grdItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="false"
        v-bind:columns="[
                              {fieldName: 'SOTHUTU', headerText: 'Số thứ tự', textAlign: 'Left'},
                              {fieldName: 'TEN', headerText: 'Tên cổng', textAlign: 'Left'},
                              {fieldName: 'TEN_LOAICONG', headerText: 'Loại cổng', textAlign: 'Left'},
                              {fieldName: 'TEN_MUCDICHSUDUNG_CONG', headerText: 'Mục đích', textAlign: 'Left'},
                              {fieldName: 'TEN_BANGTHONGCONG', headerText: 'Băng thông', textAlign: 'Left'},
                              {fieldName: 'TEN_HIEU_LUC', headerText: 'Hiệu lực', width: 100, textAlign: 'Left'},
                              {fieldName: 'CHITIET', headerText: 'Chi tiết', template: this.getColumnCapNhatTemplate(this), textAlign: 'Left'},
                              ]" v-bind:dataSource="dsPortInterface">
      </DataGrid>
      <ChiTietCongThietBi :key="interfaceItem.so_interface" ref="dialogChiTietCongThietBi"
        @chitietCongThietBiTraVe="chitietCongThietBiTraVe" />
    </div>
  </div>

  <div class="row" style="padding-top: 20px;" v-show="interfaceItem.so_linecard > 0">
    <div class="legend-title">Danh sách Card
    </div>
  </div>
  <div class="row" v-show="interfaceItem.so_linecard > 0">
    <div class="col-12">
      <DataGrid ref="grdItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="false" :selectionSettings="selectionOptions"
        v-bind:columns="[
                              {fieldName: 'MODEL', headerText: 'Model thiết bị', textAlign: 'Left'},
                              {fieldName: 'TEN_HANG_SX', headerText: 'Nhà sản xuất', textAlign: 'Left'},
                              {fieldName: 'CHIEUCAO', headerText: 'Chiều cao', textAlign: 'Left'},
                              {fieldName: 'FULLDEPTH', headerText: 'Full Depth', textAlign: 'Left'},
                              {fieldName: 'CS_DINHDANH', headerText: 'Công suất định danh', textAlign: 'Left'},
                              {fieldName: 'TEN_HIEU_LUC', headerText: 'Hiệu lực', width: 100, textAlign: 'Left'},
                              {fieldName: 'CHI_TIET', headerText: 'Chi tiết', template: this.getColumnChiTietCardTemplate(this), textAlign: 'Left'},
                              ]" v-bind:dataSource="dsCardInterface"
                              @rowSelected="rowCardSelected">

      </DataGrid>
    </div>
  </div>

  <DanhSachPortThietBiTheoPhanLoai :key="interfaceItem.so_linecard != 0" ref="dialogDanhSachPortThietBiTheoPhanLoai" :thongtinCard = "thongtinCard"/>

  <ModalThemCard ref="modalThemCard" @send-data="handleModalThemCard"></ModalThemCard>

  <!-- <b-modal ref="modalThongTinThietBi" title="Thông tin thiết bị" centered hide-footer size="xl"
    @shown="modalThongTinThietBiShown">
    <template #default="{ ok }">
      <ThongTinThietBi ref="formThongTinThietBi"></ThongTinThietBi>
    </template>
  </b-modal> -->

  <!-- <b-modal ref="modalChiTietCongThietBi" title="Chi tiết cổng thiết bị" centered hide-footer size="xl"
    @shown="modalChiTietCongThietBiShown">
    <template #default="{ ok }">
      <ChiTietCongThietBi ref="formChiTietCongThietBi"></ChiTietCongThietBi>
    </template>
  </b-modal> -->
</div>
