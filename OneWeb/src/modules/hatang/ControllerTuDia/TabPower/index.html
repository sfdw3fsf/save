<!-- Tab 2 Power-->
<div class="table-content">
  <div class="row">
    <div :class="[powerItem.so_power == 0 ? 'col-sm-12' : 'col-sm-10', 'col-12']">
      <div class="info-row">
        <div class="key" :style="{ width: powerItem.so_power == 0 ? '130px' : '180px'}">Số Power Module <span class="red">*</span></div>
        <div class="value">
          <input type="number" class="form-control" :class="controls.txtSoPower.invalid ? 'is-invalid' : ''"
            :disabled="!controls.txtSoPower.enabled" v-model="powerItem.so_power" />
        </div>
      </div>
    </div>
    <div class="col-sm-2 col-12" v-show="powerItem.so_power > 0">
      <div class="info-row">
        <div class="value"><!-- :class="{disabled:!buttons.btnThongTinKhac}" -->
          <button class="btn btn-second fullw" @click="showThongTinThietBi">Thêm Card</button>
      </div>
      </div>
    </div>
  </div>
  <div class="row" v-show="powerItem.so_power > 0">
    <div class="col-sm-10 col-12">
      <div class="info-row">
        <div class="key" :style="{ width: '180px'}">Tổng số Port của thiết bị</div>
        <div class="value">
          <input type="text" class="form-control" :class="controls.txtTongSoPortPower.invalid ? 'is-invalid' : ''"
            :disabled="true" v-model="tongsoPortModuleThietbi" />
        </div>
      </div>
    </div>
    <div class="col-sm-2 col-12">
      <div class="info-row">
        <div class="value">
          <button class="btn btn-second fullw" @click="xemDanhSachPortThietBi">Xem danh sách</button>
      </div>
      </div>
    </div>
  </div>
  <div class="row" v-show="powerItem.so_power == 0">
    <div class="col-sm-4 col-12">
      <div class="info-row">
        <div class="key" :style="{ width: powerItem.so_power == 0 ? '130px' : '180px'}">Số PowerSlot <span class="red">*</span></div>
        <div class="value">
          <input type="number" class="form-control" :class="controls.txtSoPowerSlot.invalid ? 'is-invalid' : ''"
            :disabled="!controls.txtSoPowerSlot.enabled" v-model="powerItem.so_powerslot" />
        </div>
      </div>
    </div>
    <div class="col-sm-4 col-12">
      <div class="info-row">
        <div class="key w100">Bắt đầu từ <span class="red">*</span></div>
        <div class="value">
          <input type="number" class="form-control" :class="controls.txtPowerStart.invalid ? 'is-invalid' : ''"
            :disabled="!controls.txtPowerStart.enabled" v-model="powerItem.power_start" />
        </div>
      </div>
    </div>
    <div class="col-sm-4 col-12">
      <div class="info-row">
        <div class="key w100">Định dạng tên <span class="red">*</span></div>
        <div class="value">
          <input type="text" class="form-control" :class="controls.txtPowerFname.invalid ? 'is-invalid' : ''"
            :disabled="!controls.txtPowerFname.enabled" v-model="powerItem.power_fname" />
        </div>
      </div>
    </div>
  </div>

  <!-- Danh sách card -->
  <div class="row" style="padding-top: 20px;" v-show="powerItem.so_power == 0">
    <div class="legend-title">Danh sách Port Power
    </div>
  </div>
  <div class="row" v-show="powerItem.so_power == 0">
    <div class="col-12">
      <DataGrid ref="grdItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="false"
        v-bind:columns="[
                              {fieldName: 'SOTHUTU', headerText: 'Số thứ tự', textAlign: 'Left'},
                              {fieldName: 'TEN', headerText: 'Tên cổng', textAlign: 'Left'},
                              {fieldName: 'TEN_LOAICONG', headerText: 'Loại cổng', textAlign: 'Left'},
                              {fieldName: 'TEN_MUCDICHSUDUNG_CONG', headerText: 'Mục đích', textAlign: 'Left'},
                              {fieldName: 'TEN_BANGTHONGCONG', headerText: 'Băng thông', textAlign: 'Left'},
                              {fieldName: 'TEN_HIEU_LUC', headerText: 'Hiệu lực', width: 100, textAlign: 'Left'},
                              {fieldName: 'CHITIET', headerText: 'Chi tiết', template: this.getColumnCapNhatTemplate(this), textAlign: 'Left'},
                              ]" v-bind:dataSource="dsPortPower">
      </DataGrid>
      <ChiTietCongThietBi :key="powerItem.so_powerslot" ref="dialogChiTietCongThietBi" @chitietCongThietBiTraVe="chitietCongThietBiTraVe"/>
    </div>
  </div>

  <div class="row" style="padding-top: 20px;" v-show="powerItem.so_power > 0">
    <div class="legend-title">Danh sách Module
    </div>
  </div>
  <div class="row" v-show="powerItem.so_power > 0">
    <div class="col-12">
      <DataGrid ref="grdItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="false" :selectionSettings="selectionOptions"
        v-bind:columns="[
                              {fieldName: 'MODEL', headerText: 'Model thiết bị', textAlign: 'Left'},
                              {fieldName: 'TEN_HANG_SX', headerText: 'Nhà sản xuất', textAlign: 'Left'},
                              {fieldName: 'CHIEUCAO', headerText: 'Chiều cao', textAlign: 'Left'},
                              {fieldName: 'FULLDEPTH', headerText: 'Full Depth', textAlign: 'Left'},
                              {fieldName: 'CS_DINHDANH', headerText: 'Công suất định danh', textAlign: 'Left'},
                              {fieldName: 'TEN_HIEU_LUC', headerText: 'Hiệu lực', width: 100, textAlign: 'Left'},
                              {fieldName: 'CHI_TIET', headerText: 'Chi tiết', template: this.getColumnChiTietCardTemplate(this), textAlign: 'Left'},
                              ]" v-bind:dataSource="dsModule"
                              @rowSelected="rowCardSelected">

      </DataGrid>
    </div>
  </div>
  <DanhSachPortThietBiTheoPhanLoai :key="powerItem.so_power != 0" ref="dialogDanhSachPortThietBiTheoPhanLoai" :thongtinCard = "thongtinCard"/>
  <ModalThemCard ref="modalThemCard" @send-data="handleModalThemCard"></ModalThemCard>
</div>
