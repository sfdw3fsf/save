<div>
  <div class="list-actions-top">
    <ul class="list">
      <!-- <li>
        <b-link href="javascript:void(0)" @click="btnNhapMoi_Click" :disabled="!buttons.btnNhapMoi.enabled">
          <span class="icon one-file-plus"></span>Nhập mới
        </b-link>
      </li> -->
      <li>
        <b-link href="javascript:void(0)" @click="btnGhiLai_Click" :disabled="!buttons.btnGhiLai.enabled">
          <span class="icon one-save"></span>Ghi lại
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnHuyBo_Click" :disabled="!buttons.btnHuyBo.enabled">
          <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnSua_Click" :disabled="!buttons.btnSua.enabled">
          <span class="icon nc-icon-glyph ui-1_edit-72"></span>Sửa
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="btnXoa_Click" :disabled="!buttons.btnXoa.enabled">
          <span class="icon one-trash"></span>Xóa
        </b-link>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Thông tin chung
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w400">Mã tủ đĩa</div>
                <div class="value">
                  <input type="text" class="form-control" :class="controls.txtMaTuDia.invalid ? 'is-invalid' : ''"
                    disabled="true" v-model="currentItem.matudia" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key" :style="{ width: '120px'}">Hiệu lực</div>
                <div class="value padt4">
                  <div class="check-action">
                    <input type="checkbox" class="check" :disabled="!controls.checBoxHieuLuc.enabled"
                      v-model="currentItem.hieu_luc" :true-value="1" :false-value="0" /><span class="name"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w1000">Mã thiết bị</div>
                <div class="value">
                  <input type="text" class="form-control" :class="controls.txtMaThietBi.invalid ? 'is-invalid' : ''"
                    disabled="true" v-model="currentItem.mathietbi" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key" :style="{ width: '120px'}">SerialNumber</div>
                <div class="value">
                  <input type="text" class="form-control" :disabled="!controls.txtSerialNumber.enabled"
                    v-model="currentItem.serial_number" />
                </div>
              </div>
            </div>

          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w400">Tên thiết bị<span class="red">*</span></div>
                <div class="value">
                  <input type="text" class="form-control" :disabled="!controls.txtTenThietBi.enabled"
                    v-model="currentItem.ten" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key" :style="{ width: '120px'}">IP MGMT</div>
                <div class="value">
                  <treeselect :multiple="true"
                                        v-model="currentItem.ip_mgmt"
                                        :options="dsIP"
                                        :disabled="!controls.comboboxIpMgmt.enabled"
                                        :disable-branch-nodes="false" :append-to-body="true" placeholder=""
                                        style="overflow-y:auto; ">
                                    </treeselect>
                  <!-- <SelectExt :settings="{placeholder: ''}" :dataSource="dsDoiTuong" dataTextField="ten"
                    dataValueField="id" :disabled="!controls.comboboxDoiTuong.enabled" v-model="currentItem.doiTuong" /> -->
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w400">Ký hiệu TB<span class="red">*</span></div>
                <div class="value">
                  <input type="text" class="form-control" :disabled="!controls.txtKyHieuTB.enabled"
                    v-model="currentItem.kyhieu" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key" :style="{ width: '120px'}">IP Controller</div>
                <div class="value">
                  <treeselect :multiple="true"
                                        v-model="currentItem.ip_controller"
                                        :options="dsIP"
                                        :disabled="!controls.comboboxIpController.enabled"
                                        :disable-branch-nodes="false" :append-to-body="true" placeholder=""
                                        style="overflow-y:auto; ">
                                    </treeselect>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w400">Số thứ tự</div>
                <div class="value">
                    <input type="text" class="form-control" :class="controls.txtSTT.invalid ? 'is-invalid' : ''"
                    disabled="true" v-model="currentItem.sothutu" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key" :style="{ width: '120px'}">Trạng thái sử dụng</div>
                <div class="value">
                  <SelectExt :settings="{placeholder: ''}" :dataSource="dsTTSuDung" dataTextField="ten"
                    dataValueField="id" :disabled="!controls.comboboxTTSuDung.enabled" v-model="currentItem.trangthai_sd" />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-12 col-12">
              <div class="info-row">
                <div class="key w400">Ghi chú</div>
                <div class="value">
                  <input type="text" class="form-control" :disabled="!controls.txtGhiChu.enabled"
                    v-model="currentItem.ghi_chu" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="nav tab-over tabs" style="margin-top: 30px;">
      <!-- Tab 1 -->
      <a href="#tabInterface" data-toggle="tab" :class="tabDsPortSelected.Inteface ? 'active' : ''" @click="tabDsPort_Click">Interface</a>
      <a href="#tabPower" data-toggle="tab" :class="tabDsPortSelected.Power ? 'active' : ''" @click="tabDsPort_Click">Power</a>
      <a href="#tabConsole" data-toggle="tab" :class="tabDsPortSelected.Console ? 'active' : ''" @click="tabDsPort_Click">Console</a>
    </div>
    <!-- v-if="showInterfaceComponent" -->
    <div class="tab-content">
      <div class="tab-pane" :class="tabDsPortSelected.Inteface ? 'active' : ''" id="tabInterface">
        <keep-alive>
          <!-- :dsPortInterfaceFromParent = "dsPortInterface" -->
          <interface-component :key="currentItem.so_linecard"  ref="interfaceComponent" :controllerItem = "currentItem" :enableControl = "buttons.btnGhiLai.enabled"></interface-component>
        </keep-alive>
      </div>
      <div class="tab-pane" :class="tabDsPortSelected.Power ? 'active' : ''" id="tabPower">
        <keep-alive>
          <!-- :dsPortPowerFromParent = "dsPortPower" -->
          <power-component :key="currentItem.so_power" ref="powerComponent" :controllerItem = "currentItem" :enableControl = "buttons.btnGhiLai.enabled"></power-component>
        </keep-alive>
      </div>
      <div class="tab-pane" :class="tabDsPortSelected.Console ? 'active' : ''" id="tabConsole">
        <keep-alive>
          <!-- :dsPortConsoleFromParent = "dsPortConsole"  -->
          <console-component :key="currentItem.so_controlcard" ref="consoleComponent" :controllerItem = "currentItem" :enableControl = "buttons.btnGhiLai.enabled"></console-component>
        </keep-alive>
      </div>
    </div>

    <div class="row" style="padding-top: 20px;" >
      <div class="legend-title">Lịch sử thay đổi
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <DataGrid ref="grdItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="false"
          v-bind:columns="[
                                {fieldName: 'SOTHUTU', headerText: 'STT', textAlign: 'Left'},
                                {fieldName: 'TACDONG', headerText: 'Tên tác động', textAlign: 'Left'},
                                {fieldName: 'FIELD', headerText: 'Trường thông tin thay đổi', textAlign: 'Left'},
                                {fieldName: 'OLD_VALUE', headerText: 'Giá trị cũ', textAlign: 'Left'},
                                {fieldName: 'NEW_VALUE', headerText: 'Giá trị mới', textAlign: 'Left'},
                                {fieldName: 'TEN_NV', headerText: 'Người thực hiện', textAlign: 'Left'},
                                {fieldName: 'NGAY_CN', headerText: 'Thời điểm', textAlign: 'Left'},
                                ]" v-bind:dataSource="dsLichSuThayDoi">
        </DataGrid>
      </div>
    </div>
  </div>
</div>
