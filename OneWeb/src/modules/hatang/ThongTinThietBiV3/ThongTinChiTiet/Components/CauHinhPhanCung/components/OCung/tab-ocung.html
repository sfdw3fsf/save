<div class="row">
  <div class="box-form">
    <div class="legend-title">
      Cấu hình ổ cứng
    </div>
    <div class="row">
      <div class="col-sm-4 col-12">
        <div class="info-row">
          <div class="key w150">Số lượng khe cắm (<span class="red">*</span>)</div>
          <div class="value">
            <input type="number" class="form-control" v-model="thietBiCurrent.SL_KHE_OCUNG" :disabled="false" />
          </div>
        </div>
      </div>
      <div class="col-sm-4 col-12">
        <div class="info-row">
          <div class="key w150">SL đã cắm (<span class="red">*</span>)</div>
          <div class="value">
            <input type="number" class="form-control" v-model="thietBiCurrent.SL_OCUNG_DACAM" :disabled="true" />
          </div>
        </div>
      </div>
      <div class="col-sm-4 col-12">
        <div class="info-row">
          <div class="key w150">Tổng dung lượng (<span class="red">*</span>)</div>
          <div class="value">
            <input type="text" class="form-control" :disabled="true" v-model.trim="thietBiCurrent.TONG_DL_O_CUNG" />
          </div>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-sm-4 col-12">
        <div class="info-row">
          <div class="key w150">Định dạng tên</div>
          <div class="value">
            <input type="text" class="form-control" :disabled="false" v-model.trim="dinhDangTen" />
          </div>
        </div>
      </div>
      <div class="col-sm-4 col-12">
        <div class="info-row">
          <div class="key w150">Bắt đầu từ</div>
          <div class="value">
            <input type="number" class="form-control" :disabled="false" v-model="batDauTu" />
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="box-form">
    <div class="row">
      <div class="legend-title d-flex justify-content-between align-items-center">
        <span>Danh sách Ổ cứng</span>
        <button class="btn btn-sm btn-outline-primary" title="Sinh cổng tự động" @click="onGenerateDSOCung()">
          <i class="fa fa-plus"></i>
        </button>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <DataGrid
          ref="danhSachOCungGrd"
          :allowPaging="true"
          :enablePagingServer="false"
          :showColumnCheckbox="false"
          v-bind:columns="[
                                    {fieldName: 'TEN_VITRI', headerText: 'Tên khe cắm', textAlign: 'Left'},
                                    {fieldName: 'TEN_OCUNG', headerText: 'Tên Ổ cứng', textAlign: 'Left'},
                                    {fieldName: 'KYHIEU', headerText: 'Ký hiệu', textAlign: 'Left'},
                                    {fieldName: 'LOAIOCUNG', headerText: 'Loại', textAlign: 'Left'},
                                    {fieldName: 'TOCDO', headerText: 'Tốc độ', textAlign: 'Left'},
                                    {fieldName: 'KICHTHUOC', headerText: 'Khích thước', textAlign: 'Left'},
                                    {fieldName: 'DUNGLUONG', headerText: 'Dung lượng', textAlign: 'Left'},
                                    {fieldName: 'PART_NUMBER', headerText: 'Part Number', textAlign: 'Left'},
                                    {fieldName: 'TRANGTHAI_VH', headerText: 'Trạng thái VH', textAlign: 'Left'},
                                    {fieldName: 'THAOTAC', headerText: 'Thao tác', textAlign: 'Center', template: actionColumn(this), allowFiltering: false},
                                  ]"
          v-bind:dataSource="localDsOCung"
        >
        </DataGrid>
      </div>
    </div>
  </div>
  <EditOCungModal ref="editOCungModal" />
</div>
