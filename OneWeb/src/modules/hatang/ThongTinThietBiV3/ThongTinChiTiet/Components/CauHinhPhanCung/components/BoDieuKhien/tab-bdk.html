<div class="row">
  <div class="box-form">
    <div class="legend-title">
      Bộ điều khiển
    </div>
    <div class="row">
      <div class="col-sm-6 col-12">
        <div class="info-row">
          <div class="key w150">Số bộ điều khiển:</div>
          <div class="value">
            <input type="number" class="form-control" :disabled="true" v-model.trim="localDsBodKh.length" />
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="box-form">
    <div class="row">
      <div class="legend-title d-flex justify-content-between align-items-center">
        <span>Danh sách bộ điều khiển</span>
        <div>
          <button class="btn btn-sm btn-outline-primary" title="Thêm mới" @click="onGenerateBDK()">
            <i class="fa fa-plus"></i>
          </button>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <DataGrid
          ref="danhSachBDKGrd"
          :allowPaging="true"
          :enablePagingServer="false"
          :showColumnCheckbox="false"
          v-bind:columns="[
                                  {fieldName: 'STT', headerText: 'STT', textAlign: 'Left'},
                                  {fieldName: 'MA_TS', headerText: 'Mã tủ đĩa', textAlign: 'Left'},
                                  {fieldName: 'MA_TBI', headerText: 'Mã TB', textAlign: 'Left'},
                                  {fieldName: 'TEN', headerText: 'Tên TB', textAlign: 'Left'},
                                  {fieldName: 'KYHIEU', headerText: 'Ký hiệu', textAlign: 'Left'},
                                  {fieldName: 'SERIAL_NUMBER', headerText: 'Serial', textAlign: 'Left'},
                                  {fieldName: 'SL_CORECPU', headerText: 'CPU', textAlign: 'Left'},
                                  {fieldName: 'DL_RAM', headerText: 'RAM', textAlign: 'Left'},
                                  {fieldName: 'DL_CACHE', headerText: 'Cache', textAlign: 'Left'},
                                  {fieldName: 'TRANGTHAI_VH', headerText: 'Trạng thái VH', textAlign: 'Left'},
                                  {fieldName: 'THAOTAC', headerText: 'Thao tác', textAlign: 'Center', template: actionColumn(this), allowFiltering: false},
                                ]"
          v-bind:dataSource="localDsBodKh"
        >
        </DataGrid>
      </div>
    </div>
  </div>
  <EditBDKModal ref="editBDKModal" />
  <DetailBDKModal ref="detailBDKModal" />
</div>
