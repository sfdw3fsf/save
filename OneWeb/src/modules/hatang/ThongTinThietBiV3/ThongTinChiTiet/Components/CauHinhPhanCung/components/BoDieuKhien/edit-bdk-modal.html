<b-modal
  ref="modalEditBDK"
  size="xl"
  title="Chỉnh sửa Bộ điều khiển"
  hide-footer
  body-class="modal-body p-0"
  centered
>
  <div class="modal-content popup-box">
    <div class="popup-body">
      <div class="box-form">
        <div class="row">
          <div class="list-actions-top">
            <ul class="list">
              <li>
                <b-link href="javascript:void(0)" @click="onSave"> <span class="icon one-save"></span>Ghi lại </b-link>
              </li>
              <li>
                <b-link href="javascript:void(0)" @click="closeModal">
                  <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
                </b-link>
              </li>
            </ul>
          </div>
        </div>
        <div class="row">
          <!-- --------------CPU------------------- -->
          <div class="col-12">
            <div class="box-form">
              <div class="legend-title" >
                Danh sách Bộ điều khiển
              </div>
              <div class="row">
                <div class="col-12">
                  <DataGrid
                    ref="danhSachBDKChonGrd"
                    :allowPaging="true"
                    :enablePagingServer="false"
                    :showColumnCheckbox="true"
                    v-bind:columns="[
                                            {fieldName: 'STT', headerText: 'STT', textAlign: 'Left'},
                                            {fieldName: 'MA_TS', headerText: 'Mã tủ đĩa', textAlign: 'Left'},
                                            {fieldName: 'MA_TBI', headerText: 'Mã TB', textAlign: 'Left'},
                                            {fieldName: 'TEN', headerText: 'Tên TB', textAlign: 'Left'},
                                            {fieldName: 'KYHIEU', headerText: 'Ký hiệu', textAlign: 'Left'},
                                            {fieldName: 'SERIAL_NUMBER', headerText: 'Serial', textAlign: 'Left'},
                                            {fieldName: 'SL_CORECPU', headerText: 'CPU', textAlign: 'Left'},
                                            {fieldName: 'DL_RAM', headerText: 'RAM', textAlign: 'Left'},
                                            {fieldName: 'DL_CACHE', headerText: 'Cache', textAlign: 'Left'},
                                            {fieldName: 'TRANGTHAI_VH', headerText: 'Trạng thái VH', textAlign: 'Left'},
                                          ]"
                    v-bind:dataSource="DsBodKhNew"
                  >
                  </DataGrid>
                </div>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</b-modal>
