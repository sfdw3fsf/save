<div class="row">
  <div class="box-form">
    <div class="legend-title">
      Cấu hình RAM
    </div>
    <div class="row">
      <div class="col-sm-4 col-12">
        <div class="info-row">
          <div class="key w150">Số khe cắm (<span class="red">*</span>)</div>
          <div class="value">
            <input type="number" class="form-control" v-model="thietBiCurrent.SL_KHERAM" :disabled="false" />
          </div>
        </div>
      </div>
      <div class="col-sm-4 col-12">
        <div class="info-row">
          <div class="key w150">SL đã cắm (<span class="red">*</span>)</div>
          <div class="value">
            <input type="number" class="form-control" v-model="thietBiCurrent.SL_RAM_DACAM" :disabled="true" />
          </div>
        </div>
      </div>
      <div class="col-sm-4 col-12">
        <div class="info-row">
          <div class="key w150">Tổng dung lượng (<span class="red">*</span>)</div>
          <div class="value">
            <input type="text" class="form-control" :disabled="true" v-model.trim="thietBiCurrent.TONG_DL_RAM" />
          </div>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-sm-4 col-12">
        <div class="info-row">
          <div class="key w150">Định dạng tên</div>
          <div class="value">
            <input type="text" class="form-control" :disabled="false" v-model.trim="dinhDangTen" />
          </div>
        </div>
      </div>
      <div class="col-sm-4 col-12">
        <div class="info-row">
          <div class="key w150">Bắt đầu từ</div>
          <div class="value">
            <input type="number" class="form-control" :disabled="false" v-model="batDauTu" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="box-form">
    <div class="row">
      <div class="legend-title d-flex justify-content-between align-items-center">
        <span>Danh sách RAM</span>
        <div>
          <button class="btn btn-sm btn-outline-primary" title="Sinh cổng tự động" @click="onGenerateRAM()">
            <i class="fa fa-plus"></i>
          </button>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <DataGrid
          ref="cauHinhRAMgrd"
          :allowPaging="true"
          :enablePagingServer="false"
          :showColumnCheckbox="false"
          v-bind:columns="[
                                    {fieldName: 'TEN_VITRI', headerText: 'Tên khe cắm RAM', textAlign: 'Left'},
                                    {fieldName: 'TEN_RAM', headerText: 'Tên RAM', textAlign: 'Left'},
                                    {fieldName: 'DUNGLUONG', headerText: 'Dung lượng', textAlign: 'Left'},
                                    {fieldName: 'LOAI_RAM', headerText: 'Loại RAM', textAlign: 'Left'},
                                    {fieldName: 'TOCDO', headerText: 'Tốc độ', textAlign: 'Left'},
                                    {fieldName: 'TRANGTHAI_VH', headerText: 'Trạng thái VH', textAlign: 'Left'},
                                    {fieldName: 'THAOTAC', headerText: 'Thao tác', textAlign: 'Center', template: actionColumn(this), allowFiltering: false},
                                  ]"
          v-bind:dataSource="localDsRAM"
        >
        </DataGrid>
      </div>
    </div>
  </div>
  <EditRAMModal ref="editRAMModal" />
</div>
