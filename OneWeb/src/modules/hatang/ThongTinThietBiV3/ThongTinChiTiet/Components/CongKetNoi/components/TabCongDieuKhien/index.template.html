<div>
  <div class="row" v-if="!deviceTypeInfo.isNetwork">
    <div class="col-12">
      <div class="row">
        <div class="col-md-4">
          <div class="info-row">
            <div class="key w150">Số cổng <span class="red">*</span></div>
            <div class="value">
              <input
                type="number"
                class="form-control"
                v-model="currentItem.so_cong"
                :disabled="controls.txt_so_cong.enabled"
                min="1"
                v-on:keypress="isNumber($event)"
                @paste="handlePasteNumber(currentItem, 'so_cong', $event, 1)"
              />
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="info-row">
            <div class="key w150">Đã sử dụng</div>
            <div class="value">
              <input type="number" class="form-control" v-model="currentItem.da_su_dung" disabled />
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="info-row">
            <div class="key w150">Còn trống</div>
            <div class="value">
              <input type="number" class="form-control" v-model="currentItem.con_trong" disabled />
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-4">
          <div class="info-row">
            <div class="key w150">Định dạng tên <span class="red">*</span></div>
            <div class="value">
              <input
                type="text"
                class="form-control"
                v-model="currentItem.dinh_dang_ten"
                :disabled="controls.txt_dinh_dang_ten.enabled"
              />
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="info-row">
            <div class="key w150">Bắt đầu từ <span class="red">*</span></div>
            <div class="value">
              <input
                type="number"
                class="form-control"
                v-model="currentItem.bat_dau_cong"
                :disabled="controls.txt_bat_dau_cong.enabled"
                min="1"
                v-on:keypress="isNumber($event)"
                @paste="handlePasteNumber(currentItem, 'bat_dau_cong', $event, 1)"
              />
            </div>
          </div>
        </div>
      </div>
      <div class="row pt-4">
        <div class="col-12">
          <div class="legend-title d-flex justify-content-between align-items-center">
            <span>Danh sách cổng điều khiển</span>
            <div>
              <button class="btn btn-sm btn-outline-primary" title="Sinh cổng tự động" @click="onGenerateDataPort()">
                <i class="fa fa-plus"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <DataGrid
            :columns="getDataCols"
            :dataSource="listCongDieuKhien"
            :allowPaging="true"
            :enablePagingServer="false"
            :enabledSelectFirstRow="true"
            ref="grdItems"
            @rowSelected="grdItems_RowSelected($event, false)"
          >
          </DataGrid>
        </div>
      </div>
    </div>
  </div>
  <div class="row" v-if="deviceTypeInfo.isNetwork">
    <div class="col-12">
      <div class="row">
        <div class="col-12">
          <div class="legend-title">

          </div>
        </div>
      </div>

      <div class="row pt-4">

              />
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="info-row">
            <div class="key w150">Bắt đầu từ <span class="red">*</span></div>
            <div class="value">
              <input

              />

      <div class="row pt-4">
        <div class="col-12">
          <div class="legend-title d-flex justify-content-between align-items-center">
            <span>Danh sách cổng điều khiển</span>
            <div>
              <button class="btn btn-sm btn-outline-primary" title="Sinh cổng tự động" @click="onGenerateDataPort()">
                <i class="fa fa-plus"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <DataGrid
            :columns="getDataPortControlCard"
            :dataSource="listCongDieuKhien"
            :allowPaging="true"
            :enablePagingServer="false"
            :enabledSelectFirstRow="true"

    </div>
    <ModalChonThietBi ref="ModalChonThietBi" />
  </div>
  <ThongTinCongDieuKhien ref="ThongTinCongDieuKhien" />
</div>
