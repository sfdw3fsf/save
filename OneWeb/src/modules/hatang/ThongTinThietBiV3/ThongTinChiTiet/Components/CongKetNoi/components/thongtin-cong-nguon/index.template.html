<ejs-dialog
  :enableResize="true"
  :allowDragging="false"
  :visible="false"
  ref="dialogKhaiBaoCongNguon"
  :animationSettings="animationSettings"
  :showHeader="false"
  :showCloseIcon="false"
  width="80%"
  height="auto"
  :target="target"
>
  <div class="modal-content popup-box">
    <div class="popup-header">
      <div class="title" style="font-weight: 600;">Khai báo cổng nguồn</div>
      <div class="close -ap icon-close" @click="closeDialog"></div>
    </div>
    <div class="popup-body">
      <div class="row">
        <div class="list-actions-top">
          <ul class="list">
            <li>
              <b-link href="javascript:void(0)" @click="onSave"> <span class="icon one-save"></span>Ghi lại </b-link>
            </li>
            <li>
              <b-link href="javascript:void(0)" @click="closeDialog">
                <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
              </b-link>
            </li>
          </ul>
        </div>
      </div>
      <div class="row">
        <div class="box-form" style="margin-top: 10px;">
          <div class="legend-title">Thông tin loại cổng nguồn</div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Dòng định danh</div>
                <div class="value">
                  <input
                    type="number"
                    class="form-control"
                    min="0"
                    v-model="thongTinCong.dong_dinh_danh"
                    v-on:keypress="isNumber($event)"
                    @paste="handlePasteNumber(thongTinCong, 'dong_dinh_danh', $event, 0)"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Điện áp định danh</div>
                <div class="value">
                  <input
                    type="number"
                    class="form-control"
                    min="0"
                    v-model="thongTinCong.dien_ap_dinh_danh"
                    v-on:keypress="isNumber($event)"
                    @paste="handlePasteNumber(thongTinCong, 'dien_ap_dinh_danh', $event, 0)"
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Loại nguồn điện</div>
                <div class="value">
                  <SelectExt
                    dataTextField="TEN"
                    dataValueField="ID"
                    :dataSource="listLoaiNguonDienItems"
                    v-model="thongTinCong.loaiNguonDienId"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Chuẩn đấu nối <span class="red">*</span></div>
                <div class="value">
                  <SelectExt
                    dataTextField="TEN"
                    dataValueField="ID"
                    :dataSource="listChuanDauNoiItems"
                    v-model="thongTinCong.chuanDauNoiId"
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Trạng thái port <span class="red">*</span></div>
                <div class="value">
                  <SelectExt
                    dataTextField="TEN"
                    dataValueField="ID"
                    :dataSource="trangThaiPortListItems"
                    v-model="thongTinCong.trangThaiPortId"
                    @change="onChangeTrangThaiPort($event)"
                  />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Trạng thái kết nối <span class="red">*</span></div>
                <div class="value">
                  <SelectExt
                    dataTextField="TEN"
                    dataValueField="ID"
                    :dataSource="trangThaiKetNoiListItems"
                    v-model="thongTinCong.trangThaiKetNoiId"
                    disabled
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Thiết bị nối đến<span class="red">*</span></div>
                <div class="value">
                  <SelectExt
                    dataTextField="TEN"
                    dataValueField="ID"
                    :dataSource="thietBiNoiDenListItems"
                    v-model="thongTinCong.thietBiNoiDenId"
                    disabled
                  />
                </div>
              </div>
            </div>
            <!-- <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w150">Địa chỉ IP <span class="red">*</span> </div>
                <div class="value">
                  <SelectExt
                    dataTextField="TEN"
                    dataValueField="ID"
                    :dataSource="diaChiIPListItems"
                    v-model="interfacePortType.diaChiIP"
                  />
                </div>
              </div>
            </div> -->
          </div>
        </div>
      </div>
    </div>
  </div>
</ejs-dialog>
