<div>
  <div class="list-actions-top">
    <ul class="list">
      <!-- Actions khi hiển thị form chi tiết -->
      <li v-if="detailCurrentMode == 'EDIT' || detailCurrentMode == 'ADD'">
        <b-link href="javascript:void(0)" @click="onSaveDetail">
          <span class="icon one-save"></span>{{ detailSaveButtonText }}</b-link>
      </li>
      <li v-if="detailCurrentMode == 'VIEW'">
        <b-link href="javascript:void(0)" @click="onEditDetail">
          <span class="icon fa fa-edit"></span>Sửa</b-link>
      </li>
      <li v-if="detailCurrentMode === 'VIEW'">
        <b-link href="javascript:void(0)" @click="onAddNew">
          <span class="icon one-file-plus"></span>Nhập mới</b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onRefreshDetail" :class="{ disabled: loading }">
          <span class="icon fa one-refresh"></span>Làm mới</b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onCancel" :disabled="detailCurrentMode == 'VIEW'">
          <span class="icon ui-1_circle-remove nc-icon-glyph"></span>Huỷ</b-link>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <!-- Thông tin chi tiết thiết bị -->
    <ThongTinChiTietThietBi 
      v-if="isDetail || detailCurrentMode === 'ADD'"
      ref="ThongTinChiTietThietBi" 
      @save-device="onSaveDevice" 
      @show-detail="onShowDetail"
      @hide-detail="onHideDetail"
    ></ThongTinChiTietThietBi>
  </div>
</div>
