<div>
    <div class="row pb-3">
        <div class="col-12">
            <div class="info-row">
                <div class="key w100">Thuộc IDC <span class="red">*</span></div>
                <div class="value">
                    <input type="text" class="form-control" v-model="idcDetail.TEN" :disabled="true" />
                </div>
            </div>
        </div>
    </div>
    <div class="row pb-3">
        <div class="col-12">
            <div class="info-row">
                <div class="key w100">Loại thiết bị<span class="red">*</span></div>
                <div class="value">
                    <SelectExt @change="onChangeTypeDevice()" dataTextField="TEN" dataValueField="ID"
                        v-model="selectedDeviceType" :dataSource="deviceTypes" />
                </div>
            </div>
        </div>
    </div>

    <div class="row pb-3">
        <div class="col-12">
            <div class="info-row">
                <div class="key w100">Thiết bị đích<span class="red">*</span></div>
                <div class="value">
                    <SelectExt @change="onChangeDevice()" dataTextField="TENHIENTHI" dataValueField="THIETBI_ID"
                        :dataSource="deviceList" v-model="selectedDevice" />
                </div>
            </div>
        </div>
    </div>
    <div class="row pb-3" v-if="showSelectCard && cardTypeList.length > 0">
        <div class="col-12">
            <div class="info-row">
                <div class="key w100">Loại card <span class="red">*</span></div>
                <div class="value">
                    <select class="form-control" @change="onChangeTypeCard()" dataTextField="TEN" dataValueField="ID" disabled
                        v-model="selectedCardType">
                        <option v-for="type in cardTypeList" :key="type.ID" :value="type.ID">{{ type.TEN }}</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
    <div class="row pb-3" v-if="showSelectCard">
        <div class="col-12">
            <div class="info-row">
                <div class="key w100">Card đích<span class="red">*</span></div>
                <div class="value">
                    <SelectExt @change="onChangeCard()" dataTextField="TENHIENTHI" dataValueField="card_id" :dataSource="cardListByType" v-model="cardSelected"/>
                </div>
            </div>
        </div>
    </div>
    <div class="row pb-3" v-if="!showSelectCard && portTypeList.length > 0">
        <div class="col-12">
            <div class="info-row">
                <div class="key w100">Loại port <span class="red">*</span></div>
                <div class="value">
                    <select class="form-control" @change="onChangeTypePort()" dataTextField="TEN" dataValueField="ID" disabled
                        v-model="typePortSelected">
                        <option v-for="type in portTypeList" :key="type.ID" :value="type.ID">{{ type.TEN }}</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
    <div class="row pb-3">
        <div class="col-12">
            <div class="info-row">
                <div class="key w100">Port đích<span class="red">*</span></div>
                <div class="value">
                    <SelectExt @change="onChangePort()" dataTextField="TEN" dataValueField="ID" :dataSource="portFreeList" v-model="portSelected"/>
                </div>
            </div>
        </div>
    </div>
    <div class="row pb-3">
        <div class="col-12">
            <div class="info-row">
                <div class="key w100">Ghi chú </div>
                <div class="value">
                    <input type="text" class="form-control" v-model="ghiChu"/>
                </div>
            </div>
        </div>
    </div>
    <div class="row button-group">
        <div class="col-12" style="text-align: right;">
            <button class="btn btn-primary" @click="saveLinkDevice">Đấu nối</button>
            <button class="btn btn-secondary" @click="closeModal">Đóng</button>
        </div>
    </div>
</div>
