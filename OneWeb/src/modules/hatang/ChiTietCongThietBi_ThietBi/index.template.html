<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" :disabled="!buttons.btnSave.enabled" @click="handleSaveClick">
          <span class="icon one-save"></span>Ghi lại
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" :disabled="!buttons.btnCancel.enabled" @click="handleCancelClick">
          <span class="icon ui-1_circle-remove nc-icon-glyph"></span>Hủy bỏ
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" :disabled="!buttons.btnEdit.enabled" @click="handleEditClick">
          <span class="icon nc-icon-glyph ui-1_edit-72"></span>Sửa
        </b-link>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row ">
            <div class="col-6">
              <div class="row">
                <div class="legend-title">Thông tin chung</div>
              </div>
              <div class="row">
                <div class="col-12">
                  <div class="info-row">
                    <div class="key w150">Thiết bị cha</div>
                    <div class="value">
                      <input type="text" class="form-control" disabled v-model="currentItem.parentDevice" />
                    </div>
                  </div>
                </div>
                <div class="col-12">
                  <div class="info-row">
                    <div class="key w150">Số thứ tự</div>
                    <div class="value">
                      <input type="text" class="form-control" disabled v-model="currentItem.no" />
                    </div>
                  </div>
                </div>
                <div class="col-12">
                  <div class="info-row">
                    <div class="key w150">Tên cổng</div>
                    <div class="value">
                      <input type="text" class="form-control" :disabled="!controls.txt_tencong.enable"
                        v-model="currentItem.portName" />
                    </div>
                  </div>
                </div>
                <div class="col-12">
                  <div class="info-row">
                    <div class="key w150">Phân loại cổng</div>
                    <div class="value">
                      <input type="text" class="form-control" disabled v-model="portType" />
                    </div>
                  </div>
                </div>
                <div v-show="isInterface" class="col-12">
                  <div class="info-row">
                    <div class="key w150">Mục đích sử dụng cổng</div>
                    <div class="value">
                      <SelectExt :dataSource="portPurposeData" dataTextField="TEN" dataValueField="ID"
                        :disabled="!controls.comboboxPortPurpose.enable" v-model="currentItem.portPurpose" />
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-6">
              <div class="row">
                <div class="legend-title">Đặc tính</div>
              </div>
              <div class="row">
                <div class="col-12">
                  <div class="info-row">
                    <div class="key w150">Hiệu lực</div>
                    <div class="value padt4">
                      <div class="check-action">
                        <input type="checkbox" class="check" :disabled="!controls.checkboxValidity.enable"
                          v-model="currentItem.validity" :true-value="1" :false-value="0" /><span class="name"></span>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="col-12">
                  <div class="info-row">
                    <div class="key w150">Loại cổng</div>
                    <div class="value">
                      <SelectExt :dataSource="loaiCongList" dataTextField="TEN" dataValueField="ID"
                        :disabled="!controls.comboboxPortType.enable" v-model="currentItem.portType" />
                    </div>
                  </div>
                </div>
                <template v-show="isInterface">
                  <div class="col-12" v-show="isInterface">
                    <div class="info-row">
                      <div class="key w150">Băng thông cổng</div>
                      <div class="value">
                        <SelectExt :dataSource="portBandwidthData" dataTextField="TEN" dataValueField="ID"
                          :disabled="!controls.comboboxPortBandWidth.enable" v-model="currentItem.portBandWidth" />
                      </div>
                    </div>
                  </div>
                  <div class="col-12" v-show="isInterface">
                    <div class="info-row">
                      <div class="key w150">Thông tin module</div>
                      <div class="value">
                        <SelectExt :dataSource="thongTinModuleList" dataTextField="TEN" dataValueField="ID"
                          :disabled="!controls.comboboxModuleInfo.enable" v-model="currentItem.moduleInfo" />
                      </div>
                    </div>
                  </div>
                  <div class="col-12" v-show="isInterface">
                    <div class="info-row">
                      <div class="key w150">Kết nối</div>
                      <div class="value">
                        <!-- <input type="text" class="form-control" :disabled="!controls.comboboxConnection.enabled" v-model="currentItem.connection" /> -->
                        <SelectExt :dataSource="connectData" dataTextField="name" dataValueField="id"
                          :disabled="!controls.comboboxConnection.enable" v-model="currentItem.connection" />
                      </div>
                    </div>
                  </div>
                </template>
                <div v-show="!isInterface" class="col-12">
                  <div class="info-row">
                    <div class="key w150">Mục đích sử dụng cổng</div>
                    <div class="value">
                      <SelectExt :dataSource="portPurposeData" dataTextField="TEN" dataValueField="ID"
                        :disabled="!controls.comboboxPortPurpose.enable" v-model="currentItem.portPurpose" />
                    </div>
                  </div>
                </div>
                <div class="col-12">
                  <div class="info-row">
                    <div class="key w150">Trạng thái sử dụng</div>
                    <div class="value">
                      <SelectExt :dataSource="tinhTrangHoatDongData" dataTextField="TEN" dataValueField="ID"
                        :disabled="!controls.comboboxUsingStatus.enable" v-model="currentItem.usingState" />
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <!-- <div class="col-12">
              <div class="col-12">
                <div class="info-row">
                  <div class="key w150">Ghi chú</div>
                  <div class="value"><input type="text" class="form-control" :disabled="!controls.checkboxValidity.enable" v-model="currentItem.note" /></div>
                </div>
              </div>
            </div> -->
          </div>
        </div>
      </div>
    </div>

    <!-- Danh sách Tab -->
    <div class="row">
      <div class="col-12">
        <div class="nav tabs tab-over ">
          <a href="#tabInfo" data-toggle="tab" :class="{active: currentTab === 1}">Thông tin đấu nối với thiết bị</a>
          <a href="#tabHistory" data-toggle="tab" :class="{active: currentTab === 2}">Lịch sử thay đổi</a>
          <div class="connect-buttons">
            <button class="btn btn-primary" @click="showModalDauNoiThietBi" :disabled="!enableBtnDauNoi"><span
                class="-ap icon icon-plus"></span> Đấu nối</button>
            <button class="btn btn-primary" @click="goDauNoiThietBi" :disabled="enableBtnDauNoi"><span
                class="-ap icon icon-trash"></span> Gỡ đấu nối</button>
          </div>
        </div>
        <div class="tab-content">
          <!-- Tab Thông tin -->
          <div class="tab-pane" id="tabInfo" :class="{active: currentTab === 1}">
            <div class="row">
              <div class="box-form">
                <DataGrid :columns="connectorCols" :dataSource="connectorList" :allowPaging="true"
                  :enablePagingServer="false" :showColumnCheckbox="false" ref="grdConnector"></DataGrid>
              </div>
            </div>
          </div>
          <!-- Tab Lịch sử -->
          <div class="tab-pane" id="tabHistory" :class="{active: currentTab === 2}">
            <div class="row">
              <div class="box-form">
                <DataGrid :columns="historyCols" :dataSource="historyList" :allowPaging="true"
                  :enablePagingServer="false" :showColumnCheckbox="true" ref="grdHistory"></DataGrid>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <b-modal ref="modalDauNoiThietBi" title="Đấu nối thiết bị" centered hide-footer size="xl" @shown="showDauNoiThietBi">
    <template>
      <ModalDauNoiThietBi ref="dauNoiThietBi" @success="successDauNoi" @close="closeModalDauNoiThietBi" :typePortNguon="portType"
        :idcDetail="idcDetail" :deviceDetail="deviceDetail" :idPortNguon="currentItem.id"></ModalDauNoiThietBi>
    </template>
  </b-modal>
  <b-modal ref="modalChiTietThietBi" title="Thông tin thiết bị" centered hide-footer size="xl"
    @shown="showThongTinThietBi">
    <template>
      <ComponentThongTinThietBi ref="thongTinThietBi"></ComponentThongTinThietBi>
    </template>
  </b-modal>
</div>
