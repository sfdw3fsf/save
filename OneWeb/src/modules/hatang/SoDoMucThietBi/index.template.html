<div class="so-do-muc-thiet-bi">
  <div class="row">
    <div class="box-form">
      <div class="row">
        <div class="col-12">
          <div class="info-row">
            <div class="key w100">Chọn hạ tầng IDC <span class="red">*</span></div>
            <div class="value">
              <SelectExt v-model="selectedIDC" dataTextField="TEN" dataValueField="ID" :dataSource="IDCList">
              </SelectExt>
            </div>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-12">
          <div class="info-row">
            <div class="key w100">Hiển thị <span class="red">*</span></div>
            <div class="value">
              <multiselect
                v-model="selectedTypeView"
                :options="loaiHienThiListWithAll" 
                :multiple="true"
                track-by="ID"
                label="TENHIENTHI"
                placeholder="Chọn loại hiển thị"
                @input="handleSelectViewType($event)"
              >
              </multiselect>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="box-form diagram-container">
      <div v-if="isLoading" class="loading-overlay">
        <div class="spinner-border text-primary" role="status">
          <span class="sr-only">Đang tải...</span>
        </div>
      </div>
      <ejs-diagram
        id="diagram"
        ref="diagram"
        :width="width"
        :height="height"
        :nodes="diagramData.nodes"
        :connectors="diagramData.connectors"
        :tool="tool"
        :snapSettings="snapSettings"
        :constraints="diagramSettings.constraints"
        :dragLimit="diagramSettings.dragLimit"
        :getNodeDefaults="diagramSettings.getNodeDefaults"
        :getConnectorDefaults="diagramSettings.getConnectorDefaults"
        :contextMenuSettings="contextMenuSettings"
        :contextMenuOpen="diagram_contextMenuOpen"
        :contextMenuClick="diagram_contextMenuClick"
        :layout="layout"
        :selectedItems="diagramSettings.selectedItems"
      >
      </ejs-diagram>
    </div>
  </div>
  <b-modal
    ref="modalChiTietThietBi"
    title="Thông tin thiết bị"
    centered
    hide-footer
    size="xl"
    @shown="showThongTinThietBi"
  >
    <template>
      <ComponentThongTinThietBi ref="thongTinThietBi"></ComponentThongTinThietBi>
    </template>
  </b-modal>
  <b-modal
    ref="modalDichvuThietBi"
    title="Dịch vụ thiết bị"
    centered
    hide-footer
    size="xl"
    @shown="showThongTinDichvuLienQuanDenThietBi"
  >
    <template>
      <ComponentDichVuThietBi ref="DichvuThietBi"></ComponentDichVuThietBi>
    </template>
  </b-modal>
  <b-modal
    ref="modalKhachHangThietBi"
    title="Khách hàng thiết bị"
    centered
    hide-footer
    size="xl"
    @shown="showThongTinKhachHangLienQuanDenThietBi"
  >
    <template>
      <ComponentKhachHangThietBi ref="KhachHangThietBi"></ComponentKhachHangThietBi>
    </template>
  </b-modal>
</div>
