<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="onSearch" :class="{ disabled: loading }">
          <span class="icon one-search"></span>{{ loading ? 'Đang tìm kiếm...' : 'Tìm kiếm' }}</b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onResetSearch" :class="{ disabled: loading }">
          <span class="icon fa one-refresh"></span>Làm mới</b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onAddNew">
          <span class="icon one-file-plus"></span>Nhập mới</b-link>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <!-- Tìm kiếm thiết bị -->
    <DeviceSearchForm ref="deviceSearchForm" />
    <!-- Danh sách thiết bị -->
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="col-12">
              <div class="legend-title d-flex justify-content-between align-items-center">
                Danh sách thiết bị
              </div>
            </div>
          </div>
          <div class="table-content">
            <div class="col-12">
              <DataGrid
                v-if="showGrid"
                :columns="getDataCols"
                :dataSource="listThietBi"
                :allowPaging="true"
                :childGrid="childGrid"
                :enablePagingServer="false"
                :enabledSelectFirstRow="false"
                ref="grdItems"
                @detailDataBound="onDetailDataBound"
                @recordDoubleClick="onRecordDoubleClick"
              >
              </DataGrid>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <ThongTinChiTietThietBi ref="ThongTinChiTietThietBi" @save-device="onSaveDevice" @save-card-module="onSaveCardModule"></ThongTinChiTietThietBi>
</div>
