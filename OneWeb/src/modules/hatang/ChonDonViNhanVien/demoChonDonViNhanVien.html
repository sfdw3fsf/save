<div class="page-content">
 <div class="row">
    <div class="col-sm-4 col-12">
      <div class="info-row">
        <div class="key w150">Chọn Nhân viên</div>
        <div class="value">
            <ejs-dropdownlist
            class="form-control"
            ref="cboFormOption"
            locale='vi'
            v-model="optFormId"
            :dataSource="dsOptForm"
            :fields="{value:'ID', text: 'TEN'}"
            :allowFiltering="true"
            >
            </ejs-dropdownlist>
        </div>
      </div>
    </div>
    <div class="col-sm-2 col-12">
      <div class="info-row">
        <button class="btn btn-second nocorner" @click="Test" style="width: 120px">
          <span class="icon one-search"></span> Chọn đơn vị
        </button>
        <ChonDonViNhanVien  ref="refChonDonViNhanVien" :p_phanVungSDID="phanvung_id" :p_tenDonVi="tenDonVi" :p_chonNhanVien="chonNhanVien" @xacNhanChon="xacNhanChonDVNV"/>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="legend-title">Thông tin chọn </div>
  </div>
  <div class="row">
    <div class="col-sm-3 col-12">
        <div class="info-row">
            <div class="key w100">Mã đơn vị</div>
            <div class="value">
                <input type="text" class="form-control"
                    v-model="donViId" />
            </div>
        </div>
    </div>
    <div class="col-sm-3 col-12">
      <div class="info-row">
          <div class="key w100">Tên đơn vị</div>
          <div class="value">
              <input type="text" class="form-control"
                  v-model="tenDonVi" />
          </div>
      </div>
  </div>
</div>
  <div class="row">
    <div class="col-sm-3 col-12">
      <div class="info-row">
          <div class="key w100">Mã nhân viên</div>
          <div class="value">
              <input type="text" class="form-control"
                  v-model="nhanVienId" />
          </div>
      </div>
    </div>
    <div class="col-sm-3 col-12">
      <div class="info-row">
          <div class="key w100">Tên nhân viên</div>
          <div class="value">
              <input type="text" class="form-control"
                  v-model="tenNhanVien" />
          </div>
      </div>
    </div>
  </div>
</div>
