<div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <b-link href="javascript:void(0)" @click="onAddNew" :disabled="!buttons.btnAddNew.enabled">
          <span class="icon one-file-plus"></span>Nhập mới
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onSave" :disabled="!buttons.btnSave.enabled">
          <span class="icon one-save"></span>Ghi lại
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onCancel" :disabled="!buttons.btnCancel.enabled">
          <span class="icon ui-1_circle-remove nc-icon-glyph"></span> Huỷ bỏ
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onEdit" :disabled="!buttons.btnEdit.enabled">
          <span class="icon nc-icon-glyph ui-1_edit-72"></span>Sửa
        </b-link>
      </li>
      <li>
        <b-link href="javascript:void(0)" @click="onDelete" :disabled="!buttons.btnDelete.enabled">
          <span class="icon one-trash"></span>Xóa
        </b-link>
      </li>
    </ul>
  </div>
  <div class="page-content">
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Thông tin chung
            </div>
          </div>
          <!-- Tên VRF - Hiệu lực -->
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Tên VLAN <span class="red">*</span></div>
                <div class="value">
                  <input type="text" class="form-control" :class="controls.txtVlan.invalid ? 'is-invalid' : ''"
                    :disabled="!controls.txtVlan.enabled" v-model="currentItem.ten" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Hiệu lực</div>
                <div class="value padt4">
                  <div class="check-action">
                    <input type="checkbox" class="check" :disabled="!controls.chkHieuLuc.enabled"
                      v-model="currentItem.hieuLuc" :true-value="1" :false-value="0" /><span class="name"></span>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <!-- Thuộc IDC(selection) - RD -->
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Thuộc IDC <span class="red">*</span></div>
                <div class="value">
                  <SelectExt v-model="currentItem.idcId" @change="onChangeIDC()" dataTextField="TEN" dataValueField="ID"
                    :class="controls.selectIDC.invalid ? 'is-invalid' : ''" :dataSource="idcSelectionList"
                    :disabled="!controls.selectIDC.enabled" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Thuộc Zone <span class="red">*</span></div>
                <div class="value">
                  <SelectExt v-model="currentItem.zoneId" dataTextField="TEN" dataValueField="ID"
                    :class="controls.selectZone.invalid ? 'is-invalid' : ''" :dataSource="zoneSelectionList"
                    :disabled="!controls.selectZone.enabled" />
                </div>
              </div>
            </div>
          </div>
          <!-- Thuộc thiết bị mạng(selection) - RD Export -->
          <div class="row">
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Thuộc VRF <span class="red">*</span></div>
                <div class="value">
                  <SelectExt v-model="currentItem.vrfId" @change="onChangeVrf()" dataTextField="TEN" dataValueField="ID"
                    :dataSource="vrfSelectionList" :disabled="!controls.selectVRF.enabled"
                    :class="controls.selectVRF.invalid ? 'is-invalid' : ''" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-12">
              <div class="info-row">
                <div class="key w100">Thuộc thiết bị</div>
                <div class="value">
                  <input type="text" class="form-control" :disabled="true"
                    :class="controls.txtThietBi.invalid ? 'is-invalid' : ''" v-model="currentItem.tenThietBi" />
                </div>
              </div>
            </div>
          </div>
          <div class="info-row">
            <div class="key w100">Ghi chú</div>
            <div class="value">
              <input type="text" class="form-control" :disabled="!controls.txtGhiChu.enabled"
                v-model="currentItem.ghiChu" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Nav tabs info -->
    <div class="box-form">
      <div class="nav tab-over tabs">
        <a href="#tab1" v-on:click="tab_index = 1" data-toggle="tab" class="tab active">Hạ tầng mạng</a>
        <a href="#tab2" v-on:click="tab_index = 2" data-toggle="tab" class="tab">Subnet</a>
        <a href="#tab3" v-on:click="tab_index = 3" data-toggle="tab" class="tab">Lịch sử thay đổi</a>
      </div>
      <div class="tab-content">
        <!-- Tab 1 Hạ tầng mạng-->
        <div class="tab-pane active" id="tab1">
          <div class="table-content">
            <div class="grid-ext grid-ext-nodata">
              <DataGrid ref="grdItems_haTangMang" :allowPaging="true" :enablePagingServer="false"
                :showColumnCheckbox="true" v-bind:columns="[
                        {fieldName: 'SOTHUTU', headerText: 'STT', textAlign: 'Left', width: 50},
                        {fieldName: 'MAHATANG', headerText: 'Mã hạ tầng', textAlign: 'Left', width: 100},
                        {fieldName: 'TENHATANG', headerText: 'Tên hạ tầng', textAlign: 'Left', width: 200},
                        {fieldName: 'CONGNGHE', headerText: 'Công nghệ', textAlign: 'Left', width: 200},
                        {fieldName: 'TEN_IDC', headerText: 'IDC', textAlign: 'Left', width: 200},
                        {fieldName: 'TEN_DV', headerText: 'Đơn vị quản lý', textAlign: 'Left', width: 150},
                        {fieldName: 'TEN_NV', headerText: 'Người quản lý', textAlign: 'Left', width: 150},
                        {fieldName: 'HIEU_LUC', headerText: 'Hiệu lực', width: 80, template: getColumnHieuLucTemplate(), textAlign: 'Left'},
                        ]" v-bind:dataSource="haTangMangItemList">
                <!-- :enabledSelectFirstRow="false"
                        @rowClicked="haTangMangDetail">
                        > -->
              </DataGrid>
            </div>
          </div>
        </div>
        <!-- Tab 2 Subnet-->
        <div class="tab-pane" id="tab2">
          <div class="table-content">
            <div class="grid-ext grid-ext-nodata">
              <DataGrid ref="grdItems_subnet" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true"
                v-bind:columns="[
                            {fieldName: 'SOTHUTU', headerText: 'STT', textAlign: 'Left', width: 50},
                            {fieldName: 'TENSUBNET', headerText: 'Tên Subnet', textAlign: 'Left'},
                            {fieldName: 'HIEU_LUC', headerText: 'Hiệu lực', width: 100, template: getColumnHieuLucTemplate(), textAlign: 'Left'},
                            ]" v-bind:dataSource="subnetItemList">
                >
              </DataGrid>
            </div>
          </div>
        </div>
        <!-- Tab 3 Lịch sử thay đổi-->
        <div class="tab-pane" id="tab3">
          <div class="table-content">
            <div class="grid-ext grid-ext-nodata">
              <DataGrid ref="grdItems_history" :allowPaging="true" :enablePagingServer="false"
                :showColumnCheckbox="true" v-bind:columns="[
                        {fieldName: 'SOTHUTU', headerText: 'STT', textAlign: 'Left', width: 50},
                        {fieldName: 'TACDONG', headerText: 'Tên tác động', textAlign: 'Left'},
                        {fieldName: 'FIELD', headerText: 'Trường thông tin thay đổi', textAlign: 'Left'},
                        {fieldName: 'OLD_VALUE', headerText: 'Giá trị cũ', textAlign: 'Left'},
                        {fieldName: 'NEW_VALUE', headerText: 'Giá trị mới', textAlign: 'Left'},
                        {fieldName: 'NGUOI_CN', headerText: 'Người cập nhật', textAlign: 'Left'},
                        {fieldName: 'NGAY_CN', headerText: 'Ngày cập nhật', textAlign: 'Left'},
                        ]" v-bind:dataSource="lichSuItemList">
                >
              </DataGrid>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Danh sách VRF -->
    <div class="row">
      <div class="col-12">
        <div class="box-form">
          <div class="row">
            <div class="legend-title">Danh sách VLAN
            </div>
          </div>
          <div class="row">
            <div class="col-12">
              <DataGrid ref="grdItems" :allowPaging="true" :enablePagingServer="false" :showColumnCheckbox="true"
                v-bind:columns="[
                                {fieldName: 'TEN', headerText: 'Tên VLAN', textAlign: 'Left'},
                                {fieldName: 'TEN_IDC', headerText: 'Thuộc IDC', textAlign: 'Left'},
                                {fieldName: 'TEN_VRF', headerText: 'Thuộc VRF', textAlign: 'Left'},
                                {fieldName: 'TEN_ZONE', headerText: 'Thuộc ZONE', textAlign: 'Left'},
                                {fieldName: 'TEN_THIETBI', headerText: 'Thuộc thiết bị', textAlign: 'Left'},
                                {fieldName: 'HIEU_LUC', headerText: 'Hiệu lực', width: 100, template: getColumnHieuLucTemplate(), textAlign: 'Left'},
                                ]" v-bind:dataSource="vlanItemList" @rowSelected="grdItems_RowSelected"
                @rowDeselected="grdItems_RowDeselected" @selectedItemsChanged="onSelectRowCheckbox">
                >
              </DataGrid>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
