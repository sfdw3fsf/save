<div>
    <div class="list-actions-top">
        <ul class="list">
            <li  :class="{disabled: isDisableNew }">
                <a href="#" @click.prevent="onNew">
                    <span class="icon one-file-plus"></span> Nhập mới
                </a>
            </li>
            <li :class="{disabled: isDisableSave}">
                <a href="#" @click.prevent="setDanhSach" >
                    <span class="icon one-save"></span> Ghi Lại
                </a>
            </li>
            <li :class="{disabled: isDisableUpdate}">
                <a href="#" @click.prevent="editDanhSach">
                    <span class="icon one-edit"></span> Sửa
                </a>
            </li>
            <li :class="{disabled: isDisableDelete}">
                <a href="#" @click.prevent="deleteDanhSach" >
                    <span class="icon one-trash"></span> Xóa
                </a>
            </li>
        </ul>
    </div>
    <div class="page-content">
        <div class="box-form">
            <div class="legend-title">Thông tin nhà cung cấp</div>
            <div class="row">
                <div class="col-sm-6 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Tên<span style="color: red;">*</span>
                        </div>
                        <div class="value">
                            <input type="text" class="form-control" v-model.trim="form.pTen" :disabled="isDisableSave" >
                        </div>
                    </div>
                </div>
                <div class="col-sm-4 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Mã NCC<span style="color: red;">*</span>
                        </div>
                        <div class="value">
                            <input type="text" class="form-control" v-model.trim="form.pMaNCC" :disabled="isDisableSave" >
                        </div>
                    </div>
                </div>
                <div class="col-sm-2 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Hiệu lực
                        </div>
                        <div class="form-check ">
                            <input class="form-check-input" type="checkbox" v-model="form.pHieuLuc" :disabled="isDisableSave"  id="flexCheckDefault">
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Người đại diện
                        </div>
                        <div class="value">
                            <input type="text" class="form-control" :disabled="isDisableSave" v-model.trim="form.pNguoiDaiDien">
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-12">
                    <div class="info-row">
                        <div class="key w100">Địa chỉ </div>
                        <div class="value">
                          <div class="input-more-button">
                            <button class="btn" @click="isShowDiaChi=!isShowDiaChi">
                              <span class="-ap icon-more_horiz"></span>
                            </button>
                            <input type="text" class="form-control " :disabled="isDisableSave"  v-model.trim="form.pDiaChi" ref="r_diachi">
                          </div>
                        </div>
                      </div>
                      <chonDiaChi v-if="isShowDiaChi"
                                    :isShow="isShowDiaChi"    
                                    :chiTietDiaChi="getChiTietDiaChi" 
                                    :diaChi="query"
                                    @closeModalDiaChi="closeModalDiaChi" />
                </div>
            </div>        
            <div class="row">
                <div class="col-sm-3 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Điện thoại
                        </div>
                        <div class="value">
                            <input type="number" class="form-control" :disabled="isDisableSave" v-model.trim="form.pDienThoai">                            
                        </div>
                    </div>
                </div>
                <div class="col-sm-3 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Email
                        </div>
                        <div class="value">                            
                            <input type="email" class="form-control":disabled="isDisableSave"  pattern=".+@example\.com" size="30" required v-model.trim="form.pEmail"/>
                        </div>
                    </div>
                </div>
                <div class="col-sm-3 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Website
                        </div>
                        <div class="value">
                            <input type="text" class="form-control" :disabled="isDisableSave" v-model.trim="form.pWebsite">
                        </div>
                    </div>
                </div>
                <div class="col-sm-3 col-12">
                    <div class="info-row">
                        <div class="key w100">
                            Số tài khoản
                        </div>
                        <div class="value">
                            <input type="text" class="form-control" :disabled="isDisableSave" v-model.trim="form.pSoTaiKhoan">
                        </div>
                    </div>
                </div>
            </div>        
            <div class="info-row">
                <div class="key w100">
                    Ghi chú
                </div>
                <div class="value">
                    <input type="text" class="form-control" :disabled="isDisableSave" v-model.trim="form.pGhiChu">
                </div>
            </div>

        </div>
        <div class="box-form">
            <div class="legend-title">Danh sách nhà cung cấp</div>
            <DataGrid v-bind:columns="[
            {fieldName: 'TEN', headerText: 'Tên', allowFiltering: true, allowSorting: false},
            {fieldName: 'NGUOI_DAI_DIEN', headerText: 'Người đại diện', allowFiltering: true, allowSorting: false},
            {fieldName: 'DIA_CHI', headerText: 'Địa chỉ liên hệ', allowFiltering: true, allowSorting: false},
            {fieldName: 'SO_TAI_KHOAN', headerText: 'Số tài khoản', allowFiltering: true, allowSorting: false},
            {fieldName: 'DIEN_THOAI', headerText: 'Điện thoại', allowFiltering: true, allowSorting: false},
            {fieldName: 'EMAIL', headerText: 'Email', allowFiltering: true, allowSorting: false},
            {fieldName: 'WEBSITE', headerText: 'Website', allowFiltering: true, allowSorting: false},
            {fieldName: 'HIEU_LUC_TEXT', headerText: 'Hiệu lực', allowFiltering: true, allowSorting: false}
            ]" 
            :dataSource="dsNhaCungCap"
            :showFilter="true" 
            :allowPaging="true" 
            :enablePagingServer="false"            
            @selectedItemsChanged="onSelectRowCheckbox"                        
            @rowSelected="onSelectRowChanged"
            @dataBound="onDataBound"
            dataKeyField="ID"  
                ref="dsTienTrinhGrid"
                id="refGrid">

            </DataGrid>
        </div>
    </div>
    
</div>
