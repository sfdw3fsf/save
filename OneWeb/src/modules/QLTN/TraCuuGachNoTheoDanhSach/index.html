<div>
    <div class="list-actions-top">
        <ul class="list">
            <li>
                <a href="javascript:void(0)" v-on:click.prevent="tsbtnTimKiem_Click">
                    <span class="icon  one-search"></span> Tìm kiếm
                </a>
            </li>
            <li>
                <a href="javascript:void(0)" v-on:click.prevent="doDelete">
                    <span class="icon  one-save"></span> Xóa Phiếu
                </a>
                <PopupXacNhanXoaPhieu ref="refXoaPhieuTT" :kiemtra_matkhau="this.kiemtra_matkhau" :kycuoc="this.p_kycuoc" :dsPhieu="phieuSelected" @acceptChange="deletePhieuThuHandler"></PopupXacNhanXoaPhieu>
            </li>
        </ul>
        <div class="more">
            <a href="#">
                <span class="-ap icon-th-menu"></span>
            </a>
        </div>
    </div>
    <div class="page-content">        
        <div class="box-form">
            <div class="legend-title">Thông tin tìm kiếm</div>
            <div class="row">
                <div class="col-sm-3 col-12">
                    <div class="info-row">
                        <div class="key w90">
                            Mã ND
                        </div>
                        <div class="value">
                            <input ref="maND" v-model="maND" type="text" class="form-control highlight">
                        </div>
                    </div>
                </div>
                <div class="col-sm-3 col-12">
                    <div class="info-row">
                        <div class="key w90">
                            Kỳ hóa đơn
                        </div>
                        <div class="value">
                            <div class="input-icon-right">
                                <ejs-datepicker v-model="kyCuoc" :max="config.kyCuocConfig.max"
                                    :format="config.kyCuocConfig.format" :showClearButton="false"
                                    :value="config.kyCuocConfig.value" >
                                </ejs-datepicker>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-3 col-12">
                </div>
                <div class="col-sm-3 col-12">
                </div>
            </div>
            <div class="row">
                <div class="col-sm-3 col-12">
                    <div class="info-row">
                        <div class="key w90">
                            Từ ngày
                        </div>
                        <div class="value">
                            <div class="input-icon-right">
                                <ejs-datepicker v-model="tuNgay" :max="config.dateConfig.max"
                                    :format="config.dateConfig.format" :showClearButton="false"
                                    :value="config.dateConfig.value" >
                                </ejs-datepicker>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-3 col-12">
                    <div class="info-row">

                        <div class="key w90">
                            Đến ngày
                        </div>

                        <div class="value">
                            <div class="input-icon-right">
                                <ejs-datepicker v-model="denNgay" :max="config.dateConfig.max"
                                    :format="config.dateConfig.format" :showClearButton="false"
                                    :value="config.dateConfig.value" >
                                </ejs-datepicker>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-12">
                    <div class="info-row">
                        <div class="key">Ngân hàng</div>
                        <div class="value">
                          <ejs-dropdownlist                                 
                                :allowFiltering="true"
                                v-model="nganHangId"                                                                 
                                :dataSource="dsNganHang"
                                :fields="fieldsNganHang"
                                :placeholder="'Chọn ngân hàng'"></ejs-dropdownlist>
                        </div>
                    </div>
                    <!-- <div class="info-row">
                        <div class="key w90">Ngân hàng</div>
                        <div class="value">
                            <div class="select-custom">
                                <select2
                                    :options = "dsNganHang"
                                    v-model = "nganHangId"
                                />
                            </div>
                        </div>
                    </div> -->
                </div>
                <!-- <div class="col-sm-3 col-12">

                </div> -->
            </div>
        </div>

        <div class="box-form">
            <div class="legend-title">
                <div class="pull-left">Danh sách file đã thực hiện</div>
                <div class="pull-right red">
                    Số lượng:{{this.dsGachNo.length}}
                </div>
                <div class="clearfix"></div>
            </div>
            <div class="table-content">
                <!-- <DataGrid
                    ref="grid"
                    :columns="fieldDsCongNo"
                    :showFilter="true"
                    :dataSource="dsGachNo"
                    dataKeyField="GIAOPHIEU_ID"
                    @selectedRowChanged="onCongNoRowChange"
                    @selectedItemsChanged="onCongNoChange"
                    :showColumnCheckbox="true"
                    :allowPaging="true"
                    :totalRecords="listCongNoGetter.length"
                    :enablePagingServer="false"
                ></DataGrid> -->
                <DataGrid
                    ref="grid1"
                    :columns="fieldsDanhSach"
                    :showFilter="true"
                    :dataSource="dsGachNo"                    
                    :allowPaging="true"
                    :totalRecords="dsGachNo.length"
                    :enablePagingServer="false"
                    @selectedRowChanged="onDanhSachChange"
                    @rowDataBound="rowDataBound"
                    :enabledSelectFirstRow="false"
                ></DataGrid>
            </div>
        </div>
        <div class="box-form">
            <div class="legend-title">
                <div class="pull-left">Chi tiết theo file</div>
                <div class="pull-right red">
                    Số lượng:{{this.dsGachNoChiTiet.length}}
                </div>
                <div class="clearfix"></div>
            </div>
            <div class="table-content">
                <DataGrid
                    ref="grid"
                    :columns="fieldsDanhSachChiTiet"
                    :showFilter="true"                    
                    :dataSource="dsGachNoChiTiet"                    
                    :allowPaging="true"
                    :totalRecords="dsGachNoChiTiet.length"
                    :enablePagingServer="false"
                    :showColumnCheckbox="true"          
                    @selectedItemsChanged="onDSChiTietCheck"          
                ></DataGrid>
            </div>
        </div>
    </div>
</div>
