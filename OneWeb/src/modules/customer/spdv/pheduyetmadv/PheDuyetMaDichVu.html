<div>
  <breadcrumb :header='header' />
  <div class='list-actions-top'>
    <ul class='list'>
      <li>
        <a href='javascript: void(0)' @click='timkiem'> <span class='icon one-search'></span> Tìm kiếm</a>
      </li>
      <li>
        <a href='javascript: void(0)' @click='xem'> <span class='icon one-eye'></span> Xem</a>
      </li>      
      <li>
        <a href='javascript: void(0)' @click='PheDuyet'> <span class='icon one-file-check'></span>Phê duyệt</a>
      </li>
      <li>
        <a href='javascript: void(0)' @click='KhongDuyet'> <span class='icon one-trash'></span>Không duyệt</a>
      </li>
      <li>
        <a href='javascript: void(0)' @click='GuiTapDoan'> <span class='icon one-file-check'></span>Gửi tập đoàn phê duyệt</a>
      </li>
      <li>
        <a href='javascript: void(0)' @click='lichsu'> <span class='icon one-history'></span> Lịch sử</a>
      </li>
    </ul>
  </div>

  <div class='page-content'>
    <div class='box-form'>
      <div class='legend-title'>Thông tin dịch vụ</div>
      <div class='row'>        
        <div class='col-4'>
          <div class='info-row'>
            <div class='key w110'>Nhóm SPDV</div>
            <div class='value'>
              <div class='select-custom'>
                <SelectExt v-model='nhomspdv_id'
                           :allowFiltering='true'
                           :allowClear='true'
                           :dataSource='initialData.NHOM_SPDV'
                           dataValueField='nhomspdv_id'
                           dataTextField='ten_nhomspdv' />
              </div>
            </div>
          </div>
        </div>

        <div class='col-4'>
          <div class='info-row'>
            <div class='key w110'>PT phát triển</div>
            <div class='value'>
              <div class='select-custom'>
                <SelectExt v-model='phuongthucpt_id'
                           :allowFiltering='true'
                           :dataSource='initialData.PHUONGTHUC_PT'
                           dataValueField='phuongthuc_id'
                           dataTextField='ten_phuongthuc' />
              </div>
            </div>
          </div>
        </div>

        <div class='col-4'>
          <div class='info-row'>
            <div class='key w110'>ĐV chủ quản</div>
            <div class='value'>
              <div class='select-custom'>
                <SelectExt v-model='donvi_id'
                           :allowFiltering='true'
                           :dataSource='initialData.DONVI'
                           dataValueField='donvi_id'
                           dataTextField='ten_dv' />
              </div>
            </div>
          </div>
        </div>

        <div class='col-4'>
          <div class='info-row'>
            <div class='key w110'>Trạng thái</div>
            <div class='value'>
              <div class='select-custom'>
                <SelectExt v-model='trangthai_id'
                           :allowFiltering='true'
                           :dataSource='initialData.TRANGTHAI'
                           dataValueField='trangthai_id'
                           dataTextField='trangthai_spdv' />
              </div>
            </div>
          </div>
        </div>

        <div class='col-4'>
          <div class='info-row'>
            <div class='key w110'>Mã định danh</div>
            <div class='value'>
              <input type='text' class='form-control' v-model='ma_dt' />
            </div>
          </div>
        </div>

        <div class='col-4'>
          <div class='info-row'>
            <div class='key w110'>Tên dịch vụ</div>
            <div class='value'>
              <input type='text' class='form-control' v-model='ten_chitieu' />
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class='box-form'>
      <div class='legend-title'>Danh sách đề nghị cấp mã dịch vụ</div>
      <ejs-treegrid :dataSource="dsDeNghiCapMaSP" :treeColumnIndex='1' :allowFiltering='true'
                  :sortSettings='sortSettings' @rowSelected="selectedRowChanged"
                  :allowSorting='true' childMapping='children' :allowPaging="true" :pageSettings='pageSettings' >
                  <e-columns>
                    <e-column field='madt_id' headerText='ID' headerTextAlign='Center' textAlign='Center' width=30></e-column>
                    <e-column field='nhomgiaiphap' headerText='Nhóm giải pháp' headerTextAlign='Center' textAlign='Left' width=180></e-column>
                    <e-column field='dv_chuquan' headerText='Đơn vị chủ quản' headerTextAlign='Center' textAlign='Left' width=150></e-column>
                    <e-column field='ma_dt' headerText='Mã định danh' headerTextAlign='Center' textAlign='Left' width=90></e-column>
                    <e-column field='ten_thuongmai' headerText='Tên thương mại' headerTextAlign='Center' textAlign='Left' width=120></e-column>
                    <e-column field='ten_viettat' headerText='Tên viết tắt' headerTextAlign='Center' textAlign='Left' width=90></e-column>
                    <e-column field='trangthai_spdv' headerText='Trạng thái' headerTextAlign='Center' textAlign='Left' width=90></e-column>
                </e-columns>
                </ejs-treegrid>
                <DataGrid
                :dataSource='dsDichVu.data'
                :columns='dsDichVu.columns'
                :allowGrouping="true"
                :enabledSelectFirstRow='false'
                :allowPaging='true'
                :enablePagingServer='false'
                :showFilter='false'
                :toolbar='null'
                @selectedRowChanged="selectedRowChanged"
              />
    </div>


    <ejs-dialog :isModal='false' :enableResize='true' :visible='false'
                ref='popupHistory'
                :header='"Lịch sử tác động"'
                showCloseIcon='true'
                target='.main-wrapper' width='75%'
                height='500' allowDragging='true' :animationSettings='animationSettings'>
      <div>
        <div class='box-form'>
          <DataGrid
            :dataSource='history.data'
            :columns='history.columns'
            :enabledSelectFirstRow='false'
            :allowPaging='true'
            :enablePagingServer='false'
            :showFilter='false'
            :toolbar='null'
          />
        </div>        
      </div>
    </ejs-dialog>
    <b-modal id="popupKoDuyet" size="large" title="Không duyệt" dialog-class="dialog-content" body-class="body-content" header-class="popup-header" 
        content-class="popup-box" no-close-on-esc no-close-on-backdrop
        @hidden="handleKoDuyet_Hidden()"
        @ok="handleKoDuyet_Ok()">
        <div class="info-row">
            <div class="key">
                <span class="name">Lý do</span>
            </div>
            <div class="value">
                <input type="text" class="form-control" v-model="lydo_koduyet">
            </div>
        </div>
    </b-modal>
  </div>
</div>
