<div class="device-detail-page">
  <div class="page-header">
    <div class="title">
      <span class="icon one-notepad"></span>
      {{ currentMode == 'VIEW' ? ' Chi tiết thiết bị: ' + (item && item.TEN ? item.TEN : 'Chưa có tên') : currentMode
      == 'EDIT' ? ' Chỉnh sửa thiết bị: ' + (item && item.TEN ? item.TEN : 'Chưa có tên') : ' Thêm mới thiết bị' }}
    </div>
  </div>
  <div class="page-content p-2">
    <!-- TAB NAVIGATION -->
    <div class="">
      <div class="nav tab-over tabs">
        <a
          href="#tabThongTinChung"
          v-on:click="onChangeTab(1)"
          data-toggle="tab"
          class="tab"
          :class="{active: tab_index == 1}"
          >Thông tin chung</a
        >
        <a
          href="#tabLichSuThayDoi"
          v-on:click="onChangeTab(2)"
          data-toggle="tab"
          v-if="currentMode != 'ADD'"
          class="tab"
          :class="{active: tab_index == 2}"
          >Lịch sử thay đổi</a
        >
      </div>
    </div>
    <div class="tab-content" style="margin-bottom: 20px;">
      <div class="tab-pane" id="tabThongTinChung" :class="{active: tab_index == 1}">
        <!-- THÔNG TIN CHUNG -->
        <ThongTinChung
          ref="ThongTinChung"
          :currentItem="currentItem"
          :currentMode="currentMode"
          :controls="controls"
        />
      </div>
      <div class="tab-pane" id="tabLichSuThayDoi" :class="{active: tab_index == 2}">
        <!-- LỊCH SỬ TÁC ĐỘNG -->
        <div class="box-form" v-if="currentMode != 'ADD'">
          <div class="legend-title">Lịch sử tác động</div>
          <TabHistory :tenBang="'THIETBI'" :tenCot="''" :khoaDuLieu="currentItem.id" ref="tabHistory"></TabHistory>
        </div>
      </div>
    </div>
  </div>
</div>
