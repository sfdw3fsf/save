<div class="">
  <div class="legend-title">Thông tin lắp đặt</div>

  <div class="row">
    <div class="col-sm-4 col-12">
      <div class="info-row">
        <div class="key w130">Lắp đặt tại IDC <bss-required-marker /></div>
        <div class="value">
          <SelectExt
            v-model="currentItem.lapDatTaiIdcId"
            dataTextField="TEN"
            dataValueField="ID"
            :dataSource="danhMucData.danhMucIdcList || []"
            :disabled="true"
          />
        </div>
      </div>
    </div>
    <div class="col-sm-4 col-12">
      <div class="info-row">
        <div class="key w130">Toà nhà <bss-required-marker /></div>
        <div class="value">
          <SelectExt
            v-model="currentItem.toaNhaId"
            dataTextField="TEN"
            dataValueField="ID"
            :dataSource="danhMucData.toaNhaList || []"
            :disabled="true"
          />
        </div>
      </div>
    </div>
    <div class="col-sm-4 col-12">
      <div class="info-row">
        <div class="key w130">Mặt sàn</div>
        <div class="value">
          <SelectExt
            v-model="currentItem.matSanId"
            dataTextField="TEN"
            dataValueField="ID"
            :dataSource="danhMucData.matSanList || []"
            :disabled="true"
          />
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-sm-4 col-12">
      <div class="info-row">
        <div class="key w130">Phòng/ Zone</div>
        <div class="value">
          <SelectExt
            v-model="currentItem.phongZoneId"
            dataTextField="TEN"
            dataValueField="ID"
            :dataSource="danhMucData.phongList || []"
            :disabled="true"
          />
        </div>
      </div>
    </div>
    <div class="col-sm-4 col-12">
      <div class="info-row">
        <div class="key w130">Rack</div>
        <div class="value">
          <SelectExt
            v-model="currentItem.rackId"
            dataTextField="TEN"
            dataValueField="ID"
            :dataSource="danhMucData.rackList || []"
            :disabled="true"
          />
        </div>
      </div>
    </div>
    <div class="col-sm-4 col-12">
      <div class="info-row">
        <div class="key w130">U Trên</div>
        <div class="value">
          <SelectExt
            v-model="currentItem.uTrenId"
            dataTextField="VITRI"
            dataValueField="ID"
            :dataSource="danhMucData.uTrenList || []"
            :disabled="true"
          />
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-sm-4 col-12">
      <div class="info-row">
        <div class="key w130">Thời điểm lắp đặt <bss-required-marker /></div>
        <div class="value">
          <ejs-datepicker
            v-model="currentItem.thoiDiemLapDat"
            :format="'dd/MM/yyyy'"
            :enabled="false"
          >
          </ejs-datepicker>
        </div>
      </div>
    </div>
    <div class="col-sm-4 col-12">
      <div class="info-row">
        <div class="key w130">U Dưới</div>
        <div class="value">
          <SelectExt
            v-model="currentItem.uDuoiId"
            dataTextField="VITRI"
            dataValueField="ID"
            :dataSource="danhMucData.uDuoiList || []"
            :disabled="true"
          />
        </div>
      </div>
    </div>
  </div>
</div>
