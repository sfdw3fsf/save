<div class="main-wrapper hoavqtqg">
  <div class="breadcrumb-top">
    <div class="main-title">Danh mục công đoạn đơn vị tham gia bán chéo</div>
    <ul class="breadcrumb">
      <li class="breadcrumb-item"><a href="#"><span class="nc-icon-outline ui-1_home-simple"></span> Trang chủ </a></li>
      <li class="breadcrumb-item"><a href="#">Dữ liệu</a></li>
      <li class="breadcrumb-item"><a href="#">Quản lý bán chéo</a></li>
      <li class="breadcrumb-item">Danh mục công đoạn đơn vị tham gia bán chéo</li>
    </ul>
  </div>
  <div class="list-actions-top">
    <ul class="list">
      <li title="Danh mục công đoạn đơn vị tham gia bán chéo">
        <a href="#" @click="onClickNew">
          <span class="icon one-file-plus"></span>Nhập mới
        </a>
      </li>
      <li title="Ghi lại" @click="onClickSave">
        <a href="#">
          <span class="icon one-save"></span>Ghi lại
        </a>
      </li>
      <li title="Hủy">
        <a href="#" @click="onClickNew">
          <span class="icon nc-icon-glyph ui-1_circle-remove"></span>Hủy
        </a>
      </li>
      <li title="Xóa">
        <a href="#" @click="onClickRemove()">
          <span class="icon one-trash"></span>Xóa
        </a>
      </li>

    </ul>
  </div>

  <div class="page-content" id="checkTTDKNCVT">
    <div class="grid-stack-box">
      <Split :gutterSize="20">
        <SplitArea :size="100" :minSize="100">
          <div class="box-col box-form" id="boxLeft">
            <div class="legend-title">Thông tin danh mục công đoạn</div>
            <div class="row">
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w110">Mã công đoạn</div>
                  <div class="value">
                    <input type="text" class="form-control" disabled v-model="model.ma_cd">
                  </div>
                </div>
              </div>

              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w120">Tên công đoạn <span class="required"> *</span></div>
                  <div class="value">
                    <input type="text" class="form-control" v-model="model.congdoan">
                  </div>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w110">Đối tượng bán<span class="required"> *</span></div>
                  <div class="value">
                    <SelectExt
                      placeholder="Đối tượng bán"
                      v-model="model.khdn"
                      :allowFiltering="true"
                      dataTextField="loai_kh"
                      dataValueField="loaikh_id"
                      :dataSource="dtbList"
                      @change="changeDtb">
                    </SelectExt>
                  </div>
                </div>
              </div>
              <div class="col-sm-6 col-12">
                <div class="info-row">
                  <div class="key w120">Tình trạng<span class="required"> *</span></div>
                  <div class="value">
                    <SelectExt
                      placeholder="Tình trạng"
                      v-model="model.ttcd_id"
                      :allowFiltering="true"
                      dataTextField="name"
                      dataValueField="id"
                      :dataSource="tinhtrangList"
                      @change="changeTinhtrang">
                    </SelectExt>
                  </div>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-sm-12 col-12">
                <div class="info-row">
                  <div class="key w110">Mô tả</div>
                  <div class="value">
                    <textarea class="form-control" style="height: 80px;resize: vertical;"
                              v-model="model.mota"></textarea>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </SplitArea>
      </Split>
    </div>
    <YesNoModal :content="xoaContent" idModal='popup-confirmXoa' @onOk="onXoaConfirm" />
    <div class="box-form">
      <div class="legend-title">Danh sách công đoạn</div>
      <DataGrid ref="tblCongDoan" v-bind:columns="gridbox.cols"
                v-bind:dataSource="gridbox.list"
                :showFilter="true"
                :enabledSelectFirstRow="false"
                :showColumnCheckbox="true"
                @selectedItemsChanged="dsCongDoanChange"
                :allowPaging="true" :enablePagingServer="false"
                :totalRecords="gridbox.list.length">
      </DataGrid>
    </div>
  </div>


</div>
