<div class="main-wrapper">
  <breadcrumb :header="header" />
  <div class="list-actions-top">
    <ul class="list">
      <li v-for="item in actions" :key="item.id" @click="onActionClick(item)" :class="{disabled: !item.active}"
        v-show="item.visible">
        <a style="cursor: pointer;" :class="{'disabled': !item.active}">
          <span class="icon" :class="item.icon_class"></span> {{ item.name }}
        </a>
      </li>
    </ul>

  </div>
  <div class="page-content">

    <div class="row">
      <div class="col-sm-12 col-12">
        <div class="box-form">
          <div class="legend-title">
            Thông tin gói cước
          </div>
          <div class="row">
            <div class="col-sm-4 col-12">
              <div class="info-row">
                <div class="key">Dịch vụ gia tăng</div>
                <div class="value">
                  <div class="select-custom">
                    <SelectExt v-model="formTT.dichvugt_id" :allowFiltering="true" dataTextField="ten_dvgt"
                      dataValueField="dichvugt_id" :dataSource="options.ds_dichvu_gt">
                    </SelectExt>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-sm-4 col-12">
              <div class="info-row">
                <div class="key">Nhóm đối tượng</div>
                <div class="value">
                  <div class="select-custom">
                    <SelectExt v-model="formTT.nhomdt_id" :allowFiltering="true" dataTextField="nhom_dt"
                      dataValueField="nhomdt_id" :dataSource="options.ds_nhom_dt">
                    </SelectExt>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-sm-4 col-12">
              <div class="info-row">
                <div class="key">Tỷ lệ giảm</div>
                <div class="value">
                  <div class="select-custom">
                    <SelectExt v-model="formTT.tyle_giam" :allowFiltering="true" dataTextField="ten_tyle_giam"
                      dataValueField="tyle_giam" :dataSource="options.ds_tyle_giam">
                    </SelectExt>
                  </div>
                </div>
              </div>

            </div>
          </div>

          <div class="row">
            <div class="col-sm-4 col-12">
              <div class="info-row">
                <div class="key">Tiền giảm</div>
                <div class="value">
                  <input type="number" class="form-control" v-model="formTT.tien_giam" required>
                </div>
              </div>
            </div>

            <div class="col-sm-4 col-12">
              <div class="info-row">
                <div class="key">Phút giảm</div>
                <div class="value">
                  <input type="number" class="form-control" v-model="formTT.phut_giam" required>
                </div>

              </div>
            </div>
            <div class="col-sm-4 col-12">
              <div class="info-row">
                <div class="key">Phút đầu</div>
                <div class="value">
                  <input type="number" class="form-control" v-model="formTT.phut_dau" required />
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>

    </div>

    <div class="box-form">
      <div class="legend-title">
        <div class="pull-left">
          Danh sách gói cước
        </div>
        <div class="clearfix"></div>
      </div>
      <div class="">
        <vue-card label="">
          <DataGrid ref="gvDanhSach" v-bind:columns="gvDanhSach.tableCollumns" v-bind:dataSource="gvDanhSach.tableData"
            :showColumnCheckbox="false" :showFilter="true" :allowPaging="true" :enablePagingServer="false"
            :enabled-select-first-row="true" @rowSelected="selectItem">
          </DataGrid>
        </vue-card>
      </div>
    </div>
  </div>
</div>
