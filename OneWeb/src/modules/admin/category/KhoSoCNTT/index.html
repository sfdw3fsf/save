<div class="main-wrapper">
  <breadcrumb :header="header" />
  <div class="list-actions-top">
    <ul class="list">
      <li v-for="item in actions" :key="item.id" @click="onActionClick(item)" :class="{disabled: !item.active}"
        v-show="item.visible">
        <a style="cursor: pointer;" :class="{'disabled': !item.active}">
          <span class="icon" :class="item.icon_class"></span> {{ item.name }}
        </a>
      </li>

      <input
        ref="fileUpload"
        type="file"
        @click="$refs.fileUpload.value = ''"
        @change="onChange"
        hidden
      />
    </ul>

  </div>
  <div class="page-content">

    <div class="row">
      <div class="col-sm-12 col-12">
        <div class="box-form">
          <div class="legend-title">
            Thông tin số CF
          </div>
          <div class="row">
            <!-- <div class="col-sm-4 col-12">
              <div class="info-row">
                <div class="key">Tỉnh</div>
                <div class="value">
                  <div class="select-custom">
                    <SelectExt v-model="formTT.phanvung_id" :allowFiltering="true" dataTextField="tentinh"
                      dataValueField="phanvung_id" :dataSource="options.ds_tinh">
                    </SelectExt>
                  </div>
                </div>
              </div>
            </div> -->
            <div class="col-sm-4 col-12">
              <div class="info-row">
                <div class="key">Trạng thái số</div>
                <div class="value">
                  <div class="select-custom">
                    <SelectExt v-model="formTT.trangthaiso_id" :allowFiltering="true" dataTextField="ten_ttso"
                      dataValueField="trangthaiso_id" :dataSource="options.ds_trangthaiso">
                    </SelectExt>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-sm-4 col-12">
              <div class="info-row">
                <div class="key">Nhóm số</div>
                <div class="value">
                  <div class="select-custom">
                    <SelectExt v-model="formTT.nhomso_id" :allowFiltering="true" dataTextField="nhom_so"
                      dataValueField="nhomso_id" :dataSource="options.ds_nhomso">
                    </SelectExt>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-sm-4 col-12">
              <div class="info-row">
                <div class="key">Kiểu số</div>
                <div class="value">
                  <div class="select-custom">
                    <SelectExt v-model="formTT.kieuso_id" :allowFiltering="true" dataTextField="kieu_so"
                      dataValueField="kieuso_id" :dataSource="options.ds_kieuso">
                    </SelectExt>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-sm-4 col-12">
              <div class="info-row">
                <div class="key">Loại thuê bao</div>
                <div class="value">
                  <div class="select-custom">
                    <SelectExt v-model="formTT.loaitb_id" :allowFiltering="true" dataTextField="loaihinh_tb"
                      dataValueField="loaitb_id" :dataSource="options.ds_loaihinh_tb">
                    </SelectExt>
                  </div>
                </div>

              </div>
            </div>
            <div class="col-sm-4 col-12">
              <div class="info-row">
                <div class="key">Số máy</div>
                <div class="value">
                  <input type="text" class="form-control" v-model="formTT.somay" required />
                </div>
              </div>
            </div>


            <div class="col-sm-4 col-12">
              <div class="info-row">
                <div class="key">Ghi chú</div>
                <div class="value">
                  <input type="text" class="form-control" v-model="formTT.ghichu"></input>
                </div>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col-sm-4 col-12">
              <div class="info-row">
                <div class="key">Tiền tố</div>
                <div class="value">
                  <input type="text" class="form-control" v-model="formTT.tiento">
                </div>
              </div>
            </div>
            <div class="col-sm-4 col-12">
              <div class="info-row">
                <div class="key">Số bắt đầu</div>
                <div class="value">
                  <input type="number" class="form-control" v-model="formTT.so_bd">
                </div>
              </div>
            </div>
            <div class="col-sm-4 col-12">
              <div class="info-row">
                <div class="key">Số kết thúc</div>
                <div class="value">
                  <input type="number" class="form-control" v-model="formTT.so_kt">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="box-form">
        <div class="legend-title">
          <div class="pull-left">
            Danh sách số
          </div>
          <div class="clearfix"></div>
        </div>
        <div class="">
          <vue-card label="">
            <DataGrid ref="gvDanhSach" v-bind:columns="gvDanhSach.tableCollumns"
              v-bind:dataSource="gvDanhSach.tableData" :showColumnCheckbox="false" :showFilter="true"
              :allowPaging="true" :enablePagingServer="false" :enabled-select-first-row="true"
              @rowSelected="selectItem">
            </DataGrid>
          </vue-card>
        </div>
      </div>
    </div>
  </div>
</div>
