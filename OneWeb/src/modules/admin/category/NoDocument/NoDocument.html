<div class="main-wrapper">
    <breadcrumb :header="header" />
    <div class="list-actions-top">
        <ul class="list">
            <li>
                <a href="#" v-if="statusNhapMoi" @click.prevent="NhapMoi">
                    <span class="icon one-file-plus"></span>Nhập mới
                </a>
                <a v-else href="#" class="disabledInput">
                    <span class="icon one-file-plus"></span>Nhập mới
                </a>
            </li>
            <li>
                <a href="" @click.prevent="GhiLai" v-if="statusGhiLai">
                    <span class="icon one-save"></span>Ghi lại
                </a>
                <a v-else href="#" class="disabledInput">
                    <span class="icon one-save"></span>Ghi lại
                </a>
            </li>
            <li>
                <a href="#" @click.prevent="Huy" v-if="statusHuy">
                    <span class="icon nc-icon-glyph ui-1_circle-remove"></span>Hủy
                </a>
                <a v-else href="#" class="disabledInput">
                    <span class="icon nc-icon-glyph ui-1_circle-remove"></span>Hủy
                </a>
            </li>
            <li>
                <a href="#" v-if="statusXoa" @click.prevent="BtnXoa">
                    <span class="icon one-trash"></span>Xóa
                </a>
                <a v-else href="#" class="disabledInput">
                    <span class="icon one-trash"></span>Xóa
                </a>
            </li>
            <li>
                <a @click="uploadFileNT_showDialog">
                    <span class="icon fa fa-cloud-upload"></span> File đính kèm
                </a>
                <input type="file" style="display: none;" multiple accept=".doc,.docx,.xls,.xlsx,.pdf" ref="uploadFileNT" @change="uploadFileNT_OnChange" />
            </li>
        </ul>
    </div>
    <div class="page-content">
        <div class="box-form">
            <div class="legend-title">Thông tin công văn</div>
            <div class="row">
                <div class="col-sm-7 col-12">
                    <div class="row">
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w110">
                                    Số công văn <span>*</span>
                                </div>
                                <div>
                                    <input id="socongvan" type="text" class="form-control" v-model="txtSoCongVan"
                                        ref="txtSoCongVan" maxlength="360">
                                </div>
                            </div>
                        </div>
                            <div class="col-sm-6 col-12">
                                <div class="info-row">
                                    <div class="key w110">ĐV phát hành <span>*</span></div>
                                    <div class="select-custom">
                                        <select name="" id="donviphathanh" class="form-control"
                                            v-model="listbox.donvi_phathanh.value">
                                            <option v-for="dv_phathanh in listbox.donvi_phathanh.list"
                                                v-bind:value="dv_phathanh.donvi_id">{{ dv_phathanh.ten_dv }}</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-12 col-12">
                            <div class="info-row">
                                <div class="key w110">
                                    Tên công văn <span>*</span>
                                </div>
                                <div>
                                    <input id="tencongvan" type="text" class="form-control" v-model="txtTenCongVan"
                                        maxlength="500">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-3 col-12">
                            <div class="info-row">
                                <div class="key w110">Năm <span>*</span></div>
                                <div>
                                    <input type="text" id="nam" onkeydown="return ( event.ctrlKey || event.altKey 
                                                                                    || (47<event.keyCode && event.keyCode<58 && event.shiftKey==false) 
                                                                                    || (95<event.keyCode && event.keyCode<106)
                                                                                    || (event.keyCode==8) || (event.keyCode==9) 
                                                                                    || (event.keyCode>34 && event.keyCode<40) 
                                                                                    || (event.keyCode==46) )"
                                        class="form-control" v-model="txtNam" maxlength="4">
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-6 col-12">
                            <div class="info-row">
                                <div class="key w120">Ngày quyết định <span>*</span></div>
                                <div>
                                    <DatePicker :format="dateFormat" placeholder="__/__/____" :value-type="'format'"
                                        v-model="dtpNgayQD" ref="dtpNgayQD" id="dtpNgayQD" @change="onChangeNgayQD"
                                        :input-attr="{required: 'true',title: 'Bạn chưa nhập ngày quyết định!'}">
                                    </DatePicker>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-3 col-12">
                            <div class="info-row">
                                <div class="key hieu-luc">
                                    <div class="check-action">
                                        <input type="checkbox" class="check" v-model="booleanValue">
                                        <p class="name">Hiệu lực</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-12 col-12">
                            <div class="info-row">
                                <div class="key w110">Loại công văn <span>*</span></div>
                                <div class="select-custom">
                                    <select name="" id="loaicongvan" class="form-control"
                                        v-model="listbox.loai_cv.value">
                                        <option v-for="cong_van in listbox.loai_cv.list"
                                            v-bind:value="cong_van.loaicv_id">{{ cong_van.ten_loai }}</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="info-row">
                        <div class="key w110">Công văn VNP</div>
                        <ComboboxGrid :valueField="CV_VNP.valueField" :textField="CV_VNP.textField"
                            v-model="CV_VNP.KhuVucId" :value="CV_VNP.KhuVucId" :columns="CV_VNP.headers"
                            :panelDataHeight="CV_VNP.panelDataHeight" :enabledSelectFirstRow="true"
                            :placeHolder="`Chọn loại công văn VNP ...`" :dataSource="CV_VNP.data">
                        </ComboboxGrid>
                    </div>
                    <div class="info-row">
                        <div class="key w110">File đính kèm <span>*</span></div>
                        <div class="attachments">
                            <div v-if="attachments.length>0" v-for="attachment in attachments" :key="attachment.url">
                                <a :href="attachment.url" target="_blank">{{ attachment.ten_file }}</a>
                                <span class="delete-icon" @click="removeAttachment(attachment.url,attachment.file_id)">&#10060;</span>
                            </div>
                        </div>
                    </div>
                    
                </div>
                <div class="col-sm-5 col-12">
                    <div class="info-row">
                        <div class="key nd"> 
                            Nội dung
                        </div>
                        <div>
                            <textarea data-v-0ffcf221="" name="" id="" cols="30" rows="10" class="form-control"
                                style="height: 145px; resize: none;" v-model="txtNoiDung" reg="txtNoiDung"
                                maxlength="2000"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="box-form">
            <div class="legend-title">
                <div class="pull-left">
                    Danh sách công văn
                </div>
                <div class="pull-right" style="width:40%">
                  <div class="col-sm-12 col-12">
                    <div class="info-row">
                      <div class="key w100">Loại công văn</div>
                      <div class="value">
                        <div class="select-custom">
                            <select name="" id="loaicongvan" class="form-control"
                                v-model="listbox.loai_cv.value" @change="searchLoaiCV">
                                <option v-for="cong_van in listbox.loai_cv.list"
                                    v-bind:value="cong_van.loaicv_id">{{ cong_van.ten_loai }}</option>
                            </select>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="clearfix"></div>
            </div>
            <div class="table-content">
                <table class="table-result table-gachle table-filter">
                    <DataGrid ref="dscongvan" v-bind:columns="listbox.ketquatimkiem.cols" :showColumnCheckbox="false"
                        v-bind:dataSource="this.listbox.ketquatimkiem.list" :showFilter="true" :allowPaging="true"
                        :enabledSelectFirstRow="true" :enablePagingServer="false"
                        @selectedRowChanged="grdKhachHangChanged">
                    </DataGrid>
                </table>
            </div>
        </div>
    </div>
</div>
