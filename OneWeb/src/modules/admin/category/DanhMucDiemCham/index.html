
<div class="main-wrapper">
  <breadcrumb :header="header" />
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <a href="javascript:;" v-on:click="Clear" >
          <span class="icon one-save"></span> Thêm mới
        </a>
      </li> 
      <li>
        <a href="javascript:;" v-on:click="tsbtnGhilai_Click" >
          <span class="icon one-save"></span> Ghi lại
        </a>
      </li> 
      <li>
        <a href="javascript:;" v-on:click="tsbtnXoa_Click" >
          <span class="icon one-save"></span> Xóa
        </a>
      </li> 
    </ul>
  </div>
  <div class="page-content">
     <vue-card label="Thông tin điểm chạm">
        <div class="row">          
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w90">Mã điểm chạm</div>
              <div class="value">
                <input type="text" class="form-control" v-model="txtMaDiemCham">
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w120">Loại điểm chạm</div>
              <div class="value">
                <div class="select-custom">
                  <SelectExt v-model="cboLoaiDiemCham.value"
                            :allowFiltering="true"
                            :dataSource="cboLoaiDiemCham.data"
                            dataValueField="id"
                            dataTextField="value"/>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="row">          
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w90">Tên điểm chạm</div>
              <div class="value">
                <input type="text" class="form-control" v-model="txtTenDiemCham">
              </div>
            </div>
          </div>
          <div class="col-sm-6 col-12">
            <div class="info-row">
              <div class="key w120">Điểm chạm cha</div>
              <div class="value">
                <div class="select-custom">
                  <SelectExt v-model="cboDiemChamCha.value"
                            :allowFiltering="true"
                            :dataSource="cboDiemChamCha.data"
                            dataValueField="ungdung_id"
                            dataTextField="ten_ungdung"/>
                </div>
              </div>
            </div>
          </div>
        </div>
      </vue-card>      
      <vue-card label="Danh sách điểm chạm">
        <DataGrid :dataSource="dsDiemCham"
                  :columns="cols"
                  :allowPaging="true"
                  :enablePagingServer="false"      
                  :allow-excel-export="true"                         
                  @rowSelected="dsDiemCham_Click"     
                  ref="gridDanhSach"/>
      </vue-card>
  </div>
  
</div>
