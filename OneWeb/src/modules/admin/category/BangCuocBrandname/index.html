<div class="main-wrapper">
    <breadcrumb :header="header" />
    <div class="list-actions-top">
        <ul class="list">
            <li v-for="item in actions" :key="item.id" @click="onActionClick(item)" :class="{disabled: !item.active}"
                v-show="item.visible">
                <a style="cursor: pointer;" :class="{'disabled': !item.active}">
                    <span class="icon" :class="item.icon_class"></span> {{ item.name }}
                </a>
            </li>
        </ul>

    </div>
    <div class="page-content">

        <div class="row">
            <div class="col-sm-12 col-12">
                <div class="box-form">
                    <div class="legend-title">
                        Thông tin bảng cước
                    </div>
                    <div class="row">
                        <div class="col-sm-4 col-12">
                            <div class="info-row">
                                <div class="key">Phân loại</div>
                                <div class="value">
                                    <div class="select-custom">
                                        <SelectExt v-model="formTT.phanloai_id" :allowFiltering="true"
                                            dataTextField="phanloai" dataValueField="phanloai_id"
                                            :dataSource="options.ds_phanloai">
                                        </SelectExt>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-4 col-12">
                            <div class="info-row">
                                <div class="key">Nhà mạng</div>
                                <div class="value">
                                    <div class="select-custom">
                                        <SelectExt v-model="formTT.nhamang_id" :allowFiltering="true"
                                            dataTextField="nhamang" dataValueField="nhamang_id"
                                            :dataSource="options.ds_telco">
                                        </SelectExt>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-4 col-12">
                            <div class="info-row">
                                <div class="key">Loại đại lý</div>
                                <div class="value">
                                    <div class="select-custom">
                                        <SelectExt v-model="formTT.loai_daily" :allowFiltering="true"
                                            dataTextField="loai_daily" dataValueField="loai_daily_id"
                                            :dataSource="options.ds_loai_daily">
                                        </SelectExt>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="row">
                        <div class="col-sm-4 col-12">
                            <div class="info-row">
                                <div class="key">HT thanh toán</div>
                                <div class="value">
                                    <div class="select-custom">
                                        <SelectExt v-model="formTT.ht_thanhtoan" :allowFiltering="true"
                                            dataTextField="ht_thanhtoan" dataValueField="ht_thanhtoan_id"
                                            :dataSource="options.ds_ht_thanhtoan">
                                        </SelectExt>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-sm-4 col-12">
                            <div class="info-row">
                                <div class="key">Loại nhãn</div>
                                <div class="value">
                                    <div class="select-custom">
                                        <SelectExt v-model="formTT.loainhan_id" :allowFiltering="true"
                                            dataTextField="label_type_name" dataValueField="label_type_id"
                                            :dataSource="options.ds_label_type">
                                        </SelectExt>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="col-sm-4 col-12">
                            <div class="info-row">
                                <div class="key">Đơn giá</div>
                                <div class="value">

                                    <input type="number" class="form-control" v-model="formTT.dongia" required />

                                </div>
                            </div>
                        </div>
                        
                    </div>


                    <div class="row">
                        <div class="col-sm-4 col-12">
                            <div class="info-row">
                                <div class="key">Số lượng từ</div>
                                <div class="value">
                                    <input type="number" class="form-control" v-model="formTT.sl_tu" required />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-4 col-12">
                            <div class="info-row">
                                <div class="key"> Số lượng đến</div>
                                <div class="value">
                                    <input type="number" class="form-control" v-model="formTT.sl_den" required />
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-4 col-12">
                            <div class="info-row">
                                <div class="key">Ghi chú</div>
                                <div class="value">
                                    <input type="text" class="form-control" v-model="formTT.ghichu" required />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-sm-4 col-12">
                            <div class="info-row">
                                <div class="key">Ngày bắt đầu</div>
                                <div class="value">
                                    <date-picker
                                        input-class="form-control"
                                        :format="dateFormat"
                                        :value-type="'format'"
                                        v-model="formTT.ngay_bd"
                                        style="width: 100%;"
                                    ></date-picker>
                                    <!-- <input type="date" class="form-control" required
                                        :value="new Date().toISOString().substr(0, 10)" id="formTT.dtpNgayBD"
                                        @input="HandleDate('formTT.ngay_bd', $event.target.value)" /> -->
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-4 col-12">
                            <div class="info-row">
                                <div class="key">Ngày kết thúc</div>
                                <div class="value">
                                    <date-picker
                                        input-class="form-control"
                                        :format="dateFormat"
                                        :value-type="'format'"
                                        v-model="formTT.ngay_kt"
                                        style="width: 100%;"
                                    ></date-picker>
                                </div>
                            </div>
                        </div>
                        <div class="col-sm-4 col-12">
                            <div class="info-row">
                                <div class="key">Thời hạn</div>
                                <div class="value">
                                    <input type="number" class="form-control" required
                                        
                                        v-model="formTT.thoihan" />
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="box-form">
            <div class="legend-title">
                <div class="pull-left">
                    Danh sách bảng cước
                </div>
                <div class="clearfix"></div>
            </div>
            <div class="">
                <vue-card label="">
                    <DataGrid ref="gvDanhSach" v-bind:columns="gvDanhSach.tableCollumns"
                        v-bind:dataSource="gvDanhSach.tableData" :showColumnCheckbox="false" :showFilter="true"
                        :allowPaging="true" :enablePagingServer="false" :enabled-select-first-row="true"
                        @rowSelected="selectItem">
                    </DataGrid>
                </vue-card>
            </div>
        </div>
    </div>
</div>
