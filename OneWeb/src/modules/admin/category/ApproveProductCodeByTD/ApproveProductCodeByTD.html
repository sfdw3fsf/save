<div>
  <div class="breadcrumb-top">
    <div class="main-title">TĐ PHÊ DUYỆT CẤP MÃ SẢN PHẨM</div>
    <ul class="breadcrumb">
      <li class="breadcrumb-item"><a href="#"><span class="nc-icon-outline ui-1_home-simple"></span> Trang chủ
      </a></li>
      <li class="breadcrumb-item"><a href="#">QLSPDV</a></li>
      <li class="breadcrumb-item active">TĐ phê duyệt cấp mã sản phẩm</li>
    </ul>
  </div>
  <div class="list-actions-top">
    <ul class="list">
      <li>
        <a href="#" class="hand_click click-tk" v-on:click.prevent="timKiem">
          <span class="icon one-search"></span> Tìm kiếm
        </a>
      </li>
      <li v-show="SanPhamSelected != undefined">
        <a href="#" class="hand_click" v-on:click.prevent="xemThongTinSanPham">
          <span class="icon fa fa-eye"></span> Xem
        </a>
      </li>
      <li>
        <a href="#" class="hand_click" v-on:click.prevent="pheDuyet_Tct">
          <span class="icon one-file-check"></span> Phê duyệt
        </a>
      </li>
      <li>
        <a href="#" class="hand_click" v-on:click.prevent="khongPheDuyet_Tct">
          <span class="icon one-cancel"></span> Không duyệt
        </a>
      </li>
<!--      <li>-->
<!--        <a href="#" class="hand_click" v-on:click.prevent="guiTapDoanDuyet">-->
<!--          <span class="icon one-clipart-check"></span> Gửi TĐ phê duyệt-->
<!--        </a>-->
<!--      </li>-->
<!--      <li>-->
<!--        <a href="#" class="hand_click" v-on:click.prevent="xemLichSuSanPham">-->
<!--          <span class="icon one-history"></span> Lịch sử-->
<!--        </a>-->
<!--      </li>-->
    </ul>
  </div>
  <div class="page-content">
    <div class="box-form">
      <div class="legend-title active">
        <span class="icon fa fa-angle-up hand_click"></span> Thông tin sản phẩm
      </div>
      <div class="grid-stack-box">
        <div id="boxLeft" class="box-col col-sm-12 col-12">
          <div class="row">
            <div class="col-sm-3 col-3">
              <div class="info-row">
                <div class="key">
                  <span class="name">Nhóm SPDV</span>
                </div>
                <div class="value">
                  <SelectExt v-model="searchInfo.nhomspdv_id" dataTextField="ten_nhomspdv"
                             dataValueField="nhomspdv_id" :dataSource="dsSpdv" />
                </div>
              </div>
            </div>
            <div class="col-sm-3 col-3">
              <div class="info-row">
                <div class="key">
                  <span class="name">PT phát triển</span>
                </div>
                <div class="value">
                  <SelectExt v-model="searchInfo.phuongthuc_id" dataTextField="ten_phuongthuc"
                             dataValueField="phuongthuc_id" :dataSource="dsPtPhatTrien" />
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-6">
              <div class="info-row">
                <div class="key">
                  <span class="name">ĐV chủ quản</span>
                </div>
                <div class="value">
                  <SelectExt v-model="searchInfo.donvi_id" dataTextField="ten_dv"
                             dataValueField="donvi_id" :dataSource="dsDonVi" />
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-sm-3 col-3">
              <div class="info-row">
                <div class="key">
                  <span class="name">Trạng thái</span>
                </div>
                <div class="value">
                  <SelectExt v-model="searchInfo.trangthai_id" dataTextField="trangthai_spdv"
                             dataValueField="trangthai_id" :dataSource="dsTrangThai" />
                </div>
              </div>
            </div>
            <div class="col-sm-3 col-3">
              <div class="info-row">
                <div class="key">
                  <span class="name">Mã định danh</span>
                </div>
                <div class="value">
                  <input type="text" class="form-control" v-model="searchInfo.ma_spdv">
                </div>
              </div>
            </div>
            <div class="col-sm-6 col-6">
              <div class="info-row">
                <div class="key">
                  <span class="name">Tên sản phẩm</span>
                </div>
                <div class="value">
                  <input type="text" class="form-control" v-model="searchInfo.ten_spdv">
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="box-form">
      <div class="legend-title active">
        <span class="icon fa fa-angle-up hand_click"></span> Danh sách đề nghị cấp mã sản phẩm
      </div>
      <div class="grid-stack-box">
        <div class="box-col col-sm-12 col-12">
          <DataGrid :dataSource="dgSanPham.dataSource" :groupSettings="dgSanPham.groupOptions"
                    :selectionSettings="dgSanPham.selectionOptions" :allowGrouping="true"
                    :columns="dgSanPham.columns" :allowPaging="true" :enablePagingServer="false"
                    @selectedRowChanged="onDgSanPham_RowChanged" @rowDoubleClicked="xemThongTinSanPham"
                    :enabledSelectFirstRow="true" ref="grdSanPham" />
        </div>
      </div>
    </div>
  </div>

  <b-modal v-show="SanPhamSelected != undefined && SanPhamSelected.length > 0" id="popupProductDetail" size="xl"
           title="Chi tiết sản phẩm" dialog-class="dialog-content" body-class="body-content" header-class="popup-header"
           content-class="popup-box" hide-footer no-close-on-esc no-close-on-backdrop>
    <popupProductDetail :DmChung="this.DmChung" :SanPham="SanPhamSelected"></popupProductDetail>
  </b-modal>
  <b-modal id="popupProductHistory" size="xl" title="Lịch sử sản phẩm" dialog-class="dialog-content"
           body-class="body-content" header-class="popup-header" content-class="popup-box" hide-footer no-close-on-esc
           no-close-on-backdrop>
    <DataGrid :dataSource="dgLichSu.dataSource" :selectionSettings="dgLichSu.selectionOptions"
              :columns="dgLichSu.columns" :allowPaging="true" :enablePagingServer="false" :enabledSelectFirstRow="true"
              ref="grdLichSu" />
  </b-modal>
  <b-modal id="popupKoDuyet" size="large" title="TĐ - Không duyệt" dialog-class="dialog-content" body-class="body-content" header-class="popup-header"
           content-class="popup-box" no-close-on-esc no-close-on-backdrop
           @hidden="handleKoDuyet_Hidden()"
           @ok="handleKoDuyet_Ok()">
    <div class="info-row">
      <div class="key">
        <span class="name">Lý do</span>
      </div>
      <div class="value">
        <input type="text" class="form-control" v-model="lydo_koduyet">
      </div>
    </div>
  </b-modal>
</div>
